body:
  text: 號帝王者何號也號者功之表也所以表功明德號令臣下者也德合天地者稱帝仁義合者稱王別優劣也禮記諡法曰德象天地稱帝仁義所生稱王帝者天號王者五行之稱也皇者何謂也亦號也皇君也美也大也天人之總美大之稱也時質故總稱之也號之為皇者煌煌人莫違也煩一夫擾一士以勞天下不為皇也不擾匹匹夫匹匹婦故為皇故黃金棄於山珠玉捐於淵巖居穴處衣皮毛飲泉液吮露英虛無廖廓與天地通靈也號言為帝者何帝者諦也象可承也王者往也天下所歸往鉤命決曰三皇步五帝趨三王馳五霸騖或稱天子或稱帝王何以為接上稱天子者明以爵事天也接下稱帝王者得明位號天下至尊言之稱以號令臣下也故尚書曰帝曰咨四嶽王曰裕汝衆或有稱一人王者自謂一人者謙也欲言己材能當一人耳故論語曰百姓有過在豫一人臣下謂之一人何亦所以尊王者也以天下之大四海之內所共尊者一人耳故尚書曰不施豫一人或稱朕何亦王者之謙稱也朕我也或稱豫者豫亦我也不以尊稱自也但自我皆謙或稱君子何者何道德之稱也君之為言群也子者丈夫之通稱也故孝經曰君子之教以孝也下言所以敬天下之為人父者也何以言知其通稱也以天子至於民故詩云凱弟君子民之父母論語云君子哉若人此謂弟子弟子者民也三皇者何謂也謂伏羲神農燧人也或曰伏羲神農祝融也禮曰伏羲神農祝融三皇也謂之伏羲者何古之時未有三綱六紀民人但知其母不知其父能覆前而不能覆後臥之行之吁吁飢即求食飽即棄餘茹毛飲血而衣皮葦於是伏羲仰觀象於天俯察法於地因夫婦正五行始定人道畫八卦以治下下以治天下伏而化之故謂之伏羲也謂之神農何古之人民皆食禽獸肉至於神農人民衆多禽獸不足於是神農因天之時分地之利制耒耜教民農作神而化之使民宜之故謂之神農也謂之燧人何鑽木燧取火教民熟食養人利性避臭去毒謂之燧人也謂之祝融何祝者屬也融者續也言能屬續三皇之道而行之故謂祝融也五帝者何謂也禮曰黃帝顓頊帝嚳帝堯帝舜五帝也易曰黃帝堯舜氏作書曰帝堯帝舜黃帝者中和之色自然之姓性萬世不易黃帝始作制度得其中和萬世常存故稱黃帝也謂之顓頊何顓者專也頊者正也能專正天人之道故謂之顓頊也謂之帝嚳者何也嚳者極也言其能施行窮極道德也謂之堯者何堯猶嶢嶢墝墝也至高之貌清妙高遠優遊博衍衆聖之主百王之長也謂之舜者何舜猶諯言能推准信堯道而行之三王者何謂也夏殷周也故禮士冠經曰周辨殷哻冔夏收三王共皮辨也所以有夏殷周號何以為王者受命必立天下之美號以表功自克明易姓為子孫制也夏殷周者有天下之大號也百王同天下無以相別改制天下之大禮號以自別於前所以表著己之功業也必改號者所以明天命已著欲顯揚己於天下也己復襲先王之號與繼體守文之君無以異也不顯不明非天意也故受命王者必擇天下美號表著己之功業明當致施是也所以預自表克於前也帝王者居天下之尊號也所以差優號令臣下諡者行之跡也所以別於後代著善惡垂無窮無自推觀施後世皆以勸善著戒惡明不勉也不以姓為號何姓者一字之稱也尊卑所同也諸侯各稱一國之號而有百姓矣天子至尊即備有天下之號而兼萬國矣夏者大也明當守持大道殷者中也明當為中和之道也聞也見也謂當道著見中和之為也周者至也密也道德周密無所不至也何以知即政立號也詩云命此文王于周于京此改號為周易邑為京也春秋傳曰王者受命而王必擇天下之美號以自號也五帝無有天下之號何五帝德大能禪以民為子成于天下無為立號也或曰唐虞者號也唐蕩蕩也蕩蕩者道德至大之貌也虞者樂也言天下有道人皆樂也故論語曰唐虞之際帝嚳有天下號曰高辛顓頊有天下號曰高陽黃帝有天下號曰自然有熊有熊者獨宏大道德也高陽者陽猶明也道德高明也高辛者道德大信也五霸者何謂也昆吾氏大彭氏豕韋氏齊桓公晉文公也昔三王之道衰而五霸存其政率諸侯朝天子正天下之化興復中國攘除夷狄故謂之霸也昔昆吾氏霸於夏者也大彭氏豕韋氏霸於殷者也齊桓晉文霸於周者也或曰五霸謂齊桓公晉文公秦穆公楚莊王吳王闔閭也霸者伯也行方伯之職會諸侯朝天子不失人臣之義故聖人與之非明王之法不張霸猶迫也把也迫脅諸侯把持其王政論語曰管仲相桓公霸諸侯春秋曰公朝于王所於是時知晉文之霸也尚書曰邦之榮懷亦尚一人之慶知秦穆之霸也楚勝鄭而不告從而攻之又令還師而佚晉寇圍宋宋因而與之平引師而去知楚莊之霸也蔡侯無罪而拘於楚吳有憂中國心興師伐楚諸侯莫敢不至知吳之霸也或曰五霸謂齊桓公晉文公秦穆公宋襄公楚莊王也宋襄伐齊亂齊桓公宋襄伐齊不擒二毛不鼓不成烈列春秋傳曰雖文王之戰不是過知其霸也侯伯子男臣子於其國中褒其君為公王者臣子獨不得襄褒其君謂之為帝何以為諸侯有會聚之事相朝聘之道或稱公而尊或稱伯子男而卑為交接之時不私其臣子之義心俱欲尊其君父故皆令臣子得稱其君為公也帝王異時無會同之義故無為同也何以知諸侯德得稱公春秋曰葬齊侯桓公齊侯也尚書曰公曰嗟秦伯也詩云覃公惟維私覃子也春秋曰葬皆許繆公許男也禮大射經曰公則擇釋獲大射者諸侯之禮也伯子男皆在也
