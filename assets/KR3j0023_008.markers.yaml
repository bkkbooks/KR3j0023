  - {type: variant, offset: 467, length: 3, content: 尊賢重, SBCK: 復記論語何見夫子遭事異變出之號令失法文王所以演易何文王受王不率仁義之道失爲人法矣已之調和隂陽尚微故演易使我得卒至于太平日月之光明則如易矣伏羲作八卦何伏羲始王天下未}
  - {type: page-break, offset: 467, content: '', id: KR3j0023_SBCK_008-19b}
  - {type: variant, offset: 467, length: 0, content: '', WYG: 譏者乃謂其無常者也若乍為名祿甫元言武庚名不以日月山川為名者少賤卑已之稱也臣子當諱為物示通故避之也曲禮曰二名不偏諱逮事父母則諱王父母不逮父母則不諱王父母也君前不諱詩書不諱臨文不諱郊廟中不諱又曰君前臣名父前子名謂大夫名卿弟名兄也明不敢諱於}
