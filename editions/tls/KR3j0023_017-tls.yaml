body:
  text: 耕桑王者所以親耕后親桑何以率天下農蠶也天子親耕以供郊廟之祭后之后親桑以供祭服祭義曰天子三推三公五推卿大夫士七推耕於東郊何東方少陽農事始起桑於西郊何西方少陰女功所成故曾子問曰天子耕東田而三反之周官曰后親桑率外內命婦蠶於北郊禮祭義曰古者天子諸侯必有公桑蠶室近外水為之築周宮棘晹茈閉之者也
