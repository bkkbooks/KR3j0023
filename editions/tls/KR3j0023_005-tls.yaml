body:
  text: 社稷王者所以有社稷何為天下地求福報功人非土不立非穀不食土地廣博不可敬也五穀眾多不可一一而祭也故封土立社示有土尊稷五穀之長故封稷而祭之也尚書曰乃社于新邑孝經曰保其社稷而和其民人蓋諸侯之孝也稷者得陰陽中和之氣而用尤多故為長也歲再祭之何春求穀秋報之義也故月令仲春之月擇元日命人民社仲秋之月擇元日命民社援神契曰仲春秋獲穫禾報社祭稷祭社稷以三牲何重功故也尚書曰乃社于新邑羊牛一牛羊一豕一工王制曰天子社稷皆太牢諸侯社稷皆俱少牢宗廟俱大牢社稷獨少牢何宗廟大牢所以廣孝道也社稷為報功諸侯一國所報者少故也孝經曰保其社稷而和其民人蓋諸侯之孝也王者諸侯所以俱兩社何俱有上土之君也故禮記三正曰王者二社為天下立禮社曰太社自為立社曰王社諸侯為百姓立社曰國社自為立社曰侯社大社為天下報功王社為京師報功也太社尊於王社土地久故而報之王者諸侯必有誡柴社何者何示有存亡也明為善者得之為惡者失之故春秋公羊傳曰亡國之社奄其上柴其下郊特牲記曰喪國之社屋之自言示與天地絕也在門東明自下示斥之無事處也或曰皆當著明誡當近君置宗廟之牆南禮曰亡國之社稷必以為宗廟之屏示賤之也社稷在中門之外外門之內何尊而親之與先祖同也不置中門內何敬之示不褻瀆也論語曰譬諸宮墻不得其門而入不見宗廟之美百官之富祭義曰右社稷左宗廟大夫有民其有社稷者亦為報功也禮祭法曰大夫以下成群立社曰置在社月令曰擇元日命人社論語曰季路使子羔為費宰曰有民人焉有社稷焉不謂之土何封土為社故變名謂之社別於眾土也為社稷立祀治即謂之稷語亦不自變示有內外或曰至社稷不以稷為為稷社故不變其名事自示可知也不正月祭稷何禮不常存養人為用故立其神社無屋何達天地氣故郊特牲曰天子太社稷必受霜露風雨以達天地之氣社稷所以有樹何尊而識之使民人民望見師即敬之又所以表功也故周官曰司徒班社而樹之各以土地所生宜尚書亡逸篇曰太社唯松東社唯柏南社唯梓西社唯栗北社唯槐王者自親祭社稷何社者土地之神也土生萬物天下之所主也尊重之故自祭也其壇大何如如何春秋文義曰天子之社稷廣五丈諸侯半之其色如何春秋傳曰天子有太社焉也東方青色南方赤色西方白色北方黑色上冒以黃土故將封東方諸侯取青土苴以白茅各取其面以為封社明土謹敬潔清也祭社稷有樂乎樂記曰樂之施於金石絲竹越於聲音用之於宗廟社稷曾子問曰諸侯之祭社稷俎豆既陳聞天子崩如之何孔子曰廢臣子哀痛之不敢終於禮也
