seq: 2
front:
  text: 再祭何春求榖之義也故月令仲春之月擇元日命人社援神契曰仲春獲禾報社祭稷以三牲何重功故也尚書曰乃社于新邑羊一牛一豕一王制曰天子社稷皆大牢諸侯社稷皆少牢宗廟俱大牢社稷獨少牢何宗廟大牢所以廣孝道也社稷為報功諸侯一國所報者少故也王者諸侯俱兩社何俱有土之君禮記三正曰王者二社為天下立社曰太社自為立社曰王社諸侯為百姓立社曰國社自為立社曰侯社太社為天下報功王社為京師報功太社尊於王社土地久故而報之王者諸侯必有誡社何示有存亡也明為善者得之惡者失之故春秋公羊傳曰亾國之社奄其上柴其下郊特牲曰䘮國之社屋之自言與天地絶也在門東明自下之無事處也或曰皆當著明誡當近君置宗廟之墻南禮曰亡國之社稷必以為宗廟之屏示賤之也社稷在中門之外外門之内何尊而親之與先祖同也不置中門内何敬之示不褻瀆也論語曰譬諸宫墻不得其門而入不見宗廟之美百官之富祭義曰右社稷左宗廟大夫有民其有社稷者亦為報功也禮祭法曰大夫成羣立社曰置社月令曰擇元日命人社論語曰季路使子羔為費宰曰有民人焉有社稷焉不謂之土何封土為社故變名謂之社利於衆土也為社立祀始謂之稷語亦自變有内外或曰至稷不以稷為社故不變其名事自可知也不正月祭稷何禮不常存養人為用故立其神社無屋何逹天地氣故郊特牲曰太社稷必受霜露風雨以逹天地之氣社稷所以有樹何尊而識之使民人望見師敬之又所以表功也故周官曰司社而樹之各以土地所生尚書曰大社唯松東社唯柏南社唯梓西社唯栗北社唯槐王者自親祭社稷何社者土地之神也土生萬物天下之所主也尊重之故自祭也其壇大何如春秋文義曰天子之社稷廣五丈諸侯半之其色如何春秋傳曰天子有太社焉東方青色南方赤色西方白色北方黒色上冒以黄土故將封東方諸侯青土苴以白茅謹敬㓗清也祭社有樂樂記曰樂之施於金石絲竹越於聲音用之於宗廟社稷曾子問曰諸侯之祭社稷爼豆既陳聞天子崩如之何孔子曰廢臣子哀痛之不敢終於禮也
