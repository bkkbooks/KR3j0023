  - {type: variant, offset: 413, length: 0, content: '', SBCK: 謝則必賜之几杖王記曰臣致仕於君者飬之以其禄之半几杖所以扶助衰也故王制曰五十杖於家六十杖於郷七十杖於國八十杖於朝臣老歸年九十君欲有問則就其室以珎􅀙明尊賢也故禮祭義曰八十不仕朝於君問就之大夫老歸死以大夫禮葬車馬衣服如之何曰盡如故也辟雍古者所以年十五入太學何以爲八􅀊毀齒始有識知入學學書計七八十五隂陽􅇱故十五成童志明入太學學經術學之爲言覺也悟所不知也故學以治性慮以變情故玉不􅅣不成器人不學不知道子夏曰百工居肆以致其事君子學以致其道故礼曰十年曰㓜學論語曰吾十有五而志於學三十而立又生而知之者上也學而知之者次也是以雖有自然之性必立師傅焉論語䜟曰五帝立師三王制之傳曰黄帝師力牧帝顓頊師緑圖帝嚳師赤松子帝尭師務成子帝舜師尹夀禹師國先生湯師伊尹文王師吕望武王師尚父周公師虢叔孔子師老聃天子太子諸侯丗子皆就師於外尊師重先生之道也禮曰有來學者無往教者也易曰匪我求童􅀩童􅀩求我王制曰小學在公宫南之左太學在郊又曰天子太子群后之太子公卿大夫之元士嫡子皆造焉父所以不自教子何爲丗瀆也又授之道當極􅀃隂陽夫婦變化之事不可父子相教也師弟子之道有三論語曰朋友自逺方來朋友之道也又曰回也視予猶父也父子之道以君臣之義教之君臣之道也天子立辟雍何所以行礼樂宣德化也辟者璧也象璧圎又以法天於雍水側象教化流行也辟之爲言積也積天下之道德也雍之爲言壅也壅天下之殘賊故謂之辟雍也王制曰天子曰辟雍諸侯曰泮宫外圎者欲使觀之平均也又欲言外圎内方明德當圎行當方也不言圎辟何又圎於辟何以知其圎也以其言辟也何以知有外也又詩云思樂泮水薄采其荇詩訓曰水圎如璧諸侯曰泮宫者半於天子宫也明尊卑有差所化少也半者象璜也獨南面礼儀之方有水耳其餘壅之言垣宫名之别尊卑也明不得化四方也不曰泮雍何嫌但半天子制度也詩云穆穆魯侯克明其徳旣作泮宫淮夷攸服郷曰庠里曰序庠者庠礼義也序者序長㓜也礼五帝記曰帝庠序之學則父子有親長㓜有序善如尓舎明令必次外然後前民者也未見於仁故立庠序以導之也教民者皆里中之老而有道徳者為右師教里中之子弟以道藝孝悌行義立五帝之德朝則坐於里之門弟子皆出就農而復罷示如之皆入而復罷其有出入不時早晏不莭有過故使語之言心無由生也􅀂旣收蔵皆入教學立春而就事其有賢才美質如學者足以聞其心頑鈍之民亦足以别於禽獸而知人倫故無不教之民孔子曰以不教民戰是謂弃之明無不教民也天子所以有靈臺者何所以考天人之心察隂陽之㑹揆星度之證驗爲万物􅀗福無方之元詩云經始靈臺天子立明堂者所以通神靈感天地正四時出教化宗有徳童有道顯有能褒有行者也明堂上圎下方八䆫四闥布政之宫在國之陽上圎法天下方法地八䆫象八風四闥法四時九室法九州十二坐法十二月三十六戸三十六兩七十二牖法七十二風災變天所以有災變何所以譴告人君覺悟其行欲令悔過修德深思慮也援神契曰行有玷缺氣逆于天情感變出以戒人也災異者何謂也春秋潛潭巴曰災之言傷也随事而誅異之言恠先感動之也何以言災有哭也春秋曰新宫火三日哭傳曰必三日哭何禮也災三日哭所以然者宗廟先礼所處􅀑神無形體曰今忽得天火得無爲災所中乎故哭也變者何謂變者非常也耀嘉曰禹將受位天意火變迅風靡木雷雨晝㝠服乗者何謂衣服乍大乍小言語非常故尚書大傳曰時則有服乗也孽者何謂也曰介蟲生爲非常尚書大傳曰時則有介蟲之孽時則有􅀛孽尭遭洪水湯遭大旱示有譴告乎尭遭洪水湯􅇜大旱命運時然所以或災變或異何各随其行因其事也霜之爲言亡也陽以散云雹之爲言合也隂氣專精積合爲雹日}
