  - {type: variant, offset: 3, length: 1, content: 樂, krp: 學記曰當其爲師則不臣也當其爲尸則不臣也不臣將師用兵者重士衆爲敵國國不可從外治兵不可從内御欲成其威一其令春秋之義兵不稱使明不可臣也不臣三老五更者欲率天下爲人子弟禮曰父事三老兄事五更王者不純臣諸侯何尊重之以其列土傳子孫丗丗稱君南面而治凢不臣異朝則迎之於著覲則待之於阼階升降自西階爲庭燎設九賔享禮而後歸是異於衆臣也始封之君不臣諸父弟何不忍以己一日之功德加於諸父兄弟也故禮服傳曰封君之子不臣諸父封君之孫盡臣之禮服傳曰子得爲父臣者不遺善之義也詩云文武受命召公雖翰召公文王子也傳曰子不得爲父臣者閨門尚和朝廷尚敬人不能無過失爲恩傷義也王者臣不得爲諸侯臣以其尊當與諸侯同春秋傳曰許公不丗待以𥘉或曰王者臣得復爲諸侯臣者爲衰丗主上不明賢者非其罪而去道不施行百姓不得其所復令得爲諸侯臣施行其道易曰不事王侯此據言王之致仕臣也言不事王可知復言侯者明年少復得仕於諸侯也王者臣有不名者五先王老臣不名親與先王戮力共治國同功於天下故尊而不名也尚書曰咨爾伯不言名也不名者貴賢者而已共成先祖功德德加于百姓者也春秋曰單父不言名傳曰大夫之命于天子者大也盛德之士名尊賢也春秋曰公弟叔盻諸父諸兄不名諸父諸兄者親與已父兄有敵體之義也詩云王曰叔父春秋傳曰王禮者何無長之稱也不名盛德之士者不可屈爵禄也故韓詩内傳曰師臣者帝交友受臣者王臣臣者爵魯臣者亡不行蓍龜天子下至士皆有蓍龜者重事决疑示不自專尚書曰女則有大疑謀及卿士謀及庶人謀及卜筮定天下之吉凶成天下之亹亹者莫善於蓍龜禮三正記曰天子龜長一尺二寸諸侯一尺大夫八寸士六寸龜隂故數偶也天子蓍長九尺諸侯七尺大夫五尺士三尺蓍陽故數竒也所以先謀及卿士何先盡人事念而不能得思而不能知然後問於蓍龜聖人獨見先睹必問蓍龜何示不自專也或曰清微無端緒非聖人所及聖人亦疑之尚書曰女則有疑謂武王也乾草枯骨衆多非一獨以灼龜何此天地之間壽考之物故問之也龜之爲言乆也蓍之爲言耆也乆長意也龜曰卜蓍曰筮何卜赴也爆見兆筮也者信也見其卦也尚書卜三龜禮士冠經曰筮于廟門外筮畫卦所以必於廟何託義歸智於先祖至尊故因先祖而問之也卜春秋何方以爲於西方東面蓋蓍之處也卜時西嚮已卜退東向問蓍於東方面以少問老之義皮弁素積求之於質也禮曰皮弁素積筮于廟門之外或曰天子占卜九人諸侯七人大夫五人士三人又尚書曰三人占則從二人之言不見吉凶于蓍復以卜何蓍者陽道多變變乃成龜以制火灼之何禮雜記曰龜隂之老也蓍陽之老也龍非水不處龜非火不兆以陽動隂也必以荆者取其究音也禮三正記曰灼龜以荆以火動龜不以水動蓍何以爲嘔則是也蓍龜敗則埋之何重之不欲人襲尊者也周官曰凢國之大事先筮而後卜凢卜人君視體大夫視色士視墨凢人卜事視髙揚火以作龜凢取龜用秋時攻龜用冬時聖人聖人者何聖者通也道也聲也道無所不通明無所不照聞聲知情與天地合德日月合明四時合序鬼神合吉凶禮别名記曰五人曰茂十人曰選百人曰俊千人曰英倍英曰賢萬人曰傑萬傑曰聖聖人未没時寕知其聖乎曰知之論語曰太宰問子貢曰夫子聖者歟孔子曰太宰知我乎聖人亦自知聖乎曰知之孔子曰文王旣没文不在兹乎何以知帝王聖人也易曰古者伏羲氏之王天下也於是始作八卦又曰聖人之作易也又曰伏羲氏没神農氏作神農没黄帝尭舜氏作文俱言作明皆聖人也論語曰聖乎堯舜其由病諸何以言禹湯聖人論語曰巍巍乎舜禹之有天下而不預焉與舜比方巍巍知禹湯聖人春秋傳曰湯以聖德故放桀何以言文王武王周公皆聖人詩曰文王受命非聖不能受命易曰湯武革命順乎天湯武與文王比方孝經曰則周公其人也下言夫聖人之德又何以加於孝乎何以言臯陶聖人也以自篇曰若稽古臯陶聖人而能爲舜陳道朕言惠可底行又旁施象刑維明又聖人皆有表異傳曰伏羲禄衡連珠唯大目鼻龍伏作易八卦以應樞黄帝顔得天匡陽上法中宿取象文昌顓頊戴午是謂清明發節移度蓋象招揺帝嚳駢齒上法月叅康度成紀取理隂陽堯眉八彩是謂通明暦象日月璇璣玉衡舜重瞳子是謂玄景上應攝提以象三光禮曰禹耳三漏是謂大通興利除害决河踈江皐陶鳥喙是謂至誠决獄明白察於人情湯臂三肘是謂柳翼攘去不義萬民蕃息文王四乳是謂至仁天下所歸百姓所親武王望羊是謂攝揚盱目陳兵天下冨昌周公背僂是謂強俊成就周道輔於㓜主孔子反宇是謂尼甫立德澤所與藏元通流聖人所以能獨見前覩與神通精者盖皆天所生也八風風}
