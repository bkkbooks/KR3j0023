body:
  text: 三軍國有必三軍何所以戒非常伐無道尊宗廟重社稷安不忘危也何以言有三軍也論語曰子行三軍則誰與詩云周王于邁六師及之三軍者何法法天地人也以為五人為伍五伍為兩四兩為卒五卒為旅五旅為師五師為軍二千五百人二千五百人為師二師為一軍萬二千五百人為一軍三軍六師一萬五千人也三軍三萬七千五百人也傳曰一人必死十人不能當百人必死千人不能當千人必死萬人不能當萬人必死橫行天下雖有萬人猶謙讓自以為不足故復加五二千人因法月數月者群陰之長也十二月足以窮盡陰陽備物成功萬二千人亦足以征伐不義致天下太平也穀梁傳曰天子有六軍諸侯上國三軍次國二軍下國一軍諸侯所以一軍者何諸侯蕃屏之臣也任兵革之重距一方之難故得有一軍也王者征伐所以必皮辨素幘何伐者凶事素服示有悽愴也伐者質故衣古服禮曰三王共皮辨素幘服亦皮辨素幘又招虞人亦皮辨知伐亦皮辨王者將出辭於禰還格還格於祖禰者言子辭面之禮尊親之義也王制曰王者將出類于上帝宜于社造于禰獨見禰何辭從卑不敢留尊者之命至禰不嫌不至祖也尚書曰歸假于藝祖出所以告天至告祖無二元后廟後告者示不敢留尊者之命也告天何示不敢自專也非出辭反面之道也與宗廟異義還不復告天者天道質無內外天道無外內故不復告也尚書言歸假于祖禰不見言告於天知不告也王者受命質家先伐文家先改正朔何質家之言天命己也使己也誅無道今誅得為王故先伐文家言天命已成為王者乃得誅伐王者耳故先改正朔也又改正朔者文代其質也文者先其文質者先其質也故論語曰豫小子履敢用玄牡敢昭告于皇天上帝此湯伐桀告天用憂夏家之法牲也詩云曰命此文王于周于京此言文王誅伐故改號為周易邑為京也明天著忠臣孝子之義也湯親北面稱臣而事桀不忍相誅也禮曰湯放桀武王伐紂時也王法天誅者天子自出者以為王者乃天之所立而欲謀危社稷故自出重天命也犯王法使方伯誅之尚書曰命今豫惟恭行天之罰此所以言開自出伐有扈也王制曰賜之弓矢乃得專征伐謂誅犯王誅法者也大夫將兵出必不御者欲盛其威使士卒一意繫心也故但聞將軍令不聞君命也明進退在大夫也春秋傳曰此受命于君如伐齊則還何大其不伐喪也大夫以君命出進退在大夫也天子遣將軍必於廟何示不敢自專也獨於祖廟何制法度者祖也王制曰受命于祖受成於學此言於祖廟命遣之義也王法年此卅受王命法兵何重不絶人嗣也師行不必反戰不必勝故須其有世嗣也年六十歸兵者何不忍並鬥父子也王制曰六十不預服戎又曰八十一子不從政九十家不從政父母之喪三年不從政齊衰大功三月不從政廢疾非人不養者一人不從政古者師出不踰時者為怨思也天道一時生一時養人者天之貴物也踰時則內有怨女外有曠夫詩云昔我往矣楊柳依依今我來思雨雪霏霏春秋曰宋人取長葛傳曰外取邑不書此何以書久也王者有三年之喪夷狄有內侵伐之者重天誅為宗廟社稷也春秋傳曰天王居于狄泉傳曰此未三年其稱天王何著有天子也
