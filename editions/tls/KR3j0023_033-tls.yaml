body:
  text: 姓名人所以有姓者何所以崇恩愛厚親親遠禽獸別婚姻也故紀世別類使生相愛死相哀同姓不得相娶皆為重人倫也姓者生也人所稟天氣所以生者也詩云天生烝民尚書曰平章百姓姓所以有百者何以為古者聖人吹律定姓以記其族人含五常而生正聲有五音宮商角徵羽轉而相雜五五二十五轉生四時故百而異也氣殊音悉備故殊姓有百也所以有氏者何所以貴功德賤伎力或氏其官或氏其事聞其氏即可知其德矣所以勉人為善也或氏王父字者何所以別諸侯之後為興滅國繼絕世也王者之子稱王子王者之孫稱王孫諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏故春秋有王子瑕論語有王孫賈又有衛公子荊公孫朝魯有仲孫叔孫季孫楚有昭屈原景齊有高國崔立氏三以知其為子孫也王者之後亦稱王子兄弟立而皆封也或曰王者之孫上亦稱王孫也刑德放曰堯知命表稷契賜生姓子姓姬皋陶典刑不表姓言天任德遠刑禹姓姒氏祖昌意以億薏苡生殷姓子氏祖以玄鳥子生也周姓姬氏祖以履大人跡生也人必有名何所以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有變物有其變人生三月目煦亦能咳笑與人相更荅故因其始有知而名之故禮服傳曰子生三月則父名之於祖廟於祖廟者謂子之親廟也明當為宗祖主也一說名之於燕寢名者幼少小卑賤之稱也寡質略故於無燕寢禮內則曰子生君沐浴朝服夫人亦如之立于阼階西南世婦抱子升自西階君命之士適子執其右手庶子撫其首君曰欽有師帥夫人曰記有成告於四境四境者所以遏絕萌牙芽禁備未然故曾子問曰世子生三月以名告于祖禰內則記曰以名告于山川社稷四境天子太子使士負子於南郊以桑弧蓬矢六射者何也此男子之事也故先表其事然後食其祿必桑弧何桑者相逢接之道也保傅曰天太子生舉之以禮使士負之者何有司齋肅端緌見之南郊見于天韓詩內傳曰太子生以桑弧蓬矢六射上下四方明當有事天地四方也殷以生日名子何殷家質故直以生日名子也以尚書道殷家太甲帝乙武丁也於臣民民臣亦得以甲乙生日名子何不使亦不止也以尚書道殷臣有巫咸有祖己也何以知諸侯不象王者以生日名子也以太王名亶甫王季名歷此殷之諸侯也易曰帝乙謂成湯書曰帝乙謂六代孫也湯生於夏世時何以用甲乙為名曰湯王後乃更變名子孫法耳本名履故論語曰予小子履履湯名也不以子丑為名何曰甲乙者幹也子丑者枝也幹為本本質故以甲乙為名也名或兼或單何示非一也或聽其聲以律定其名或依其事旁其形故名或兼或單也依其事者若后稷是也棄之因名之為棄也旁其形者孔子首類魯國尼丘山故名為丘或旁其名為之字者聞名其名即知其字聞字其字即知其名若名賜字子貢名鯉字伯魚春秋譏二名何所以譏者乃謂其無常者也若乍為名祿甫元言武庚名不以日月山川為名者少賤卑己之稱也臣子當諱為物示通故避之也曲禮曰二名不偏諱逮事父母則諱王父母不逮逮事父母則不諱王父母也君前不諱詩書不諱臨文不諱郊廟中不諱又曰君前臣名父前子名謂大夫名卿弟名兄也明不敢諱於尊者前也太古之時世所不諱者何尚質也故臣子不言其君父之名故禮記曰朝日上值質不諱正天名也人所以十月而生者何人天子之也經任天地之數五故十月而備乃成人也人生所以位泣何本一幹而分得氣異息故泣重離母之義也尚書曰啟呱呱泣也人拜所以自名者何所以泣立號自紀禮拜自後不自名何備陰陽也人所以相拜者何所以表情見意屈節卑體尊事之人者也拜之言服也所以必再拜何法陰陽也尚書曰再拜稽首也必稽首何敬之至也頭至地何以言首謂頭也禮曰首有瘍則沐所以先拜首手後稽首何名順其文質也尚書曰周公拜首手稽首人所以有字何所以冠德明功敬成人也故禮士冠經曰賓北面字之曰伯某甫又曰冠而字之敬其名也所以五十乃稱伯仲者五十知天命思慮定也能順四時長幼之序故以伯仲號之禮檀弓曰幼名冠字五十乃稱伯仲論語曰五十而知天命稱號所以有四何法四時用事先後長幼兄弟之象也故以時長幼號曰伯仲叔季也伯者長也伯者子最長迫近父也仲者中也叔者少也季者幼也適長稱伯伯禽是也庶長稱孟以魯大夫孟氏是也男女異長各自有伯仲法陰陽各自有終始也春秋傳曰伯姬者何內女稱也婦人十五稱伯仲何婦人值質少變陰陽道促蚤成十五通乎織紝之事思慮定故許嫁笄而字故禮經曰女子十五許嫁笄禮之稱字之婦婦人姓以配字何明不娶同姓也故春秋曰伯姬歸于宋姬者姓也值字質家所以積於仲春何值質者親親故近積於仲文子家尊尊故積於叔伯仲之時物尚值叔之時物失之章即如是論語曰周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧不積於叔何蓋以兩兩俱生故也不積於伯季明其無二也文王十子詩傳曰伯邑考武王發周公旦管叔鮮蔡叔度曹叔振鐸成叔處霍叔武康叔封南季載載所以或上其叔季何也管蔡曹霍成康南皆采也故上置叔季上伯邑叔震考也何以獨無乎蓋以為大夫者不是采地也
