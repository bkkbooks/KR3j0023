body:
  text: 考黜諸侯所以考黜何王者所以勉賢抑惡重民之至也尚書曰三載考績三考黜陟禮記九錫車馬衣服樂則朱戶納陛虎賁鈇鉞弓矢秬鬯皆隨其德可行而賜車馬能安民者賜車馬能富民者賜衣服能使民和樂者賜以樂則民衆多者賜以朱戶能進善者賜以納陛能退惡者賜以虎賁能誅有罪者賜以鈇鉞能征不義者賜以弓矢孝道備者賜以秬鬯以先後與施行之次自不相踰相為本末然安民然後富貴足富足而後樂樂而後衆乃多賢多賢乃能進善進善乃能退惡退惡乃能斷刑內能正己外能正人內外行備孝道乃生能安民故賜車馬以著其功德安其身能使人富足衣食倉廩實故賜衣服以彰其體能使民和樂故賜之樂則以事其先也禮曰夫賜樂者不得以時王之樂事其宗廟也朱盛色戶所以紀民數也故民衆多賜朱戶也古者人君下賢降階一等而禮之故進賢賜之納陛以優之也既能進善當能戒惡故賜虎賁虎賁者所以戒不虞而距惡距惡當斷刑故賜之鈇鉞鈇鉞所以斷大刑刑罰既中則能征不義故賜之弓矢弓矢所以征不義伐無道也圭瓚秬鬯宗廟之盛禮故孝道備而賜之秬鬯所以極著孝道孝道純備故內和外榮玉以象德金以配情芬香條鬯以通神靈玉飾其本君子之性金飾其中君子之道君子有黃中通理之道美素德金者精和之至也玉者德美之至也鬯者芬香之至也君子有玉瓚秬鬯乎車者以配道德也其至矣合天下之極美以通其志也其唯玉瓚秬鬯乎車者謂有赤有青之蓋朱輪特能居前左右寢米庶麋也以其進止有節德綏民路車乘馬以安其身言成章行成規卷袞龍之衣服表顯其德長於教誨內懷至仁則賜時王樂以化其民居處修治房內不泄賜以朱戶以明其列尊賢達德動作有禮賜之納陛以安其體居處修治房內節男女時配貴賤有別則賜朱戶以明其德列威武有矜勇猛徑疾嚴仁堅強執義堅強賜以虎賁以備非常喜怒有節誅伐刑刑刺抗揚威武志在宿衛賜以鈇鉞使得專殺好惡無私內懷仁德執義不傾賜以弓矢使得專征孝道之美百行之本也故賜以玉瓚得專為賜暢也孝慈父母賜以秬鬯使之祭祀故王制曰賜之弓矢然後專殺又曰賜圭瓚然後為暢未賜者資暢於天子王度記曰天子鬯諸侯薰大夫芑蘭士蒹庶人艾車馬衣服樂則三等者賜與其物禮天子賜諸侯民氏服車車服路先設路下四惡亞之又曰諸公奉選篋服王制曰天子賜諸侯樂則以柷將之詩曰君子來朝何錫與之雖無與之路車乘馬又何以與之玄袞及黼書曰明試以功車服以庸朱戶納陛虎賁者皆與之制度而鈇鉞弓矢玉鑽秬鬯皆與之物各因其宜也秬者黑黍一稃二米鬯者以百草之香鬱金合而釀之成為鬯陽達於棓峞陰入于淵泉所以灌地降神也玉瓚者器名也所以灌鬯之器也以圭飾其柄灌鬯貴玉器氣也所以三歲一考績何三年有成故於是賞有功黜不肖尚書曰三載考績三考黜陟何以知始考輒黜之尚書曰三年一考少黜以地書所所以言三考黜陟者謂爵土異也小國考之有功增土進爵後考無功削黜後考有功上而賜之矣五十里不過五賜而進爵土七十里不過七賜而進爵土能有小大行有進退也一說盛德始封百里者賜三等得征伐專殺斷獄七十里伯始封賜二等至虎賁百人後有功賜弓矢復有功賜秬鬯增爵為侯益土百里復有功入為三公五十里子男始封賜一等至樂則復有功稍賜至虎賁增爵為伯復有功稍賜至秬鬯增爵為侯未賜鈇鉞者從大國連率方伯而斷獄受命之五王致太平之主美群臣上下之功故盡封之及中興征伐大功皆封所以著褒大功也盛德之士亦封之所以尊有德也以德封者必試之必為附庸三年有功因而封之五十里元士有功者亦為附庸世其位大夫有功成封五十里卿功成封七十里公功成封百里士有功德遷為大夫大夫有功德遷為卿卿有功德遷為公故爵主有德封主有功也諸侯有九賜習其賜者何子之能否未可知也或曰得之但未得行其習以專也三年有功則皆得用之矣二考無功則削其地而賜自并知之明本非其身所得也身得之者得以賜當稍黜之爵所以封賢也三公功成當封而死得立其子為附庸賢者之體能有一也不二矣一削為七十里侯再削為七十里伯三削為寄公七十里伯一削為五十里伯一二削為五十里子三削地盡五十里子一削為三十里子再削為三十里男三削地盡五十里男一削為三十里男再削為三十里附庸三削爵地盡所以至三削何禮成於三三三三而不改雖反百無益也尚書曰三考黜陟先削地後黜爵者何爵者尊號也地者人所任也今不能治廣土衆民故先削其土地也故王制曰宗廟有不順者君黜以爵山川神祇有不舉者君削以地明爵土不相隨也或曰惡人貪狼狠重土故先削其所重者以懼之也諸侯始封爵土相隨者何君子重德薄刑賞疑宜從重詩云三曰叔父建爾元子俾侯于魯君幼稚唯考不黜者何君子不備責童子也禮八十九十曰耄九十七年曰悼悼與耄雖有罪不加刑焉二王後不貶黜者何尊賓客重先王也以其當尚公也罪惡足以絶之即絶更立其次周公誅祿甫立微子妻父母不削己昆弟削而不黜何非以賢能得之也至於老小但令得大夫受其罪而已諸侯喑聾跛躄惡疾不免黜者何尊人君也春秋曰甲戌己丑陳侯鮑卒傳曰甲戌之日亡己丑之日死而得有狂易之病蜚亡而死由不絶也世子有惡疾廢者何以其不可承先祖也故春秋傳曰兄弟何以不立有疾也何疾爾惡疾也
