  - {type: variant, offset: 1530, length: 238, content: 與之非明王之法不張霸猶迫也把也迫脅諸侯把持其王政論語曰管仲相桓公霸諸侯春秋曰公朝于王所於是時知晉文之霸也尚書曰邦之榮懷亦尚一人之慶知秦穆之霸也楚勝鄭而不告從而攻之又令還師而佚晉寇圍宋宋因而與之平引師而去知楚莊之霸也蔡侯無罪而拘於楚吳有憂中國心興師伐楚諸侯莫敢不至知吳之霸也或曰五霸謂齊桓公晉文公秦穆公宋襄公楚莊王也宋襄伐齊亂齊桓公宋襄伐齊不擒二毛不鼓不成烈列春秋傳曰雖文王之戰不是過知其霸也侯伯子男臣子於其國中褒其君為公王者臣子獨不得襄褒其君謂之為帝何以為諸侯有會聚之事相朝聘, SBCK: ''}
