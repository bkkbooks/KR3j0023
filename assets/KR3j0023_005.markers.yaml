  - {type: variant, offset: 99, length: 1, content: 和, WYG: 分天下出黜陟詩曰周公東征四國是皇言東征述職周公黜陟而天下皆正也又曰蔽芾甘棠勿剪勿伐召伯所茇言邵公述職親說舎於野樹}
  - {type: variant, offset: 101, length: 5, content: 氣而用尤多, WYG: 下也春秋榖梁𫝊曰古之君民以時視民之勤巡狩祭天何本巡狩為祭天告至尚書曰東巡狩至于岱宗柴也王者出必告廟何孝子出辭反面事死如事生尚書歸假于祖禰曾子問曰王者諸侯出稱告祖禰使祝遍告五廟尊親也王者將出告天者示不專也}
