body:
  text: 封公侯王者所以立三公九卿何曰天雖至神必因日月之光地雖至靈必有山川之化聖人雖有萬人之徳必須俊賢三公九卿二十七大夫八十一元士以順天成其道司馬主兵司徒主人司空主地王者受命為天地人之職故八職以置三公各主其一以効其功一公置三卿故九卿也天道莫不成於三天有三光日月星地有三形髙下平人有三尊君父師故一公三卿佐之一卿三大夫佐之一大夫三元士佐之天有三光然後而能遍照各自有三法物成於三有始有中有終明天道而終之也三公九卿二十七大夫八十一元士凡百二十官下應十二子别名記曰司徒典民司空主地司馬順天天者施生所以主兵何兵者為謀除害也所以全其生衞其養也故兵稱天冦賊猛獸皆為除害者所主也論語曰天下有道則禮樂征伐自天子出司馬主兵言馬者馬陽物乾之所為行兵用焉不以傷害為度故言馬也司徒主人不言人言徒者徒衆也重民司空主土不言土言空者空尚主之何况於實以微見著王者立三公九卿二十七大夫足以教道照幽隠必復封諸侯何重民之至也善惡比而易故知擇賢而封之使治其民以著其徳極其才上以尊天子備蕃輔下以子養百姓施行其道開賢者之路讓不自專故列土封賢因而象之象賢重民也州伯何謂也伯長也選擇賢良使長一州故謂之伯也王制曰千里之外設方伯五國以為属属有長十國以為連連有率三十國以為卒卒有正二百一十國以為州州有伯唐虞謂之牧何尚質使大夫往來牧諸侯故謂之牧旁立三人凡十二人尚書曰咨十有二牧何知堯時十有二州也以禹貢言九州也王者所以有二伯者分職而授政欲其亟成也王制曰八伯各以其屬屬於天子之老曰二伯詩云蔽芾丼棠勿剪勿伐召伯所茇春秋公羊傳曰自陜已東周公主之自陜已西召公主之不分南北何東方被聖人化日少西方被聖人化日久故分東西使聖人主其難者賢者主其易者乃俱致太平也又欲令同有陰陽寒暑之節共法度也所分陜者是國中也若言靣八百四十國矣諸侯有三卿者分三事也五大夫者下天子王制曰大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君大夫悉同禮王度記曰子男三卿一卿命於天子諸侯封不過百里象雷震百里所潤雨同也雷者陰中之陽也諸侯象也諸侯比王者為陰南靣賞罰為陽法雷也七十里五十里差徳功也故王制曰凡四海之内九州州方千里建百里之國三十七十里之國六十五十里之國百有二十名山大澤不以封其餘以為附庸閒田天子所治方千里此平土三千并數邑居山川至五十里名山大澤不以封者與百姓共之不使一國獨專也山木之饒水泉之利千里相通所均有無贍其不足制土三等何因土地有髙下中王者即位先封賢者憂人之急也故列土為疆非為諸侯張官設府非為卿大夫皆為民也易曰利建侯此言因所利故立之樂記曰武王克殷反商下車封夏后氏之後於把殷人之後於宋封王子比干之墓釋箕子之囚天下太平乃封親屬者示不私也即不私封之何普天之下莫非王土率土之濱莫非王臣海内之衆已盡得使之不忍使親屬無短足之居一人使封之親親之義也以尚書封康叔據平安也王者始起封諸父昆弟與己共財之義故可與共土一說諸父不得封諸侯二十國厚有功象賢以為民也賢者子孫類多賢又卿不世位為其不子愛百姓各加一功以虞樂其身也受命不封子者父子手足無分離異財之義至昆弟皮體有分别故封之也以舜封弟象有痺之野也封諸侯以夏何陽氣盛養故封諸侯盛養賢也封立人君陽徳之盛者月令曰孟夏之月行賞封諸侯慶賜無不欣悅何以言諸侯繼世以立諸侯象賢也大夫不世位何股肱之臣任事者也為其專權擅勢傾覆國家又曰孫首也庸不任輔政妨塞賢故不世世故春秋公羊𫝊曰譏世世非禮也諸侯世位大夫不世安法所以諸侯南靣之體體陽而行陽道不絶大夫人臣北靣體陰而行陰道絶以男生内嚮有留家之義女生外嚮有從夫之義此陽不絶陰有絶之効也國在立太子者防簒弑壓臣子之亂也春秋之弑太子罪與弑君同春秋曰弑其君之子奚齊明與弑君同也君薨適夫人無子有育遺腹必待其産立之何專適重正也曾子問曰立適以長不以賢何以言為賢不肖不可知也尚書曰惟帝其難之立子以貴不以長防愛憎也春秋曰適以長不以賢立子以賢不以長也始封諸侯無子死不得與兄弟何古者象賢也弟非賢者子孫春秋傳曰善善及子孫不言及昆弟昆弟尊同無相承養之義以閔公不繼莊公也昆弟不相繼之義至繼體諸侯無子得及親屬者以其俱賢者子孫也重其先祖之功故得及之禮服傳曰大宗不可絶同宗則可以為後為人作子何明小宗可以絶大宗不可絶故舍己之父往為後於大宗所以尊祖重不絶大宗也春秋傳曰為人後者為人子者繼世諸侯無子又無弟但有諸父庶兄當誰與庶兄推親之序也王者受命而作興滅國繼絶世何為先王無道妄殺無辜及嗣子幼弱為強臣所奪子孫皆無罪囚而絶重其先人之功故復立之論語曰興滅國繼絶世誅君之子不立者義無所繼也諸侯世位象賢也今親被誅絶也春秋傳曰誅君之子立君見弑其子得立何所以尊君防簒弑春秋繼經曰齊無知殺其君貴妾子公子糾當立也大夫功成未封子得封者善善及子孫也春秋傳曰賢者子孫宜有土地也周公不之魯何為周公繼武王之業也春秋傳曰周公曷為不之魯欲天下一于周也詩云王曰叔父建爾元子俾侯于魯周公身薨天為之變成王以天子之禮葬之命魯郊以明至孝天所興也京師王者必即土中者何所以均教道平徃来使善易以聞為惡易以聞明當懼愼損於善惡尚書曰王來紹上帝自服於土中聖人承天而制作尚書曰公不敢不敬天之休來相宅周家始封於何后稷封於邰公劉去邰之邠詩云即有邰家室又曰篤公劉于邠斯館周家五遷其意一也皆欲成其道也時寧先皇者不以諸侯移必先請從然後行京師者何謂也千里之邑號也京大也師衆也天子所居故大衆言之明諸侯法日月之徑千里春秋傳曰京曰天子之居也王制曰天子之田方千里或曰夏曰夏邑殷曰商邑周曰京師尚書曰率割夏邑謂桀也在商邑謂殷也王制曰天子三公之田視公侯卿視伯大夫視子男士視附庸上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者以是為差也諸侯之下士視上農夫禄足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫禄君十卿禄次國之卿三大夫禄君十卿祿小國之卿倍大夫祿君十卿禄天子之縣内有百里之國九七十里之國二十一五十里之國六十三凡九十三國名山大澤不以朌其餘以祿士以為閒田諸侯入為公卿大夫得食兩家菜必日有能然後居其位徳加於人然後食其祿所以尊賢重有徳也今以盛徳人輔佐兩食之何王制曰天子縣内諸侯祿也外諸侯嗣也天子太子食菜者儲君嗣主也當有土以尊之也太子食百里與諸侯封同故禮曰公士大夫子子也無爵而在大夫上故百里也公卿大夫皆食菜者示與民同有無也五行五行者何謂也謂金木水火土也言行者欲為天行氣之義也地之承天猶妻之事夫臣之事君也謂其位卑卑者親事故自周於一行尊於天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方北方者陰氣在黄泉之下任養萬物水之為言淮也陰化沾濡任生木木在東方東方者陰陽氣始動萬物始生木之為言觸也陽氣動躍火在南方南方者陽在上萬物垂枝火之為言委隨也言萬物布施火之為言化也陽氣用事萬物變化也金在西方西方者陰始起萬物禁止金之為言禁也土在中央者主吐含萬物土之為言吐也何知東方生樂記曰春生夏長秋收冬藏土所以不名時地土别名也比於五行最尊故不自居部職也元命包曰土之為位而道在故大不預化人主不任部職五行之性或上或下何火者陽也尊故上水者陰也卑故下木者少陽金者少隂有中和之性故可曲直可從革土者最大苞含物將生者出者將歸者不嫌清濁為萬物尚書曰水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡五行所以二陽三陰何土尊尊者配天金木水火陰陽自偶水味所以醎何是其性也所以北方醎者萬物醎與所以堅之也猶五味得醎乃堅也木味所以酸者何東方萬物之生也酸者以達生也猶五味得酸乃達也火味所以苦何南方主長養苦者所以長養也猶五味須苦可以養也金味所以辛何西方煞傷成物辛所以煞傷之也猶五味得辛乃委煞也土味所以甘何中央者中和也故甘猶五味以甘為主也尚書曰潤下作醎炎上作苦曲直作酸從革作辛稼穡作甘北方其臰朽者何北方水萬物所幽藏也又水者受垢濁故臰腐朽也東方者木也萬物新出地中故其臭羶南方者火也盛陽承動故其臭焦西方者金也萬物成熟始復諾故其臭腥中央土也主養故其臭香也月令曰東方其臭羶南方其臭焦中央其臭香西方其臭腥北方其臭朽所以名之為東方者動方也萬物始動生也南方者任養之方萬物懷任也西方者遷方也萬物遷落也北方者伏方也萬物伏藏也少陽見寅寅者演也律中大簇律之言率所以率氣令生也卯者茂也律中夾鍾衰於辰辰震也律中姑洗其日甲乙甲者萬物孚甲也乙者物蕃屈有節欲出時為春春之為言偆偆動也位在東方其色青其音角角者氣動躍也其帝太皡皥者大起萬物擾也其神勾芒勾芒者物之始生其精青龍芒之為言萌也陰中陽故太陽見於己巳者物必起律中仲呂壯盛於午午物滿長律中㽔賓衰於未未味也律中林鍾其日丙丁丙者其物炳明丁者强也時為夏夏之言大也位在南方其色赤其音徴徴止也陽度極也其帝炎帝者太陽也其神祝融祝融者屬續其精為鳥離為鸞故少陰見於申申者身也律中夷則壯於酉酉者老物收歛律中南呂衰于戌戌者滅也律中無射無射者無聲也其日庚辛庚者物更也辛者隂始成時為秋秋之為言愁亡也其位西方其色白其音商商者强也其帝少皥少皥者少歛也其神蓐收蓐收者縮也其精白虎虎之為言搏討也故太陰見於亥亥者仰也律中應鍾壯於子子者孶也律中黄鍾衰於丑丑者紐也律中大呂其日壬癸壬者陰始任癸者揆度也時為冬冬之為言終也其位在北方其音羽羽之為言舒言萬物始孶其帝顓頊顓頊者寒縮也其神𤣥㝠𤣥㝠者入㝠也其精𤣥武掩起離體泉龜蛟珠蛤土為中宫其日戊巳戊者茂也巳抑屈起其音宫宫者中也其帝黄帝其神后土月令云十一月律謂之黄鍾何中和之色鍾者動也言陽氣動於黄泉之下動養萬物也十二月律謂之大吕何大大也吕者拒也言陽氣欲出陰不許也吕之為言拒者旅抑拒難之也正月律謂之大蔟何太亦大也蔟者湊也言萬物始大湊地而出也二月律謂之夾鍾何夾者孚甲也言萬物孚甲種類分也三月謂之姑洗何姑者故也洗者鮮也言萬物皆去故就其新莫不鮮明也四月謂之仲吕何言陽氣極將彼故復中難之也五月謂之㽔賓㽔者下也賓者敬也言陽氣上極陰氣始賓敬之也六月謂之林鍾何林者衆也萬物成熟種類衆多七月謂之夷則何夷傷則法也言萬物始傷被刑法也八月謂之南吕何南者任也言陽氣尚有任生薺麥也故陰拒之也九月謂之無射何射者終也言萬物隨陽而終也當復隨陰起無有終已十月謂之應鍾何鍾動也言萬物應陽而動下藏也五行所以更王何以其轉相生故有終始也木生火火生土土生金金生水水生木是以木王火相土死金囚水休王所勝者死囚故王者休木王火相何以知為臣土所以死者子為父報仇者也五行之子慎之物歸母木王火相金成其火燋金金生水水滅火報其理火生土土則害水莫能而禦五行所以相害者天地之性衆勝寡故水勝火也精勝堅故火勝金剛勝柔故金勝木專勝㪚故木勝土實勝虚故土勝水也火陽君之象也水隂臣之義也臣所以勝其君何此謂無道之君也故為衆陰所害猶紂王也是使水得施行金以盖之土以應之欲温則温欲寒則寒亦何從得害火乎曰五行各自有隂陽木生火所以還燒其母何曰金勝木火欲為木害金金者堅强難消故母以遜體助火燒金此自欲成子之義又陽道不相離故為兩盛母死子乃繼之木王所以七十二日何土王四季各十八日合九十日為一時王九十日土所以王四季何木非土不生火非土不榮金非土不成水無土不髙土扶㣲助衰歴成其道故五行更王亦須土也王四季居中央不名時五行何以知同時起丑訖義相生傳曰五行並起赴各以别名陽生陰煞火中無生物水中反有生物何生者以内火陰在内故不生也水火獨一種金木多品何以為南北陰陽之極也得其極故一也東西非其極也故非一也水木可食金火土不可食何木者陽陽者施生故可食火者陰在内金者陰嗇􅈔故不可食火水所以殺人何水盛氣也故入而殺人火陰在内故殺人壯於水也金木微氣故不能自殺人也火不可入其中者陰在内也入則殺人矣水土陽在内故可入其中金木微氣也精密不可得入也水火不可加人功為用金木加人功何火者盛陽水者盛陰者也氣盛不變故不可加人功為人用金木者不能自成故須人加功以為人用也五行之性火熱水寒有温水無寒火何明臣可以為君君不可更為臣五行常在火乍亡何水太陰也刑者故常在金少陰木少陽微氣無變故亦常在火太陽精微人君之象象尊常藏猶天子居九重之内臣下衞之也藏於木者依於仁也木自主金須人取之乃成陰卑不能自成也木所以浮金所以沉何子生於母之義肝所以沉肺所以浮何有知者尊其母也一說木畏金金之妻庚受庚之化木者法其本柔可曲直故浮也肝法其化直故沉五行皆同義天子所以内明而外昧人所以外明而内昧何明天人欲相嚮而治也行有五時有四何四時為時五行為節故木王即謂之春金王即謂之秋土尊不任職君不居部故時有四也子不肯禪何法法四時火不興土而興金也父死子繼何法法木終火王也兄死弟及何法法夏之承春也善善及子孫何法法春生待夏復長也惡惡止其身何法法秋煞不待冬也主㓜臣攝政何法法土用事於季孟之間也子之復讎何法法土勝水水勝火也子順父臣順君妻順夫何法法地順天也男不離父母何法法火不離木也女離父母何法法水流去金也娶妻親迎何法法日入陽下陰也君讓臣何法法月三十日名其功也善稱君過稱已何法法陰陽共敘共生陽名生陰名煞臣有功歸於君何法法歸明於日也臣法君何法法金正木也子諫父何法法火揉直木也臣諫君不從則去何法法水潤下逹於上也君子逺子近孫何法法木逺火近土也親属臣諌不相去何法法水木枝葉不相離也父為子隠何法法木之藏火也子為父隠何法法水逃金也君有衆民何法法天有衆星也王者賜先親近後踈逺何法法天雨髙者先得之也長幼何法法四時有孟仲季也朋友何法法水合流相承也父母生子養長子何法法水生木長大也子養父母何法法夏養長木此火養母也不以父命廢主命何法法金不畏土而畏火陽舒陰急何法法日行遲月行疾也有分土無分民何法法四時各有分而所生者通也若言東東方天下皆生也君一娶九女何法法九州象天之施也不娶同姓何法法五行異類乃相生也子䘮父母何法法木不見水則憔悴也䘮三年何法法三年一閏天道終也父䘮子夫䘮妻何法法一歲物有終始天氣亦為之變也年六十閉房何法法六月陽氣衰也人有五藏六府何法法五行六合也人目何法法日月明也日照晝月照夜人目所不更照何法目亦更用事也王者監二王之後何法法木須金以正須水以潤也明王先賞後罰何法法四時先生後煞也
