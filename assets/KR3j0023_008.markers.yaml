  - {type: variant, offset: 159, length: 1, content: 京, krp: 人禀隂陽氣而生故内懷五性六情情者静也性者生也此人所禀六氣以生者也故鈎命决曰情生於隂欲以時念也性生於陽以理也陽氣者仁隂氣者貪故情有利欲性有仁也五常者何謂仁義禮智信也仁者不忍也施生愛人也義者冝也斷决得中也禮者履也履道成文也智者知也獨見前聞不惑於事見微者也信者誠也專一不移也故人生而應八卦之體得五氣以爲常仁義禮智信是也六情者何謂也喜怒哀樂愛惡謂六情所以扶成五性性所以五情所以六者何人本含六律五行氣而生故内有五藏六府此情性之所由出入也樂動聲儀曰官有六府人有五藏五藏者何也謂肝心胏腎脾也肝之爲言干也胏之爲言費也情動得序心之爲言任也任於恩也腎之爲言冩也以竅冩也脾之爲言辨也所以積精禀氣也五藏肝仁胏義心禮腎智脾信也肝所以仁者何肝木之精也仁者好生東方者陽也萬物始生故肝象木色青而有枝葉目爲之候何目能出淚而不能内物木亦能出枝葉不能有所内也胏所以義者何胏者金之精義者斷决西方亦金成萬物也故胏象金色白也鼻爲之候何鼻出入氣髙而有竅山亦有金石累積亦有孔穴出雲布雨以潤天下雨則雲消鼻能出納氣也心所以爲禮何心火之精也南方尊陽在上卑隂在下禮有尊卑故心象火色赤而銳也人有道尊天本在上故心下銳也耳爲之候何耳能遍内外别音語火照有似於禮上下分明腎所以智何腎者水之精智者進而止無所疑惑水亦進而不惑北方水故腎色黒水隂故腎雙竅爲之候何竅能㵼水亦能流濡脾所以信何脾者土之精也土尚任養萬物爲之象生物無所私信之至也故脾象土色黄也口爲之候何口能啖甞舌能知味亦能出音聲吐滋液故元命苞曰目者肝之使肝者木之精蒼龍之位也鼻者胏之使胏者金之精制割立斷耳者心之候心者火之精上爲張星隂者腎之冩腎者水之精上爲虚危口者脾之門戸脾者土之精上爲北斗主變化者也或曰口者心之候耳者腎之候或曰肝繫於目胏繫於鼻心繫於口脾繫於舌腎繫於耳六府者何謂也謂}
