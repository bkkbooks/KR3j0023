  - {type: variant, offset: 1455, length: 2, content: 昔昆, SBCK: 隂陽順而復故曰柷承順天地序迎萬物天下樂之故樂用柷柷始也敔終也一說笙柷鼓簫瑟塤鐘磬也如其次笙在北方柷在東北方鼓在東方琴在南方塤在西南方鐘在西方磬在北方聲五音八何聲爲本出於五行音爲末象八風故樂記曰聲成文謂之音知音而樂之謂之樂也問曰異􅀃並行則弟子疑焉孔子有言}
