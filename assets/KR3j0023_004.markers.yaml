  - {type: variant, offset: 3, length: 1, content: 祀, krp: 伍爲兩四兩爲卒五卒爲旅五旅爲師師二千五百人師爲一軍六師一萬五千人也傳曰一人必死十人不能當百人必死千人不能當千人必死萬人不能當萬人必死横行天下雖有萬人猶謙讓自以爲不足故復加五千人因法月數月者群隂之長也十二足以窮盡隂陽備物成功二千人亦足以征伐不義致太平也榖梁傳曰天子有六軍諸侯上國三軍次國二軍下國一軍諸侯所以一軍者何諸侯蕃屏之臣也任兵革之重距一方之難故得有一軍王者征伐所以必皮弁素幘何伐者凶事素服示有悽愴也伐者質故衣古服禮曰三王共皮弁素幘服亦皮素幘又招虞人亦皮弁知伐亦皮王者將出辤於禰還格祖禰者言子辤面之禮尊親之義也王制曰王者將出類于上帝冝于社造于禰尚書曰歸假于藝祖出所以告天至告祖無二元后廟後告者示不敢留尊者之命也告天何示不敢自專非出辭反面之道也與宗廟異義還不復告天者天道質無内外故不復告也尚書言歸假于祖禰不見告於天知不吿也王者受命質家先伐文家先正何質家之天命已也使已也誅無道今誅得爲王故先伐文家言天命巳成爲王者乃得誅伐王者耳故先改正朔也又改正朔者文代其質也文者先其文質者先其質故論語曰予小子履敢昭告于皇天上帝此湯伐桀吿天用憂家之法也詩云命此文王于周于京此言文王誅伐故改號爲周易邑爲京也明天著忠臣孝子之義也湯親北面稱臣而事桀不忍相誅也禮曰湯放桀武伐紂時也王法天誅者天子自出者以爲王者乃天之所立而欲謀危社稷故自出重天命也犯王法使方伯誅之尚書曰命予惟恭行天之罰此所以言開自出伐有扈也王制曰賜之弓矢乃得專征伐犯王誅者也大夫將兵出必不御者欲盛其威使士卒一意繫心也故但聞將軍令不聞君命也明進退大夫也春秋傳曰此受命于君如伐齊則還何大其不伐䘮也大夫以君命出進退在大夫也天子遣將軍必於廟何示不敢自專也獨於祖廟何制法度者祖也王制曰受命于祖受成於學此言於祖廟命遣之也王法年此受兵何重不絶人嗣也師行不必勝故須其有丗嗣年六十歸兵者何不忍並闘人父子也王制曰六十不預服戎又曰八十一子不從政九十家不從政父母之䘮三年不從政齊衰大功三月不從政廢疾非人不飬者一人不從政古者師出不踰時者爲怨思也天道一時生一時飬人者天之貴物也踰時則内有怨女外有曠夫詩云昔我往矣楊栁依依今我来思雨雪霏霏春秋曰宋人取長葛傳曰外取邑不書此何以書乆也王者有三年之䘮夷狄有内侵伐之者重天誅爲宗廟祉稷也春秋傳曰天王居于狄泉傳曰此未三年其稱天王何著有天子也誅伐誅不避親戚何所以尊君卑臣强榦弱枝明善惡善惡之義也春秋傳曰季子煞其母兄何善示誅不避母兄君臣之義尚書曰肆朕誕以爾東征誅弟也諸侯有三年之䘮有罪且不誅何君子恕巳哀孝子之思慕不忍加刑罰春秋曰晉士丐帥師侵齊至糓聞齊侯卒乃旋傳曰大其不伐䘮也諸侯之義非天子之命不得動衆起兵誅不義者所以强榦弱枝尊天子卑諸侯論語曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出丗無聖賢方伯諸侯有相㓕者力能救者可也論語曰陳恒弑其君孔子沐浴而朝請討之王者侯之子篡弑其君而立臣下得誅之者廣討賊之義也春秋傳曰臣弑君臣不討賊非臣也又曰蔡丗子班弑其君楚子誅之王者受命而起諸侯有臣弑君而立當誅君身死子不得繼者以其逆無所天也詩云母封靡于爾邦惟王其崇之此言追誅大罪也㦯盗天子土地自立爲諸侯絶之而已父煞其子當誅何以爲天地之性人爲貴人皆天所生也託父母氣而生耳王者以飬長而教之故父不得專也春秋傳曰晉侯煞丗子申生不出蔡佞人當誅何爲其亂善行傾䨱國政韓詩内傳孔子爲魯司冦先誅少正卯謂佞道巳行亂國政也佞道未行章明逺之而巳論語曰放鄭聲逺佞人子得爲父報讎者臣子於君父其義一也忠臣孝子所以不能巳以恩義不可奪也故曰父之讎不與共天下兄弟之讎不與共國朋友之讎不與同朝族人之讎不共隣故春秋傳曰子不復讎非子檀弓記子夏問曰居兄弟之讎如之何仕不與同國銜君命遇之不闘父母以義見煞子不復讎者爲往來不止也春秋曰父不受誅子復讎可誅猶責也誅其人責其罪極其過惡春秋曰楚子虎誘蔡侯班煞之于由傳曰誅君之子不立討者何謂討猶除也欲言臣當掃除君之賊春秋曰衛人煞州吁于濮傳曰其稱人何討賊之辭也伐者何謂伐擊也欲言伐擊之也尚書曰武王伐紂征}
