  - {type: 'tls:seg', offset: 3, content: '', id: KR3j0023_tls_007-305a.1}
  - {type: variant, offset: 3, length: 0, content: '', SBCK: 九寸四玉一石也伯子男俱三玉二石也五玉者各何施盖以爲璜以徴召璧以聘問璋以發兵珪以信質琮以起土功之事也珪以爲信者何珪者兊上象物皆生見於上也信莫著于作見故以珪爲信而見萬物之始莫不自㓗珪之爲言㓗也上兊陽也下方隂也陽尊故其禮順備也在位東方陽見義於上也璧以聘問何璧者方中圎外象地地道安寜而岀財物故以璧聘問也方中隂德方也圎外隂繫於陽也隂德盛於内故見象於内位在中央璧之爲言積也中央故有天地之象所以據用也内方象地外圎象天也璜所以徴召何璜者半璧位在北方北隂極而陽始起故象半隂陽氣始施徴召萬物故以徴召也不象隂何陽始物微未可見璜者横也質尊之命也陽氣横于黃泉故曰璜璜之爲言光也陽光所及莫不動也象君之威命所加莫敢不從陽之所施無不節也璋以發兵何璋半珪位在南方南方陽極而隂始起兵亦隂也故以發兵也不象其隂何隂始起物尚凝未可象也璋之爲言明也賞罰之道使臣之禮當章明也南方之時萬物莫不章故謂之璋琮以起土功發聚衆何琮之爲言聖也象萬物之宗聚聖也功之所成故以起土功發衆也位西方西方陽収功於内隂出城於外内圎象陽外直爲隂外牙而内湊象聚㑹也故謂之琮后夫人之財也五玉所施非一不可勝條略舉大者也合符信者謂天子執瑁以朝諸侯諸侯執圭以覲天子瑁之爲言冒也上有所覆下有所冒故覲禮曰侯氏執圭升堂尚書大傳曰天子執瑁以朝諸侯又曰諸侯執所受圭與璧朝于天子無過者復得其珪以歸其拜有過者留其圭能正行者復還其珪三年珪不復少絀以爵圭所以還何以爲琮信瑞也璧所以留者以財弊盡輙更造何以言之禮曰圭造尺八寸有造圭門得造璧也公圭九寸四玉一石何以知不以玉爲四器石持爲也以尚書合言五玉也臣見君所以有贄何贄者質也質已之誠致已之悃幅也}
