  - {type: variant, offset: 719, length: 1, content: 帝, SBCK: 狄故曽子問曰九夷八蠻六戎五狄百姓之難至者也何以知夷在東方禮王制曰東方曰夷􅀍髮文身又曰南方曰蠻雕題交趾西方曰戎􅀍髮衣皮北方曰狄衣羽毛穴居東所以九何盖來者過九之爲言究也德徧究故應德而來亦九也非故爲之道自然也何以名爲夷蠻曰聖人本不治外國非爲制名也因其國名而言之耳一􅀃曰名其短而爲之制名也夷者僔狄無禮義東方者少陽易化故取名也北方太隂鄙郄故少蠻蟲難化執心違邪戎者強惡也狄者易也辟易無别也歌者在堂上舞在堂下何歌者象德舞者象君子上德而下功郊特牲曰歌者在上論語曰季氏八佾舞於庭書下管鞀鼓笙鏞以間降神之樂在上何爲􅀑神舉故書曰戞擊鳴球搏拊琴瑟以詠祖考來格何以用鳴球搏拊者何􅀑神清虚貴浄賤鏗鏘也故尚書大傳曰搏拊鼓振以秉琴瑟練絲朱絃鳴者貴玉聲也王者食所以有樂何樂食天下之太平冨積之饒也明天子至尊非功不食非德不飽故傳曰天子食時舉樂王者所以日食者何明有四方之物食四時之功也四方不平四時不順有徹樂之法焉所以明至尊著法戒也王平居中央制御四方平旦食少陽之始也晝食太陽之始也晡食少隂之始也暮食太隂之始也論語曰亞飯干適楚三飯繚適蔡四飯缺適秦諸侯三飯卿大夫再飯尊卑之差也弟子職暮食士偃禮士也食力無數庶人職在耕桑戮力勞役飯即食飽即作故無數禮樂}
