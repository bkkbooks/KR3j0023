  - {type: variant, offset: 1878, length: 7, content: 興滅國繼絕世誅, SBCK: 不教民戰是謂弃之尚書曰以教祗德詩云爾之教矣欲民斯効忠形於悃誠故失野敬形於祭祀故失􅀑文形於飾皃故失薄夏后氏用明器殷人用祭器周人兼用之何謂曰夏后氏教以忠故先明器以奪孝子之心也殷人教以敬故先祭器敬之至也周人教以文故兼用之周人意至文也孔子曰之死而致死之不仁而不可爲也之死而致生之不知而不可爲也故有死道焉以奪孝子之心也有生道焉使人勿倍也故竹器不成用木器不成斵瓦器不成沫琴瑟張而不平竽笙備而不和有鍾磬而無簨簴縣示備物而不可用也孔子曰爲明器者善爲俑者不仁塗車羞靈自古有之言今古皆然也三綱六紀三綱者何謂也謂}
