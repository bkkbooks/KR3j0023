  - {type: variant, offset: 1390, length: 313, content: 故就其新莫不鮮明也四月謂之仲呂何言陽氣極將將極中充大也彼故復中難之也五月謂之蕤賓何蕤者下也賓者敬也言陽氣上極陰氣始起故賓敬之也六月謂之林鍾何林者眾也萬物成孰熟其種類眾多也七月謂之夷則何夷傷也則法也言萬物始傷被刑法也八月謂之南呂何南者任也言陽氣尚有任也生薺麥也故陰拒之也九月謂之無射何射者終也言萬物隨陽而終也當復隨陰而起無有終已也十月謂之應鍾何應者應也鍾者動也言萬物應陽而動下藏也五行所以更王何以其轉相生故有終始也木生火火生土土生金金生水水生木是以木王火相土死金囚水休王所勝者死內囚故王者休見木王火相何以知為臣土所以死者子為父報仇者也五行之子慎之物歸母木王火相金成其火燋金金生水水滅火報其理火生土土則害水莫能而禦五行所以相害者大, WYG: ''}
