body:
  text: 天地天者何也天之為言鎮也居高理下為人鎮也地者元氣之所生萬物之祖也地者易也言養萬物懷任交易變化也始起之天始起先有太初後有太始形兆既成名曰太素混沌相連視之不見聽之不聞然後剖判清濁既分精出曜曜出布度庶物施生精者為三光號者為五行五行生情性情性生汁中汁中生神明神明生道德道德生文章故乾鑿度曰太初者氣之始也太始者形兆之始也太素者質之始也陽唱陰和男行女隨也天道所以左旋地道右周何以為天地動而不別行而不離所以左旋右周者猶君臣陰陽相對向之義男女總名為人天地所以無總名何曰天圓地方不相類故無總名也君舒臣疾卑者宜勞天所以反常行何以為陽不動無以行其教陰不靜無以成其化雖終日乾乾亦不離其處也故易曰終日乾乾反覆道也
