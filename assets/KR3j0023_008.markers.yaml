  - {type: variant, offset: 550, length: 0, content: '', WYG: 下至庶人上下通孝經者夫制作禮樂仁之本聖人道徳已備弟}
  - {type: variant, offset: 551, length: 0, content: '', WYG: 所以復記論語何見夫子遭事異變出之號令失法文王所以演易何文王受王不率仁義之道失為人法矣已之調和陰陽尚微故演易使我得卒至于太平日月之光明則如易矣伏羲作八卦何伏羲始王天下未有前聖法度故仰則觀象於天俯則察法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以象萬物之情}
