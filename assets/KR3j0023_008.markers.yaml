  - {type: variant, offset: 322, length: 1, content: 下, WYG: 子稱公子公子之子稱公孫公孫之子各以其王父字為氏故魯有仲叔季楚有昭屈景齊有髙國崔立氏三以知其為子孫也王者之後二稱王子兄弟立而皆封也或曰王孫上稱王孫也堯知命表稷契賜生子姓臯陶典刑不表姓言天任徳逺刑禹姓姒氏祖以億生殷姓子氏祖以𤣥鳥子也周姓姬氏祖以履大人跡生也人必有名何所以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有變人生三月目煦亦能笑與人相更答故因其始有知而名之故禮服傳曰子生三月則父名之於祖廟於祖廟者謂子之親廟也明當為宗祖主也一說名之於燕寢名者幼少卑賤之稱也寡略故於燕寢禮内則曰子生君沐浴朝服夫人亦如之立于阼階西南世婦抱子升自西階君命之}
