  - {type: punctuation, offset: 865, content: 「, id: KR3j0023_tls_010-bkkpn248}
  - {type: variant, offset: 865, length: 1, content: 受, WYG: 天子七日而殯諸侯五日而殯卿大夫三日而殯夏后氏殯於阼階殷人殯於兩楹之間周人殯於西階之上何夏后氏敎以忠忠者厚也曰生吾親也死亦吾親也主人宜在阼殷人敎以敬曰死者將去又不敢容也故置之两楹之間賓主共夾而敬之周人敎以文曰死者將去不可又得故賔客之也檀弓記曰夏后氏殯於阼階殷人殯於两楹之間周人殯於西階稽}
  - {type: page-break, offset: 865, content: '', id: KR3j0023_WYG_002-72a, image: WYG0850/WYG0850-0072a.png}
  - {type: variant, offset: 867, length: 1, content: 于, WYG: 徴曰天子舟車殯何為避水火災也故棺在車上車在舟中臣子更執紼晝夜常百二十二人紼者所以掌持棺也故禮曰天子舟車殯諸侯車殯大夫倚塗士瘞尊卑之差也}
  - {type: page-break, offset: 867, content: '', id: KR3j0023_WYG_002-72b, image: WYG0850/WYG0850-0072b.png}
  - {type: punctuation, offset: 869, content: ，, id: KR3j0023_tls_010-bkkpn249}
