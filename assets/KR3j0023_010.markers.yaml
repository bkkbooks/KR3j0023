  - {type: variant, offset: 589, length: 1, content: 予, SBCK: 麻冕禮也尚書王麻冕冕所以前後遂延者何示進賢退不能也垂旒者示不現邪纊塞耳示不聽䜛也故水清無魚人察無徒明不尚極知下故禮玉藻曰十有二旒前後遂延禮器曰天子麻冕朱緑藻􅂷十有二旒者法四時十二月也諸侯九旒大夫七旒士爵弁無旒委皃者何謂也周朝廷理政事行道德之冠名士冠經曰委皃周道章甫殷道母追夏后氏之道所以謂之委皃何周統十一月爲正萬物萌}
