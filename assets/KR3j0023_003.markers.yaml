  - {type: variant, offset: 720, length: 2, content: 附庸, SBCK: 公卿大夫皆食菜者示與民同有無也五行五行者何謂也謂金木水火土也言行者欲言爲天行氣之義也地之承天猶妻之事夫臣之事君也謂其位卑卑者親事故自周於一行尊於天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方北方者隂氣在黄泉之下任飬萬物水之爲言淮也隂化沾濡任生木木在東方東方者隂陽氣始動萬物始生木之爲言觸也陽氣動躍火在南方南方者陽在上萬物垂枝火之爲言委随也言萬物布施火之爲言化也陽氣用事萬物變化也金在西方西方者隂始起萬物禁止金之爲言禁也土在中央者主吐含萬物土之爲言吐也何知東方生樂記曰春生夏長秋收冬蔵土}
