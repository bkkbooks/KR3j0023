  - {type: variant, offset: 407, length: 0, content: '', SBCK: 安上治民莫善於禮移風易俗莫善於樂子曰樂在宗廟之中君臣上下同聽之則莫不和敬族長郷里之中長㓜同聽之則莫不和順在閨門之内父子兄弟同聽之則莫不和親故樂者所以崇和順比物飾節節奏合以成文所以合和父子君臣附親萬民也是先王立樂之意也故聽其雅頌之聲志意得廣焉執干戚習俯仰屈信容貌得齊焉其惙兆要其節奏行列得正焉進退得齊焉故樂者天地之命中和之紀人情之所不能免焉也夫樂者先王之所以飾喜也軍族鈇􅃏所以飾怒也故先王之喜怒皆得其齊焉喜則天下和之怒則􅁀亂者畏之先王之道禮樂可謂盛矣聞角聲莫不惻隱而慈者聞徴聲莫不喜養好施者聞啇聲莫不剛斷而立事者聞羽聲莫不深思而逺慮者聞宫聲莫不温潤而寛和者也禮所揖讓何所以尊人自損也不爭論語曰揖讓而升下而飲其爭也君子故君使臣以禮臣事君以忠謙謙君子利渉大川以貴下賤大得民也屈己敬人}
