body:
  text: 紼冕紼者何謂也紼者蔽也行以蔽前紼蔽者小有事因以別尊卑彰有德也天子朱紼諸侯赤紼詩云朱紼斯皇室家君王又云赤紼金舄會同有繹又云赤紼在股皆謂諸侯也書曰黼黻衣黃朱紼亦謂諸侯也並見衣服之制故遠別之謂黃朱亦赤矣大夫蔥衡別於君矣天子大夫赤紱蔥衡士朱赤者或盛色也是以聖人塗法之用為紼服為百王不易也紼以韋為之者反古不忘本也上廣一尺下廣二尺法天一地二也長三尺法天地人也所以有冠者何冠者𢃩也所以𢃩持其髮者也者也人懷五常莫不貴德示成禮有修飾文章故制冠以飾首別成人也士冠經曰冠而字之敬其名也論語曰冠者五六人童子六七人禮所以十九見正者而冠者何漸三十之人耳男子陽也成於陰故二十而冠曲禮曰二十弱冠言見正何以知不謂正月也以禮士冠經曰夏葛屨冬皮屨明非歲之正月也皮弁者何謂也所以法古至質冠之名也弁之為言樊攀也所以樊攀持其髮也上古之時質先加服皮以鹿皮者取其文章也禮曰三王共皮弁素積素積者積素以為裳也言腰中辟積至質不易之服反古不忘本也戰伐田獵此皆服之麻冕者何周宗廟之冠也禮曰周冕而祭又曰殷冔夏收而祭此三代宗廟之冠也十一月之時陽氣冕仰黃泉之下萬物被施如冕前冕而後仰故謂之冕也謂之詡冔者十二月之時施陽氣受化詡張而後得牙故謂之詡冔謂之收者十三月之時陽氣收本舉生萬物而達出之故謂之收冕俛仰不同故前後乖也詡張故萌大時物亦牙萌大也收而達故前蔥大者在後時物亦前蔥也絻冕所以用麻為之者女功之始亦示不忘本也即不忘本不用皮何皮乃太古未有禮文之服故論語曰麻冕禮也尚書曰王麻冕冕所以前後遂邃延者何示進賢退不能也垂旒者示不現視邪纊塞耳示不聽讒也故水清無魚人察無徒明不尚極知下故禮曰天子玉藻曰十有二旒前後遂邃延禮器曰天子麻冕朱綠藻垂十有二旒者法四時十二月也諸侯九旒大夫七旒士爵弁無旒委貌者何謂也周朝廷理政事行道德之冠名士冠經曰委貌周道章甫殷道毋追夏后氏之道所以謂之委貌何周統十一月為正萬物始萌小故為冠飾最小故曰委貌委貌者言委曲有貌也殷統十二月為正其飾微大故曰章甫章甫者尚未與極其本相當也夏者統十三月為正其飾最大故曰毋追毋追者言其追大也爵弁者何謂也其色如爵頭周人宗廟士之冠也禮郊特牲曰周弁士冠經曰周弁殷冔夏收爵何以知指謂其色又乍言爵弁乍但言弁周之冠色所以爵何為周尚赤所以不純赤但如爵頭何以本制冠者法天天色玄者不失其質故周加赤殷加白夏之冠色純玄何以知殷加白也周加赤知殷加白也夏殷士冠不異何古質也以士冠禮知之
