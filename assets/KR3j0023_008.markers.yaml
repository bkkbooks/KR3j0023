  - {type: variant, offset: 552, length: 2, content: 無爵, WYG: 經所以有五何經常也有五常之道故曰五經樂仁書義禮禮易智詩信也人情有五性懐五常不能自成是以聖人象天五常之道}
  - {type: page-break, offset: 552, content: '', id: KR3j0023_WYG_002-49a, image: WYG0850/WYG0850-0060c.png}
  - {type: variant, offset: 555, length: 3, content: 在大夫, WYG: 明之以敎人成其徳也五經何謂易尚書詩禮春秋也禮解曰温柔寛厚詩敎也疏通知逺書敎也廣博易良樂敎也潔净精微易敎也恭儉莊敬禮教也屬辝比事春秋敎也春秋何常也則黄帝已來何以言之易曰}
