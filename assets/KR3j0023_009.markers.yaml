  - {type: variant, offset: 0, length: 0, content: '', WYG: 嫁娶人道所以有嫁娶何以為情性之大莫若男女男女之交人情之始莫若夫婦易曰天地氤氲萬物化淳男女構精萬物化生人承天地施陰陽故設嫁娶之禮者重人倫廣繼嗣也禮保傳記曰謹為子嫁娶必擇世有仁義者禮男娶女嫁何陰卑不得自専就陽而成之故𫝊曰陽倡陰和男行女隨男不自専娶女不自専嫁必由父母須媒妁何逺耻防滛泆也詩云娶妻如之何必告父母又曰娶妻如之何匪媒不得男三十而娶女二十而嫁陽數竒陰數偶男長女幼者陽舒隂促男三十䈥骨堅强任為人父女二十肌膚充盛任為人母合為}
