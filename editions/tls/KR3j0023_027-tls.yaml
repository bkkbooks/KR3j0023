body:
  text: 文家先改正質家先改正質家先伐何改正者文伐者質文者先其文質者先其質論語曰予小子履敢用玄牡敢昭告于皇王后帝此湯伐桀告天以夏之牲也詩云曰命此文王于周于京此言文王改號為周易邑為京也又曰清酒既載騂牡既備言文王之牲周用騂周尚赤也正朔有三何本天有三統謂三微之月也明王者當奉順而成之故受命各統一正也敬始重本也朔者蘇也革也言萬物革更於是故統焉禮三正記曰正朔三而改文質再而復也三微者何謂也陽氣始施黃泉萬物始動微而未著也十一月之時陽氣始養根株黃泉之下萬物皆赤赤者盛陽之氣也故周為天正色尚赤也十二月之時萬物始牙而白白者陰氣故殷為地正色尚白也十三月之時萬物始達孚由甲而出皆黑人得加功故夏為人正色尚黑尚書大傳曰夏以孟十二春月為正殷以季冬月為正周以仲冬月為正夏以十三月為正色尚黑以平旦為朔殷以十二月為正色尚白以雞鳴為朔周以十一月為正色尚赤以夜半為朔不以二月後為正者萬物不齊莫適所統故必以三微之月也三正之相承若順連環也孔子承周之弊行夏之陸時知繼十一月正者當用十三月也天道左旋改正者右行何也改正者非改天道也但改日月耳日月右行故改正亦右行也日尊於月不言正日言正月何也積日成月物隨月而變故據物為正也天質地文質者據質文者據文周反統天正何也質文再而復正朔三而改三微質文數不相配故正不隨質文也王者受命而起或有所不改者何也王者有改道之文無改道之質如君南面臣北面皮弁素積聲味不可變哀戚不可改百世不易之道也王者所以存二王之後何也所以尊先王通天下之三統也明天下非一家之有謹敬謙讓之至也故封之百里使得服其正色用行其禮樂永事先祖論語曰夏禮吾能言之杞不足徵也殷禮吾能言之宋不足徵也春秋傳曰王者存二王之後使服其正色行其禮樂詩曰厥作祼將常服黼冔言微子服殷之冠助祭於周也周頌曰有客有客亦白其馬此微子朝周也二王之後若有聖德受命而王當因其改之耶天下之所安得受命耶也非其運次者王者必一質一文者何所以承天地順陰陽陽之道極則陰道受陰之道極則陽道受明二陰二陽不能相繼也質法天文法地而已故天為質地受而化之養而成之故為文尚書大傳曰王者一質一文據天地之道禮三正記曰質法天文法地也帝王始起先質後文者順天下地之道本末之義先後之序也事莫不先有有其質性乃後有有其文章也
