  - {type: 'tls:seg', offset: 718, content: '', id: KR3j0023_tls_002-91a.1}
  - {type: variant, offset: 718, length: 0, content: '', SBCK: 佾者列也以八人爲行列八八六十四人也諸公六六爲行諸侯四四爲行諸公謂三公二王後大夫士北面之臣非專事子民者也故但琴瑟而巳王者有六樂者貴公美德也所以作供養傾先王之樂明有法示亡其本興巳所以自作樂明作巳也樂所以作四夷之樂何德廣及之也易曰先王以作樂崇德殷薦之上帝以配祖考詩云奏皷簡簡衎我烈祖樂元語曰受命而六樂樂先王之樂明有法也與其所自作明有制興四夷之樂明德廣及之也故南夷之樂曰兠西夷之樂曰禁北夷之樂曰昧東夷之樂曰離合觀之樂儛於堂四夷之樂陳於右先王所以得之順命重始也此言以人得之先以文謂持羽毛儛也以武得之持干戚儛也樂元語曰東夷之樂持矛舞助時生也南夷之樂持羽舞助時養也西夷之樂持㦸舞助時煞也北夷之樂持干舞助時藏也誰制夷狄之樂以爲先聖王也先王惟行道德和調隂陽覆􅀍夷狄故夷狄安樂來朝中國於是作樂樂之南之爲言任也任養萬物味之爲言昧也昧者萬物老衰禁者萬物禁藏侏離者萬物微離地而生一􅀃東方持矛南方歌西方戚北方擊金夷狄質不如中國中國文章但隨物名之耳故百王不易戚二者制夷狄樂不制夷狄禮何以爲禮者身當履而行也夷狄之人不能行禮樂者聖人作爲以樂之耳故有夷狄樂也殊爲舞者以爲使中國人何以言之夷狄之人禮不備恐有過誤也作之門外者何夷在外故就之也夷狄無禮義故不在内明堂記曰九夷之國在東門之外所以知不在門内也明堂記曰禹納蠻夷之樂於太廟言納明有入也曰四夷之樂者何謂也以爲四夷外無禮義之國數夷狄者從東故舉本以爲之惣名也言夷狄者舉終始也言蠻舉逺也言貉舉惡也則别之東方爲九夷南方爲八蠻西方爲六戎北方爲}
