  - {type: variant, offset: 0, length: 2, content: 社稷, SBCK: 白虎通德論卷第五臣班固纂集封禪王者易姓而起必升封㤗山何教告之義也始受命之時改制應天天下太平功成封禪以告太平也所以必於㤗山何萬物所交代之處也必於其上何因髙告髙順其􅀋也故升封者増髙也下禪梁甫之山基廣厚也刻石紀號者著己之功跡也以自效放也天以髙爲尊地以厚爲德故増㤗山之髙以放天附梁甫之基以報地明天地之所命功成事遂有益於天地􅀂髙者加髙厚者加厚矣或曰封者金泥銀繩或曰石泥金繩封以印璽故孔子曰升㤗山觀易姓之王可得而數者七十有餘封者廣也言禪者明以成功相傳也梁甫者太山旁山名正於梁甫何以三皇禪於繹繹之山明巳成功而去有德者居之繹繹者無窮之意也五帝禪于亭亭者制度審諟德著明也三王禪于梁甫之山者梁信也甫輔也輔天地之道而行之也太平乃封知告于天必也於岱宗何明知易姓也刻石紀號知自紀于百王也燎祭天報之義也望祭山川祀群神也詩云於皇明周陟其髙山言周太平封太山也又曰墮山喬嶽允猶翕河言望祭山川百神來歸也天下太平符瑞所以來至者以爲王者承統理調和隂陽隂陽和萬物序休氣充塞故符瑞並臻皆應德而至徳至天則斗極明日月光甘露降德至地則嘉禾生􅕴莢起秬鬯岀太平感徳至文表則景星見五緯順􅁤徳至草木朱草生木連理徳至鳥獸則鳯凰翔鸞鳥舞騏驎臻白虎到狐九尾白雉降白鹿見白烏下徳至山陵則景雲出芝實茂陵出異丹阜出蓮甫山出器車澤出神鼎徳至淵泉則黄龍見醴泉通河出龍圖洛出􅀛書江出大貝海出明珠徳至八方則祥風至佳氣時喜鐘律調音度施四夷化越裳貢孝道至則以蓮甫者樹名也其葉大於門扇不摇自扇於飲食清凉助供養也繼嗣平明則賔連生於房戸賔連者木名連累相承故在於房戸象繼嗣也日暦得其分度則􅕴以莢生於階間蓂莢樹名也月一日生一莢十五日畢至十六日去莢故莢階生似日月也賢不肖位不相踰則平路生于庭平路者樹名也官位得其人則生失其人則死狐九尾何狐死首丘不忘本也明安不忘危也必九尾者也九妃得其所子孫繁息也於尾者何明後當盛也景星者大星也月或不見景星常見可以夜作有益於人民也甘露者美露也降則物無不盛者也朱草者赤草也可以染絳别尊卑也醴泉者美泉也狀􅀂醴酒可以養老嘉禾者大禾也成王時有三苗異畒而生同爲一穟大幾盈車長幾充箱民有得而上之者成王訪周公而問之公曰三苗爲一穟天下當和爲一乎以是果有越裳氏重九譯而來矣廵狩}
