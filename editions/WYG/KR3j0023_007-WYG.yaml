body:
  text: 文質王者始立諸侯皆見何當受法禀正敎也尚書輯五瑞覲四嶽謂舜始即位見四方諸侯合符信詩云𤣥王桓撥受小國是達受大國是達言湯王天下大小國諸侯皆來見湯能通達以禮義也周頌曰烈文辟公錫兹祉福言武王伐紂定天下諸侯來㑹聚於京師受法度也逺近莫不至受命之君天之所興四方莫敢違夷狄咸率服故也何謂五瑞謂珪璧琮璜璋也禮曰天子珪尺二寸又曰博三寸剡上寸半厚半寸珪為璋方中圓外曰璧半璧曰璜圓中牙身𤣥外曰琮禮記王度曰玉者有象君之徳燥不輕濕不重薄不澆亷不傷疵不掩是以人君寶之天子之純玉尺有二寸公侯九寸四玉一石也伯子男俱三玉二石也五玉者各何施蓋以為璜以徴召璧以聘問璋以發兵珪以信質琮以起土功之事也圭以為信者何珪者兊上象物皆生見於上也信莫著于作見故以珪為信而見萬物之始莫不自潔珪之為言潔也上兊陽也下方陰也陽尊故其禮順備也位在東方陽見義於上也璧以聘問何璧者方中圎外象地地道安寧而出財物故以璧聘問也方中陰徳方也圓外陰繫於陽也陰徳盛於内故見象於内位在中央璧之為言積也中央故有天地之象所以據用也内方象地外圎象天也璜所以徴召何璜者半璧位在北方北陰極而陽始起故象半隂陽氣始施徴召萬物故以徴召也不象隂何陽始物微未可見璜者横也質尊之命也陽氣横于黄泉故曰璜璜之為言光也陽光所及莫不動也象君之威命所加莫敢不從陽之所施無不節也璋以發兵何璋半珪位在南方南方陽極而隂始起兵亦隂也故以發兵也不象其陰何陰始起物尚凝未可象也璋之為言明也賞罰之道使臣之禮當章明也南方之時萬物莫不章故謂之璋琮以起土功發聚衆何琮之為言聖也象萬物之宗聚聖也功之所成故以起土功發衆也位西方西方陽收功於内陰出城於外内圓象陽外直為陰外牙而内湊象聚㑹也故謂之琮后夫人之財也五玉所施非一不可勝條略舉大者也合符信者謂天子執瑁以朝諸侯諸侯執圭以覲天子瑁之為言冒也上有所覆下有所冒故覲禮曰侯氏執圭升堂尚書大傳曰天子執瑁以朝諸侯又曰諸侯執所受圭與璧朝于天子無過者復得其珪以歸其拜有過者留其圭能正行者復還其珪三年珪不復少絀以爵圭所以還何以為琮信瑞也璧所以留者以財弊盡輒更造何以言之禮曰圭造尺八寸有造圭門得造璧也公圭九寸四玉一石何以知不以玉為四器石持為也以尚書合言五玉也臣見君所以有贄何贄者質也質已之誠致已之悃愊也王者緣臣子心以為之制差其尊卑以副其意公侯以玉為贄者玉取其燥不輕濕不重公之徳全卿以羔者取其羣不黨卿職在盡忠率下不阿黨也大夫以鴈為贄者取其飛成行列大夫職在以奉命之適四方動作當能自正以事君也士以雉為贄者取其不可誘之以食懾之以威必死不可生畜士行威守節死義不當移轉也曲禮曰卿羔大夫以鴈士以雉為贄庶人之贄疋童子委䞇而退野外軍中無贄以纓拾矢可也言必有贄也疋謂䳱也卿大夫贄古以麑鹿今以羔鴈何以為古者質取其内謂得美草鳴相呼今文取其外謂羔跪乳鴈有行列也禮相見經曰上大夫相見以羔左顧右䞇執麑明古以麑鹿今以羔也卿大夫贄變君與士贄不變何人君至尊極美之物以為贄士賤仗節死義一介之道也故不變私相見亦有贄何所以相尊敬長和睦也朋友之際五常之道有通財之義賑窮告急之意中心好之欲飲食之故財幣者所以副至意也禮士相見經曰上大夫相見以鴈士冬以雉夏以脯也婦人之贄以棗栗腵脩者婦人無專制之義御衆之任交接辭讓之禮職在供養饋食之間其義一也故后夫人以棗栗腶脩者凡内修陰也又取其朝早起栗戰慄自正也腶脩者脯也故春秋傳曰宗婦覿用幣非禮也然則棗栗云乎腶脩云乎子見父無贄何至親也見無時故無贄臣之事君以義合也得親供養故質己之誠副己之意故有贄也三正王者受命必改朔何明易姓示不相襲也明受之於天不受之於人所以變易民心革其耳目以助化也故䘮服大傳曰王始起改正朔易服色殊徽號異器械别衣服也是以舜禹雖繼太平猶宜改以應天王者改作樂必得天應而後作何重改制也春秋瑞應傳曰敬受瑞應而王改正朔易服色易曰湯武革命順乎天而應乎民也文家先改正質家先伐正質家先伐何改正者文伐者質文者先其文質者先其質論語曰予小子履敢用𤣥牡敢昭告于皇王后帝此湯伐桀告天以夏之牲也詩云命此文王于周于京此言文王改號為周易邑為京也又曰清酒既載騂牡既備言文王之牲用騂周尚赤也正朔有三何本天有三統謂三微之月也明王者當奉順而成之故受命各統一正也敬始重本也朔者蘓也革也言萬物革更於是改統焉禮三正記曰正朔三而改文質再而復也三微者何謂也陽氣始施黄泉萬物動微而未著也十一月之時陽氣始養根株黄泉之下萬物皆赤赤者盛陽之氣也故周為天正色尚赤也十二月之時萬物始牙而白白者陰氣故殷為地正色尚白也卜三月之時萬物始達孚甲而出皆黑人得加功故夏為人正色尚黒尚書大傳曰夏以孟春月為正殷以季冬月為正周以仲冬月為正夏以十三月為正色尚黑以平旦為朔殷以十二月為正色尚白以雞鳴為朔周以十一月為正色尚赤以夜半為朔不以二月後為正者萬物不齊莫適所統故必以三微之月也三正之相承若順連環也孔子承周之弊行夏之時知繼十一月正者當用十三月也天道左旋改正者右行何也改正者非改天道也但改日月耳日月右行故改正亦右行也日尊於月不言正日言正月何也積日成月物隨月而變故據物為正也天質地文質者據質文者據文周反統天正何也質文再而復正朔三而改三微質文數不相配故正不隨質文也王者受命而起或有所不改者何也王者有改道之文無改道之質如君南面臣北面皮弁素積聲味不可變哀戚不可改百王不易之道也王者所以存二王之後何也所以尊先王通天下之三統也明天下非一家之有謹敬謙讓之至也故封之百里使得服其正色用其禮樂永事先祖論語曰夏禮吾能言之杞不足徴也殷禮吾能言之宋不足徴也春秋傳曰王者存二王之後使服其正色行其禮樂詩曰厥作祼將常服黼冔言微子服殷之冠助祭於周也周頌曰有客有客亦白其馬此微子朝周也二王之後若有聖徳受命而王當因其改之耶天下之所安得受命也非其運次者王者必一質一文何以承天地順陰陽陽之道極則隂道受隂之道極則陽道受明二陰二陽不能相繼也質法天文法地而已故天為質地受而化之養而成之故為文尚書大傳曰王者一質一文據天地之道禮三正記曰質法天文法地也帝王始起先質後文者順天下之道本末之義先後之序也事莫不先有質性乃後有文章也三教王者設三教者何承衰救弊欲民反正道也三正之有失故立三教以相指受夏人之王教以忠其失野救野之失莫如敬殷人之王教以敬其失鬼救鬼之失莫如文周人之王教以文其失薄救薄之失莫如忠繼周尚黑制與夏同三者如順連環周則復始窮則反本樂稽熠嘉曰顔回尚三敎變虞夏何如曰教者所以追補敗政靡弊溷濁謂之治也舜之承堯無為易也或曰三敎改易夏后氏始髙宗亦承弊所以不改敎何明子無改父之道也何言知髙宗不改之以周之敎承以文也三敎所以先忠者行之本也三敎一體而分不可單行故王者行之有先後何以言三敎竝施不可單行也以忠敬文無可去者也敎所以三何法天地人内忠外敬文飾之故三而備也即法天地人各何施忠法人敬法地文法天人道主忠人以至道敎人忠之至也人以忠敎故忠為人敎也地道謙卑天之所生地敬養之以敬為地教也教者何謂也教者效也上為之下効之民有質樸不教不成故孝經曰先王見敎之可以化民論語曰不敎民戰是謂弃之尚書曰以敎祗徳詩云爾之敎矣欲民斯効忠形於悃誠故失野敬形於祭祀故失鬼文形於飾貌故失薄夏后氏用明器殷人用祭器周人兼用之何謂曰夏后氏教以忠故先明器以奪孝子之心也殷敎以敬故先祭器敬之至也周人教以文故兼用之周人意至文也孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也故有死道焉以奪孝子之心也有生道焉使人勿倍也故竹器不成用木器不成斵瓦器不成沫琴瑟張而不平竽笙備而不和有鐘磬而無簨簴縣示備物而不可用也孔子曰為明器者善為俑者不仁塗車蒭靈自古有之言今古皆然也三綱六紀三綱者何謂也謂君臣父子夫婦也六紀者謂諸父兄弟族人謂舅師長朋友也故君為臣綱父為子綱夫為妻綱又曰敬諸父兄六紀道行諸舅有義族人有序昆弟有親師長有尊朋友有舊何謂綱紀綱者張也紀者理也大者為綱小者為紀所以疆理上下整齊人道也人皆懐五常之性有親愛之心是以紀綱為化若羅網之有紀綱而萬目張也詩云亹亹我王綱紀四方君臣父子夫婦六人也所以稱三綱何一陰一陽謂之道陽得陰而成陰得陽而序剛柔相配故六人為三綱三綱法天地人六紀法六合君臣法天取象日月屈信歸功天也父子法地取象五行轉相生也夫婦法人取象六合隂陽有施化端也六紀為三綱之紀者也師長君臣之紀也以其皆成已也諸父兄弟父子之紀也以其有親恩連也諸舅朋友夫婦之紀也以其皆有同志為紀助也君臣者何謂也君羣也下之所歸心臣者繵堅也屬志自堅固春秋傳曰君處此臣請歸也父子者何謂也父者矩也以法度教子子者孶孶無己也故孝經曰父有爭子則身不䧟於不義夫婦者何謂也夫者扶也以道扶接也婦者服也以禮屈服昏禮曰夫親脫婦之纓傳曰夫婦判合也朋友者何謂也朋者黨也友者有也禮記曰同門曰朋同志曰友朋友之交近則謗其言逺則不相訕一人有善其心好之一人有惡其心痛之貨則通而不計共憂患而相救生不屬死不託故論語曰子路云願車馬衣輕裘與朋友共敝之又曰朋友無所歸生於我乎舘死於我乎殯朋友之道親存不得行者二不得許友以其身不得專通財之恩友飢則白之於父兄父兄許之乃稱父兄與之不聽即止故曰友飢為之減飡友寒為之不重裘故論語曰有父兄在如之何其聞斯行之也男稱兄弟女稱姊妹何男女異姓故别其稱也何以言之禮親屬記曰男子先生稱兄後生稱弟女子先生為姊後生為妹父之昆弟不俱謂之世叔父之女昆弟俱謂之姑何也以為諸父曰内親也故别稱之也姑當外適人踈故總言之也至姊妹亦當外適人所以别諸姊妹何以為事諸姑禮等可以外出又同故稱畧也至姊妹雖欲有略之姊尊妹卑其禮異也詩云問我諸姑遂及伯姊謂之舅姑何舅者舊也姑者故也舊故之者老人之稱也謂之姊妹何姊者恣也妹者未也謂之兄弟何兄者况也况父法也弟者悌也心順行篤也稱夫之父母謂之舅姑何尊如父而非父者舅也親如母而非母者姑也故稱夫之父母為舅姑也
