body:
  text: 崩薨書曰成王崩天子稱崩何別尊卑異生死也天子曰崩大尊像崩之為言崩然伏強天下撫擊失神明黎庶殞涕海內悲涼諸侯曰薨國失陽薨之言奄也奄然亡也大夫曰卒精熠耀終卒也卒之為言終於國邦也士曰不祿失其忠節不忠終君之緑祿緑祿之言消也身消名彰庶人曰死魂魄去亡心死之為言澌精氣窮也崩薨紀於國何以為有尊卑之禮諡號之制即有矣禮始於黃帝至堯舜而備易言復沒者據遂遠也書言殂落死者矣各自見義堯皆見憯痛之舜見終各一也喪者何謂也喪者亡也人死謂之喪何言其喪亡不可復得見也不直言死稱喪者何為孝子之心不忍言也尚書曰武王既喪喪禮終經曰死為於適室知據死者稱喪也生者喪哀痛之亦稱喪禮曰喪服斬衰易曰不封不樹喪期無數孝經曰孝子之喪親也是施生者也天子下至庶人俱言喪何欲言身體髮膚俱受之父母其痛一也天子崩訃赴告諸侯何緣臣子喪君哀痛憤悶無能不告語人者也諸侯欲聞之又當持土地所出以供喪事故禮曰天子崩遣使者訃赴告諸侯王者崩諸侯悉奔喪何臣子悲哀慟怛莫無不欲觀君父之棺柩盡悲哀者也又為天子守蕃不可頓空也故分為三部有始死先奔者有得中來盡其哀者有得會喪奉送君者十七月之間諸侯有在京師親供臣子之事者也有號泣非悲哀奔走道路者有居其國哭痛思慕竭盡所供以助喪事者是四海之內咸悲臣下若喪考妣之義也葬有會者親疏遠近盡至親親之義也童子諸侯不朝而來奔喪者何明臣子於其君父非有老少也亦因喪質無般旋之禮但盡悲哀而已臣死亦赴告於君何此君哀痛於臣子也欲聞之加賻賵之禮故春秋曰蔡侯考父卒傳曰卒赴而葬禮也諸侯薨赴告鄰國何緣鄰國欲有禮也春秋傳曰桓母喪告於諸侯桓母賤尚告於諸侯諸侯薨告鄰國明矣諸侯夫人薨告天子者不敢自廢政事天子亦欲知之當有禮也春秋曰天子王使宰喧來歸惠公仲子之賵譏不及事仲子者魯君之貴妾也何況於夫人乎諸侯薨使臣歸瑞圭於天子者何諸侯以瑞圭為信今死矣嗣子諒暗三年之後當乃更更受爵命故歸之歸之者推讓之義也禮故禮曰諸侯薨使臣歸瑞圭於天子天子聞諸侯薨哭之何慘怛發中哀痛之至也使大夫吊弔之追遠重終之義也故禮檀弓曰天子哭諸侯爵辨純衣又曰遣大夫吊弔謂詞曰皇天降災子遭離之難離之嗚呼哀哉大天王使臣某吊弔臣子死君往吊弔之何親與之共治民恩深義重厚欲躬見之故禮雜記曰君吊弔臣主人待于門外見馬首不哭君至主人先入君升自阼階西向哭王主人居中庭從哭或曰大夫疾君問之無數士疾二一問之而已大夫卒比葬不食肉比卒哭不舉樂士比殯不舉樂玄冠不以吊弔者不以吉服臨人凶示助哀也論語曰羔裘玄冠不以吊弔崩薨三日乃小斂何奪孝子之恩以漸也一日之時屬纊於口上以候俟絶氣二日之時尚冀其生三日之時魂氣不還返終不可奈何故禮士喪經曰御者四人皆坐持禮體屬纊以候俟絶氣禮曰天子諸侯三日小斂大夫士二日小斂屬纊於口者孝子欲生其親也人死必沐浴於中霤何示潔淨反本也禮檀弓曰死於牖下沐浴於中霤飯唅於牖下小斂於戶內大斂於阼階殯於客位祖於庭葬於墓所以即遠奪孝子之恩以漸也所以有飯唅何緣生食今死不欲虛其口故唅用珠寶物何也有益死者形體故天子飯以玉諸侯以珠大夫以米璧士以貝也贈襚贈襚者何謂也贈之為言稱也玩好曰贈襚之為言遺也衣被曰曰襚知死者則贈襚所以助生送死追恩重終追遠思終副至意也贈賻賵者何謂也贈賻者助也賵者赴也賵之為言赴也所以相赴左也所以相赴佐給不足也故吊弔辭曰知生則賻賵貨財曰賻車馬曰賵天子七日而殯諸侯五日而殯事有小大大小所供者不等故王制曰天子七日而殯諸侯五日而殯卿大夫三日而殯夏后氏殯於阼階殷人殯於兩楹之間周人殯於西階之上何夏后氏教以忠忠者厚也曰生吾親也死亦吾親也主人宜在阼阼階殷人教以敬曰死者將去又不敢容也故置之兩楹之間賓主共夾而敬之周人教以文曰死者將去不可又得故賓客之也檀弓記曰夏后氏殯於阼階殷人殯於兩楹之間周人殯於西階稽命徵禮稽命徵曰天子舟車殯何為避水火災也故棺在車上車在舟中臣子更執紼晝夜常百二十二千二百人紼者所以掌牽持棺者也故禮曰天子舟車殯諸侯車殯大夫倚欑塗士瘞尊卑之差也祖於庭何盡孝子之恩也祖者始也始載於庭也乘軸車辭祖禰故名為祖載也禮曰祖於庭葬於墓又曰適祖升自西階所以有棺槨何所以掩藏形惡也不欲令孝子見其毀壞也棺之為言之為言完所以藏尸令漸也載尸令完全也槨之為言廓所以開廓辟土無令迫棺也禮王制曰天子棺槨九重衣衾百二十稱干領大度曰公侯五重衣衾九十稱大夫有大棺三重衣衾五十稱士無大棺二重士再重無大棺衣衾三十稱單夾備為一稱禮檀弓曰天子棺四重水光草兕革棺被之其厚三寸地杝棺一梓棺二柏槨以端長六尺有虞氏瓦棺今以木何虞尚質故用瓦夏后氏益文故易之以堲周謂堲木相周無膠漆之周用也殷人棺槨有膠漆之用周人浸文椓翣加巧飾喪葬之禮緣生以事死生時無死亦不敢造太古之時穴居野處夜衣皮帶革故死衣之以薪內藏不飾中古之時有宮室衣服故衣之幣帛藏以棺槨封樹識表體以象生夏殷彌文齊之以器械至周大文緣夫婦生時同室死同葬之尸柩者何謂也尸之為言失也陳也失氣亡神形體獨陳柩之為言究也久也不復章變也曲禮曰在床曰尸在棺曰柩崩薨別號至墓同何也時臣子藏其君父安曆厝之義貴賤同葬之為言下藏之也所以入地何人時生於陰含陽光死始入地歸所與也天子七月而葬諸侯五月而葬何尊卑有差也天子七月而葬同軌必至諸侯五月而葬同會必至所以慎終重喪也禮曰家冢人奉掌兆域之圖先君王之葬君居以中居中以昭穆為左右群臣從葬以貴賤序合葬者何所以固同夫婦之道也故詩曰穀則異室死則同穴又禮檀弓曰合葬非古也自周公已以來未之有改也葬於城郭外何死生別處終始異居易曰葬之中野所以絶孝子之思慕也傳曰作樂於廟不聞於墓哭泣於墓不聞於廟所以於北方何者何就陰也檀弓曰孔子卒所以以所受魯君之璜玉葬魯城北又曰於邑北北首三代之達禮也封樹者所以為識故檀弓曰古也墓而不墳今丘也東西南北之人也不可以不識也於是封之崇四尺春秋含文嘉曰天子墳高三仞樹以松諸侯半之樹以柏大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊柳
