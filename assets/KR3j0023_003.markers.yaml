  - {type: variant, offset: 727, length: 2, content: 卑小, SBCK: 中和之色鍾者動也言陽氣動於黄泉之下動飬萬物也十二月律之謂之大吕何大大也吕者拒也言陽氣欲出隂不許也吕之爲言拒者旅抑拒難之也正月律謂之太蔟何太亦大也蔟者湊也言萬物始大湊地而出也二月律謂之夾鐘何夾者孚甲也言萬物孚甲種􅀋分也三月謂之姑洗何姑者故也洗者鮮也言萬物皆去故就其新莫不鮮明也四月謂之仲吕何言陽氣極將彼故復中難之也五月謂之㽔賔㽔者下也賔者敬也言陽氣上極隂氣始賔敬之也六月謂之林鍾何林者衆也萬物成熟種􅀋衆多七月謂之夷則何夷傷則法也言萬物始傷􅀍刑法也八月謂之南吕何南者任也言陽氣尚有任生薺麥也故隂拒之也九月謂之}
