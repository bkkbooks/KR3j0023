body:
  text: 日月天左旋日月五星右行何日月五星比天為陰故右行右行者猶臣對君也含文嘉曰計日月右行也刑德放曰日月東行而日行遲月行疾何君舒臣勞也日日行一度月日行十三度十九分度之七感精符曰三綱之義日為君月為臣也日月所以懸晝夜者何助天行化照明下地故易曰懸象著明莫大乎日月日之為言實也常滿有節月之為言闕也有滿有闕也所以有缺何歸功於日也三日成魄八日成光二八十六日轉而歸功晦至朔旦受符復行故援神契曰月三日成魄也所以名之為星何星者精也據日節言也一日一夜適行一度一日夜為一日剩復分天為三十六度周天三百六十五度四分度之一日月徑千里也所以必有晝夜何備陰陽也日照晝月照夜日所以有長短何陰陽更相用事也故夏節晝長冬節夜長夏日宿在東井出寅入戌冬日宿在牽牛出辰入申月有大小何天道左旋日月東右行日日行一度月日行十三度月及日為一月至二十九日未及七度即三十日者過行七度日不可分故月乍大乍小明有陰陽也故春秋曰九月庚戌朔日有食之十月庚辰朔日有食之此三十日也又曰七月甲子朔日有食之八月癸巳朔日有食之此二十九日也月有閏餘何周天三百六十五日度四分度之一歲十二月日過十二度故三年一閏五年再閏明陰不足陽有餘也故讖曰閏者陽之餘
