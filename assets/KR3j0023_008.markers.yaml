  - {type: variant, offset: 505, length: 1, content: 外, WYG: 所以必有紳帶示謹敬自約整繢繒為結於前垂三分身半紳居二焉以有鞶帯者示有事也其所以必有佩者論語曰去䘮無所不佩天子佩白玉}
  - {type: variant, offset: 508, length: 1, content: 嗣, WYG: 佩𤣥玉大夫佩水蒼玉士佩瓀珉石佩即象其事若農夫佩其耒耜工匠佩其斧斤婦人佩其鍼鏤何以知婦人亦佩玉詩云將翺將翔佩玉將將彼美孟姜徳音不忘五刑聖人治天下必有刑罰何所以佐徳助治順天之度}
