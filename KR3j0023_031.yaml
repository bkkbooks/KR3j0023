body:
  text: 壽命命者何謂也人之壽也天命已使生者也命有三科以記驗有壽命以保度有遭命以遇暴有隨命以應行習壽命者上命也若言文王受命唯中身享國五十年隨命者隨行為命若言怠棄三正天用勦絶其命矣又欲使民務仁立義闕無滔天滔天則司命舉過言則用以弊之遭命者逢世殘賤賊若上逢亂君下必災變暴至夭絶人命沙鹿崩于受邑是也冉伯牛危言正行而遭惡疾孔子曰命矣夫斯人也而有斯疾也夫子過鄭與弟子相失獨立郭門外或謂子貢曰東門有一人其頭似堯其頸似皋繇其肩似子産然自腰以下不及禹者三寸儡儡然如喪家之狗子貢以告孔子孔子喟然而笑曰形狀末也如喪家之狗然哉乎哉然哉乎哉
