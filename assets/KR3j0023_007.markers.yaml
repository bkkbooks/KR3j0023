  - {type: variant, offset: 0, length: 1, content: 封, WYG: 文質王者始立諸侯皆見何當受法禀正敎也尚書輯五瑞覲四嶽謂舜始即位見四方諸侯合符信詩云𤣥王桓撥受小國是達受大國是達言湯王天下大小國諸侯皆來見湯能通達以禮義也周頌曰烈文辟公錫兹祉福言武王伐紂定天下諸侯來㑹聚於京師受法度也逺近莫不至受命之君天之所興四方莫敢違夷狄咸率服故也何謂五瑞謂珪璧琮璜璋也禮曰天子珪尺二寸又曰博三寸剡上寸半厚半寸珪為璋方中圓外曰璧半璧曰璜圓中牙身𤣥外曰琮禮記王度曰玉者有象君之徳燥不輕濕不重薄不澆亷不傷疵不掩是以人君寶之天子之純玉尺有二寸}
