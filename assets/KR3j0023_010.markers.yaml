  - {type: variant, offset: 327, length: 0, content: '', SBCK: 反古不忘本也戰伐田獵此皆服之麻冕者何周宗廟之冠也禮曰周冕而祭又曰殷哻夏収而􅀕此三代宗廟之冠也十一月之時陽氣冕仰黄泉之下萬物􅀍施前冕而後仰故謂之冕謂之詡者十二月之時施氣受化詡張而後得牙故謂之詡謂之収者十三月之時氣収本舉生萬物而逹出之故謂之収冕仰不同故前後乖也詡張故萌大時物}
