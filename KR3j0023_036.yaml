body:
  text: 四時所以名為歲何歲者遂也三百六十六日一周天萬物畢死成故為一歲也尚書曰三百有六旬有六日以閏月定四時成歲歲時何謂春夏秋冬也時者期也陰陽消息之期也四時天異名何天尊各據其盛者為名也春秋物變盛冬夏氣變盛春曰蒼天夏曰昊天秋曰旻天冬為曰上天爾雅曰一説春為蒼天等是也四時不隨正朔變何以為四時據物為名春當生冬當終皆以正為時也或言歲或言載或言年何言歲者以紀氣物帝王共之據曰日為歲年者仍也年以紀事據月言年春秋曰元年正月十有二月朔有朔有晦知故據月斷為言年載之言成也載成萬物終始言之也二帝為載三王言年皆謂窺故尚書曰三載四海遏密八音謂二帝也又曰諒陰三年謂三王也春秋傳曰三年之喪其實二十五月知闕日言夜月言晦月言朔日言朝何朔之言蘇也明消更生故言朔日晝見夜藏有朝夕故言朝也
