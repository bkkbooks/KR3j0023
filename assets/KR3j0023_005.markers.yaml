  - {type: variant, offset: 175, length: 0, content: '', SBCK: 三載考績三考黜陟禮記九錫車馬衣服樂朱戸納陛虎賁鈇􅃏弓矢秬鬯皆隨其徳可行而賜車馬能安民者賜衣服能使民和樂者賜以樂民衆多者賜以朱戸能進善者賜以納陛能退惡者賜以虎賁能誅有罪者賜以鈇􅃏能征不義者賜以弓矢孝道備者賜以秬鬯以先後與施行之次自不相踰相爲本末然安民然後冨貴而後樂樂而後衆}
