  - {type: variant, offset: 206, length: 2, content: 田方, SBCK: 七感精符曰三綱之義日為君月為臣也日月所以懸晝夜者何助天行化照明下地故易曰懸象著明莫大乎日月日之爲言實也常滿有節月之爲言闕也有滿有闕也所以有缺何歸功於日也八日成光二八十六日轉而歸功晦至朔旦受符復行故援神契曰月三日成魄也所以名之爲星何星者精也據日節言也一日一夜適行一度一日夜爲一日剰復分天爲三十六度周天三百六十五度四分度之一日月徑}
