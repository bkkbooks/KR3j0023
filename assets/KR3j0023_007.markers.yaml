  - {type: variant, offset: 1369, length: 340, content: 者也為其專權擅勢傾覆國家又白曰孫苟中庸不任輔政妨塞賢故不世世故春秋公羊傳曰譏世卿世卿非禮也諸侯世位大夫不世安法所以諸侯南面之君體陽而行陽道不絕大夫人臣北面體陰而行陰道有絕以男生內嚮有留家之義女生外嚮有從夫之義意此陽不絕陰有絕之效也國君在立太子者所以防篡煞壓臣子之亂也春秋之義弒太子罪與弒君同春秋曰弒其君之子奚齊言君者明與弒君同也君薨適夫人無子有育遺腹必待其產立之何尊適重正也曾子問曰立適以長不以賢何以言為賢不肖不可知也尚書曰知人則哲惟帝其難之立子以貴不以長者防愛憎也春秋公羊傳曰立適以長不以賢立子以賢貴不以長也始封諸侯無子死不得與兄弟何古者象賢也弟非賢者子孫春秋傳曰善善及子孫不言及昆弟昆弟尊同無相承養之義以閔公不繼莊公也昆弟不相繼之義至繼體諸侯無子得及親屬者以其俱賢者子孫也重其, SBCK: ''}
