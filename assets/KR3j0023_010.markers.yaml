  - {type: variant, offset: 869, length: 2, content: 受成, WYG: ''}
  - {type: variant, offset: 872, length: 2, content: 學此, WYG: 庭何盡孝子之恩也祖者始也始載於庭也乗軸車辭祖禰故名為祖載也禮曰祖於庭葬於墓又曰適祖昇自西階所以有棺槨何所以掩藏形惡也不欲令孝子見其毁壊也棺之為}
  - {type: punctuation, offset: 873, content: 。, id: KR3j0023_tls_010-bkkpn250}
