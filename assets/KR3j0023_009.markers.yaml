  - {type: variant, offset: 2988, length: 1, content: 喪, SBCK: 有五不娶亂家之子不娶逆家之子世有刑人惡疾䘮婦長子此不娶也出婦之義必送之接以賔客之禮君子絶愈于小人之交詩云薄送我畿天子妃謂之后何后君也天下尊之故謂之后明海内小人之君子也天下尊之故繫王言之春秋傳曰迎王后于紀國君之妻稱之曰夫人何明當扶進夫人謂八妾也國人尊之故稱君夫人也自稱小童者謙也言已智能寡少如童􅀩也論語曰國君之妻稱之曰夫人夫人自稱曰小童國人稱之曰君夫人稱諸異􅀖曰寡小君謂聘問兄弟之國及臣他國稱之謙之辭也妻者何謂妻者齊也與夫齊體自天子下至庻人其義一也妾者接也以時接見也嫁娶者何謂也嫁者家也婦人外成以岀適人爲嫁娶者取也男女謂男者任也任功業也女者如也從如人也在家從父母旣嫁從夫夫没從子也傳曰婦人有}
