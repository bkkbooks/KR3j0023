  - {type: variant, offset: 411, length: 0, content: '', WYG: 者所服近也所以十月行鄉飲酒之禮何所復尊卑長幼之義春夏事急浚井次墻至有子使父弟使兄故以事閒暇復長幼之序也王者父事三老兄事五更者何欲陳孝悌之徳以示天下也故雖天子必有尊也言有父也必有先也言有兄也天子臨辟雍親􅃝割牲尊三老父象也竭忠奉几杖授安車濡輪恭綏執授兄事五更寵接禮交加客謙敬順貌也禮記祭義曰祀于明堂所以教諸侯之孝也享三老五更于太學者所以教諸侯悌也不正言父兄言三老五更者何也老者夀考也欲言所令者多也更者更也所更歴者衆也即如是不但言老言三何欲言其明於天地人之道而老也五更者欲言其明於五行之道而更事也三老五更幾人乎曰各一人何以知之既以父事父一而已不宜有三致仕臣七十懸車致仕者臣以執事趨走為職七十陽道極耳目不聦明跂踦之屬是以退去避賢者所以長亷耻也懸車示不用也致仕者致其事於君君不使自去者尊賢者也故曲禮大夫七十而致仕王制曰七十致政鄉大夫老有盛徳者留賜之几杖不備之以筋力之禮在家者三分其祿以一與之所以厚賢也人年七十卧非人不温適四方乘安車與婦人俱自稱曰老夫曲禮曰大夫致仕若}
