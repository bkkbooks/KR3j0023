  - {type: variant, offset: 927, length: 199, content: 天地人之道也舜曰簫韶者舜能繼堯之道也禹曰大夏者言禹能順二聖之道而行之故曰大夏也湯曰大護濩者言湯承衰能護民之急也周公曰酌合者言周公輔成王能斟酌文武之道而成之也武王曰象者象太平而作樂示已太平也合曰大武者天下始樂周之征伐行武故詩人歌之歌之曰王赫斯怒爰整其旅當此之時天下樂文王之怒以定天下故樂其武也周室中制象湯樂何殷紂為惡日久其惡最甚斮涉刳胎殘賊天下武王起兵前歌後舞剋殷之後民人大喜故中作所以節喜盛天子八佾, SBCK: 庶風至則修封疆埋田疇清明風至出幣帛使}
