  - {type: variant, offset: 2973, length: 0, content: '', SBCK: 小寢則嫌群公之舎則巳卑矣故必改築於城郭之内傳曰築之禮也于外非禮也卿大夫妻二妾者何尊賢重繼嗣也不備姪娣何北靣之臣賤不足盡執人骨肉之親禮服經曰貴臣貴妾明有卑賤妾也士一妻何下卿大夫禮䘮服小記曰士妾有}
  - {type: page-break, offset: 2973, content: '', id: KR3j0023_SBCK_009-8b}
  - {type: variant, offset: 2973, length: 0, content: '', WYG: 小寢則嫌羣公之舍則已卑矣故必改築於城郭之内傳曰築之禮也于外非禮也卿大夫妻二妾者何尊賢重繼嗣也不備姪娣何北靣之臣賤不足盡執人骨肉之親禮服經曰貴臣貴妾明有卑賤妾也士一妻何下卿大夫禮喪服小記曰士妾有}
  - {type: variant, offset: 2973, length: 0, content: '', krp: 小寢則嫌群公之舎則巳卑矣故必改築於城郭之内傳曰築之禮也于外非禮也卿大夫妻二妾者何尊賢重繼嗣也不備姪娣何北靣之臣賤不足盡執人骨肉之親禮服經曰貴臣貴妾明有卑賤妾也士一妻何下卿大夫禮䘮服小記曰士妾有}
  - {type: variant, offset: 2974, length: 1, content: 喪, SBCK: 則爲之緦娉嫡夫徃而死媵當徃否乎人君不再娶之義也天命不可保故一娶九女以春秋伯􅁎卒時娣季􅁎更嫁鄫春秋譏之適夫人死後更立夫人者不敢以卑賤承宗廟自立其娣者尊大國也春秋傳曰叔􅁎歸于紀叔􅁎者伯􅁎之娣也伯􅁎卒叔􅁎升于嫡經不譏也或曰嫡死不復更立明嫡無二防􅆲煞也祭宗廟攝而巳以禮不聘爲妾明不升曽子問曰昏禮旣納幣有吉日女之}
  - {type: page-break, offset: 2974, content: '', id: KR3j0023_SBCK_009-9a}
