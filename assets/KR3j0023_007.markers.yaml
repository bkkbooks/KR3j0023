  - {type: variant, offset: 1837, length: 1, content: 為, SBCK: 如曰教者所以追􅀘敗政靡弊溷濁謂之治也舜之承堯無爲易也或曰三教改易夏后氏始髙宗亦承弊所以不改教何明子無改父之道也何言知髙宗不改之以周之教承以文也三教所以先忠者行之本也三教一體而分不可單行顧王者行之有先後何以言三教並施不可單行也以忠敬文無可去者也教所以三何法天地人内忠外敬文飾之故三而備也即法天地人各何施忠法人敬法地文法天人道主忠人以至道教人忠之至也人以忠教故忠爲人教也地道謙卑天之所生地敬養之以敬爲地教也教者何謂也教者効也上爲之下効之民有質朴不教不成故孝經曰}
