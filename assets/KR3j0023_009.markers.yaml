  - {type: variant, offset: 2982, length: 0, content: '', WYG: 在則稱伯父世母壻已葬壻之伯父叔父使人致命女氏曰某子有父母之喪不得嗣為兄弟使母致命女氏許諾不敢嫁禮也壻免喪女父使人請壻不娶而後嫁之禮也女之父母死壻亦如之婦人所以有師何學事人之道也詩云言告師氏言告言歸禮昏經曰告于公宫三月婦人學一時足以成矣與君無親者各教於宗廟婦之室國君取大夫之妾士之妻老無子者而明於婦道又禄之使教宗室五屬之女大夫士皆有宗族自於宗子之室學事人也女必有傅姆何尊之也春秋傳曰傅至矣姆未至婦人學事舅姑不學事父母者示婦與夫一體也禮内則曰妾事夫人如事舅姑尊嫡絶妬嫉之原禮服傳曰妾事女君與事舅姑同也婦事夫有四禮焉鷄初鳴咸􅏕潄櫛縰䈂總而朝君臣之道也惻隠之恩父子之道也㑹計有無兄弟之道也閨閫之内衽席之上朋友之道也聞}
