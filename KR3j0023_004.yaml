body:
  text: 五祀五祀者何謂也謂門戶井灶中霤也所以祭之何人之所居處出入所飲食故為神而祭之何以知五祀謂門戶井竈中霤也月令曰其祀戶又曰其祀竈其祀中霤其祀門其祀井獨大夫已上得祭之何士者位卑祿薄但祭其先祖耳禮曰天子祭天地諸侯祭山川卿大夫祭五祀士祭其祖先曲禮曰天子祭天地四時山川五祀歲遍諸侯方伯祀山川祭五祀歲遍卿大夫祭五祀士祭其先凡祀有廢之莫敢舉也有舉之莫敢廢也非所當祭而祭之名曰淫祀淫祀無福祭五祀所以歲一遍何順五行也故春即祭戶戶者人所出入亦春萬物始觸戶而出也夏祭灶灶者火之主人所以自養也夏亦火王長養萬物秋祭門門以閉藏自固也秋亦萬物成熟內備自守也冬祭井井者水之生主藏任在地中冬亦水王萬物伏藏六月祭中霤中霤者象土在中央也六月亦土王也故月令春言其祀戶祭先脾夏言其祀竈祭先肺秋言其祀門祭先肝冬言其祀井祭先腎中央言其祀中霤祭先心春祀戶祭所以時特先脾者何脾者土也春木王煞土故以所勝祭之也是冬腎六月心非所勝也以祭何以為土位在中央至尊故祭以心心者藏之尊者水最卑不得食其所勝祭五祀天子諸侯以牛卿大夫以羊因曰四時祭牲也一說戶以羊竈以雉雞中霤以豚門以犬井以豕或曰中霤用牛餘不得用牛者用豚井以魚
