  - {type: variant, offset: 1093, length: 2, content: 狄泉, SBCK: 領大度曰公侯五重衣衾九十稱士再重禮曰大夫有大棺三重衣衾五十稱士無大棺二重衣衾三十稱單祫備爲一稱禮檀弓曰天子棺四重水光草棺被之其厚三寸地棺一梓棺二柏椁以端長六尺有虞氏瓦棺今以木何虞尚質故用瓦夏后氏益文故易之以堲周謂堲木相周無膠􅃮之周也殷人棺椁有膠􅃮之用周人􅪶文墻置翣加巧飾䘮葬之禮縁生以事死生時無死亦不敢造太古之時穴居野處夜皮帶革故死衣之以薪内藏不師中古之時有宫室衣服故衣之幣帛藏以棺椁封樹識表體以象生夏殷彌文齊之以器械至周大文縁夫婦生時同室死同葬之尸柩者何謂也尸之爲言失也陳也失氣亡神形體獨陳柩之爲言究也乆也不復章也曲禮曰在床曰尸在棺曰柩崩薨别號至墓同何也時臣子藏其君父安暦之義貴賤同葬之爲言下藏之也所以入地何人時於隂含陽光死始入地歸所與也天子七月而葬諸侯五月而葬何尊卑有差也天子七月而葬同䡄必至諸侯五月而葬同㑹必至所以愼終重䘮也禮曰家人奉圗先君之葬君居以中昭穆爲左右群臣從葬以貴賤序合葬者所以固夫婦之道也故詩曰榖則異室死則同穴又禮檀弓曰合葬非古也自周公已來未之有改也葬於城郭外何死生别處終始異居易曰葬之中野所以絶孝子之思慕也}
