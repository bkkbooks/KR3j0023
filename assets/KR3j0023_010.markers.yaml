  - {type: variant, offset: 750, length: 2, content: 矢乃, WYG: 曰昔夫子之䘮顔囘若䘮子而無服䘮子路亦然請䘮夫子若䘮父而無服也曾子問曰君薨既殯而臣有父母之䘮則如之何孔子曰歸居于家有殷事則之君所朝夕否曰君既斂而臣有父母之喪則如之何孔子曰歸殯哭而反于君所有殷事則歸朝夕否大夫室老行事士則子孫行事大夫内子有殷事則亦之君所朝夕否諸侯有親䘮聞天子崩奔䘮者何屈己親親猶尊尊之義也春秋𫝊曰天子記崩不記葬者必其時葬也諸侯記葬不必有時諸侯為有天子䘮尚奔不}
