body:
  text: 蓍龜天子下至士皆有蓍龜者重事決疑示不自專尚書曰女則有大疑謀及卿士謀及庶人謀及卜筮定天下之吉凶成天下之亹亹者莫善於蓍龜禮三正記曰天子龜長一尺二寸諸侯一尺大夫八寸士六寸龜陰故數偶也天子蓍長九尺諸侯七尺大夫五尺士三尺蓍陽故數奇也所以先謀及卿士何先盡人事念而不能得思而不能知然後問於蓍龜聖人獨見先睹必問蓍龜何示不自專也或曰清微無端緒非聖人所及聖人亦疑之尚書曰女則有疑謂武王也乾草枯骨衆多非一獨以灼蓍龜何此天地之間壽考之物故問之也龜之為言久也蓍之為言耆也久長意也龜曰卜蓍曰筮何卜赴也爆見兆也筮也者信也見其卦也尚書曰卜三龜禮士冠經曰筮于廟門外筮畫卦所以必於廟何託義歸智於先祖至尊故因先祖而問之也卜春秋何方以為於西方東面蓋蓍之處也卜時西嚮已卜退東向嚮問蓍於東方西面以少問老之義皮辨素積求之於質也禮曰皮辨素積筮于廟門之外或曰天子占卜九人諸侯七人大夫五人士三人又尚書曰三人占則從二人之言不見吉凶于蓍復以卜何蓍者陽道多變變乃成龜以制荊火灼之何禮雜記曰龜陰之老也蓍陽之老也龍非水不處龜非火不兆以陽動陰也必以荊者取其究音也禮三正記曰灼龜以荊以火動龜不以水動蓍何以為嘔則是也蓍龜敗則埋之何重之不欲人襲褻尊者也周官曰九凡國之大事先筮而後卜凡卜人筮君視體大夫視色士視墨凡人卜事視高揚火以作龜凡取龜用秋時攻龜用冬春時
