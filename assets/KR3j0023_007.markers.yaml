  - {type: variant, offset: 488, length: 1, content: 伯, SBCK: 時萬物始牙而白白者隂氣故殷爲地正色尚白也十三月之時萬物始逹孚由而岀皆黒人得加功故夏爲人正色尚黒尚書大傳曰夏以孟春月爲正殷以季冬月爲正周以仲冬月爲正夏以十三月爲正色尚黒以平旦爲朔殷以十二月爲正色尚白以雞鳴爲朔周以十一月爲正色尚赤以夜半爲朔不以二月後爲正者萬物不齊莫適所統故必以三微之月也三正之相承􅀂順連環也孔子承周之弊行夏之陸知繼十一月正者當用十三月也天道左旋改正者右行何也改正者非改天道也但改日月耳日月右行故改正亦右行也日尊於月不言正日言正月何也積日成月物隨月而變故據物爲正也天質地文質者據質文者據文周反統天正何也質文再而復正朔三而改三微質文數不相配故正不隨質文}
