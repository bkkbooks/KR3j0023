  - {type: variant, offset: 194, length: 1, content: 師, SBCK: 女子十五許嫁笄禮之稱字之婦姓以配字何明不娶同姓也故春秋曰伯􅁎歸于宋􅁎者姓也值字所以於仲春何值者親故近於仲文子尊尊故於伯仲之時物尚值叔之時物失之章即如是周有八士論語曰伯逹伯适仲突仲忽叔夜叔夏季隨季騧積於叔何盖以兩兩俱生故也不積於伯季明其無二也文王十子詩傳曰伯邑考武王發周公旦管叔鮮蔡叔鐸成叔處霍叔武康叔封南季載載所以或上其叔何也管蔡霍成康􅀯皆采也故上置叔上伯邑叔震也以獨無乎盖以爲大夫者不是采地也}
