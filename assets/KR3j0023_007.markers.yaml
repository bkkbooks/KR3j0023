  - {type: variant, offset: 488, length: 1, content: 伯, WYG: 時萬物始牙而白白者陰氣故殷為地正色尚白也卜三月之時萬物始達孚甲而出皆黑人得加功故夏為人正色尚黒尚書大傳曰夏以孟春月為正殷以季冬月為正周以仲冬月為正夏以十三月為正色尚黑以平旦為朔殷以十二月為正色尚白以雞鳴為朔周以十一月為正色尚赤以夜半為朔不以二月後為正者萬物不齊莫適所統故必以三微之月也三正之相承若順連環也孔子承周之弊行夏之時知繼十一月正者當用十三月也天道左旋改正者右行何也改正者非改天道也但改日月耳日月右行故改正亦右行也日尊於月不言正日言正月何也積日成月物隨月而變故據物為正也天質地文質者據質文者據文周反統天正何也質文再而復正朔三而改三微質文數不相配故正不隨質文}
