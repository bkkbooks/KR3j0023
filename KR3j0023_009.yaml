body:
  text: 五行五行者何謂也謂金木水火土也言行者欲言為天行氣之義也地之承天猶妻之事夫臣之事君也謂其位卑卑者親視事故自周同於一行尊於天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方北方者陰氣在黃泉之下任養萬物水之為言淮准也陰化沾濡任生木養物平均有準則也木在東方東方者陰陽氣始動萬物始生木之為言觸也陽氣動躍觸地而出也火在南方南方者陽在上萬物垂枝火之為言委隨也言萬物布施火之為言化也陽氣用事萬物變化也金在西方西方者陰始起萬物禁止金之為言禁也土在中央中央者土土主吐含萬物土之為言吐也何知東方生樂記曰春生夏長秋收冬藏土所以不名時者地土之別名也比於五行最尊故不自居部職也元命包苞曰土之為無位而道在故大一不預與化人主不任部職五行之性或上或下何火者陽也尊故上水者陰也卑故下水木者少陽金者少陰有中和之性故可曲可直從革土者最大苞含物將生者出者將歸者入不嫌清濁為萬物尚書曰水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡五行所以二陽三陰何土尊尊者配天金木水火陰陽自偶水味所以鹹何是其性也所以北方鹹者萬物鹹與所以堅之也猶五味得鹹乃堅也木味所以酸者何所以酸何東方萬物之生也酸者以達生也猶五味得酸乃達也火味所以苦何南方主長養苦者所以長養也猶五味須苦可以養也金味所以辛何西方煞傷成物辛所以煞傷之也猶五味得辛乃委煞也土味所以甘何中央者中和也故甘猶五味以甘為主也尚書曰潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘北方其臭朽者何北方水萬物所幽藏也又水者受垢濁故臭腐朽也東方者木也萬物新出地中故其臭羶南方者水火也盛陽承動故其臭焦西方者金也萬物成熟始復諾故其臭腥中央土也中央者土也主養故其臭香也月令曰東方其臭羶南方其臭焦中央其臭香西方其臭腥北方其臭朽所以名之為東方者動方也萬物始動生也南方者任養之方萬物懷任也西方者遷方也萬物遷落也北方者伏方也萬物伏藏也少陽見於寅寅者演也律中大太簇律之言率所以率氣令生也盛於卯卯者茂也律中夾鍾衰於辰辰者震也律中姑洗其日甲乙甲者萬物孚甲也乙者物蕃屈有節欲出時為春春之為言偆偆動也位在東方其色青其音角角者氣動耀躍也其帝太皞太皞者大起萬物擾也其神勾芒勾芒者物之始生其精青龍芒之為言萌也陰中陽故太陽見於巳巳者物必起律中仲呂壯盛於午午物滿長律中蕤賓衰於未未味也律中林鍾其日丙丁丙者其物炳明丁者強也時為夏夏之言大也位在南方其色赤其音徵徵止也陽度極也其帝炎帝炎帝者太陽也其神祝融祝融者屬續也其精為朱鳥離為鸞故少陰見於申申者身也律中夷則壯於酉酉者老也物收斂律中南呂衰於戍戍者滅也律中無射無射者無聲也其日庚辛庚者物更庚也辛者陰始成時為秋秋之為言愁亡也其位西方其色白其音商商者強也其帝少皞少皞者少斂也其神蓐收蓐收者縮也其精白虎虎之為言搏討也故太陰見於亥亥者仰賅也律中應鍾壯於子於子者孳也律中黃鍾衰於丑丑者紐也律中大呂其日壬癸壬者陰始使任癸者揆揆度可揆度也時為冬冬之為言終也其位在北方其音羽羽之為言舒言萬物始孳其帝顓頊顓頊者寒縮也其神玄冥玄冥者入冥也其精玄武掩起離體泉龜蛟珠蛤土為中宮其日戊己戊者茂也己者抑屈起其音宮宮者中也其帝黃帝其神后土月令云月令十一月律謂之黃鍾何黃中和之色鍾者動也言陽氣潛藏動於黃泉之下動養萬物也十二月律之謂之大呂何大者大也呂者拒也言陽氣欲出陰不許也呂之為言拒者也旅抑拒難之也正月律謂之太蔟何太亦大也蔟者湊也言萬物始大湊地而出也二月律謂之夾鐘何夾者孚甲也言萬物孚甲種類分也三月謂之姑洗何姑者故也洗者鮮也言萬物皆去故就其新莫不鮮明也四月謂之仲呂何言陽氣極將將極中充大也彼故復中難之也五月謂之蕤賓何蕤者下也賓者敬也言陽氣上極陰氣始起故賓敬之也六月謂之林鍾何林者衆也萬物成孰熟其種類衆多也七月謂之夷則何夷傷也則法也言萬物始傷被刑法也八月謂之南呂何南者任也言陽氣尚有任也生薺麥也故陰拒之也九月謂之無射何射者終也言萬物隨陽而終也當復隨陰而起無有終已也十月謂之應鍾何應者應也鍾者動也言萬物應陽而動下藏也五行所以更王何以其轉相生故有終始也木生火火生土土生金金生水水生木是以木王火相土死金囚水休王所勝者死內囚故王者休見木王火相何以知為臣土所以死者子為父報仇者也五行之子慎之物歸母木王火相金成其火燋金金生水水滅火報其理火生土土則害水莫能而禦五行所以相害者大天地之性衆勝寡故水勝火也精勝堅故火勝金剛勝柔故金勝木專勝散故木勝土實勝虛故土勝水也火陽君之象也水陰臣之義也臣所以勝其君何此謂無道之君也故為衆陰所害猶紂王也是使冰水得施行金以蓋益之土以應之欲溫則溫欲寒則寒亦何從得害火乎曰五行各自有陰陽木生火所以還燒其母何曰金勝木火欲為木害金金者堅強難消故母以遜體助火燒金此自欲成子之義又陽道不相離故為兩盛火死子乃繼之木王所以七十二日何土王四季各十八日合九十日為一時王九十日土所以王四季何木非土不生火非土不榮金非土不成水無非土不高土扶微助衰歷成其道故五行更王亦須土也王四季居中央不名時五行何以知同時起丑訖義相生傳曰五行並起赴各以名別陽生陰煞火中無生物水中反有生物何生者以內火陰在內故不生也水火獨一種金木多品何以為南北陰陽之極也得其極故一也東西非其極也故非一也水木可食金火土不可食何木者陽陽者施生故可食火者陰在內金者陰嗇故不可食火水所以殺人何水盛氣也故入而殺人火陰在內故殺人壯於水也金木微氣故不能自殺人也火不可入其中者陰在內也入則殺人矣水土陽在內故可入其中金木微氣也精密不可得入也水火不可加人功為用金木加人功何火者盛陽水者盛陰者也氣盛不變故不可加人功為人用金木者不能自成故須人加功以為人用也五行之性火熱水寒有溫水無寒火何明臣可以為君君不可更為臣五行常在火乍亡何水太陰也刑者故常在金少陰木少陽微氣無變故亦常在火太陽精微人君之象象尊常藏猶天子居九重之內臣下衛之也藏於木者依於仁也木自主生金須人取之乃成陰卑不能自成也木所以浮金所以沉何子生於母之義肝所以沉肺所以浮何有知者尊其母也一說云甲木畏金金之以乙妻庚受庚之化木者法其本柔可曲直甲故浮也肝法其化直乙故沉金畏火以辛妻丙受丙之化金法其本直庚故沈肺法其化直辛故浮五行皆同義天子所以內明而外昧人所以外明而內昧何明天人欲相嚮而治也行有五時有四何四時為時五行為節故木王即謂之春金王即謂之秋土尊不任職君不居部故時有四也子不肯禪何法法四時火不興土而興金也父死子繼何法法木終火王也兄死弟及何法法夏之承春也善善及子孫何法法春生待夏復長也惡惡止其身何法法秋煞不待冬也主幼臣攝政何法法土用事於季孟之間也子之復讎何法法土勝水水勝火也子順父臣順君妻順夫何法法地順天也男不離父母何法法火不離木也女離父母何法法水流去金也娶妻親迎何法法日入陽下陰也君讓臣何法法月三十日名其功也善稱君過稱己何法法陰陽共敘共生陽名生陰名煞臣有功歸於君何法法歸明於日也臣法諫君何法法金正木也子諫父何法法火揉直木也臣諫君不從則去何法法水潤下達於上也君子遠子近孫何法法木遠火近土也親屬臣諫不相去何法法水木枝葉不相離也父為子隱何法法木之藏火也子為父隱何法法水逃金也君有衆民何法法天有衆星也王者賜先親近後疏遠何法法天雨高者先得之也長幼何法法四時有孟仲季也朋友何法法水合流相承也父母生子養長子何法法水生木長大也子養父母何法法夏養長木此火養母也不以父命廢主命王父命何法法金不畏土而畏火陽舒陰急何法法日行遲月行疾也有分土無分民何法法四時各有分而所生者通道也若言東東方天下皆生也君一娶九女何法法九州象天之施也不娶同姓何法法五行異類乃相生也子喪父母何法法木不見水則憔悴也喪三年何法法三年一閏天道終也父喪子夫喪妻何法法一歲物有終始天氣亦為之變也年六十閉房何法法六月陽氣衰也人有五藏六府何法法五行六合也人目何法法日月明也日照晝月照夜人目所不更照何法法日亦更用事也王者監二王之後何法法木須金以正須水以潤也明王先賞後罰何法法四時先生後煞也
