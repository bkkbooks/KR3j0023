  - {type: variant, offset: 354, length: 4, content: 時特先脾, WYG: 有諌君之義何盡忠納誠也愛之能無勞乎忠焉能無誨乎孝經曰天子有諍臣七人雖無道不失其天下諸侯有諍臣五人雖無道不失其國大夫有諍臣三人雖無道不失其家士有諍友則身不離於令名父有諍子則身不陷於不義天子置左輔右弼前疑後丞以順左輔主修政㓨不法右弼主糺周言失傾前疑主糺度定徳經後丞主匡正常考變天四弼興道率主行仁夫陽變於七以三成故建三公序四諍列七人雖無道不失天下仗羣賢也諸侯諍不從得去何以屈尊申卑孤惡君也去曰某質性頑鈍言愚不任用請退避賢如是之是待以禮臣待放如不以禮待遂去君待之以禮奈何曰予熟思夫子言未得其道今子不且留聖王之制無塞賢之路夫子欲何之則遣大夫送至於郊必三諌}
