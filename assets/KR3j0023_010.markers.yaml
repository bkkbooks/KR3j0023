  - {type: variant, offset: 662, length: 0, content: '', SBCK: 下服之有先後何恩有深淺逺近故制有日月檀弓記曰天子崩三日祝先服五日官長服七日國中男女服三月天下服三年之䘮何二十五月以爲古民質痛於死者不封不樹䘮期無數亡之則除後代聖人因天地萬物有終始}
