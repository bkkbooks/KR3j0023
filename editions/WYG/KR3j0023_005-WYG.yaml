body:
  text: 封禪王者易姓而起必升封泰山何教告之義也始受命之時改制應天天下太平功成封禪以告太平也所以必於泰山何萬物所交代之處也必於其上何因髙告髙順其類也故升封者增髙也下禪梁甫之山基廣厚也刻石紀號者著己之功跡也以自效倣也天以髙為尊地以厚為徳故增泰山之髙以放天附梁甫之基以報地明天地之所命功成事遂有益於天地若髙者加髙厚者加厚矣或曰封者金泥銀繩或曰石泥金繩封以印璽故孔子曰升泰山觀易姓之王可得而數者七十有餘封者廣也言禪者明以成功相傳也梁甫者太山旁山名正於梁甫何以三皇禪於繹繹之山明已成功而去有徳者居之繹繹者無窮之意也五帝禪于亭亭者制度審諟徳著明也三王禪于梁甫之山者梁信也甫輔也輔天地之道而行之也太平乃封知告于天必也於岱宗何明知易姓也刻石紀號知自紀于百王也燎祭天報之義也望祭山川祀羣神也詩云於皇時周陟其髙山言周太平封太山也又曰墮山喬嶽允猶翕河言望祭山川百神來歸也天下太平符瑞所以來至者以為王者承綂理調和陰陽陰陽和萬物序休氣充塞故符瑞並臻皆應徳而至徳至天則斗極明日月光甘露降徳至地則嘉禾生蓂莢起秬鬯出平路感徳至文表則景星見五緯順軌徳至草木朱草生木連理徳至鳥獸則鳯凰翔鸞鳥舞騏驎臻白虎到狐九尾白雉降白鹿見白烏下徳至山陵則景雲出芝實茂陵出異丹阜出萐莆山出器車澤出神鼎徳至淵泉則黄龍見醴泉通河出龍圖洛出龜書江出大貝海出眀珠徳至八方則祥風至佳氣時喜鍾律調音度施四夷化越裳貢孝道至則出萐莆者樹名也其葉大於門扇不摇自扇於飲食清凉助供養也繼嗣平明則賓連生於房户賓連者木名連累相承故在於房户象繼嗣也日歴得其分度則蓂莢生於階間蓂莢樹名也月一日生一莢十五日畢至十六日去莢故莢階生似日月也賢不肖位不相踰則平路生于庭平路者樹名也官位得其人則生失其人則死狐九尾何狐死首丘不忘本也明安不忘危也必九尾者何九妃得其所子孫繁息也於尾者何明後當盛也景星者大星也月或不見景星常見可以夜作有益於人民也甘露者美露也降則物無不盛者也朱草者赤草也可以染絳别尊卑也醴泉者美泉也狀若醴酒可以養老嘉禾者大禾也成王時有三苖異畆而生同為一穟大幾盈車長幾充箱民有得而上之者成王訪周公而問之公曰三苖為一穟天下當和為一乎以是果有越裳氏重九譯而來矣巡狩王者所以巡狩者何巡者循也狩牧也為天下循行守牧民也道徳太平恐逺近不同化幽隠自不得所考禮義正法度同律歴計時月皆為民也尚書曰遂覲東后叶時月正日同律度量衡修五禮尚書大𫝊曰見諸侯問百年太師陳詩以觀民命風俗命市納賈以觀民好惡山川神祗有不舉者為不敬不敬者削以地宗廟有不順者為不孝不孝者黜以爵變禮易樂為不從不從者君流改制度衣服爲畔畔者君討有功者賞之尚書曰明試以功車服以庸巡狩所以四時出何當承宗廟故不踰時也以夏之仲月者同律度當得其中也二月八月晝夜分五月十一月陰陽終尚書曰二月東巡狩至于岱宗柴五月南巡狩至于南岳八月西巡狩至于西岳十有一月朔巡狩至于北岳所以五嵗巡狩何為太煩也過五年為太踈也因天道時有所生嵗有所成三嵗一閏天道小備五歳再閠天道大備故五歳一巡狩三年小備二伯出述職黜陟一年物有終始歳有所成方伯行國時有所生諸侯行邑𫝊曰周公入為三公出為二伯中分天下出黜陟詩曰周公東征四國是皇言東征述職周公黜陟而天下皆正也又曰蔽芾甘棠勿剪勿伐召伯所茇言邵公述職親說舎於野樹之下也春秋榖梁𫝊曰古之君民以時視民之勤巡狩祭天何本巡狩為祭天告至尚書曰東巡狩至于岱宗柴也王者出必告廟何孝子出辭反面事死如事生尚書歸假于祖禰曾子問曰王者諸侯出稱告祖禰使祝遍告五廟尊親也王者將出告天者示不專也故王制曰類于上帝宜乎社造于禰類祭以祖配不曰接者尊無二禮尊尊之義造于禰獨見禰何辭從卑不復留尊者之命至禰不謙不至祖即祭告天為告事也祖為出辭也義異告于尊者然後乃辭出王者諸侯出必將主何示有所尊故曾子曰王者將出必以遷廟主行載于齋車示有尊也無遷主以幣帛主告于祖禰廟遂奉以出每舍奠焉盖貴命也必以遷主者明廟不可空也王者巡狩諸侯待於境者何諸侯以守蕃為職也禮祭義曰天子巡狩諸侯待于境也王者巡狩必舍諸侯祖廟何明尊無二上也故禮坊記曰君適其臣升自阼階示不敢有其室也禮曰天子適諸侯必舍其祖廟王者出一公以其屬守二公以其屬從也王者巡狩崩于道歸葬何夫太子當為䘮主天下皆來奔䘮京師四方之中也即如是舜塟蒼梧禹𦵏㑹稽于時尚質故死則止塟不重煩擾也何以知太平乃巡狩以武王不巡狩至成王乃巡狩岳者何謂也岳之為言桷桷功徳東方為岱宗者言萬物更相代於東方也南方霍山者霍之為言䕶也言萬物護也太陽用事䕶養萬物也西方為華山者華之為言穫也言萬物成熟可得穫也北方為恒山恒者常也萬物伏藏於北方有常也中央為嵩山言其後大之也故尚書大𫝊曰五岳謂岱山霍山華山恒山嵩山也謂之瀆何瀆者濁也中國垢濁發源東注海其功著大故稱瀆也爾雅云江河淮濟為四瀆也考黜諸侯所以考黜何王者所以勉賢抑惡重民之至也尚書曰三載考績三考黜陟禮記九錫車馬衣服樂朱户納陛虎賁鈇鉞弓矢秬鬯皆隨其徳可行而賜車馬能安民者賜衣服能使民和樂者賜以樂民衆多者賜以朱户能進善者賜以納陛能退惡者賜以虎賁能誅有罪者賜以鈇鉞能征不義者賜以弓矢孝道備者賜以秬鬯以先後與施行之次自不相踰相為本末然安民然後富貴而後樂樂而後衆乃多賢賢乃能進善進善乃能退惡退惡乃能㫁刑内能正己外能正人内外行備孝道乃生能安民故賜車馬以著其功徳安其身能使人富足衣食倉廩實故賜衣服以彰其體能使民和樂故賜之樂以事其先也禮曰夫賜樂者得以時王之樂事其宗廟也朱盛色户所以紀民數也故民衆多賜朱户也古者人君下賢降階一等而禮之故進賢賜之納陛以優之也既能進善當能戒惡故賜虎賁虎賁者所以戒不虞而距惡距惡當㫁刑故賜之鈇鉞鈇鉞所以㫁大刑刑罰既中則能征不義故賜弓矢弓矢所以征不義伐無道也圭瓉秬鬯宗廟之盛禮故孝道備而賜之秬鬯所以極著孝道孝道純備故内和外榮玉以象徳金以配情芬香條鬯以通神靈玉飾其本君子之性金飾其中君子之道君子有黄中通理之道美素徳金者精和之至也玉者徳美之至也鬯者芬香之至也君子有玉瓉秬鬯乎車者以配道徳也其至矣合天下之極美以通其志也其唯玉瓉秬鬯乎車者謂有赤有青之盖朱輪特能居前左右寢米庶也以其進止有節徳綏民路車乘馬以安其身言成章行成䂓卷龍之衣服表顯其徳長於敎誨内懐至仁則賜時王樂以化其民尊賢達徳動作有禮賜之納陛以安其體居處修治房内節男女時配貴賤有别則賜朱户以明其徳列威武有矜嚴仁堅強賜以虎賁以備非常喜怒有節誅伐刑賜以鈇鉞使得専殺好惡無私執義不傾賜以弓矢使得專征孝道之美百行之本也故賜以玉瓉得專為賜也故王制曰賜之弓矢然後專殺又曰賜圭瓉然後為暢未賜者資暢於天子王度記曰天子鬯諸侯薫大夫芑蘭士兼暢人艾車馬衣服樂三等者賜與其物禮天子賜諸侯民服車路先設路下四惡之又曰諸公奉選服王制曰天子賜諸侯樂則以柷將之詩曰君子來朝何錫與之雖無與之路車乘馬又何以與之𤣥衮及黼書曰明試以功車服以庸朱户納陛虎賁者皆與之制度而鈇鉞弓矢玉瓉皆與之物各因其宜也秬者黒黍一稃二米鬯者以百草之香鬱金合而釀之成為鬯陽達於墻屋入于淵泉所以灌地降神也玉瓉者器名也所以灌鬯之器也以圭飾其柄灌鬯貴玉器也所以三歳一考績何三年有成故於是賞有功黜不肖尚書曰三載考績三考黜陟何以知始考輒黜之尚書曰三年一考少黜以地書所言三考黜者謂爵土異也小國考之有功增土進爵後考無功削黜後考有功上而賜之矣五十里不過五賜而進爵土七十里不過七賜而進爵土能有小大行有進退也一說盛徳始封百里者賜三等得征伐專殺斷獄七十里伯始封賜二等至虎賁百人後有功賜弓矢復有功賜秬鬯增爵為侯益土百里復有功入為三公五十里子男始封賜一等至樂復有功稍賜至虎賁增爵為伯復有功稍賜至秬鬯增爵為侯未賜鈇鉞者從大國連率方伯而㫁獄受命之五致太平之主美羣臣上下之功故盡封之及中興征伐大功皆封所以著大功盛徳之士亦封之所以尊有徳也以徳封者必試之必附庸三年有功因而封五十里元士有功者亦為附庸世其位大夫有功成封五十里卿功成封七十里公功成封百里士有功徳遷為大夫大夫有功徳遷為卿卿有功徳遷為公故爵主有徳封主有功也諸侯有九賜習其賜者何子之能否未可知也或曰得之但未得行其習以専也三年有功則皆得用之矣二考無功則削其地而賜自并知明本非其身所得也身得之者得以賜當稍黜之爵所以封賢也三公功成當封而死得立其子為附庸賢者之體能有一也不二矣一削為七十里侯再削為七十里伯三削為寄公七十里伯一削為五十里伯二削為五十里子三削地盡五十里子一削為三十里子再削為三十里男三削地盡五十里男一削為三十里男再削為三十里附庸三削爵盡所以至三削何禮成於三三三而不改雖反無益也尚書曰三考黜陟先削地後黜爵者何爵者尊號也地者人所任也今不能治廣土衆民故先削其土地也故王制曰宗廟有不順者君黜以爵山川神祗有不舉者君削以地明爵土不相隨也或曰惡人貪狠重土故先削其所重者以懼之也諸侯始封爵土相隨者何君子重徳薄刑賞疑從重詩云王曰叔父建爾元子俾侯于魯君幼稚雖考不黜者何君子不備責童子也禮八十曰耄九十曰悼悼與耄雖有罪不加刑焉二王後不貶黜者何尊賓客重先王也以其當公也罪惡足以絶之即絶更立其次周公誅祿甫立微子妻父母不削已昆弟削而不黜何非以賢能得之也至於老小但令得大夫受其罪而已諸侯喑聾跛躄惡疾不免黜者何尊人君也春秋曰甲戌己丑陳侯鮑卒傳曰甲戌之日亡己丑之日死而得有狂易之病蜚亡而死由不絶也世子有惡疾廢者何以其不可承先祖也故春秋傳曰兄弟何以不立疾也何疾惡疾也
