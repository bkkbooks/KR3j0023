  - {type: variant, offset: 812, length: 1, content: 婦, SBCK: 得其極故一也東西非其極也故非一也水木可食金火土不可食何木者陽陽者施生故可食火者隂在内金者隂嗇􅈔故不可食火水所以殺}
  - {type: variant, offset: 812, length: 1, content: 婦, WYG: 得其極故一也東西非其極也故非一也水木可食金火土不可食何木者陽陽者施生故可食火者陰在内金者陰嗇􅈔故不可食火水所以殺}
  - {type: variant, offset: 812, length: 1, content: 婦, krp: 得其極故一也東西非其極也故非一也水木可食金火土不可食何木者陽陽者施生故可食火者隂在内金者隂嗇吝故不可食火水所以殺}
  - {type: variant, offset: 814, length: 1, content: 本, SBCK: 何水盛氣也故入而殺人火隂在内故殺人壯於水也金木㣲氣故不能自殺人也火不可入其中者隂在内也入則殺人矣水土陽在内故可入其中金木㣲氣也精宻不可得入也水火不可加人功爲用金木加人功何火者盛陽水者盛隂者也氣盛不變故不可加人功爲人用金木者不能自成故湏人加功以爲人用也五行之性火􅀬水寒有温水}
  - {type: page-break, offset: 814, content: '', id: KR3j0023_SBCK_003-16a}
  - {type: variant, offset: 814, length: 1, content: 本, WYG: 何水盛氣也故入而殺人火陰在内故殺人壯於水也金木微氣故不能自殺人也火不可入其中者陰在内也入則殺人矣水土陽在内故可入其中金木微氣也精密不可得入也水火不可加人功為用金木加人功何火者盛陽水者盛陰者也氣盛不變故不可加人功為人用金木者不能自成故須人加功以為人用也五行之性火熱水寒有温水}
