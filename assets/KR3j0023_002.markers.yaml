  front:
  - {type: variant, offset: 0, length: 2, content: 號帝, SBCK: 白虎通德論卷第二臣班固纂集五祀五祀者何謂也謂門户井竈中霤也所以􅀕何人之所處出入所飲食故爲神而祭之何以知五祀謂門户井竈中霤也月令曰其祀户又曰其祀竈其祀中霤其祀門其祀井獨大夫巳上得祭之何士者位卑禄薄但祭其先祖耳禮曰天子祭天地諸侯祭山川卿大夫祭五祀士祭其祖曲禮曰天地四時山川五祀􅀊遍諸侯方祀山川五祀􅀊遍卿大夫祭五祀士祭其先非所當祭而祭之名曰淫祀淫祀無福祭五祀所以􅀊一徧何順五行也故春即祭戸戸者人所出入亦春萬物始觸戸而出也夏祭竈者火之主人所以自養也夏亦火王長養萬物秋祭門門以閉藏自固也秋亦萬物成熟内備自守也冬祭井井者水之生藏任地中冬亦水王萬物伏藏六月祭中霤中霤者象土在中央也六月亦土王也故月令春言其祀户祭先脾夏言其祀竈祭先肺秋言其祀門祭先肝冬言其祀井祭先腎中央言其祀中霤祭先心春祀户祭所以時先脾者何脾者土也春木王煞土故以所勝祭之也是冬腎六月心非所勝也以祭何以爲土位在中央至尊故祭以心心者藏之尊者水最卑不得食其所勝祭五祀天子諸侯以牛卿大夫以羊因四時牲也一􅀃􅀹多故爲長也􅀊再祭何春求榖之義也故月令仲春之月擇元日命人社援神契曰仲春獲禾報社祭稷以三牲何重功故也尚書曰乃社于新邑羊一牛一豕一王制曰天子社稷皆大牢諸侯社稷皆少牢宗廟俱大牢社稷獨少牢何宗廟大牢所以廣孝道也社稷爲報功諸侯一國所報者少故也}
