  - {type: variant, offset: 1, length: 1, content: 行, SBCK: 十應大衍之數生萬物也故禮内則曰男}
  - {type: variant, offset: 1, length: 1, content: 行, WYG: 十應大衍之數生萬物也故禮内則曰男三十壯有室女二十壯而嫁七嵗之陽也八歳之陰也七八十}
  - {type: variant, offset: 1, length: 1, content: 行, krp: 十應大衍之數生萬物也故禮内則曰男}
