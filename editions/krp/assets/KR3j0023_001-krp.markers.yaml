  - {type: line-break, offset: 5051, content: '', id: KR3j0023_SBCK_001-17b07}
  - {type: variant, offset: 5051, length: 7, content: 白虎通德論卷第, WYG: 五祀五祀者何謂也謂門户井竈中霤也所以祭何人之所處出入所飲食故為神而祭之何以知五祀謂門户井竈中霤也月令曰其祀户又曰其祀竈其祀中霤其祀門其祀井獨大夫已上得祭之何士者位卑禄薄但祭其先祖耳禮曰天子祭天地諸侯祭山川卿大夫祭五祀士祭其祖曲禮曰天地四時山川五祀嵗遍諸侯方祀山川五祀嵗遍卿大夫祭五祀士祭其先非所當祭而祭之名曰滛祀滛祀無福祭五祀所以嵗}
  - {type: page-break, offset: 5051, content: '', id: KR3j0023_WYG_001-17a, image: WYG0850/WYG0850-0011a.png}
  - {type: 'kr:newline', offset: 5059, content: '

      ', id: KR3j0023_krp_001-bkkkrnewl337}
  - {type: variant, offset: 5059, length: 0, content: '', WYG: 遍何順五行也故春即祭户户者人所出入亦春萬物始觸戸而出也夏祭竈者火之主人所以自養也夏亦火王長養萬物秋祭門門以閉藏自固也秋亦萬物成熟内備自守也冬祭井井者水之生藏任地中冬亦水王萬物伏藏六月祭中霤中霤者象土在中央也六月亦土王也故月令春言其祀戸祭先脾夏言其祀竈祭先肺秋言其祀門祭先肝冬言其祀井祭先腎中央言其祀中霤祭先心春祀戸祭所以時先脾者何脾者土也春木主煞土故以所勝祭之也是冬腎六月心非所勝者以祭何以為土位在中央至尊故祭以心心者藏之尊者水最卑不得食其所勝祭五祀天子諸侯以牛卿大夫以羊因四時牲也一說戸以羊竈以雉中霤以豚門以犬井以豕或曰中霤用牛餘不得用豚井以魚社稷王者所以有社稷何為天下求福報功人非土不立非榖不食土地廣博不可徧敬也五榖衆多不可一一而祭也故封土立社示有土尊稷五榖之長故封稷而祭之也尚書曰乃社于新邑孝經曰保其社稷而和其民人蓋諸侯之孝也稷者得陰陽中和之氣而用尤多故為長也歲}
