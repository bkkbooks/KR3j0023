  - {type: variant, offset: 2286, length: 658, content: 居九重之內臣下衛之也藏於木者依於仁也木自主生金須人取之乃成陰卑不能自成也木所以浮金所以沉何子生於母之義肝所以沉肺所以浮何有知者尊其母也一說云甲木畏金金之以乙妻庚受庚之化木者法其本柔可曲直甲故浮也肝法其化直乙故沉金畏火以辛妻丙受丙之化金法其本直庚故沈肺法其化直辛故浮五行皆同義天子所以內明而外昧人所以外明而內昧何明天人欲相嚮而治也行有五時有四何四時為時五行為節故木王即謂之春金王即謂之秋土尊不任職君不居部故時有四也子不肯禪何法法四時火不興土而興金也父死子繼何法法木終火王也兄死弟及何法法夏之承春也善善及子孫何法法春生待夏復長也惡惡止其身何法法秋煞不待冬也主幼臣攝政何法法土用事於季孟之間也子之復讎何法法土勝水水勝火也子順父臣順君妻順夫何法法地順天也男不離父母何法法火不離木也女離父母何法法水流去金也娶妻親迎何法法日入陽下陰也君讓臣何法法月三十日名其功也善稱君過稱己何法法陰陽共敘共生陽名生陰名煞臣有功歸於君何法法歸明於日也臣法諫君何法法金正木也子諫父何法法火揉直木也臣諫君不從則去何法法水潤下達於上也君子遠子近孫何法法木遠火近土也親屬臣諫不相去何法法水木枝葉不相離也父為子隱何法法木之藏火也子為父隱何法法水逃金也君有眾民何法法天有眾星也王者賜先親近後疏遠何法法天雨高者先得之也長幼何法法四時有孟仲季也朋友何法法水合流相承也父母生子養長子何法法水生木長大也子養父母何法法夏養長木此火養母也不以父命廢主命王父命何法法金不畏土而畏火陽舒陰急何法法日行遲月行疾也有分土無分民何法法四時各有分而所生者通道也若言東東方天下皆生也君, SBCK: 諸侯}
