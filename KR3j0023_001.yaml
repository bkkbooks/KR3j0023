body:
  text: 爵天子者爵稱也爵所以稱天子者何王者父天母地為天之子也故援神契曰天覆地載謂之天子上法斗極鉤命決曰天子爵稱也帝王之德有優劣所以俱稱天子者何以其俱命於天而王治五千里內也尚書曰天子作民父母以為天下王何以知帝亦稱天子也以法天下也中候曰天子臣放勛書逸篇曰厥兆天子爵何以言皇亦稱天子也以其言天覆地載俱王天下也故易曰伏羲氏之王天下也爵有五等以法五行也或三等者法三光也或法三光或法五行何質家者據天故法三光文家者據地故法五行含文嘉禮含文嘉曰殷爵三等周爵五等各有宜也王制曰王者之制祿爵凡五等謂公侯伯子男此據周制也春秋傳曰天子三公稱公王者之後稱公其餘大國稱侯小者國稱伯子男也王制曰公侯田方百里伯七十里子男五十里所以名之為公侯者何公者通也公正無私之意也侯者候也候逆順也人皆千乘象雷震百里所潤同伯者白也子者孳也孳孳無已也男者任也人皆五十里差次功德小者不滿為附庸附庸者附大國以名通也百里兩爵公侯共之七十里一爵五十里復復兩爵何公者加尊二王之後侯者百里之正爵上可有次下可有第中央故無二五十里有兩爵者所以加勉進人也小國下爵猶有尊卑亦以勸人也殷爵三等謂公侯伯也所以合子男從伯者何王者受命改文從質無虛退人之義故上就伯也尚書曰侯甸任衛作國伯謂殷也春秋傳曰合伯子男以為一爵或曰合從子貴中也以春秋名鄭忽忽者鄭伯也此未踰年之君當稱子嫌為改赴故名之也地有三等不變至爵獨變者何地比爵為質故不變為質故不變王者有改道之文無改道之實殷家所以令公居百里侯居七十里何也封賢極於百里其政改也不可空退人示優賢之義欲探而上之何以知殷家侯人不過七十里者也曰土有三等有百里有七十里有五十里其地半者其數倍制地之理體也多少不相配公卿大夫者何謂也內爵稱也內爵稱公卿大夫何爵者盡也各量其職盡其才也公之為言公正無私也卿之為言章也章善明理也大夫之為言大扶扶進人者也故傳曰進賢達能謂之卿大夫王制云上大夫卿也士者事也任事之稱也故傳曰通古今辨然否謂之士何以知士非爵禮曰四十強而士不言爵為士至五十爵為大夫何以知卿為爵也以大夫知卿亦爵也何以知公為爵也春秋傳曰諸侯四佾諸公六佾合而言之以是知公卿為爵內爵所以三等何亦法三光也所以不變質文何內者為本故不改內也諸侯所以無公爵者下天子也故王制曰上大夫下大夫上士中士下士凡五等此謂諸侯臣也大夫但有上下士有上中下何明卑者多也爵皆一字也大夫獨兩字何春秋傳曰大夫無遂事以為大夫職在之適四方受君之法施之於民故獨兩字言之或曰大夫爵之下者也稱大夫明從大夫以上受下施皆大自著也天子之士獨稱元士何士賤不得體君之尊故加元以別於諸侯之士也禮經曰士見大夫諸侯之士也王制曰王者八十一元士天子爵連言天子諸侯爵不連言王侯何即言王侯以王者同稱為衰弱僣差生篡弒猶不能為天子也故連言天子也或曰王者天爵王者不能生王諸侯故不言王侯諸侯人事自著故不著也王者太子亦稱士何舉從下升以為人無生得貴者莫不由士起是以舜時稱為天子必先試於士禮士冠經天子之元子士也婦人無爵何陰卑無外事是以有三從之義未嫁從父既嫁從夫夫死從子故夫尊於朝妻榮於室隨夫之行故禮郊特牲曰婦人無爵坐以夫之齒禮曰生無爵死無諡春秋録夫人皆有諡夫人何以知夫人非爵也論語曰邦君之妻君稱之曰夫人國人稱之曰君夫人即令是爵君稱之與國人稱之不當異也庶人稱匹夫者匹偶也與其妻為偶陰陽相成之義也一夫一婦成一室明君人者不當使男女有過時無匹偶也論語曰匹夫匹婦之為諒也爵人於朝者示不私人以官與衆共之義也封諸侯於廟者示不自敢專也明法度皆祖之制也舉事必告焉王制曰爵人於朝與衆共之也詩云王命卿士南仲太祖禮祭統曰古者明君爵有德必於太祖君降立於阼階南南向所命北向面央史由君右執策命之大夫功成未封而死不得追爵賜之者以其未當股肱也春秋穀梁傳曰追賜死者非禮也王制曰葬從死者祭從生者所以追孝繼養也追養繼孝也葬從死者何子無爵父之義也禮中庸記曰父為大夫子為士葬以大夫祭以士子為大夫父為士祭以大夫葬以士也父在稱世子何繫於君也父沒稱子某者何屈於尸柩也既葬稱小子者即尊之漸也踰年稱公者緣臣民之心不可一日無君也緣終始之義一年不可有二君也故踰年即位所以繫民臣之心也三年然後受爵者緣孝子之心未忍安吉也故春秋魯僖公三十三年十二月乙巳公薨于小寢文公元年春王正月公即位四月丁巳葬我君僖公韓詩內傳曰諸侯世子三年喪畢上受爵命於天子所以名之為世子何言欲其世世不絶也何以知天子之子亦稱世子也春秋傳春秋曰公會王世子于首止或曰天子之子稱太子尚書傳曰太子發升于舟中候曰廢考立發為太子明文王時稱太子也世子三年喪畢上受爵命於天子何明爵土者天子之所有臣無自爵之義童子當受父爵命者使大夫就其國命之明王者不與童子為禮也以春秋魯成公幼少與諸侯會公不見之不見公經不以為魯恥明不與童子為禮也世子上受爵命衣士服何謙不敢自專也故詩曰韎韐有赩謂世子始行也天子大斂之後稱王者明士民臣不可一日無君也故尚書曰王麻冕黼裳此斂之後也何以知王從死後加王也以尚書言迎子劉釗不言迎王也王者既殯而即繼體之位何緣民臣之心不可一日無君也故先君不可得見則後君繼體矣故尚書曰王再拜興對乃受銅瑁明為繼體君也緣始終終始之義一年不可有二君也故尚書曰王釋冕喪服吉冕服受銅同稱王以接諸侯明己繼體為君也釋冕藏銅反喪服明未稱王以統事也不可曠年無君故逾年乃即位改元名元元以名年年以紀事君名其事矣君統事見矣而未發號令也何以言知踰年即位謂改元位也春秋傳曰以諸侯踰年即位亦知天子踰年即位也春秋曰元年春王正月公即位改元位也王者改元年改元即事天地諸侯改元即事社稷王制曰夫喪三年不祭唯祭天地社稷為越紼而行事春秋傳曰天子三年然後稱王者謂稱王統事發號令施令也尚書曰高宗諒陰暗三年是也論語曰君薨百官總己聽於冢宰三年緣孝子之心則三年不當不忍當也故三年除喪乃即位統事即位踐祚阼為主南面朝臣下稱王以發號令也故天子諸侯凡三年即位終始之義乃備所以諒陰暗三年卒孝子之道故論語曰古之人皆然君薨百官總己聽於冢宰三年所以聽於冢宰三年者何以為冢宰職在制國之用是以由之也故王制曰大冢宰冢宰制國用所以名之為冢宰何冢者大也宰者制也大制事也故王度記曰天子冢宰一人爵祿如天子之大夫或曰冢宰視卿周官所云也
