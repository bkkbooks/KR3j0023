body:
  text: 禮樂王者所以盛禮樂何節文之喜怒樂以象天禮以法地人無不含天地之氣有五常之性者故樂所以蕩滌反其邪惡也禮所以防滛佚節其侈靡也故孝經曰安上治民莫善於禮移風易俗莫善於樂子曰樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之内父子兄弟同聽之則莫不和親故樂者所以崇和順比物飾節節奏合以成文所以合和父子君臣附親萬民也是先王立樂之意也故聽其雅頌之聲志意得廣焉執干戚習俯仰屈信容貌得齊焉行其綴兆要其節奏行列得正焉進退得齊焉故樂者天地之命中和之紀人情之所不能免焉也夫樂者先王之所以飾喜也軍旅鈇鉞所以飾怒也故先王之喜怒皆得其儕焉喜則天下和之怒則暴亂者畏之先王之道禮樂可謂盛矣聞角聲莫不惻隱而慈者聞徴聲莫不喜養好施者聞商聲莫不剛斷而立事者聞羽聲莫不深思而逺慮者聞宮聲莫不温潤而寛和者也禮所揖譲何所以尊人自損也不爭論語曰揖讓而升下而飲其爭也君子故君使臣以禮臣事君以忠謙謙君子利涉大川以貴下賤大得民也屈己敬人君子之心故孔子曰為禮不敬吾何以觀之哉夫禮者陰陽之際也百事之㑹也所以尊天地儐鬼神序上下正人道也樂所以必歌者何夫歌者口言之也中心喜樂口欲歌之手欲舞之足欲蹈之故尚書曰前歌後舞假于上下禮貴忠何禮者盛不足節有餘使豐年不奢凶年不儉富貧不相懸也樂尚雅雅者古正也所以逺鄭聲也孔子曰鄭聲滛何鄭國土地民人山居谷浴男女錯雜為鄭聲以相悅懌故邪僻聲皆滛色之聲也太平乃制禮作樂何夫禮樂所以防奢滛天下人民飢寒何樂之乎功成作樂治定制禮樂言作禮言制何樂者陽也陽倡始故言作禮者陰也陰制度於陽故言制樂象陽禮法隂也王者始起何用正民以為且用先王之禮樂天下太平乃更制作焉書曰肇稱殷禮祀于新邑此言太平去殷禮春秋𫝊曰昌何為不修乎近而修乎逺同已也可殷先以太平也必復更制者示不襲也又天下樂之者樂者所以象徳表功殊名禮記曰黄帝樂曰咸池顓頊樂曰六莖帝嚳樂曰五英堯樂曰大章舜樂曰簫韶禹樂曰大夏湯樂曰大䕶周樂曰大武象周公之樂曰酌合曰大武黄帝曰咸池者言大施天下之道而行之天之所生地之所載咸蒙徳施也顓頊曰六莖者言和律歴以調陰陽莖者著萬物也帝嚳曰五英者言能調和五聲以養萬物調其英華也堯曰大章大明天地人之道也舜曰簫韶者舜能繼堯之道也禹曰大夏者言禹能順二聖之道而行之故曰大夏也湯曰大䕶者言湯承衰能䕶民之急也周公曰酌者言周公輔成王能斟酌文武之道而成之也武王曰象者象太平而作樂示已太平也合曰大武者天下始樂周之征伐行武故詩人歌之王赫斯怒爰整其旅當此之時天下樂文王之怒以定天下故樂其武也周室中制象湯樂何殷紂為惡日久其惡最甚斮涉刳胎殘賊天下武王起兵前歌後舞尅殷之後民人大喜故中作所以節喜盛天子八佾諸侯四佾所以别尊卑樂者陽也故以陰數法八風六律四時也八風六律者天氣也助天地成萬物者也亦猶樂所以順氣變化萬民成其性命也故春秋公羊傳曰天子八佾諸公六佾諸侯四佾詩曰大夫士琴瑟御八佾者何謂也佾者列也以八人為行列八八六十四人也諸公六六為行諸侯四四為行諸公謂三公二王後大夫士北靣之臣非專事子民者也故但琴瑟而已王者有六樂者貴公美徳也所以作供養傾先王之樂明有法不亡其本興已所以自作樂明作已也樂所以作四夷之樂何徳廣及之也易曰先王以作樂崇徳殷薦之上帝以配祖考詩云奏鼓簡簡衎我烈祖樂元語曰受命而六樂樂先王之樂明有法也與其所自作眀有制興四夷之樂明徳廣及之也故南夷之樂曰兠西夷之樂曰禁北夷之樂曰昧東夷之樂曰離合觀之樂儛於堂四夷之樂陳於右先王所以得之順命重始也此言以文得之先以文謂持羽毛儛也以武得之持干戚儛也樂元語曰東夷之樂持矛舞助時生也南夷之樂持羽舞助時養也西夷之樂持㦸舞助時煞也北夷之樂持干舞助時藏也誰制夷狄之樂以為先聖王也先王惟行道徳和調陰陽覆被夷狄故夷狄安樂來朝中國於是作樂樂之南之為言任也任養萬物昧之為言昧也昧者萬物老衰禁者萬物禁藏侏離者萬物微離地而生一說東方持矛南方歌西方戚北方擊金夷狄質不如中國中國文章但隨物名之耳故百王不易戚二者制夷狄樂不制夷狄禮何以為禮者身當履而行也夷狄之人不能行禮樂者聖人作為以樂之耳故有夷狄樂也殊為舞者以為使中國人何以言之夷狄之人禮不備恐有過誤也作之門外者何夷在外故就之也夷狄無禮義不在内明堂記曰九夷之國在東門之外所以知不在門内也明堂記曰禹納蠻夷之樂於太廟言納明有入也曰四夷之樂者何謂也以為四夷外無禮義之國數夷狄者從東故舉本以為之㹅名也言夷狄者舉終始也言蠻舉逺也言貉舉惡也則别之東方為九夷南方為八蠻西方為六戎北方為五狄故曾子問曰九夷八蠻六戎五狄百姓之難至者也何以知夷在東方禮王制曰東方曰夷被髪文身又曰南方曰蠻雕踶交趾西方曰戎被髪衣皮北方曰狄衣羽毛穴居東所以九何蓋來者過九之為言究也徳徧究故應徳而來亦九也非故為之道自然也何以名為夷蠻曰聖人本不治外國非為制名也因其國名而言之耳一說曰名其短而為之制名也夷者僔狄無禮義東方者少陽易化故取名也北方太陰鄙郄故少蠻䖝難化執心違邪戎者強惡也狄者易也辟易無别也歌者在堂上舞在堂下何歌者象徳舞者象功君子上徳而下功郊特牲曰歌者在上論語曰季氏八佾舞於庭書下管鞀鼓笙鏞以間降神之樂在上何為鬼神舉故書曰戞擊鳴球搏拊琴瑟以詠祖考來格何以用鳴球搏拊者何鬼神清虚貴浄賤鏗鏘也故尚書大傳曰搏拊鼓振以秉琴瑟練絲徽絃鳴者貴玉聲也王者食所以有樂何樂食天下之太平富積之饒也明天子至尊非功不食非徳不飽故傳曰天子食時舉樂王者所以日食者何明有四方之物食四時之功也四方不平四時不順有徹樂之法焉所以鳴至尊著法戒也王平居中央制御四方平且食少陽之始也晝食太陽之始也晡食少陰之始也暮食太陰之始也論語曰亞飯干適楚三飯繚適蔡四飯缺適秦諸侯三飯卿大夫再飯尊卑之差也弟子職暮食士偃禮士也食力無數庶人職在耕桑戮力勞役飢即食飽即作故無數禮樂者何謂也禮之為言禮也可履踐而行樂者君子樂得其道小人樂得其欲聲者何謂聲鳴也聞其聲即知其所生音者飲也言其剛柔清濁和而相飲也尚書曰予欲聞六律五聲八音五聲者何謂也宫商角徴羽土謂宫金謂商木謂角火謂徴水謂羽月令曰盛徳在木其音角又曰盛徳在火其音徴盛徳在金其音商盛徳在水其音羽所以名之為角者躍也陽氣動躍徴者止也陽氣止商者張也陰氣開張陽氣始降也羽者紆也陰氣在上陽氣在下宫者容也含也含容四時者也八音者何謂也樂記曰土曰塤竹曰管皮曰鼓匏曰笙絲曰絃石曰磬金曰鐘木曰柷敔此謂八音也法易八卦也萬物之數也八音萬物之聲也所以用八音何天子承繼萬物當知其數既得其數當知其聲即思其形如此蜎飛蠕動無不樂其音者至徳之道也天子樂之故樂用八音樂記曰壎坎音也管艮音也鼓震音也絃離音也鐘兌音也柷敔乾音也壎在十一月壎之為言勲陽氣於黄泉之下默蒸而萌匏之言施也在十二月萬物始施而勞笙者太蔟之氣象萬物之生故曰笙有七正之節焉有六合之和焉天下樂之故謂之笙鼓震音煩氣也萬物憤懣震動而生雷以動之日以煖之風以散之雨以濡之奮至徳之聲感和平之氣也同聲相應同氣相求神明報應天地祐之其本乃在萬物之始耶故謂皷也鞀者震之氣也上應卯星以通王道故謂之鞀也簫者中之氣萬物生於無聲見於無形僇也簫也故謂之簫簫者以祿為本言承天繼物為民本人力加地道化然後萬物戮也故謂之簫也瑟者嗇也閑也所以懲忽宫商角則宜君父有節臣子有義然後四時和四時和然後萬物生故謂之瑟也琴者禁也所以禁止滛邪正人心也磬者夷則之氣也象萬物之盛也其氣磬故曰磬有貴賤焉有親踈焉有長幼焉朝廷之禮貴不讓賤所以明尊卑也鄉黨之禮長不讓幼所以明有年也宗廟之禮親不讓踈所以明有親也此三者行然後王道得王道得然後萬物成天下樂用磬也鐘之為言動也陰氣用事萬物動成鐘為氣用金聲也鎛者時之氣聲也節度之所生也君臣有節度則萬物昌無節度則萬物亡亡與昌正相迫故謂之鎛柷敔者終始之聲萬物之所生也陰陽順而復故曰柷承順天地序迎萬物天下樂之故樂用柷柷始也敔終也一說笙柷鼓簫瑟塤鐘磬也如其次笙在北方柷在東北方鼓在東方簫在東南方琴在南方塤在西南方鐘在西方磬在西北方聲五音八何聲為本出於五行音為末象八風故樂記曰聲成文謂之音知音而樂之謂之樂也問曰異說並行則弟子疑焉孔子有言吾聞擇其善者而從之多見而志之知之次也文武之道未墜於地天之未䘮斯文也樂亦在其中矣聖人之道猶有文質所以擬其說述所聞者亦各傳其所受而已
