  - {type: variant, offset: 686, length: 0, content: '', SBCK: 蹙也桐者痛也父以竹母以桐何竹者陽也桐者隂也竹何以爲陽竹斷而用之質故爲陽桐削而用之加人功文故爲隂也故禮曰苴杖竹也削杖桐也所以必居􅀝廬何孝子哀不欲聞人之聲又不欲居故處居中門之外􅀝木爲廬質反古也不在門外何戒不虞故也故禮大傳曰父母之葬居􅀝廬於中門外東墻下戸北面練而居堊室無餘之室又曰婦人不居􅀝廬又曰}
  - {type: page-break, offset: 686, content: '', id: KR3j0023_SBCK_010-6b}
  - {type: variant, offset: 686, length: 0, content: '', WYG: 蹙也桐者痛也父以竹母以桐何竹者陽也桐者陰也竹何以為陽竹斷而用之質故為陽桐削而用之加人功文故為隂也故禮曰苴杖竹也削杖桐也所以必居倚廬何孝子哀不欲聞人之聲又不欲居故處居中門之外倚木為廬質反古也不在門外何戒不虞故也故禮大傳曰父母之喪居倚廬於中門外東墻下户北靣練而居堊室無餘之室又曰婦人不居倚廬又曰}
  - {type: variant, offset: 686, length: 0, content: '', krp: 蹙也桐者痛也父以竹母以桐何竹者陽也桐者隂也竹何以爲陽竹斷而用之質故爲陽桐削而用之加人功文故爲隂也故禮曰苴杖竹也削杖桐也所以必居倚廬何孝子哀不欲聞人之聲又不欲居故處居中門之外倚木爲廬質反古也不在門外何戒不虞故也故禮大傳曰父母之葬居倚廬於中門外東墻下戸北面練而居堊室無餘之室又曰婦人不居倚廬又曰}
  - {type: variant, offset: 688, length: 2, content: 自出, SBCK: 七日又曰公諸侯五日卿大夫三日而服成居外門内赤壁下爲廬寢苫塊哭晝無夜時不脫絰帶旣虞寢有席􅂼食飲水朝一哭夕一哭而已旣練舎外寢居聖室始食菜果及素食哭無時二十五月而大祥飲醴酒食乾肉二十七月而禫通􅀕宗廟去䘮之殺也䘮禮不言}
