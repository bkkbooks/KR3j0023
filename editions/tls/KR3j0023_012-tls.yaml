body:
  text: 諫諍臣所以有諫君之義何盡忠納誠也論語曰愛之能無勿勞乎忠焉能無勿誨乎孝經曰天子有諍臣七人雖無道不失其天下諸侯有諍臣五人雖無道不失其國大夫有諍臣三人雖無道不失其家士有諍友則身不離於令名父有諍子則身不陷於不義天子置左輔右弼前凝疑後承以順左輔主修政刺不法右弼主糾周言失傾前凝主度定德經後承主匡正常考變天失四弼興道率主行仁夫陽變於七以三成故建三公序四諍列七人雖無道不失天下杖辟群賢也諸侯之臣諍不從得去何以屈尊申卑孤惡君也去曰某質性頑鈍言愚不任用請退避賢如是之是待君待之以禮臣待放如不以禮待遂去君待之以禮奈何曰予熟思夫子言未得其道今予不且留聖王之制無塞賢之路夫子欲何之則遣大夫送至于郊必三諫者何以為得君臣之義必得待待放於郊者忠厚之至也冀君覺悟能用之所以必三年者古者臣下有大喪君子三年不呼其門所以復君恩今己所言不合於禮義君欲罪之可得也援神契曰三諫待放復二千三年盡惓惓也所以言放者臣為君諱若言有罪而放之也所諫事已行者遂去不留凡待放者冀君用其言耳事已行篡各災咎將去至無為留之也易曰介如石不終日貞吉論語曰三日不朝孔子行臣待放於郊者君不絕其祿者示不欲其去也道不合故去耳以其祿參分之三二與之一留與其妻長子使終得祭其宗廟賜之環則反賜之玦則去明君子重恥也王度記曰反之以玦其不待放者亦與之物明有介主分土無介分民也詩曰逝將去汝適彼樂土或曰天子之臣不得言放天子以天下為家也親屬諫不待得放者骨肉無相去離之義也春秋傳曰司馬皮子反曰君請處乎此臣請歸子皮反者楚公子也時不待得放士不得諫者士賤不得預政事故不得諫也謀及之得固因盡其忠耳禮保傅曰大夫進諫士傳民語妻得諫夫者夫婦一體榮恥共之詩云相鼠有體人而無禮人而無禮胡不遄死此妻諫夫之詩也諫不從不得去之者本娶妻非為諫正也故一與之齊終身不改此地無去夫天之義也子諫父父不從不得去者父子一體而分無相離之法猶火去木而滅也論語事父母幾諫下言又敬不違臣之諫君何取法何法法金正木也子之諫父法火以楺木也臣諫君以義故折正之也子諫父以恩故但揉之也木無毀傷也待放去取法於水火無金則相離也諫者何諫者間也因也更也是非相間革更其行也人懷五常故知有五諫謂諷諫順諫窺諫指諫伯陷諫諷諫者智也知患禍禍患之萌深睹其事未彰而諷告焉此智性智之性也順諫者仁也出辭遜順不逆君心仁之性此仁之性也窺諫者禮也視君顏色不悅且卻悅則復前以禮進退此禮之性也指諫者信也指者質也質相其事也此信之性也伯陷諫者義也惻隱發於中直言國之害勵志忘生為君不避喪身義之性此義之性也故孔子曰諫有五吾從諷之諫事君進思盡忠退思補過去而不訕諫而不露故曲禮曰為人臣不顯者諫纖微未見於外如詩所刺也若過惡已著民蒙毒螫天見災變事白異露作詩以刺之幸其覺悟也明王所以立諫諍者皆為重民而求己失也禮保傅曰於是立進善之旍旌懸誹謗之木建招諫之鼓王法立史記事者以為臣下之儀樣人之所取法則也動則當應禮是以必有記過之史徹膳之宰禮玉藻曰動則左史書之言則右史書之禮保傅曰王失度則史書之士工誦之三公進讀之宰夫徹其膳是以天子不得為非故史之義不書過則死宰不徹膳亦死所以謂之史何明王者使為之也謂之宰何宰制也使制法度也宰所以徹膳何陰陽不調五穀不熟故王者為不盡味而食之禮曰一穀不升不備蛂鶉鷃二穀不升不備鳧鴈三穀不升不備雉兔四穀不升不備囿獸五穀不升不備三牲人臣之義當掩惡揚美所以記君過何各有所緣也掩惡者謂廣德宣禮之臣所以為君隱惡何君至尊故設輔弼置諫官本不當有遺失故論語曰陳司敗問昭公知禮乎孔子曰知禮此為君隱也君所以不為臣隱何以為君之於臣無適無莫義之與比賞為賞一善而眾臣勸罰一惡而眾臣懼若為卑隱為不可殆也故尚書曰必畢力賞罰以定厥功諸侯臣對天子亦為隱乎然本諸侯之臣今來者為聘問天子無恙非為告君之惡來也故孝經曰將順其美匡救其惡故上下治上下能相親也君不為臣隱父獨為子隱何以為父子一體而分榮恥相及榮恥相及故論語曰父為子隱子為父隱直在其中矣兄弟相為隱乎曰然與父子同義故周公誅四國常以祿甫為主也朋友相為隱者人本接朋結友為欲立身揚名也朋友之道有四焉通財不在其中近則正之遠則稱之樂則思之患則死之夫妻相為隱乎傳曰曾子去妻黎蒸不熟問曰婦有七出不蒸亦預乎曰吾聞之也絕交令可友棄妻令可嫁也黎蒸不熟而已何問其故乎此為隱之也
