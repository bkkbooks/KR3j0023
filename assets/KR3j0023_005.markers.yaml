  - {type: variant, offset: 98, length: 0, content: '', WYG: 終尚書曰二月東巡狩至于岱宗柴五月南巡狩至于南岳八月西巡狩至于西岳十有一月朔巡狩至于北岳所以五嵗巡狩何為太煩也過五年為太踈也因天道時有所生嵗有所成三嵗一閏天道小備五歳再閠天道大備故五歳一巡狩三年小備二伯出述職黜陟一年物有終始歳有所成方伯行國時有所生諸侯行邑𫝊曰周公入為三公出為二伯}
