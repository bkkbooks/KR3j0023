  - {type: variant, offset: 2963, length: 3, content: 法法五, SBCK: 婚禮貴和不可相荅爲傷君臣之義亦欲使女不以天子尊乘諸侯也春秋傳曰天子嫁女于諸侯必使諸侯同姓者主之諸侯嫁女于大夫使大夫同姓者主之以其同宗共祖可以主親也故使攝父事不使同姓卿主之何尊加諸侯爲威厭不得舒也不使同姓諸侯就京師主之何諸侯親迎入京師當朝天子爲禮不兼春秋傳曰築王􅁎觀于外明不徃京師也所以必更築觀者何尊之也不於路寢路寢本所以}
