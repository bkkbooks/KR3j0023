seq: 6
front:
  text: 王者不臣王者所以不臣三何也謂二王之後妻之父母夷狄也不臣二王之後者尊先王通天下之三統也詩云有客有客亦白其馬謂㣲子朝周也尚書曰虞賓在位不臣丹朱也不臣妻父母何妻者與己一體恭承宗廟欲得其歡心上承先祖下繼萬世傳於無窮故不臣也春秋世紀季姜歸于京師父母之於子雖為王后尊不加於父母加王何王者不臣也人譏宋三世内娶於國中謂無臣也夷狄者與中國絶域異俗非中和氣所生非禮義所能化故不臣也春秋傳曰夷狄相誘君子不疾尚書大傳曰正朔所不加即君子所不臣也王者有蹔不臣者五謂祭尸受授之師將師用兵三老五更不臣祭尸者方與尊者配也不臣受授之師者尊師重道欲使極陳天人之意也故禮學記曰當其為師則不臣也當其為尸則不臣也不臣將師用兵者重士衆為敵國國不可從外治兵不可從内御欲成其威一其令春秋之義兵不稱使明不可臣也不臣三老五更者欲率天下為人子弟禮曰父事三老兄事五更王者不純臣諸侯何尊重之以其列土傳子孫世世稱君南面而治凡不臣異朝則迎之於著覲則待之於阼階升降自西階為庭燎設九賓享禮而後歸是異於衆臣也始封之君不臣諸父兄弟何不忍以己一日之功徳加於諸父兄弟也故禮服傳曰封君之子不臣諸父封君之孫盡臣之禮服傳曰子得為父臣者不遺善之義也詩云文武受命召公維翰召公文王子也傳曰子不得為父臣者閨門尚和朝廷尚敬人不能無過失為恩傷義也王者臣不得為諸侯臣以其尊當與諸侯同春秋傳曰許公不世待以初或曰王者臣得復為諸侯臣者為衰世主上不明賢者非其罪而去道不施行百姓不得其所復令得為諸侯臣施行其道易曰不事王侯此據言王之致仕臣也言不事王可知復言侯者明年少復得仕於諸侯也王者臣有不名者五先王老臣不名親與先王戮力共治國同功於天下故尊而不名也尚書曰咨爾伯不言名也不名者貴賢者而已共成先祖功徳徳加于百姓者也春秋曰單父不言名傳曰大夫之命于天子者大也盛徳之士名尊賢也春秋曰公弟叔盻諸父諸兄不名諸父諸兄者親與己父兄有敵體之義也詩云王曰叔父春秋傳曰王禮者何為長之稱也不名盛徳之士者不可屈爵祿也故韓詩内傳曰師臣者帝交友受臣者王臣臣者霸爵臣者亡不行
