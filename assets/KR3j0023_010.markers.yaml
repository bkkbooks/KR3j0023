  - {type: variant, offset: 1089, length: 0, content: '', krp: 桓母䘮告於諸侯桓母賤尚告於諸侯諸侯薨告隣國明矣諸侯夫人薨告}
  - {type: variant, offset: 1090, length: 0, content: '', SBCK: 子者不敢自廢政事天子亦欲知之當有禮也春秋曰天子使宰喧來歸惠公仲子之賵譏不及事仲子者魯君之貴妾也何况於夫人乎諸侯薨使臣歸瑞珪於天子何諸侯以瑞珪爲信今死矣嗣子諒闇三年之後當乃更爵命故歸之推讓之義也禮曰諸侯薨使臣歸瑞珪於天子天子聞諸侯薨哭之何慘怛發中哀痛之至也使大夫吊之追逺重終之義也故禮檀弓曰天子哭諸侯爵弁純衣又曰遣大夫吊詞曰皇天降災子遭離之難嗚呼哀哉大}
  - {type: page-break, offset: 1090, content: '', id: KR3j0023_SBCK_010-13a}
  - {type: variant, offset: 1090, length: 9, content: 王居于狄泉傳曰此未, WYG: 子墳髙}
  - {type: variant, offset: 1090, length: 0, content: '', krp: 子者不敢自廢政事天子亦欲知之當有禮也春秋曰天子使宰喧來歸惠公仲子之賵譏不及事仲子者魯君之貴妾也何况於夫人乎諸侯薨使臣歸瑞珪於天子何諸侯以瑞珪爲信今死矣嗣子諒闇三年之後當乃更爵命故歸之推讓之義也禮曰諸侯薨使臣歸瑞珪於天子天子聞諸侯薨哭之何慘怛發中哀痛之至也使大夫吊之追逺重終之義也故禮檀弓曰天子哭諸侯爵弁純衣又曰遣大夫吊詞曰皇天降災子遭離之難嗚呼哀哉大}
  - {type: variant, offset: 1091, length: 0, content: '', SBCK: 使臣某吊臣子死君往吊之何親與之共治民恩深義重厚欲躬見之故禮􅄂記曰君吊臣主人待于門外見馬首不哭君至主人先入君升自阼階西向哭王人}
  - {type: variant, offset: 1091, length: 0, content: '', krp: 使臣某吊臣子死君往吊之何親與之共治民恩深義重厚欲躬見之故禮雜記曰君吊臣主人待于門外見馬首不哭君至主人先入君升自阼階西向哭王人}
  - {type: variant, offset: 1092, length: 0, content: '', SBCK: 中庭從哭或曰大夫疾君問之無數士疾二問之而大夫卒比葬不食􅁏比卒哭不舉樂士比殯不舉樂玄冠不以吊者不以􅁻服臨人凶示助哀也論語曰羔裘玄冠不以吊崩薨三日乃小斂何奪孝子之恩以漸也一日之時属纊於口上以􅀱絶氣二日之時尚兾其生三日之時魂氣不還終不可柰何故禮士䘮經曰御者四人皆坐持禮属纊以􅀱絶氣禮曰天子諸侯三日小斂大夫士二日小歛属纊於口者孝子欲生其親也人死必沐浴於中霤何示㓗净反本也禮檀弓曰死於牖下沐浴於中霤飯唅於牖下小斂於戸内大斂於阼階殯於客位祖於庭葬於墓所以即逺奪孝子之恩以漸也所以有飯唅何縁生食今死不欲虚其口故唅用珠寳物何也有益死者形體故天子飯以玉諸侯以珠大夫以米士以貝也贈禭何謂也贈之爲言稱也玩好曰贈禭之爲言遺也衣􅀍曰曰禭知死者則贈禭所以助生送死追恩重終副至意也贈􅈖者何謂也贈者助也所以相佐給不足也故吊辤曰知生則􅉠貨財曰􅉠車馬曰􅈖天子七日而殯諸侯五日而殯事有小大所供者不䓁故王制曰天子七日而殯諸侯五日而殯卿大夫三日而殯夏后氏殯於阼階殷人殯於兩楹之間周人殯於西階之上何夏后氏教以忠忠者厚也曰生吾親也死亦吾親也主人冝在阼殷人教以敬曰死者將去又不敢容也故置之兩楹之間周人共夾而敬之周人教以文曰死者將去不可又得故賔客之也檀弓記曰夏后氏殯於阼階殷人殯於兩楹之間周人殯於西階稽命徴曰天子舟車殯何爲避水火災也故棺在車上車在舟中臣子更執紼晝夜常百二十二人紼者所以掌持棺也故禮曰天子舟車殯諸侯車殯大夫􅀝塗士瘞尊卑之差也祖於庭何盡孝子之恩也祖者始也始載於庭也乗軸車辭祖禰故名爲祖載也禮曰祖於庭葬於墓又曰適祖昇自西階所以有棺槨何所以掩藏形惡也不欲令孝子見其毀壞也棺之爲言之皃所以藏尸令皃全也槨之爲言廓所以開廓辟土無令迫棺也禮王制曰天子棺槨九重衣衾百二十稱}
