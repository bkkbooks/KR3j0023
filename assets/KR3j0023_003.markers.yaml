  - {type: variant, offset: 725, length: 1, content: 謚, WYG: 射無射者無聲也其日庚辛庚者物更也辛者隂始成時為秋秋之為言愁亡也其位西方其色白其音商商者强也其帝少皥少皥者少歛也其神蓐收蓐收者縮也其精白虎虎之為言搏討也故太陰見於亥亥者仰也律中應鍾壯於子子者孶也律中黄鍾衰於丑丑者紐也律中大呂其日壬癸壬者陰始任癸者揆度也時為冬冬之為言終也其位在北方其音羽羽之為言舒言萬物始孶其帝顓頊顓頊者寒縮也其神𤣥㝠𤣥㝠者入㝠也其精𤣥武掩起離體泉龜蛟珠蛤土為中宫其日戊巳戊者茂也巳抑屈起其音宫宫者中也其帝黄帝其神后土月令云十一月律謂之黄鍾}
