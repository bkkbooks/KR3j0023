  - {type: variant, offset: 2436, length: 0, content: '', SBCK: 號帝王者何號也號者功之表也所以表功明德號令臣下者也德合天地者稱帝仁義合者稱王别優劣也禮記謚法曰德象天地稱帝仁義所生稱王帝者天號王者五行之稱也皇者何謂也亦號也皇君也羙也大也天之惣羙大稱也時質故惣之也號之爲皇者煌煌人莫違也煩一夫擾一士以勞天下不爲皇也不擾疋夫疋婦故爲皇故黄金弃於山珠玉􅂢於淵巖居穴處衣皮毛飲泉液吮露英虚無廖廓與天地通靈也號言爲帝者何帝者諦也象可承也王者徃也天下所歸徃鈎命决曰三皇歩五帝趨三王馳五覇鶩或稱天子或稱帝王何以爲接上稱天子明以爵事天也接下稱帝王者得號天下至尊言稱以號令臣下也故尚書曰諮四岳曰􅁉汝衆或有一人王者自謂一人者謙也欲言已材能當一人耳故論語曰百姓有過在予一人臣謂之一人何亦所以尊王者也以天下之大四海之内所共尊者一人耳故尚書曰不施予一人或稱朕何亦王者之謙也朕我也或稱予者予亦我也不以尊稱自也但自我皆謙或稱君子何道德之稱也君之爲言群也子者丈夫之通稱也故孝經曰君子之教以孝也下言敬天下之爲人父者也何以言知其通稱也以天子至於民故詩云凱弟君子民之父母論語云君子哉􅀂人此謂弟子弟子者民也三皇者何謂也謂伏羲神農燧人也或曰伏羲神農祝融也禮曰伏羲神農祝融三皇也謂之伏羲者何古之時未有三綱六紀民人但知其母不知其父能覆前而不能覆後卧之詓詓起之吁吁飢即求食飽即弃餘茹毛飲血而衣皮葦於是伏羲仰觀象於天俯察法於地因夫婦正五行始定人道畫八卦以治下治下伏而化之故謂之伏羲也謂之神農何古之人民皆食禽獸肉至於神農人民衆多禽獸不足於是神農因天之時分地之利制耒耜教民農作神而化之使民冝之故謂之神農也謂之燧人何鑚木燧取火教民熟食養人利性避臭去毒謂之燧人也謂之祝融何祝者属也融者續也言能属續三皇之道而行之故謂祝融也五帝者何謂也禮曰黄帝顓頊帝嚳帝堯帝舜五帝也易曰黄帝堯舜氏作書曰帝尭帝舜黄帝中和之色自然之姓萬世不易黄帝始作制度得其中和萬世常存故稱黄帝也謂之顓頊何顓者專也頊者正也能專正天人之道故謂之顓頊也謂之帝嚳者何也嚳者極也言其能施行窮極道德也謂之堯者何堯猶嶤嶤也至髙之貌清妙髙逺優遊􅀶衍衆聖之主百王之長也謂之舜者何舜猶僢僢也言能推信堯道而行之三王者何謂也夏殷周也故禮士冠經曰周弁殷哻夏収三王共皮弁也所以有夏殷周號何以爲王者受命必立天下之羙號以表功自克明易姓爲子孫制也夏殷周者有天下之大號也百王同天下無以相别改制天下之大禮號以自别於前所以表着已之功業也必改號者所以明天命巳著欲顯􅀭巳於天下也巳復襲先王之號與繼體守文之君無以異也不顯不明非天意也故受命王者必擇天下美號表著已之功業明當致施是也所以預自表克於前也帝王者居天下之尊號也所以差優號令臣下謚者行之跡也所以别於後代著善惡􅂷無窮無自推觀施後世皆以勸善著戒惡明不勉也不以姓爲號何姓者一字之稱也尊卑所同也諸侯各稱一國之號而有百姓矣天子至尊即備有天下之號而兼萬國矣夏者大也明當守持大道殷者中也明當爲中和之道也聞也見也謂當道着見中和之爲也周者至也宻也道德周宻無所不至也何以知即政立號也詩云命此文王于周于京此改號爲周易邑爲京也春秋傳曰王者受命而王必擇天下之羙號以自號也五帝無有天下之號何五帝德大能禪以民爲子成于天下無爲立號也或曰唐虞者號也唐蕩蕩也蕩蕩者道德至大之貌也虞者樂也言天下有道人皆樂也故論語曰唐虞之際帝嚳有天下號髙辛顓頊有天下號曰髙陽黄帝有天號曰自然者獨宏大道德也髙陽者陽猶明也道德髙明也髙辛者道德大信也五覇者何謂也昆吾氏大彭氏豕韋氏齊桓公晉文公也昔三王之道衰而五覇存其政率諸侯朝天子正天下之化興復中國攘除夷狄故謂之霸也昔昆吾氏覇於夏者也大彭氏豕韋氏霸於殷者也齊桓晉文霸於周者也或曰五霸謂齊桓公晉文公秦穆公楚莊王呉王闔閭也霸者伯也行方伯之職㑹諸侯朝天子不失人臣之義故聖人與之非明王之張法覇猶迫也把也迫脅諸侯把持其政論語曰管仲相桓公覇諸侯春秋曰公朝于王所於是時晉文之覇尚書曰􅀖之榮懷亦尚一人之慶知秦穆之霸也楚勝鄭而不告從而攻之又令還師而佚晉冦圍宋宋因而與之平引師而去知楚莊之霸也蔡侯無罪而拘於楚吴有憂中國心興師伐楚諸侯莫敢不至知吴之覇也或曰五霸謂齊桓公晉文公秦穆公宋襄公楚莊王也宋襄伐齊亂齊桓公不擒二毛不鼓不成烈春秋傳曰雖文王之戰不是過知其覇也伯子男臣子於其國中褒其君爲公王者臣子獨不得襄其君謂之爲帝何以爲諸侯有㑹聚之事相朝聘之道或稱公而尊或稱伯子男而卑爲交接之時不􅀻其臣子之義心俱欲尊其君父故皆令臣子得稱其君爲公也帝王異時無㑹同之義故無爲同也何以諸侯德公齊侯桓公尚書曰公曰嗟秦伯也詩云覃公惟􅀻覃子也春秋曰塟皆繆公許男也禮大射經曰則擇􅀗大射者諸侯之禮也伯子男皆在也謚謚者何也謚之爲言引也引烈行之跡也所以進勸成德使上務節也故禮特牲曰古者生無爵死無謚此言生有爵死當有謚也死乃謚之何言人行終始不能􅀂一故據其終始後可知也士冠經曰死而謚之今也所以臨葬而謚之何因衆㑹欲顯􅀭之也故春秋曰公之䘮自乾侯昭公死於􅀳乾侯之地數月歸至急當未有謚也春秋曰丁巳葬戊午日下側乃克葬明祖載而有謚也黄帝先黄後帝何古者順死生之稱各持行合而言之美者在上黄帝始制法度得道之中萬世不易名黄自然也後世雖聖莫能與同也後世得與天同亦得稱帝不能立制作之時故不得復黄也謚或一言或兩言何文者以一言爲謚質者以兩言爲謚故尚書曰髙宗殷宗也湯死後世稱成湯以兩言爲謚也號無質文謚有質文何號者始也爲本故不可變也周巳後用意尤文以爲本生時號令善故有善謚故舎文武王也合言之則上其謚明别善惡所以勸人爲善戒人爲惡也帝者天號也以爲堯猶謚顧上世質直死後以其名爲號耳所以謚之爲堯何爲謚有七十二品禮記謚法曰翼善傳聖謚曰堯仁聖盛明謚曰舜慈惠愛民謚曰文強理直謚曰武天子崩臣下至南郊謚之者何以爲人臣之義莫不欲褒大其君掩惡􅀭善者也故之南郊明不得欺天也故曽子問孔子曰天子崩臣下之南郊告謚之諸侯薨世子赴告天子天子遣大夫㑹其葬而謚之何㓜不誄長賤不誄貴諸侯相誄非禮也臣當受謚於君也卿大夫老歸死有謚何謚者别尊卑彰有德也卿大夫歸無過猶有禄位故有謚也夫人無謚者何無爵故無謚或曰夫人有謚夫人一國之母修閨門之内群下亦化之故設謚以彰其善惡春秋傳曰葬宗㳟􅁎傳曰其稱謚何賢也傳曰哀姜者何莊公夫人也卿大夫妻無謚何賤也八妾所以無謚何卑賤無所能務猶士卑小不得有謚也太子夫人無謚何本婦人隨夫太子無謚其夫人不得有謚也天子太子元士也士無謚知太子亦無謚也附庸所以無謚何卑小無爵也王制曰爵禄凡五等附庸本非爵也後夫人於何所謚之以爲於朝廷朝廷本所以治政之處臣子共審謚白之於君然後加之婦人大夫故但白君而已何以知不之南郊也婦人本無外事何爲於郊也禮曽子問曰唯天子稱天以誅之唯者獨也明天子獨於南郊耳顯號謚何法法曰未岀而明巳入有餘光也白虎通德論卷第一}
