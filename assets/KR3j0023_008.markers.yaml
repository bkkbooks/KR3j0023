  - {type: variant, offset: 465, length: 0, content: '', WYG: 必桑弧何桑者相逢接之道也保傅曰大子生舉之以禮使士負之者何齋肅端緌之郊見于天韓詩内傳曰太子生以桑弧蓬矢六射上下四方明當有事天地四方也殷以生日名子何殷家質故直以生日名子也以尚書道殷家太甲帝武丁也於臣民亦得以生日名子何亦不止也以尚書道殷臣有巫咸有祖已也何以知諸侯不象王者以生日名子也以太王名亶甫王季名歴殷之諸侯也易曰帝乙謂成湯帝乙謂六代孫也湯生於夏世何以用甲乙為名曰湯王後乃更變名子孫法耳本名履故論語曰予小子履履湯名也不以子丑何曰甲乙者幹也子丑者枝也幹為本本質故以甲乙為名也名或兼或單何示非一也或聽其聲以律定其名或依事旁其形故名或兼或單也依其事者若后稷是也弃之因名之為弃也旁其形者孔子首類魯國尼丘山故名為丘或旁其名為之字者聞名即知其字聞字即知其名若名賜字子貢名鯉字伯魚春秋譏二名何}
  - {type: page-break, offset: 465, content: '', id: KR3j0023_WYG_002-39b, image: WYG0850/WYG0850-0055d.png}
