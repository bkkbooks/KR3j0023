  - {type: variant, offset: 166, length: 0, content: '', SBCK: 命巳使生者也命有三科以記驗有壽命以保度有遭命以遇暴有隨命以應行習壽命者上命也􅀂言文王受命唯中身享國五十年隨命者隨行爲命􅀂言怠弃三正天用勦絶其命矣又欲使民務仁立義闕無滔天㴞天則司命舉過言則用以弊之遭命者逢丗殘賤􅀂上逢亂君下必災變􅁀至夭絶人命沙鹿崩于受邑是也冉伯牛危言正行而遭惡疾孔}
  - {type: page-break, offset: 166, content: '', id: KR3j0023_SBCK_008-5a}
  - {type: variant, offset: 166, length: 0, content: '', WYG: 命已使生者也命有三科以記騐有壽命以保度有遭命以遇暴有隨命以應行習壽命者上命也若言文王受命唯中身享國五十年隨命者隨行為命若言怠弃三正天用勦絶其命矣又欲使民務仁立義闕無滔天滔天則司命舉過言則用以弊之遭命者逢世殘賊若上逢亂君下必災變暴至夭絶人命沙鹿崩于受邑是也冉伯牛危言正行而遭惡疾孔}
