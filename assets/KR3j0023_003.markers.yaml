  - {type: punctuation, offset: 2, content: 《, id: KR3j0023_tls_003-bkkpn1}
  - {type: variant, offset: 2, length: 0, content: '', SBCK: 八職以置三公各主其一以効其功一公置三卿故九卿也天道莫不成於三天有三光日月星地有三形髙下平人有三尊君父師故一公三卿佐之一卿三大夫佐之一大夫三元士佐之天有三光然後而能遍照各自有三法物成於三有始有中有終明天道而終之也三公九卿二十七大夫八十一元士凡百二十官下應十二子别名記曰司徒典民司空主地司馬順天天者施生所以主兵何兵者爲諸除害也所以全其生衛其養也故兵稱天寇賊猛獸皆爲除害者所主也論語曰天下有道則}
  - {type: page-break, offset: 2, content: '', id: KR3j0023_SBCK_003-1b}
  - {type: page-break, offset: 2, content: '', id: KR3j0023_SBCK_003-2a}
  - {type: variant, offset: 2, length: 0, content: '', WYG: 八職以置三公各主其一以効其功一公置三卿故九卿也天道莫不成於三天有三光日月星地有三形髙下平人有三尊君父師故一公三卿佐之一卿三大夫佐之一大夫三元士佐之天有三光然後而能遍照各自有三法物成於三有始有中有終明天道而終之也三公九卿二十七大夫八十一元士凡百二十官下應十二子别名記曰司徒典民司空主地司馬順天天者施生所以主兵何兵者為謀除害也所以全其生衞其養也故兵稱天冦賊猛獸皆為除害者所主也論語曰天下有道則}
  - {type: page-break, offset: 2, content: '', id: KR3j0023_WYG_001-31a, image: WYG0850/WYG0850-0018a.png}
  - {type: variant, offset: 2, length: 0, content: '', krp: 八職以置三公各主其一以効其功一公置三卿故九卿也天道莫不成於三天有三光日月星地有三形髙下平人有三尊君父師故一公三卿佐之一卿三大夫佐之一大夫三元士佐之天有三光然後而能遍照各自有三法物成於三有始有中有終明天道而終之也三公九卿二十七大夫八十一元士凡百二十官下應十二子别名記曰司徒典民司空主地司馬順天天者施生所以主兵何兵者爲諸除害也所以全其生衛其養也故兵稱天寇賊猛獸皆爲除害者所主也論語曰天下有道則}
  - {type: punctuation, offset: 3, content: ·, id: KR3j0023_tls_003-bkkpn2}
  - {type: variant, offset: 3, length: 3, content: 郊特牲, SBCK: 樂征伐自天子出司馬主兵言馬者馬陽物乾之所爲行兵用焉不以傷害爲度故言馬也司徒主人不言徒人者徒衆也重民司空主土不言土言空者空尚主之何况於實以㣲見著王者主三公九卿二十七大夫足以教道照幽隱必復封諸侯何重民之至也善惡比而易故知擇賢而封之使治其民以著其徳極其才上以尊天子備蕃輔下以子養百姓施行其道開賢者之路謙不自專故列土封賢因而象之象賢重民也州伯何謂也伯長也選擇賢良使長一州故謂之伯也王制}
  - {type: page-break, offset: 3, content: '', id: KR3j0023_SBCK_003-2b}
  - {type: variant, offset: 3, length: 3, content: 郊特牲, WYG: 樂征伐自天子出司馬主兵言馬者馬陽物乾之所為行兵用焉不以傷害為度故言馬也司徒主人不言人言徒者徒衆也重民司空主土不言土言空者空尚主之何况於實以微見著王者立三公九卿二十七大夫足以教道照幽隠必復封諸侯何重民之至也善惡比而易故知擇賢而封之使治其民以著其徳極其才上以尊天子備蕃輔下以子養百姓施行其道開賢者之路讓不自專故列土封賢因而象之象賢重民也州伯何謂也伯長也選擇賢良使長一州故謂之伯也王制}
