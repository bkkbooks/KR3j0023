body:
  text: 鄉射天子所以以親射何助陽氣達萬物也春陽氣微弱恐物有窒塞不能自達者夫射自內發外貫堅入剛象物之生故以射達之也含文嘉曰天子射熊諸侯射麋大夫射虎豹士射鹿豕天子所以射熊何示服猛遠巧佞也熊為獸猛巧者非但當服猛也示當服天下巧佞之臣也諸侯射麋者何示達遠迷惑人者也麋之言迷也大夫射虎豹者何示服猛也士射鹿豕者何示除害也各取德所能服也大夫士兩射者大夫士射兩物者何大夫士俱人臣示為君親視事身勞苦也或曰臣陰故數偶也侯者以布為之何布者用人事之始也本正則未末正矣所以名之為侯者何明諸侯有不朝者則當射之故禮射祝曰嗟爾不寧侯爾不朝于王所以故天下失業亢而射爾所以不射正身何君子重同類不忍射之故晝畫獸而射之射主正何為乎曰射義非一也夫射者執弓堅固心平體正然後中也二人爭勝樂以德養也勝負俱降以崇禮讓故可以選士故射選士大夫勝射者發近而制遠也其兵短而害長也故可以戒難也所以必因射助陽選士者所以扶助微弱而抑其強和調陰陽戒不虞也何以知為戒難也詩云四矢反兮以禦亂兮因射習禮樂射於堂上何示從上制下也禮曰賓主執弓請升射於兩楹之間天子射百二十步諸侯九十步大夫七十步士五十步所以明尊者所服遠也卑者所服制近也所以十月行鄉飲酒之禮何所以復尊卑長幼之義春夏事急俊浚井次墻至有子使父弟使兄故以事閑暇復長幼之序也王者父事三老兄事五更者何欲陳孝悌之德以示天下也故雖天子必有尊也言有父也必有先也言有兄也天子臨辟雍親祖袒割牲尊三老父象也竭忠謁者奉几杖授安車濡輀輪恭供綏執授兄事五更寵接禮交加客謙敬順貌也禮記祭義曰祀于明堂所以教諸侯之孝也享三老五更于太學者所以教諸侯之悌也不正言父兄言五老更者何老者壽考也欲言所令者多也更者更也所更曆歷者眾也即如是不但言老言三何欲言其明於天地人之道而走老也五更者欲言其明於五行之道而更事也三老五更幾人乎曰各一人何以知之既以父事父一而已不宜有三
