  - {type: variant, offset: 479, length: 242, content: 同也不置中門內何敬之示不褻瀆也論語曰譬諸宮墻不得其門而入不見宗廟之美百官之富祭義曰右社稷左宗廟大夫有民其有社稷者亦為報功也禮祭法曰大夫以下成群立社曰置在社月令曰擇元日命人社論語曰季路使子羔為費宰曰有民人焉有社稷焉不謂之土何封土為社故變名謂之社別於眾土也為社稷立祀治即謂之稷語亦不自變示有內外或曰至社稷不以稷為為稷社故不變其名事自示可知也不正月祭稷何禮不常存養人為用故立其神社無屋何達天地氣故郊特牲曰天子太社稷必受霜露風雨以達天地之氣社稷所以有樹何尊而識之使民人民望見師即敬之又所以表功, SBCK: ''}
