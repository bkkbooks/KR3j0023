  - {type: variant, offset: 176, length: 6, content: 社于新邑羊牛, SBCK: 多賢賢乃能進善進善乃能退惡退惡乃能斷刑内能正巳外能正人内外行備孝道乃生能安民故賜車馬以著其功德安其身能使人冨足衣食倉廪實故賜衣服以彰其體能使民和樂故賜之樂以事其先也禮曰夫賜樂者不得以時王之樂事其宗廟也朱盛色戸所以紀民數也故民衆多賜朱戸也古者人君下賢降階}
  - {type: page-break, offset: 176, content: '', id: KR3j0023_SBCK_005-8a}
  - {type: variant, offset: 176, length: 6, content: 社于新邑羊牛, WYG: 多賢賢乃能進善進善乃能退惡退惡乃能㫁刑内能正己外能正人内外行備孝道乃生能安民故賜車馬以著其功徳安其身能使人富足衣食倉廩實故賜衣服以彰其體能使民和樂故賜之樂以事其先也禮曰夫賜樂者得以時王之樂事其宗廟也朱盛色户所以紀民數也故民衆多賜朱户也古者人君下賢降階}
