  - {type: variant, offset: 122, length: 0, content: '', SBCK: 造于禰獨見禰何辭從卑不復留尊者之命至禰不謙不至祖即􅀕告天爲告事也祖爲出辤也義異告于尊者然後乃辭出王者諸侯出必將主何示有所尊故曽子曰王者將出必以遷廟主行載于齋車示有尊也無遷主以幣帛主告于祖禰廟遂奉以出每舎奠焉蓋貴命也必以遷主者明廟不可空也王者廵狩諸侯待于境者何諸侯以守蕃爲職也禮祭義曰天子廵狩諸侯待于境也王者廵狩必舎諸侯祖廟何明尊無二上}
  - {type: page-break, offset: 122, content: '', id: KR3j0023_SBCK_005-6a}
