  - {type: variant, offset: 832, length: 0, content: '', SBCK: 君過稱巳何法法隂陽共叙共生陽名生隂名煞臣有功歸於君何法法歸明於日也臣法君何法法金正木也子諌父何法法火揉直木也臣諌君不􅀙則去何法法水潤下逹於上也君子逺子近孫何法法木逺火近土也親属臣諌不相去何法法水木枝葉不相離也父爲子􅀮何法法木之蔵火也子爲父􅀮何法法水逃金也君有衆民何法法}
