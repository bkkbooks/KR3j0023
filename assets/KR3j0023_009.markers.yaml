  - {type: variant, offset: 166, length: 499, content: 為言委隨也言萬物布施火之為言化也陽氣用事萬物變化也金在西方西方者陰始起萬物禁止金之為言禁也土在中央中央者土土主吐含萬物土之為言吐也何知東方生樂記曰春生夏長秋收冬藏土所以不名時者地土之別名也比於五行最尊故不自居部職也元命包苞曰土之為無位而道在故大一不預與化人主不任部職五行之性或上或下何火者陽也尊故上水者陰也卑故下水木者少陽金者少陰有中和之性故可曲可直從革土者最大苞含物將生者出者將歸者入不嫌清濁為萬物尚書曰水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡五行所以二陽三陰何土尊尊者配天金木水火陰陽自偶水味所以鹹何是其性也所以北方鹹者萬物鹹與所以堅之也猶五味得鹹乃堅也木味所以酸者何所以酸何東方萬物之生也酸者以達生也猶五味得酸乃達也火味所以苦何南方主長養苦者所以長養也猶五味須苦可以養也金味所以辛何西方煞傷成物辛所以煞傷之也猶五味得辛乃委煞也土味所以甘何中央者中和也故甘猶五味以甘為主也尚書曰潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘北方其臭朽者何北方水萬物所幽藏也又水者受垢濁故臭腐朽也東方者木也萬物新出地中故其臭羶南方者水火也盛陽承動故其臭焦西方者金也萬物成熟始復諾故其臭腥中央土也中央者土也主養故其臭香也, WYG: ''}
