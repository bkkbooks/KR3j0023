front:
  text: 漢唐書籍以通名者五惟白虎通與風俗通行于世乃諸儒之所討論實為鉅典而所至缺此板余嘗持節七閩如建安書市號為群籍所稡訪求無有也令錫學得劉守乎父家藏白虎通善本繡梓以廣其傳是亦明經之一助豈小𥙷哉大德乙已四月望日中奉大夫雲南諸路行中書省參知政事東平
  hash: sha256:7700d4b7c2e24886e85c4636113ca21e6b9c355d06e912f75e0b4fac98d473a7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0023_SBCK_000-1a}
body:
  text: 白虎通序白虎通之為書其来尚矣群書中多見其引用然不知出於何代誰氏之手考之載籍始於漢建𥘉中淳于恭作白虎奏議又班固傳作白虎通德論唐藝文志出載班固䓁白虎通義六卷此其所自歟平生欲見其完書未之淂也余分水監歴常之無錫省郡之耆儒李顯翁晦識余於官舍翌日携是帙来且云州守劉公家蔵舊本公名丗常字平父廼大元開國之𥘉行省公之子魯齋許左轄之髙弟収書不啻萬卷其經史子集士夫之家亦或互有惟此帙丗所罕見郡之博士與二三子請福之于學将鏤板以廣其傳守慨然許之今募匠矣求余識於卷首余謂是書韜晦於丗何止數百嵗而已一旦顯於是邦殆亦有數而然耶以郡守之博古廣文曁諸生之好事俱可嘉尚於是乎書大德九年四月旦日東平克齋張楷序白虎通德論目録漢玄武司馬臣班固奉詔纂集第一卷爵號謚第二卷五祀社稷禮樂第三卷封公侯京師五行第四卷三軍誅伐諌諍郷射致仕辟雍災變耕桑第五卷封禪廵狩考黜第六卷王者不臣蓍龜聖人八風啇賈第七卷文質三政三教三綱六紀第八卷情性壽命宗族姓名天地日月四時衣裳五刑五經第九卷嫁娶第十卷紼冕䘮服崩薨白虎通德論目録謹按後漢章帝紀曰建𥘉四年十一月壬戍詔諸儒㑹白虎觀講議五經同異使五官中郎將魏應承制問侍中淳于㳟奏帝親稱制臨决如孝宣甘露石渠故事作白虎奏議注云今白虎通又按班固傳曰天子㑹諸儒講論五經作白虎通德論令固撰集其事此書所作之因也書肆舊甞鋟木歲乆摩㓕竟亡此集學者欲見而不可得邇者或謂是書中間多有魚魯之嫌如首篇援尚書言迎子劉一事即尚書顧命考之迎本作逆劉本作釗其當時傳寫之誤耶借曰𥘉得舊本如斯今旣重刋改而正諸不亦宜乎殊不思大學以尚書堯典俊德作峻德孟子以毛詩烝民秉彛作秉夷誰不知其然千古至今讀誦豈無宗工鉅儒者出蔑有一人敢爲改正由是觀之白虎通亦猶是也間有不安盡從其舊盖纂之者班固漢時人去古未逺必有所祖假借通用未可盡知後人未得班固之心安可輕議班固之述作儻能知禮記緇衣以君牙爲君雅說命爲兊命之意則能釋魚魯之疑矣昔人有云讀書未到康成處安敢髙談議漢儒觀書者試思之
  hash: sha256:eb20af530d4787979d0e45754392dcd45704504c10cfa6b1686be2926386284e
