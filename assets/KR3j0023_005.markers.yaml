  - {type: variant, offset: 110, length: 0, content: '', krp: 過五年爲太踈也因天道時有所生歲有所成三歲一閏天道小備五}
  - {type: variant, offset: 112, length: 0, content: '', krp: 閏天道大備故五歲一廵狩三年小備二伯出述職黜陟一年物有終始歲有所成方伯行國時有所生諸侯行邑傳曰周公入爲三公出爲二伯中分天下出黜陟詩曰周公東征四國是皇言東征述職周公黜陟而天下皆正也又曰蔽芾甘棠勿剪勿伐召伯所茇言邵公述職親說舎於野樹之下也春秋榖梁傳曰古之君民以時視民之勤廵狩}
