  - {type: variant, offset: 834, length: 1, content: 夫, WYG: 喪不呼其門者使得終其孝道成其大禮春秋𫝊曰古者臣有大䘮君三年不呼其門聞哀哭而後行何盡哀舒憤然後行望國境則哭過市朝則否君子自抑小人勉以及禮見星則止日行百里惻怛之心但欲見尸柩汲汲故禮奔䘮以哭答使者盡哀問故遂行曾子曰師三十里者行五十里奔䘮百里既除䘮乃歸哭於墓何眀死復不可見痛傷之至也謂喪不得追服者也哭於墓而已故禮奔䘮記曰之墓西向哭止此謂逺出歸後葬䘮服以禮除曾子與客立於門其徒趨而出曾子曰爾将何之曰吾父死將出哭於巷曾子曰反哭於爾次曾子北面而弔焉檀弓記曰孔子曰吾惡乎哭諸兄弟吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門外所知吾哭諸野養從生葬從死周公以王禮𦵏何以為周公踐祚理政與天同志展興周道顯天度數萬物咸得休氣允塞原天之意子愛周公與文武無異故以王禮葬使得郊祭尚書曰今天動威以彰周公之徳下言禮亦宜之崩薨書曰成王崩天子穪崩何别尊卑異生死}
  - {type: page-break, offset: 834, content: '', id: KR3j0023_WYG_002-67b, image: WYG0850/WYG0850-0069d.png}
