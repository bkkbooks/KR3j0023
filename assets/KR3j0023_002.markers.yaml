  - {type: variant, offset: 714, length: 0, content: '', SBCK: 曰大夏也湯曰大護者言湯承衰能護民之急也周公曰酌合者言周公輔成王能斟酌文武之道而成之也武王曰象者象太平而作樂示巳太平也合曰大武者天下始樂周之征伐行武故詩人歌之王赫斯怒爰整其旅當此之時天下樂文王之怒以定天下故樂其武也周室中制象湯樂何殷紂爲惡日乆其惡最甚斮渉刳胎殘賊天下武王起兵前歌後儛剋殷之後民人大喜故中作所以節喜盛天子八佾諸侯四佾所以别尊卑樂者陽也故以隂數法八風六律四時也八風六律者天氣也助天地成萬物者也亦猶樂所以順氣變化萬民成其性命也故春秋公羊傳曰天子八佾諸公六佾諸侯四佾詩曰大夫士琴瑟御八佾者何}
  - {type: page-break, offset: 714, content: '', id: KR3j0023_SBCK_002-8a}
