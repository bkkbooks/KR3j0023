  - {type: variant, offset: 2150, length: 251, content: 故書曰戛擊鳴球搏拊琴瑟以詠祖考來格何所以用鳴球搏拊者何鬼神清虛貴淨賤鏗鏘也故尚書大傳曰搏拊鼓振裝以秉糠琴瑟練絲朱絃鳴者貴玉聲也王者食所以有樂何樂食天下之太平富積之饒也明天子至尊非功不食非德不飽故傳曰天子食時日舉樂王者所以日四食者何明有四方之物食四時之功也四方不平四時不順有徹樂之法焉所以明至尊著法戒也焉王者平居中央制御四方平旦食少陽之始也晝食太陽之始也晡餔食少陰之始也暮食太陰之始也論語曰亞飯干適楚三飯繚適蔡四飯缺適秦諸侯三飯卿大夫再飯尊卑之差也弟子職曰暮食士偃復禮士也食力無數庶人職在耕桑戮僇力勞役飢, SBCK: ''}
