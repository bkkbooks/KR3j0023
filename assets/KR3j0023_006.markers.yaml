  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 白虎通德論卷第六臣班固纂集王者不臣王者所以不臣三何也謂三王之後妻之父母夷狄也不臣二王之後者尊先王通天下之三統也詩云有客有客亦白其馬謂㣲子朝周也尚書曰虞賔在位不臣丹朱也不臣妻父母何妻者與已一體恭承宗廟欲得其歡心上承先祖下繼萬丗傳於無窮故不臣也春秋曰紀季姜歸于京師父母之於子雖爲王后尊不加於父母加王何王者不臣也人譏宋三丗内娶於國中謂無臣也夷狄者與中國絶域異俗非中和氣所生非}
