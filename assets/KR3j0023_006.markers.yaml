  - {type: variant, offset: 1636, length: 482, content: 持矛南方歌西方戚北方擊金夷狄質不如中國中國文章但隨物名之耳故百王不易戚二王者制夷狄樂不制夷狄禮何以為禮者身當履而行也之夷狄之人不能行禮樂者聖人作為以樂之耳故有夷狄樂也殊誰為舞者以為使中國之人何以言之夷狄之人禮不備恐有過誤也作之門外者何夷在外故就之也夷狄無禮義故不不在內明堂記曰九夷之國在東門之外所以知不在門內也明堂記曰禹納蠻夷夷蠻之樂於太廟言納明有入也曰四夷之樂者何謂也以為四夷外無禮義之國數夷狄者從東故舉本以為之摠名也言夷狄者舉終始也言蠻舉遠也言貉舉惡也則別之東方為九夷南方為八蠻西方為六戎北方為五狄故曾子問曰九夷八蠻六戎五狄百姓之難至者也何以知夷在東方禮王制曰東方曰夷被髮文身又曰南方曰蠻雕題交趾西方曰戎被髮衣皮北方曰狄衣羽毛穴居東所以九何有九者何蓋來者過過者九九之為言究也徳徧究故應德而來亦九也非故為之道自然也何以名為夷蠻曰聖人本不治外國非為制名也因其國名而言之耳一說曰名其短而為之制名也夷者僔狄夷無禮義東方者少陽易化故取名也北方太陰鄙郄故少蠻蟲難化蠻者執心違邪戎者強惡也狄者易也言辟易無別也歌者在堂上舞在堂下何歌者象德舞者象功君子上德而下功郊特牲曰歌者在上, SBCK: ''}
