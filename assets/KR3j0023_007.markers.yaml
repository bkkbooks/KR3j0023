  - {type: variant, offset: 1838, length: 0, content: '', WYG: 易也或曰三敎改易夏后氏始髙宗亦承弊所以不改敎何明子無改父之道也何言知髙宗不改之以周之敎承以文也三敎所以先忠者行之本也三敎一體而分不可單行故王者行之有先後何以言三敎竝施不可單行也以忠敬文無可去者也敎所以三何法天地人内忠外敬文飾之故三而備也即法天地人各何施忠法人敬法地文法天人道主忠人以至道敎人忠之至也人以忠敎故忠為人敎也地道謙卑天之所生地敬養之以敬為地教也教者何謂也教者效也上為之下効之民有質樸不教不成故孝經曰}
