body:
  text: 三軍國有三軍何所以戒非常伐無道尊宗廟重社稷安不忘危也何以言有三軍也論語曰子行三軍則誰與詩云周王于邁六師及之三軍者何法法天地人也以為五人為伍五伍為兩四兩為卒五卒為旅五旅為師師二千五百人師為一軍六師一萬五千人也傳曰一人必死十人不能當百人必死千人不能當千人必死萬人不能當萬人必死横行天下雖有萬人猶謙讓自以為不足故復加五千人因法月數月者羣陰之長也十二足以窮盡陰陽備物成功二千人亦足以征伐不義致太平也糓梁傳曰天子有六軍諸侯上國三軍次國二軍下國一軍諸侯所以一軍者何諸侯蕃屏之臣也任兵革之重距一方之難故得有一軍王者征伐所以必皮弁素幘何伐者凶事素服示有悽愴也伐者質故衣古服禮曰三王共皮弁素幘服亦皮素幘又招虞人亦皮弁知伐亦皮王者將出辭於禰還格祖禰者言子辭靣之禮尊親之義也王制曰王者將出類于上帝宜于社造于禰尚書曰歸假于藝祖出所以告天至告祖無二元后廟後告者示不敢留尊者之命也告天何示不敢自專非出辭反靣之道也與宗廟異義還不復告天者天道質無内外故不復告也尚書言歸假于祖禰不見告於天知不告也王者受命質家先伐文家先正何質家之天命己也使己也誅無道今誅得為王故先伐文家言天命已成為王者乃得誅伐王者耳故先改正朔也又改正朔者文代其質也文者先其文質者先其質故論語曰予小子履敢昭告于皇天上帝此湯伐桀告天用夏家之法也詩云命此文王于周于京此言文王誅伐故改號為周易邑為京也明天著忠臣孝子之義也湯親北靣稱臣而事桀不忍相誅也禮曰湯放桀武伐紂時也王法天誅者天子自出者以為王者乃天之所立而欲謀危社稷故自出重天命也犯王法使方伯誅之尚書曰今予惟恭行天之罸此所以言啓自出伐有扈也王制曰賜之弓矢乃得專征伐犯王誅者也大夫將兵出必不御者欲盛其威使士卒一意繫心也故但聞將軍令不聞君命也明進退大夫也春秋傳曰此受命于君如伐齊則還何大其不伐䘮也大夫以君命出進退在大夫也天子遣將軍必於廟何示不敢自專也獨於祖廟何制法度者祖也王制曰受命于祖受成於學此言于祖廟命遣之也王法于此受兵何重不絶人嗣也師行不必勝故須其有世嗣年六十歸兵者何不忍並鬬人父子也王制曰六十不預服戎又曰八十一子不從政九十家不從政父母之䘮三年不從政齊衰大功三月不從政廢疾非人不養者一人不從政古者師出不踰時者為怨思也天道一時生一時養人者天之貴物也踰時則内有怨女外有曠夫詩云昔我往矣楊柳依依今我來思雨雪霏霏春秋曰宋人取長葛傳曰外取邑不書此何以書久也王者有三年之䘮夷狄有内侵伐之者重天誅為宗廟社稷也春秋傳曰天王居于狄泉傳曰此未三年其稱天王何著有天子也誅伐誅不避親戚何所以尊君卑臣强榦弱枝明善善惡惡之義也春秋傳曰季子殺其母兄何善示誅不避母兄君臣之義尚書曰肆朕誕以爾東征誅弟也諸侯有三年之䘮有罪且不誅何君子恕已哀孝子之思慕不忍加刑罰春秋曰晉士丐帥師侵齊至榖聞齊侯卒乃旋傳曰大其不伐䘮也諸侯之義非天子之命不得動衆起兵誅不義者所以强榦弱枝尊天子卑諸侯論語曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出世無聖賢方伯諸侯有相滅者力能救者可也論語曰陳恒弑其君孔子沭浴而朝請討之王者侯之子簒弑其君而立臣下得誅之者廣討賊之義也春秋傳曰臣弑君臣不討賊非臣也又曰蔡世子班弑其君楚子誅之王者受命而起諸侯有臣弑君而立當誅君身死子不得繼者以其逆無所天也詩云毋封靡于爾邦惟王其崇之此言追誅大罪也或盜天子土地自立為諸侯絶之而已父殺其子當誅何以為天地之性人為貴人皆天所生也託父母氣而生耳王者以養長而敎之故父不得專也春秋傳曰晉侯殺世子申生不出奔佞人當誅何為其亂善行傾覆國政韓詩内傳孔子為魯司冦先誅少正卯謂佞道已行亂國政也佞道未行章明逺之而已論語曰放鄭聲逺佞人子得為父報讐者臣子於君父其義一也忠臣孝子所以不能已以恩義不可奪也故曰父之讐不與共天下兄弟之讐不與共國朋友之讐不與同朝族人之讐不共鄰故春秋傳曰子不復讐非子檀弓記子夏問曰居兄弟之讐如之何仕不與同國銜君命遇之不鬭父母以義見殺子不復讐者為往來不止也春秋曰父不受誅子復讐何誅猶責也誅其人責其罪極其過惡春秋曰楚子虎誘蔡侯班殺之于申傳曰誅君之子不立討者何謂討猶除也欲言臣當掃除君之賊春秋曰衞人殺州吁于濮傳曰其稱人何討賊之辭也伐者何謂伐擊也欲言伐擊之也尚書曰武王伐紂征者何謂也征猶正也欲言其正也輕重從辭也誕以爾東征誅禄甫也又曰甲戌我惟征徐戎戰者何謂尚書大傳曰戰者憚警之也春秋䜟曰戰者延改也弑者試也欲言臣子殺其君父不敢卒候間司事可稍稍試之易曰臣弑其君子弑其父非一朝一夕之故也簒者何謂也簒猶奪也取也欲言庶奪嫡孽奪宗引奪取其位春秋傳曰其人何簒辭也稍稍殺之襲者何謂也行不假途掩人不備也春秋傳曰其謂之秦何夷狄之也曷為夷狄之秦伯將襲鄭人國掩人不僃行不假途人銜枚馬繮勒晝伏夜行為襲也諸侯家國入人家宜告主人所以尊敬防并兼也春秋傳曰桓公假途于陳而伐楚禮曰使次斤先假途用束帛即如是諸侯賣王者道禮無往不反非謂所賣者也將入人國先使大夫執幣假道主人亦遣大夫迎於郊為賓主設禮而待之是其相尊敬也防并兼奈何諸侯之行必有師旅恐掩人不備士卒斂取恒遲先假途則預備之矣冬至所以休兵不舉事閉關商旅不行何此日陽氣微弱王者承天理物故率天下静不復行役扶助微氣成萬物也故孝經䜟曰夏至陰氣始動冬至陽氣始萌易曰先王以至日閉關商旅不行夏至陰始起反大熱何陰氣始起陽氣推而上故大熱也冬至陽始起隂氣推而上故大寒也諌諍臣所以有諌君之義何盡忠納誠也愛之能無勞乎忠焉能無誨乎孝經曰天子有諍臣七人雖無道不失其天下諸侯有諍臣五人雖無道不失其國大夫有諍臣三人雖無道不失其家士有諍友則身不離於令名父有諍子則身不陷於不義天子置左輔右弼前疑後丞以順左輔主修政㓨不法右弼主糺周言失傾前疑主糺度定徳經後丞主匡正常考變天四弼興道率主行仁夫陽變於七以三成故建三公序四諍列七人雖無道不失天下仗羣賢也諸侯諍不從得去何以屈尊申卑孤惡君也去曰某質性頑鈍言愚不任用請退避賢如是之是待以禮臣待放如不以禮待遂去君待之以禮奈何曰予熟思夫子言未得其道今子不且留聖王之制無塞賢之路夫子欲何之則遣大夫送至於郊必三諌者何以為得君臣之義必待於郊者忠厚之至也冀君覺悟能用之所以必三年古者臣下有大䘮君三年不呼其門所以復君恩今已所言不合於禮義君欲罪之可得也援神契曰三諫待放復三年盡惓惓也所以言放者臣為君諱若言有罪放之也所諌事已行者遂去不留凡待放冀君用其言耳事已行簒各去無為留也易曰介如石不終日貞吉論語曰三日不朝孔子行臣待於郊者君絶其祿者示不欲去也道不合耳禄參二與之一留與其妻長子使終祭宗廟賜之環則反賜之玦則去明君子重耻也王度記曰反之以玦其不待放者亦與之物明有介主無介民也詩曰逝將去汝適彼樂土或曰天子之臣不得言放天子以天下為家也親屬諫不得放者骨肉無相去離之義也春秋傳曰司馬子反曰君請處乎此臣請歸子反者楚公子也時不待放士不得諌者士賤不得預政事故不得諌也謀及之得固盡其忠耳禮保傅大夫進諫士傳民語妻得諫夫者夫婦榮耻共之詩云相䑕有體人而無禮人而無禮胡不遄死此妻諌夫之詩也諫不從不得去之者本娶妻非為諫正也故一與齊終身不改此地無去天之義也子諫父不去者父子一體而分無相離之法猶火去木而滅也論語事父母幾諫下言又敬不違臣之諫君何取法法金正木也子之諫父法火以揉木也臣諫君以義故折正之也子諫父以恩故但揉之也木無毁傷也待放木取法於水火無金則相離也諫者何諫間也因也更也是非相間革更其行也人懷五常故有五諫謂諷諫順諫窺諫指諫伯諫諷諌者智也患禍之萌深睹其事未彰而諷告此智之性也順諫者仁也出辭遜順不逆君心仁之性也窺諫者禮也視君顔色不悅且郤悅則復前以禮進退此禮之性也指諫者信也指質相其事也此信之性也伯諫者義也惻隱發於中直言國之害厲志忘生為君不避䘮身義之性也孔子曰諫有五吾從諷之諫事君進思盡忠退思補過去而不訕諫而不露故曲禮曰為人臣不顯諌纎微未見於外如詩所刺也若過惡已著民蒙毒螫天見災變事白異露作詩以刺之幸其覺悟也明王所以立諫諍者皆為重民而求己失也禮保傅曰於是立進善之旌懸誹謗之木建招諫之鼓王法立史記事者以為臣下之儀様人之所取法則也動則當應禮是以必有記過之史徹膳之宰禮玉藻曰動則左史書之言則右史書之禮保傅曰王失度則史書之士誦之三公進讀之宰夫徹其膳是以天子不得為非故史之義不書則死宰不徹膳亦死所以謂之史何明王者使為之也謂之宰何宰制也使制法度也宰所以徹膳何陰陽不調五糓不熟故王者為不盡味而食之禮曰一榖不升不備鷄鷃二榖不升不備三牲人臣之義當掩惡揚美所以記君過何各有所縁也掩惡者謂廣徳宣禮之臣所以為君隱惡何君至尊故設輔弼置諫官本不當有遺失故論語曰陳司敗問昭公知禮乎孔子曰知禮此為君隱也君所以不為臣隱何以為君之於臣無適無莫義之與比賞一善而衆臣勸罸一惡而衆臣懼若為卑隱為不可殆也故尚書曰必力賞罸以定厥功諸侯臣對天子亦為隱乎然本諸侯之臣今來者為聘問天子無恙非為告君之惡來也故孝經曰將順其美匡救其惡故上下治能相親也君不為臣隱父獨為子隱何以為父子一體而分榮耻相及故論語曰父為子隱子為父隱直在其中矣兄弟相為隱乎曰然與父子同義故周公誅四國常以祿甫為主也朋友相為隱者人本接朋結友為欲立身揚名也朋友之道四焉通財不在其中近則正之逺則稱之樂則思之患則死之夫妻相為隱乎傳曰曾去妻梨蒸不熟問曰婦有七出不蒸亦預乎曰吾聞之也絶交令可友弃妻令可嫁也棃蒸不熟而已何問其故乎此為隱之也鄉射天子所以親射何助陽氣逹萬物也春氣微弱恐物有窒寒不能自逹者夫射自内發外貫堅入剛象物之生故以射逹之也含文嘉曰天子射熊諸侯射麋大夫射虎豹士射鹿豕天子所以射熊何示服猛巧佞也熊為獸猛巧者非但當服猛也示當服天下巧佞之臣也諸侯射麋者示逹迷惑人也麋之言迷也大夫射虎豹者示服猛也士射鹿豕者示除害也各取徳所能服也大夫士兩射者人臣示為君親視事身勞苦也或曰臣陰故數偶也侯者以布為之何用人事之始也本正則末正矣所以名為侯何明諸侯有不朝者則射之故禮射祝曰嗟爾不寧侯爾不朝于王所以故天下失業亢而射爾所以不射正身何君子重同類不忍射之故畫獸而射之射正何為乎曰射義非一也夫射者執弓堅固心平體正然後中也二人爭勝樂以徳養也勝負俱降以崇禮讓可以選士故射選士大夫勝者發近而制逺也其兵短而害長也故可以戒難也所以必因射助陽選士者所以扶助微弱而抑其強和調陰陽戒不虞也何以知為戒難也詩云四矢反兮以禦亂兮因射習禮樂射於堂上何示從上制下也禮曰賓主執弓請升射於兩楹之間天子射百二十步諸侯九十步大夫七十步士五十歩明尊者所服逺也卑者所服近也所以十月行鄉飲酒之禮何所復尊卑長幼之義春夏事急浚井次墻至有子使父弟使兄故以事閒暇復長幼之序也王者父事三老兄事五更者何欲陳孝悌之徳以示天下也故雖天子必有尊也言有父也必有先也言有兄也天子臨辟雍親􅃝割牲尊三老父象也竭忠奉几杖授安車濡輪恭綏執授兄事五更寵接禮交加客謙敬順貌也禮記祭義曰祀于明堂所以教諸侯之孝也享三老五更于太學者所以教諸侯悌也不正言父兄言三老五更者何也老者夀考也欲言所令者多也更者更也所更歴者衆也即如是不但言老言三何欲言其明於天地人之道而老也五更者欲言其明於五行之道而更事也三老五更幾人乎曰各一人何以知之既以父事父一而已不宜有三致仕臣七十懸車致仕者臣以執事趨走為職七十陽道極耳目不聦明跂踦之屬是以退去避賢者所以長亷耻也懸車示不用也致仕者致其事於君君不使自去者尊賢者也故曲禮大夫七十而致仕王制曰七十致政鄉大夫老有盛徳者留賜之几杖不備之以筋力之禮在家者三分其祿以一與之所以厚賢也人年七十卧非人不温適四方乘安車與婦人俱自稱曰老夫曲禮曰大夫致仕若不得謝則必賜之几杖王記曰臣致仕於君者養之以其祿之半几杖所以扶助衰也故王制曰五十杖於家六十杖於鄉七十杖於國八十杖於朝臣老歸年九十君欲有問則就其室以珎從明尊賢也故禮祭義曰八十不俟朝於君問就之大夫老歸死以大夫禮葬車馬衣服如之何曰盡如故也辟雍古者所以年十五入太學何以為八歳毀齒始有識知入學學書計七八十五陰陽備故十五成童志明入太學學經術學之為言覺也悟所不知也故學以治性慮以變情故玉不琢不成器人不學不知道子夏曰百工居肆以成其事君子學以致其道故禮曰十年曰幼學論語曰吾十有五而志於學三十而立又生而知之者上也學而知之者次也是以雖有自然之性必立師傅焉論語䜟曰五帝立師三王制之傳曰黄帝師力牧帝顓頊師綠圖帝嚳師赤松子帝堯師務成子帝舜師尹壽禹師國先生湯師伊尹文王師吕望武王師尚父周公師虢叔孔子師老聃天子太子諸侯世子皆就師於外尊師重先生之道也禮曰有來學者無往教者也易曰匪我求童蒙童蒙求我王制曰小學在公宫南之左太學在郊又曰天子太子羣后之太子公卿大夫元士之嫡子皆造焉父所以不自教子何為恐瀆也又授之道當極説陰陽夫婦變化之事不可父子相教也師弟子之道有三論語曰朋友自逺方來朋友之道也又曰囘也視予猶父也父子之道也以君臣之義教之君臣之道也天子立辟雍何所以行禮樂宣徳化也辟者璧也象璧圎又以法天於雍水側象教化流行也辟之為言積也積天下之道徳也雍之為言壅也壅天下之殘賊故謂之辟雍也王制曰天子曰辟雍諸侯曰泮宫外圓者欲使觀之平均也又欲言外圓内方明徳當圎行當方也不言圓辟何又圓於辟何以知其圓也以其言辟也何以知有外也又詩云思樂泮水薄采其芹詩訓曰水圓如璧諸侯曰泮宫者半於天子宫也眀尊卑有差所化少也半者象璜也獨南靣禮儀之方有水耳其餘壅之言垣宫名之别尊卑也明不得化四方也不曰泮雍何嫌但半天子制度也詩云穆穆魯侯克明其徳既作泮宫淮夷攸服鄉曰庠里曰序庠者庠禮義也序者序長幼也禮五帝記曰立庠序之學則父子有親長幼有序善如爾舍明令必次外然後前民者也未見於仁故立庠序以導之也教民者皆里中之老而有道徳者為右師教里中之子弟以道藝孝悌行義立五帝之徳朝則坐於里之門弟子皆出就農而復罷示如之皆入而復罷其有出入不時早晏不節有過故使語之言心無由生也若既收藏皆入教學立春而就事其有賢才美質知學者足以開其心頑鈍之民亦足以别於禽獸而知人倫故無不教之民孔子曰以不教民戰是謂弃之明無不教民也天子所以有靈臺者何所以考天人之心察陰陽之㑹揆星辰之證驗為萬物獲福無方之元詩云經始靈臺天子立明堂者所以通神靈感天地正四時出教化宗有徳重有道顯有能褒有行者也明堂上圓下方八窻四闥布政之宫在國之陽上圓法天下方法地八窻象八風四闥法四時九室法九州十二坐法十二月三十六户法三十六雨七十二牖法七十二風災變天所以有災變何所以譴告人君覺悟其行欲令悔過修徳湥思慮也援神契曰行有㸃缺氣逆于天情感變出以戒人也災異者何謂也春秋濳潭巴曰災之言傷也隨事而誅異之言怪先感動之也何以言災有哭也春秋曰新宫火三日哭傳曰必三日哭何禮也災三日哭所以然者宗廟先祖所處鬼神無形體也今忽得天火得無為災所中乎故哭也變者何謂變者非常也耀嘉曰禹將受位天意大變迅風靡木雷雨晝㝠服乘者何謂衣服乍大乍小言語非常故尚書大傳曰時則有服乘也孽者何謂也曰介蟲生為非常尚書大傳曰時則有介蟲之孽時則有龜孽堯遭洪水湯遭大旱示有譴告乎堯遭洪水湯遭大旱命運時然所以或災變或異何各隨其行因其事也霜之為言亡也陽以散云雹之為言合也陰氣專精積合為雹日食者必殺之何陰侵陽也鼓用牲于社社者衆陰之主以朱絲縈之鳴鼓攻之以陽責陰也故春秋曰日食鼓用牲于社所以必用牲者社地别神也尊之故不敢虛責也日食大水則鼓用牲於社大旱則雩祭未雨非茍虛也勑陽責下求陰道也月食救之者陰失明也故角尾交日月食救之者謂夫人擊鏡傳人擊杖庶人之妻楔搔耕桑王者所以親耕后親桑何以率天下農蠶也天子親耕以供郊廟之祭后之親桑以供祭服祭義曰天子三推三公五推卿大夫士九推耕於東郊何東方少陽農事始起桑於西郊西方少陰女功所成故曾子問曰天子耕東田而三反之周官曰后親桑率外内婦蠶於北郊禮祭義曰古者天子諸侯必有公桑蠶室近川而為之築宫棘墻而外閉之者也白虎通義巻上欽定四庫全書白虎通義卷下漢班固撰徳論下
