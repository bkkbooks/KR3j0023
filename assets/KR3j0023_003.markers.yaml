  - {type: variant, offset: 11, length: 4, content: 爵死無謚, SBCK: 贍其不足制土三等何因土地有髙下中王者即位先封賢者憂人之急也故列土爲疆非爲諸侯張官設府非爲卿大夫皆爲民也易曰利建侯}
