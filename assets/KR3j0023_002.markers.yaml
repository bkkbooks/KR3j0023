  - {type: variant, offset: 13, length: 0, content: '', WYG: 為社立祀始謂之稷語亦自變有内外或曰至稷不以稷為社故不變其名事自可知也不正月祭稷何禮不常存養人為用故立其神社無屋何逹天地氣故郊特牲曰太社稷必受霜露風雨以逹天地之氣社稷所以有樹何尊而識之使民人望見師敬之又}
