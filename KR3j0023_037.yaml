body:
  text: 衣裳聖人所以制衣服何以為絺綌蔽形表德勸善別尊卑也所以名為裳何衣者隱也裳者鄣障也所以隱形自鄣障閉也易曰黃帝堯舜垂衣裳而天下治何以知上為衣下為裳以其先言衣也詩曰褰裳涉溱所以合為衣下也弟子職言摳衣而降也名為衣何上兼下也裘所以佐女工助溫也古者緇衣羔裘黃衣狐裘禽獸衆多獨以羔裘狐羔何取其輕暖因狐死首丘明君子不忘本也羔者取其跪乳遜順也故天子狐白諸侯狐黃大夫狐蒼士羔裘亦因別尊卑也所以必有紳帶者示謹敬敬謹自約整也繢繒為結於前下垂三分身半紳居二焉男子必所以有鞶帶者示有金革之事也所以必有佩者表德見所能也故循道無窮則佩環能本道德則佩琨能決嫌疑則佩玦是以見其所佩即知其所能論語曰去喪無所不佩天子佩白玉諸侯佩山玄玉大夫佩水蒼玉士佩瓀石佩即象其事若農夫佩其耒耜工匠佩其斧斤婦人佩其針鏤亦佩玉也何以知婦人亦佩玉詩云將翱將翔佩玉將將彼美孟姜德音不忘
