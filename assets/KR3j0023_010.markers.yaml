  - {type: variant, offset: 591, length: 0, content: '', SBCK: 故爲冠飾最小故曰委貌委貌者委曲有貌也殷統十二月爲正其飾微大故曰章甫章甫者尚未與極其本相當也夏者統十三月爲正其飾最大故曰母追母追者言其追大也爵弁者周人宗廟之冠也禮郊特牲曰周弁士冠經曰周弁殷哻夏収爵何以知指謂其色又乍言爵弁乍但言弁周之冠色所以爵何爲周尚赤所以不純赤但如爵頭何以本制冠者法天天色玄者不失其質故周加赤殷加白夏之冠色純玄何以知殷加白也周加赤知殷加白也夏殷士冠不異何古質也以士冠禮知之䘮服諸侯爲天}
