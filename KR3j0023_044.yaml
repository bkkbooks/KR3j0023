body:
  text: 陳立疏證收録莊述祖所補闕文王者所以祭天何緣事父以事天也據北堂書鈔九十補祭天必以祖配何自內出者無匹不行自外至者無主不止故推其始祖配以賓主順天意也五帝三王祭天一用夏正何夏正得天之數也天地交萬物通始終之正故易乾鑿度云三王之郊一用夏正也祭天必在郊何天體至清故祭必於郊取其清潔也祭日用丁與辛何先甲三日辛也後甲三日丁也皆可以接事昊天之日故春秋傳郊以正月上辛日尚書曰丁巳用牲于郊牛二祭天歲一何言天至尊至質事之不敢褻瀆故因歲之陽氣始達而祭之也祭天作樂者何為降神也據書鈔九十補周官祭天后夫人不與者以其婦人無外事王者所以立宗廟何曰生死殊路故敬鬼神而遠之緣生以事死敬亡若事存故欲立宗廟而祭之此孝子之心所以追養繼孝也宗者尊也廟者貌也象先祖之尊貌也所以有室何所以象生之居也祭宗廟所以禘祫何尊人君貴功德廣孝道也位尊德盛所及彌遠謂之禘祫何禘之為言諦也序昭穆諦父子也祫者合也毀廟之主皆合食於太祖也三年一禘周以后稷文武特七廟后稷為始與文王為太祖武王為太宗禘祫及遷廟何以其能世世繼君之體持其統而不絶由親及遠不忘先祖也宗廟所以歲四祭何春曰祠者物微故祠名之夏曰禴者麥熟進之秋曰嘗者新穀熟嘗之冬曰蒸者蒸之為言衆也冬之物成者衆禮王制曰春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以雁諸侯以月旦告朔于廟何緣生以事死故國君月朔朝宗廟存神受政也祭所以有主者何言神無所依據孝子以主係心焉論語云哀公問主于宰我宰我對曰夏后氏以松松者所以自竦動殷人以柏柏者所以自迫促周人以栗栗者所以自戰栗亦不相襲所以用桑練主用栗據御覽五百三十一補所以用木為之者何本有終始又與人相似也蓋題之以為記欲令後可知也方尺或曰長尺二寸孝子入宗廟之中雖見木主亦當盡敬也所以虞而立何孝子既葬日中反虞念親已沒棺柩已去悵然失望倣徨哀痛故設桑主以虞所以慰孝子之心虞安其神也所以用桑練主用栗據御覽五百三十一補主祏納之西壁祭所以有尸者何鬼神聽之無聲視之無形升自阼階仰視榱桷俯視几筵其器存其人亡虛無寂寞思慕哀傷無可寫泄故座尸而食之毀損其饌欣然若親之飽尸醉若神之醉矣所以制朝聘之禮何以尊君父重孝道也夫臣之事君猶子之事父欲全臣子之恩一統尊君故必朝聘也聘者問也緣臣子欲知其君父無恙又當奉土地所生珍物以助祭是以皆得行聘問之禮也謂之朝何朝者見也五年一朝備文德而明禮義也因用朝時見故謂之朝言諸侯當時朝于天子朝用何月皆以夏之孟四月因留助祭朝禮奈何諸侯將至京師使人通命于天子天子遣大夫迎之百里之郊遣世子迎之五十里之郊矣覲禮經曰至于郊王使人皮辨用璧勞尚書大傳曰天子太子年十八曰孟侯于四方諸侯來朝迎于郊諸侯來朝天子親與之合瑞信者何正君臣重法度也覲禮經曰侯氏坐取圭升致命王受之玉尚書曰輯五瑞諸侯相朝聘何為相尊敬也故諸侯朝聘天子無恙法度得無變更所以考禮正刑一德以尊天子也公執玉取其暢達也卿執羔取其跪乳有禮也書曰五玉三帛二生一死贄至正月朔日乃執而朝賀其君朝賀以正月何歲首意氣改新欲長相保重本正始也故群臣執贄而朝賀其君自此以上皆據類聚三十九書鈔八十一初學記十四御覽五百三十八補朝禮奈何君出居內門之外天子揖諸侯持揖卿大夫膝下至地天子特揖三公面揖卿略揖大夫士所以不拜何為其屈尊也諸侯三年一貢士者治道三年有成也據書鈔七十九補諸侯所以貢士于天子者進賢勸善者也天子聘求之者貴義也治國之道本在得賢得賢則治失賢則亂故月令季春之月開府庫出幣帛周天下勉諸侯聘名士禮賢者有貢者復有聘者何以為諸侯貢士庸才者貢其身盛德者貢其名及其幽隱諸侯所遺失天子之所昭故聘之也路者何謂也路大也道也正也君至尊制度大所以行道德之正也路者君車也天子大路諸侯路車大夫軒車士飾車玉路大路也名車為輅者言所以步之于路也車所以立乘者何制車以步故立乘車中不內顧何仰即觀天俯即察地前聞和鸞之聲旁見四方之運此車教之道論語曰升車必正立執綏車中不內顧所以有和鸞者何以正威儀節行舒疾也鸞者在衡和者在軾馬動則鸞鳴鸞鳴則和應其聲鳴曰和敬舒則不鳴疾則失音明得其和也故詩云和鸞雍雍萬福攸同魯訓曰和設軾者也鸞設衡者也禮記曰天子乘龍載大旗象日月升龍傳曰天子升龍諸侯降龍王者諸侯所以田獵者何為田除害上以共宗廟下以簡集士衆也春謂之田何春歲之本舉本名而言之也夏謂之苗何擇去其懷任者也秋謂之搜何搜索肥者也冬謂之狩何守地而取之也四時之田總名為田何為田除害也春秋穀梁傳曰春曰田夏曰苗秋曰搜冬曰狩王者祭宗廟親自取禽者何尊重先祖必欲自射加功力也禽者何鳥獸之總名明為人所禽制也王者不親取魚囿天子百里大國四十里次國三十里小國二十里苑囿所以在東方何苑囿養萬物者也東方物所以生也詩云東有圃草鳥所以飛何鳥者陽也飄輕故飛也黃帝作宮室以避寒溫宮之為言中也見廣韻天子之堂高九尺天子尊故極陽之數九尺也堂之為言明也所以明禮義也禮記曰天子之堂九尺諸侯七尺大夫五尺士三尺見廣韻門四出何所以通方故禮三朝記曰天子之官四通見御覽百八十三引所以必有孰何欲以飾門因取其名也明臣下當見於君必先孰思其事也見御覽一百八十五引天子曰崇城言崇高也諸侯曰干城言不敢自專禦于天子也見初學記二十四門必有闕者闕者所以飾門別尊卑也闕者何闕疑也所以設屏何屏所以自障也示不極臣下之敬也天子德大故外屏諸侯德小所照見近故內屏天子曰崇城言崇高也諸侯曰干城言不敢自專禦于天子也齊者言己之意念專一精明也冬至前後君子安身靜體百官絶事不聽政擇吉辰而後省事共工之子曰修好遠遊舟車所至足所達靡不窮覽故祀以為祖神天子疾稱不豫諸侯稱負子大夫稱負薪士稱犬馬不豫者不復豫政也負子者諸侯子民今不復子之也負薪犬馬皆謙也夏稱后者以揖讓受于君故稱后殷稱人者以行仁義人所歸往夏法日日數十也日無不照尺所度無所不極故以十寸為尺殷法十二月言一歲之中無所不成故以十二寸為尺周據地而生地者陰也以婦人為法婦人大率奄八寸故以八寸為尺人踐三尺法天地人夏稱后者以揖讓受于君故稱后殷稱人者以行仁義人所歸往
