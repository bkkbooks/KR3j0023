  - {type: variant, offset: 404, length: 1, content: 藏, SBCK: 發近而制逺也其兵短而害長也故可以戒難也所以必因射助陽選士者所以扶助微弱而抑其强和調隂陽戒不虞也何以知爲戒難也詩云四矢反􅀆以禦􅅍􅀆因射習礼樂射於堂上何示􅀙上制下也礼曰賔主執弓請升射於兩楹}
