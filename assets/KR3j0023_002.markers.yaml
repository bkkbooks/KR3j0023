  - {type: variant, offset: 1018, length: 419, content: 繼體守文之君無以異也不顯不明非天意也故受命王者必擇天下美號表著己之功業明當致施是也所以預自表克於前也帝王者居天下之尊號也所以差優號令臣下謚者行之跡也所以別於後代著善惡垂無窮無自推觀施後世皆以勸善著戒惡明不勉也不以姓為號何姓者一字之稱也尊卑所同也諸侯各稱一國之號而有百姓矣天子至尊即備有天下之號而兼萬國矣夏者大也明當守持大道殷者中也明當為中和之道也聞也見也謂當道著見中和之為也周者至也密也道德周密無所不至也何以知即政立號也詩云命此文王于周于京此改號為周易邑為京也春秋傳曰王者受命而王必擇天下之美號以自號也五帝無有天下之號何五帝德大能禪以民為子成于天下無為立號也或曰唐虞者號也唐蕩蕩也蕩蕩者道德至大之貌也虞者樂也言天下有道人皆樂也故論語曰唐虞之際帝嚳有天下號曰高辛顓頊有天下號曰高陽黃帝有天下號曰自然有熊有熊者獨宏大道德也高陽者陽猶明也道德高明也高辛者道德大信也五霸者何謂也昆吾氏大彭氏豕韋氏齊桓公晉文公也昔三王之道衰而五霸存其政率諸侯朝天子, SBCK: 昌}
