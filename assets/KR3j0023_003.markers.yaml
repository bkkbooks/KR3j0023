  - {type: variant, offset: 809, length: 0, content: '', SBCK: 木王所以七十二日何土王四季各十八日合九十日爲一時王九十日土所以王四季何木非土不生火非土不榮金非土不成水無土不髙土扶微助衰􅊗成其道故五行更王亦須土也王四季居中央不名時五行何以知同時起丑訖義相生傳曰五行並起赴各以名别陽生隂煞火中無生物水中反有生物何生者以内火隂在内故不生也水火獨一種金木多品何以爲}
  - {type: page-break, offset: 809, content: '', id: KR3j0023_SBCK_003-15b}
  - {type: variant, offset: 809, length: 0, content: '', WYG: 木王所以七十二日何土王四季各十八日合九十日為一時王九十日土所以王四季何木非土不生火非土不榮金非土不成水無土不髙土扶㣲助衰歴成其道故五行更王亦須土也王四季居中央不名時五行何以知同時起丑訖義相生傳曰五行並起赴各以别名陽生陰煞火中無生物水中反有生物何生者以内火陰在内故不生也水火獨一種金木多品何以為}
