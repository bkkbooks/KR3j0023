  - {type: variant, offset: 830, length: 3, content: 進退在, SBCK: 聞䘮徐行不反諸侯朝而有􅀻䘮得還何凶服不入公門君不呼之義也凶服不敢入公門者明尊朝廷吉凶不相干故周官曰凶服不入公門曲禮曰居䘮不言樂􅀕事不言凶公庭不言婦女論語曰子於是日哭則不歌臣下有}
  - {type: variant, offset: 830, length: 3, content: 進退在, WYG: 聞䘮徐行不反諸侯朝而有私䘮得還何凶服不入公門君不呼之義也凶服不敢入公門者明尊朝廷吉凶不相干故周官曰凶服不入公門曲禮曰居䘮不言樂祭事不言凶公庭不言婦女論語曰子於是日哭則不歌臣下有}
