  - {type: variant, offset: 186, length: 2, content: 千里, SBCK: 天地之數五故十月而備乃成人也人生所以位何本一幹而分得氣異息故泣重離母之義也尚書曰啓􅈱􅈱泣也人拜所以自名者何所以泣號自紀禮拜自後不自名何備隂陽也人所以相拜者何所以表情見意屈節卑體尊事之者也拜之言服也所以必再拜何法隂陽也尚書曰再拜稽首也必稽首何敬之至也頭至地何以言首謂頭也禮曰首有􅅑則沐所以先拜首後稽首何名順其文質也尚書曰周公拜首稽首人所以有字何冠徳明功敬成人也故禮士冠經曰賔北面字之曰伯某甫又曰冠而字之敬其名也所以五十乃稱伯仲者五十知天命思慮定也能順四時長㓜之序故以伯仲號之禮檀弓曰㓜名冠字五十乃稱伯仲論語曰五十而知天命稱號所以有四何法四時用事先後長㓜兄弟之象也故以時長㓜號曰伯仲叔季也伯者長也伯者子最長迫近父也仲者中也叔者少也季者㓜也適長稱伯伯禽是也庻長稱孟以魯大夫孟氏男女異長各自有伯仲法隂陽各自有終始也}
