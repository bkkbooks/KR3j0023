  - {type: variant, offset: 422, length: 109, content: 為人父者也何以言知其通稱也以天子至於民故詩云凱弟君子民之父母論語云君子哉若人此謂弟子弟子者民也三皇者何謂也謂伏羲神農燧人也或曰伏羲神農祝融也禮曰伏羲神農祝融三皇也謂之伏羲者何古之時未有三綱六紀民人但知其母不知其父能覆前, SBCK: 道}
