  - {type: variant, offset: 91, length: 0, content: '', SBCK: 尚書曰明試以功車服以庸廵狩所以四時出何當承宗廟故不踰時也以夏之仲月者同律度當得其中也二月八月晝夜分五月十一月隂陽終尚書曰二月東廵狩至于岱宗柴五月南廵狩至于南岳八月西廵狩至于西岳十有一月朔廵狩至于北岳所以五􅀊廵狩何爲太煩也過五年爲太踈也因天道時有所生􅀊有所成三􅀊一閏天道小備五􅀊􅄪閏天道大備故五􅀊一廵狩三年小備二伯出述職黜陟一年物有終始􅀊有所成方伯行國時有所生諸侯行邑傳曰周公入爲三公出爲二伯中分天下出黜陟詩曰周公東征四國是皇言東征述職周公黜陟而天下皆正也又曰蔽芾甘棠勿剪勿伐召伯所茇言邵公述職親􅀃舎於野樹之下也春秋榖梁傳曰古之君民以時視民之勤廵狩􅀕天何本廵狩爲祭天告至尚書曰東廵狩至于岱宗柴也王者出必告廟何}
