  - {type: variant, offset: 168, length: 1, content: 居, krp: 尊也禮曰宗人將有事族人皆待聖者所以必有宗何也所以長和睦也大宗能率小宗小宗能率群弟通於有無所以紀理族人者也宗其爲始祖後者爲大宗此百丗之所宗也宗其爲髙祖後者五丗而遷者也髙祖遷於上宗則易於下宗其爲曽祖後者爲曽祖宗宗其爲祖後者爲祖宗宗其爲父後者爲父宗以上至髙祖宗皆爲小宗以其轉遷别於大宗也别子者自爲其子孫爲祖繼别也各自爲宗小宗有四大宗有一凡有五宗人之親所以備矣諸侯奪宗明尊者冝之大夫不得奪宗何曰諸侯丗丗傳子孫故奪宗大夫不傳子孫故不宗也䘮服經曰大夫爲宗子不言諸侯爲宗子也族者何也族者湊也聚也謂恩愛相流湊也生相親愛死相哀痛有㑹聚之道故謂之族尚書曰以親九族族所以九何九之爲言䆒也親踈恩愛究竟也謂父族四母族三妻族二父族四者謂父之姓一族也父女昆弟適人有子爲二族也身女昆弟適人有子爲三族也身女子適人有子爲四族也母族三者母之父母一族也母之昆弟二族也母昆弟子三族也母昆弟者男女皆在外親故合言之妻族二者妻之父爲一族妻之母爲二族妻之親略故父母各一族禮曰惟氏三族之不虞尚書曰以親九族義同也一說合言九族者欲明堯時俱三也禮所以獨父族四何欲言周承二弊之後民人皆厚於末故興禮母族妻之黨廢禮母族父之族足以貶妻族以附父族也或言九者據有交接之恩也若刑侯之姊覃公惟私也言四者據有服耳不相害所異也姓名人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻也故卋别類使生相愛死相哀同姓不得相娶皆爲重人倫也姓生也人所禀天氣所以生者也詩云天生烝民尚書曰平章百姓姓所以有百何以爲古者聖人吹律定姓以記其族人含五常而生聲有五音宫商角徴羽轉而相雜五五二十五轉生四時故百而異也氣殊音悉備故殊百也所以有氏者何所以貴功德賤伎力或氏其官或氏其事聞其氏即可知其所以勉人爲善也或氏王父字何所以别諸侯之後爲興滅國繼絶丗也諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字爲氏故魯有仲孫季楚有昭屈原齊有髙國崔立氏三以知其爲子孫也王者之後二稱王子兄弟立而皆封也或曰王孫上稱王孫也堯知命表稷契賜生子姓臯陶典刑不表姓言天任德逺刑禹姓姒氏祖以億生殷姓子氏祖以玄鳥子也周姓姬氏祖以履大人跡生也人必有名何所以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有變人生三月目煦亦能笑與人相更荅故因其始有知而名之故禮服傳曰子生三月則父名之於祖廟於祖廟者謂子之親廟也明當為宗祖主也一說名之於燕寢名者㓜少卑賤之稱也寡略故於燕寢禮内則曰子生君沐浴朝服夫人亦如之立于阼階西南丗婦抱子升自西階君命之士適子執其右手庶子撫其首君曰欽有師夫人曰記有成告於四境四境者所以遏絶萌牙禁備未然故曽子問曰丗子生三月以名告于祖禰内則記曰以名告于山川社稷四境天子太子使士負子於南郊以桑弧蓬矢六射者何也此男子之事也故先表其事然後食其禄必桑弧何桑者相逢接之道也保傳曰天子生舉之以禮使士負之者何齋肅端緌之郊見于天韓詩内傳曰太子生以桑弧蓬矢六射上下四方明當有事天地四方也殷以生日名子何殷家質故直以生日名子也以尚書道殷家太甲帝武丁也於臣民亦得以生日名子何亦不止也以尚書道殷臣有巫咸有祖已也何以知諸侯不象王者以生日名子也以太王名亶甫王季名歷殷之諸侯也易曰帝乙謂成湯帝乙謂六代孫也湯生於夏丗何以用甲乙爲名曰湯王後乃更變名子孫法耳本名履故論語曰予小子履履湯名也不以子丑何曰甲乙者幹也子丑者枝也榦爲本本質}
