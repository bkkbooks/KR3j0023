body:
  text: 五刑聖人治天下必有刑罰何所以儉佐德助治順天之度也故懸爵賞者示有所勸也設刑罰者明有所懼也傳曰三皇無文五帝畫象三王肉明刑應世以立五五刑者五常之鞭策刑所以五何法五行也大辟法水滅火宮者法土之壅水臏者法金之剋木劓者法木之穿土墨者法火之勝金也五帝畫象者其服象五刑也犯墨者蒙巾犯劓者赭其衣犯臏者以墨幪其臏處而畫之犯宮者履屝犯大辟者布衣無領科條三千者應天地人情也五刑之屬三千大辟之屬二百宮辟之屬三百腓辟之屬五百劓墨辟之屬各千張布羅衆非五刑不見劓墨何其下刑者也墨墨其額也劓劓其鼻也腓者脫其臏也宮者女子淫執置宮中不得出也丈夫淫割去其勢也大辟者謂死也刑不上大夫何尊大夫禮不下庶人欲勉民使至於士故禮為有知制刑為無知設也庶人雖有千金衣弊之幣不得服刑不上大夫者據禮無大夫刑或曰撻笞之刑也禮不及下庶人者謂酬酢之禮也周禮三王始有獄夏曰夏臺桀拘湯殷曰羑里周曰囹圄
