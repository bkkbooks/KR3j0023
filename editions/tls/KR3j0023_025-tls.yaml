body:
  text: 商賈商賈何謂也商之為言商商其遠近度其有亡通四方之物故謂之商也賈之為言固固有其其有用之物以待民來以求其利者也行曰商止曰賈易曰先王以至日閉關商旅不行后不省方論語曰沽之哉我待價者也即如是尚書曰肇牽車牛遠服賈用方言遠行可知也方言欽厥父母欲留供養之也
