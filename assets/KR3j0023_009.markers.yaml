  - {type: variant, offset: 404, length: 1349, content: 金木水火陰陽自偶水味所以鹹何是其性也所以北方鹹者萬物鹹與所以堅之也猶五味得鹹乃堅也木味所以酸者何所以酸何東方萬物之生也酸者以達生也猶五味得酸乃達也火味所以苦何南方主長養苦者所以長養也猶五味須苦可以養也金味所以辛何西方煞傷成物辛所以煞傷之也猶五味得辛乃委煞也土味所以甘何中央者中和也故甘猶五味以甘為主也尚書曰潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘北方其臭朽者何北方水萬物所幽藏也又水者受垢濁故臭腐朽也東方者木也萬物新出地中故其臭羶南方者水火也盛陽承動故其臭焦西方者金也萬物成熟始復諾故其臭腥中央土也中央者土也主養故其臭香也月令曰東方其臭羶南方其臭焦中央其臭香西方其臭腥北方其臭朽所以名之為東方者動方也萬物始動生也南方者任養之方萬物懷任也西方者遷方也萬物遷落也北方者伏方也萬物伏藏也少陽見於寅寅者演也律中大太簇律之言率所以率氣令生也盛於卯卯者茂也律中夾鍾衰於辰辰者震也律中姑洗其日甲乙甲者萬物孚甲也乙者物蕃屈有節欲出時為春春之為言偆偆動也位在東方其色青其音角角者氣動耀躍也其帝太皞太皞者大起萬物擾也其神勾芒勾芒者物之始生其精青龍芒之為言萌也陰中陽故太陽見於巳巳者物必起律中仲呂壯盛於午午物滿長律中蕤賓衰於未未味也律中林鍾其日丙丁丙者其物炳明丁者強也時為夏夏之言大也位在南方其色赤其音徵徵止也陽度極也其帝炎帝炎帝者太陽也其神祝融祝融者屬續也其精為朱鳥離為鸞故少陰見於申申者身也律中夷則壯於酉酉者老也物收歛律中南呂衰於戍戍者滅也律中無射無射者無聲也其日庚辛庚者物更庚也辛者陰始成時為秋秋之為言愁亡也其位西方其色白其音商商者強也其帝少皞少皞者少歛也其神蓐收蓐收者縮也其精白虎虎之為言搏討也故太陰見於亥亥者仰侅也律中應鍾壯於子於子者孳也律中黃鍾衰於丑丑者紐也律中大呂其日壬癸壬者陰始使任癸者揆揆度可揆度也時為冬冬之為言終也其位在北方其音羽羽之為言舒言萬物始孳其帝顓頊顓頊者寒縮也其神玄冥玄冥者入冥也其精玄武掩起離體泉龜蛟珠蛤土為中宮其日戊己戊者茂也己者抑屈起其音宮宮者中也其帝黃帝其神后土月令云月令十一月律謂之黃鍾何黃中和之色鍾者動也言陽氣潛藏動於黃泉之下動養萬物也十二月律之謂之大呂何大者大也呂者拒也言陽氣欲出陰不許也呂之為言拒者也旅抑拒難之也正月律謂之太蔟何太亦大也蔟者湊也言萬物始大湊地而出也二月律謂之夾鐘何夾者孚甲也言萬物孚甲種類分也三月謂之姑洗何姑者故也洗者鮮也言萬物皆去故就其新莫不鮮明也四月謂之仲呂何言陽氣極將將極中充大也彼故復中難之也五月謂之蕤賓何蕤者下也賓者敬也言陽氣上極陰氣始起故賓敬之也六月謂之林鍾何林者眾也萬物成孰熟其種類眾多也七月謂之夷則何夷傷也則法也言萬物始傷被刑法也八月謂之南呂何南者任也言陽氣尚有任也生薺麥也故陰拒之也九月謂之無射何射者終也言萬物隨陽而終也當復隨陰而起無有終已也十月謂之應鍾何應者應也鍾者動也言萬物應陽而動下藏也五行所以更王何以其轉相生故有終始也木生火火生土土生金金生水水生木是以木王火相土死金囚水休王所勝者死內囚故王者休見木王火相何以知為臣土所以死者子為父報仇者也五行之子慎之物歸母木王火相金成其火燋金金生水水滅火報其理火生土土則害水莫能而禦五行所以相害者大天地之性眾勝寡故水勝火也精勝堅故火勝金剛勝柔故金勝木專勝散故木勝土實勝虛故土勝水也火陽君之象也水陰臣, SBCK: ''}
