  - {type: variant, offset: 2957, length: 0, content: '', SBCK: 無所不生也娶九女亦足以成君施也九而無子百亦無益也王度記曰天子一娶九女春秋公羊傳曰諸侯娶一國則二國徃媵之以姪娣從之姪者何兄之子也娣者何女弟也或曰天子娶十二女法天有十二月萬物必生也必一娶何防􅁋泆也爲其棄德嗜色故一娶而已人君無再娶之義也備姪娣從者爲其必不相嫉妬也一人有子三人共之􅀂已生之不娶兩娣何傳異氣也娶三國女何廣異􅀋也恐一國血脉相似俱無子也姪娣年雖少猶從適人者明人者明人君無再娶之義也還待年於父母之國未任荅君子也詩云姪娣從之􅀄祁如雲韓侯顧之爛其盈門公羊傳曰叔􅁎歸于紀明待年也二國來媵誰爲尊者大國爲尊國等以德德同以色質家法天尊左文家法地尊右所以不聘妾何人有子孫欲尊之義義不可永人以爲賤也春秋傳曰二國來媵可求人爲士不可求人爲妾何士即尊之漸賢不止於士妾雖賢不得爲適娶妻卜之何卜女之德知相冝否昏禮經曰將加諸卜敢問女爲誰氏也人君及宗子父母自定娶者卑不主尊賤不主貴故自定之也昏禮經曰親皆没巳聘命之詩云文定厥祥親迎于渭大夫功成封得備八妾者重國廣繼嗣也不更聘大國者不忘本適也故禮曰納女於諸侯曰備掃灑天子諸侯之世子皆以諸侯禮娶與君同示無再娶之義也王者之娶必先選于大國之女禮儀備所見多詩云大􅀖有子俔天之妹文定厥祥親迎于渭明王者必娶大國也春秋曰紀侯來朝紀子以嫁女於天子故增爵稱侯至數十年之間紀侯無他功但以子爲天王后故爵稱侯知雖小國者必封以大國明其尊所不臣也王者娶及庻人者何開天下之賢示不遺善也故春秋曰紀侯來朝交加爲侯明封之也先封之明不與聖人交禮也女行􅃜缺而去其國如之何以封爲諸侯比例矣諸侯所以不得自趣國中何諸侯不得專封義不可臣其父母春秋傳曰宋三代無大夫惡其内娶}
