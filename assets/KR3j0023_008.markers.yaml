  - {type: variant, offset: 200, length: 2, content: 王制, SBCK: 地者易也言養萬物懷任交易變化也始起之天始起先有太􅀄後有太始形兆旣成名曰太素混沌相連視之不見聽之不聞然後剖判清濁旣分精出曜布度物施生精者爲三光號者爲五行行生情情生汁中汁中生神明神明生道德道徳生文章故乾鑿度曰太􅀄者氣之始也太始者形兆之始也太素者質之始也陽唱隂和男行女隨也天道所以左旋地道右周何以爲天地動而不别行而不離所以左旋右周者猶君臣隂陽相對之義男女揔名爲人天地所以無惣名何}
