  - {type: variant, offset: 471, length: 0, content: '', krp: 前聖法度故仰則觀象於天俯則察法於地觀鳥獸之文與地之冝近取諸物於是始作八卦以通神明之徳以象萬物之情也經所以有五何經常也有五常之道故曰五經樂仁書義禮禮易智詩信也人情有五性懷五常不能自成是以聖人象天五常之道而明之以教人成其徳也五經何謂謂易尚書詩禮春秋也禮解曰温柔寛厚詩教也踈通知逺書教也廣愽易良樂教也潔浄精微易教也恭儉莊敬禮教也属辝比事春秋教也春秋何常也則黄帝巳來何以言之易曰上古結繩以治後丗聖人易之以書契百官以理萬民以察後丗聖人者謂五常也傳曰三王百丗計神元書五帝之受録圗丗史記從政録帝魁巳來除禮樂之書三千二百四十篇也白虎通}
  - {type: variant, offset: 472, length: 108, content: 也今以盛德人入輔佐兩食之何劉師培云何當作可王制曰天子之縣內諸侯祿也外諸侯嗣也天子太子食菜采者儲君嗣主也當有上土以尊之也太子食百里與諸侯封同故禮曰公士大夫天子子也無爵而在大夫上故知百里也公卿大夫皆食菜采者示與民同有無也, SBCK: 論卷第八}
