  - {type: variant, offset: 933, length: 0, content: '', WYG: 天子棺槨九重衣衾百二十稱丁領大度曰公侯五重衣衾九十稱士再重禮曰大夫有大棺三重衣衾五十稱士無大棺二重衣衾三十稱單祫備為一稱禮檀弓曰天子棺四重水兕革棺被之其厚三寸杝棺一梓棺二栢椁以端長}
  - {type: page-break, offset: 933, content: '', id: KR3j0023_WYG_002-73a, image: WYG0850/WYG0850-0072c.png}
  - {type: variant, offset: 934, length: 1, content: 十, WYG: 尺有虞氏瓦棺今以木何虞尚質故用瓦夏后氏益文故易之以堲周謂堲木相周無膠漆之用也殷人棺槨有膠漆之用周人浸文墻置􅀢如巧飾䘮𦵏之禮緣生以事死生時無死亦}
  - {type: variant, offset: 936, length: 1, content: 預, WYG: 敢造太古之時穴居野䖏衣皮帯革故死衣之以薪内藏不飾中古之時有宫室衣}
  - {type: variant, offset: 938, length: 1, content: 戎, WYG: 故衣之幣帛藏以棺槨封樹識表體以象生夏殷彌文齊之以器械至周大文緣夫婦生時同室死同葬之尸柩者何謂也尸之為言失也陳也失氣亾神形體獨陳柩之為言究也久也不復章也曲禮曰在床曰尸在棺曰柩崩薨别號至墓同何也時臣子藏其君父安厝之義貴賤同葬之為言下藏之也所以入地何人時於隂含陽光死始入地歸所與也天子七月而𦵏諸侯五月而𦵏何尊卑有差也天子七月而葬同軌必至諸侯五月而𦵏同㑹必至所以慎終重䘮也禮曰家人奉圗先君之𦵏君居以中昭穆為左右羣臣從葬以貴賤序合葬者所以固夫婦之道也故詩曰榖則異室死則同穴又禮檀弓曰合𦵏非古也自周公已来未之有改也葬於城郭外何死生别處終始異居易曰葬之中野所以絶孝子之思慕也𫝊曰作樂於廟不聞於墓哭泣於墓不聞於廟所以於北方何就隂也檀弓曰孔子卒所以受魯君之璜玉葬魯城壮}
