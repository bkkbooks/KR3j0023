body:
  text: 辟雍古者所以年十五入太大學何以為八歲毀齒始有識知入學學書計七八十五陰陽備故十五成童志明入太學學經術籍學之為言覺也以覺悟所不知也故學以治性慮以變情故玉不琢不成器人不學不知道義子夏曰百工居肆以致成其事君子學以致其道故曲禮曰十年曰幼學論語曰吾十有五而志於學三十而立又曰生而知之者上也學而知之者次也是以雖有自然之性必立師傅焉論語讖曰五帝立師三王制之傳曰黃帝師力牧帝顓頊師緑圖帝嚳師赤松子帝堯師務成子帝舜師尹壽禹師國先生湯師伊尹文王師呂望武王師尚父周公師虢叔孔子師老聃天子之太子諸侯之世子皆就師於外者尊師重先生之道也故曲禮曰聞有來學者無往教者也易曰匪我求童蒙童蒙求我主王制曰小學在公宮南之左太學在郊又曰天子太子群后之太子公卿大夫之元士元士之嫡子皆造焉小學經藝之宮也大學者辟雍鄉射之宮父所以不自教子何為世泄瀆也又授之道當極説陰陽夫婦變化之事不可父子相教也師弟子之道有三論語曰朋友自遠方來朋友之道也又曰回也視豫猶父也父子之道也以君臣之義教之君臣之道也天子立辟雍何者何所以辟雍所以行禮樂宣德教化也辟者璧也象璧圓又以法天於雍者雍之以水側象教化流行也辟之為言積也積天下之道德也雍之為言壅也壅天下之殘賊儀則故謂之辟雍也王制曰天子曰辟雍諸侯曰泮宮外圓者欲使觀之者平均也又欲言外圓內方明德當圓行當方也不言圓辟何又圓於辟何以知其圓也以其言辟也何以知有外水也又詩云思樂泮水薄采其荇詩訓曰水圓如璧諸侯曰泮宮者半於天子宮也明尊卑有差所化少也半者象璜也獨南面禮儀之方有水耳其餘壅之言垣宮名之別尊卑也明不得化四方也不曰言泮雍何嫌但半天子制度也詩云穆穆魯侯克明其德既作泮宮淮夷攸服鄉曰庠里曰序庠者庠禮義也序者序長幼也禮五帝記曰帝庠序之學則父子有親長幼有序善如爾舍明令必次外然後前民者也未見於仁故立庠序以導之也古之教民者里皆有師里中之老而有道德者為里右師其次為左師教里中之子弟以道藝孝悌行義立五帝之德立春而就事朝則坐於里之門弟餘子皆出就農而復後罷夕示亦如之皆入而復後罷其有出入不時早晏不節有過故使語之言心無由生也若既收藏皆入教學立春而就事其有賢才美質如知學者足以聞開其心頑鈍之民亦足以別於禽獸而知人倫故無不教之民孔子曰以不教民戰是謂棄之明無不教民也天子所以有靈臺者何所以考天人之心察陰陽之會揆星度辰之證驗為萬物獲福於無方之元詩云經始靈臺天子立明堂者所以通神靈感天地正四時出教化宗有德章重有道顯有能褒有行者也明堂上圓下方八窗四闥布政之宮在國之陽上圓法天下方法地八窗象八風四闥法四時九室法九州十二坐堂法十二月三十六戶法三十六兩雨七十二牖法七十二風
