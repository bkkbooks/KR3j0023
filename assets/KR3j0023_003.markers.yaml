  - {type: variant, offset: 807, length: 0, content: '', SBCK: 爲臣土所以死者子爲父報仇者也五行之子慎之物歸母木王火相金成其火燋金金生水水㓕火報其理火生土土則害水莫能而禦五行所以相害者大地之性衆勝寡故水勝火也精勝堅故火勝金剛勝柔故金勝木專勝散故木勝土實勝虚故土勝水也火陽君之象也水隂臣之義也臣所以勝其君何此謂無道之君也故爲衆隂所害猶紂王也是使水得施行金以盖之土以應之欲温則温欲寒亦何從得害火乎曰五行各自有隂陽木生火所以還燒其母何曰金勝木火欲爲木害金金者堅强難消故母以遜體助火燒金此自欲成子之義又陽道}
  - {type: page-break, offset: 807, content: '', id: KR3j0023_SBCK_003-15a}
  - {type: variant, offset: 807, length: 0, content: '', WYG: 為臣土所以死者子為父報仇者也五行之子慎之物歸母木王火相金成其火燋金金生水水滅火報其理火生土土則害水莫能而禦五行所以相害者天地之性衆勝寡故水勝火也精勝堅故火勝金剛勝柔故金勝木專勝㪚故木勝土實勝虚故土勝水也火陽君之象也水隂臣之義也臣所以勝其君何此謂無道之君也故為衆陰所害猶紂王也是使水得施行金以盖之土以應之欲温則温欲寒則寒亦何從得害火乎曰五行各自有隂陽木生火所以還燒其母何曰金勝木火欲為木害金金者堅强難消故母以遜體助火燒金此自欲成子之義又陽道}
  - {type: page-break, offset: 807, content: '', id: KR3j0023_WYG_001-43a, image: WYG0850/WYG0850-0024a.png}
  - {type: variant, offset: 807, length: 0, content: '', krp: 爲臣土所以死者子爲父報仇者也五行之子慎之物歸母木王火相金成其火燋金金生水水㓕火報其理火生土土則害水莫能而禦五行所以相害者大地之性衆勝寡故水勝火也精勝堅故火勝金剛勝柔故金勝木專勝散故木勝土實勝虚故土勝水也火陽君之象也水隂臣之義也臣所以勝其君何此謂無道之君也故爲衆隂所害猶紂王也是使水得施行金以盖之土以應之欲温則温欲寒亦何從得害火乎曰五行各自有隂陽木生火所以還燒其母何曰金勝木火欲爲木害金金者堅强難消故母以遜體助火燒金此自欲成子之義又陽道}
  - {type: variant, offset: 808, length: 0, content: '', SBCK: 相離故爲兩盛火死子乃繼}
