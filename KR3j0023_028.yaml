body:
  text: 三教王者設三教者何承衰救弊欲民反正道也三正之有失故正立三教以相指受夏人之王教以忠其失野救野之失莫如敬殷人之王教以敬其失鬼救鬼之失莫如文周人之王教以文其失薄救薄之失莫如忠繼周尚黑制與夏同三者如順連環周則復始窮則反本樂稽熠耀嘉曰顏回問三教變虞夏何如曰教者所以追補敗政靡弊溷濁謂之治也舜之承堯無為易也或曰三教改易夏后氏始高宗亦承弊所以不改教何明子無改父之道也何言知高宗不改之以周之教承以文也三教所以先忠者行之本也三教一體而分不可單行顧故王者行之有先後何以言三教並施不可單行也以忠敬文無可去者也教所以三何法天地人內忠外敬文飾之故三而備也即法天地人各何施忠法人敬法地文法天人道主忠人以至道教人忠之至也人以忠教故忠為人教也地道謙卑天之所生地敬養之以敬為地教也教者何謂也教者效也上為之下效之民有質朴不教不成忠形於悃誠故失野敬形於祭祀故失鬼文形於飾貌故失薄夏后氏用明器殷人用祭器周人兼用之何謂曰夏后氏教以忠故先明器以奪孝子之心也殷人教以敬故先祭器敬之至也周人教以文故兼用之周人意至文也孔子曰之死而致死之不仁而不可為也之死而致生之不知而不可為也故有死道焉以奪孝子之心也有生道焉使人勿倍也故竹器不成用木器不成斫瓦器不成沫琴瑟張而不平竽笙備而不和有鍾磬而無簨虡縣示備物而不可用也孔子曰為明器者善為俑者不仁塗車羞芻靈自古有之言今古皆然也
