  - {type: variant, offset: 658, length: 3, content: 北面稱, SBCK: 也故禮中庸曰朞之䘮逹乎諸侯三年之䘮逹乎天子卿大夫降緦重公正也禮庻人國君服齊衰三月王者崩京師之民䘮三月何民賤故思淺故三月而已天子七月而葬諸侯五月而葬者則民始哭素服先葬三月成齊衰朞月以成禮葬君也禮不下庻人所以爲民制何禮不下庻人者尊卑制度也服者恩從内發故爲之制也王者崩}
  - {type: page-break, offset: 658, content: '', id: KR3j0023_SBCK_010-4b}
  - {type: variant, offset: 658, length: 3, content: 北面稱, WYG: 也故禮中庸曰朞之喪達乎諸侯三年之喪達乎天子卿大夫降緦重公正也禮庶人國君服齊衰三月王者崩京師之民喪三月何民賤而王貴故三月而已天子七月而葬諸侯五月而葬者則民始哭素服先葬三月成齊衰朞月以成禮葬君也禮不下庶人所以為民制何禮不下庶人者尊卑制度也服者恩從内發故為之制也王者崩}
