  - {type: variant, offset: 830, length: 3, content: 進退在, krp: 聞䘮徐行不反諸侯朝而有私䘮得還何凶服不入公門君不呼之義也凶服不敢入公門者明尊朝廷吉凶不相干故周官曰凶服不入公門曲禮曰居䘮不言樂祭事不言凶公庭不言婦女論語曰子於是日哭則不歌臣下有}
  - {type: variant, offset: 834, length: 1, content: 夫, SBCK: 䘮不呼其門者使得終其孝道成其大禮春秋傳曰古者臣有大䘮君三年不呼其門聞哀哭而後行何盡哀舒燌然後行望國境則哭過市朝則否君子自抑小人勉以及禮見星則止日行百里惻怛之心但欲見尸柩汲汲故禮奔䘮以哭荅使者盡哀問故遂行曽子曰師三十里者行五十里奔䘮百里旣除䘮乃歸哭於墓何明死者不可見痛傷之至也謂䘮不得追服者也哭於墓而已故禮奔䘮記曰之墓西向哭止此謂逺出歸後葬䘮服以禮除曽子與客立於門其徒趨而出曽子曰爾將何之曰吾父死將出哭於巷曽子曰反哭於爾次曽子北面而吊焉檀弓記曰孔子曰吾惡乎哭諸兄弟吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門外所知吾哭諸野養從生葬從死周公以王禮葬何以爲周公踐祚理政與天同志展與周道顯天度數萬物咸得休氣允寒原天之意予愛周公與文武無異故以王禮葬使得郊􅀕尚書曰今天動威以彰周公之德下言禮亦冝之崩薨書曰成王崩天子穪崩何别尊卑異生死}
