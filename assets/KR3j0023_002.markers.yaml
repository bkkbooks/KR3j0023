  - {type: variant, offset: 1010, length: 5, content: 己復襲先王, SBCK: 鐘}
  - {type: variant, offset: 1010, length: 192, content: 己復襲先王之號與繼體守文之君無以異也不顯不明非天意也故受命王者必擇天下美號表著己之功業明當致施是也所以預自表克於前也帝王者居天下之尊號也所以差優號令臣下謚者行之跡也所以別於後代著善惡垂無窮無自推觀施後世皆以勸善著戒惡明不勉也不以姓為號何姓者一字之稱也尊卑所同也諸侯各稱一國之號而有百姓矣天子至尊即備有天下之號而兼萬國矣夏者大也明當守持大道殷者中也明當為中和之道也聞也見也謂當道著見中和, WYG: 鐘}
  - {type: variant, offset: 1010, length: 5, content: 己復襲先王, krp: 鐘}
  - {type: variant, offset: 1016, length: 1, content: 號, SBCK: 爲言動也隂氣用事萬物動成鐘爲氣用金聲也鎛者時之氣聲也節度之所生也君臣有節度則萬物昌無節度則萬物亡亡}
  - {type: variant, offset: 1016, length: 1, content: 號, krp: 爲言動也隂氣用事萬物動成鐘爲氣用金聲也鎛者時之氣聲也節度之所生也君臣有節度則萬物昌無節度則萬物亡亡}
