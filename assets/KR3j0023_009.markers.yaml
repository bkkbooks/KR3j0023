  - {type: 'tls:seg', offset: 2, content: '', id: KR3j0023_tls_009-382a.1}
  - {type: variant, offset: 3, length: 1, content: 行, SBCK: 十壯有室女二十壯而嫁七嵗之陽也八􅀊隂也七八十五隂陽之數備有相偶之志故禮記曰女子十五許嫁笄而字禮之稱字隂繫於陽所以專一之節也陽尊無所繫二十五繫者就隂節也陽舒而隂促三十數三終竒陽節也二十數再終偶隂節也陽小成於隂大成於陽故二十而冠三十而娶隂小成於陽大成於隂故十五而笄二十而嫁也一􅀃春秋榖梁傳曰男二十五繫女十五許嫁感隂陽也陽數七隂數八男八􅀊毀齒女七􅀊毀齒陽數竒三三八二十四加一爲五而繫心也隂數偶再成十四四加一爲五故十五許嫁也各加一者明專一繫心所以繫心}
  - {type: page-break, offset: 3, content: '', id: KR3j0023_SBCK_009-2a}
  - {type: page-break, offset: 3, content: '', id: KR3j0023_SBCK_009-2b}
  - {type: variant, offset: 3, length: 1, content: 行, WYG: 隂陽之數備有相偶之志故禮記曰女子十五許嫁笄而字禮之稱字陰繫於陽所以專一之節也陽尊無所繫二十五繫者就陰節也陽舒而隂促三十數三終竒陽節也二十數再終偶陰節也陽小成於陰大成於陽故二十而冠三十而娶陰小成於陽大成於陰故十五而笄二十而嫁也一説春秋榖梁傳曰男二十五繫女十五許嫁感隂陽也陽数七隂􅂾八男八嵗毁齒女七嵗毁齒陽數竒三三八二十四加一為五而繫心也隂數偶再成十四四加一為五故十五許嫁也各加一者明專一繫心所以繫心}
