  - {type: punctuation, offset: 862, content: 《, id: KR3j0023_tls_010-bkkpn245}
  - {type: variant, offset: 862, length: 18, content: 王制曰受命于祖受成於學此言於祖廟命遣, SBCK: 號泣悲哀奔走道路者有居其國哭痛思慕竭盡所供以助䘮事者是四海之内咸悲臣下􅀂䘮考妣}
  - {type: variant, offset: 862, length: 0, content: '', WYG: 贈襚何謂也贈之為言稱也玩好曰贈襚之為言遺也衣被曰襚知死者則贈襚所以助生送死追恩重終副至意也贈賵者何謂也贈者助也所以相佐給不足也故弔辭曰知生則賻貨財曰賻車馬曰賵天子七日而殯諸侯五日而殯事有小大所供者不等故}
  - {type: variant, offset: 862, length: 18, content: 王制曰受命于祖受成於學此言於祖廟命遣, krp: 號泣悲哀奔走道路者有居其國哭痛思慕竭盡所供以助䘮事者是四海之内咸悲臣下若䘮考妣}
  - {type: punctuation, offset: 864, content: 》, id: KR3j0023_tls_010-bkkpn246}
