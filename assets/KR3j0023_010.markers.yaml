  - {type: variant, offset: 838, length: 0, content: '', SBCK: 曰崩大尊像崩之爲言崩伏強天下撫擊失神明􅀺庶殞涕海内悲凉諸侯曰薨國失陽薨之言奄也奄然亡也大夫曰卒精熠終卒卒之爲言終於國也士曰不禄失其忠節不忠終君之緑緑之言消也身消名彰庶人曰死魂去亡死之爲言澌精氣窮也崩薨紀於國何以爲有尊卑之禮謚號之制即有矣禮始於黄帝至堯舜而備易言復者據遂也書殂落死者矣各自見義堯皆㦧痛之舜見終各一也䘮者何謂也䘮者亡人死謂之䘮言其亡不可復得見也不直言䘮何爲孝子心不忍言尚書曰武王旣䘮䘮終曰死爲適室知據死者稱䘮也生者䘮痛之亦稱䘮禮曰䘮服斬衰易曰不封不樹䘮期無數孝經曰孝子之䘮親也是施生者也天子下至庶人俱言䘮何欲言身體髮膚俱受之父母其痛一也天子崩計告諸侯何縁臣子䘮君哀痛憤懣無能不告語人者也諸侯欲聞之又當持土地所出以供䘮事故禮曰天子崩}
  - {type: page-break, offset: 838, content: '', id: KR3j0023_SBCK_010-11a}
  - {type: page-break, offset: 838, content: '', id: KR3j0023_SBCK_010-11b}
  - {type: variant, offset: 838, length: 0, content: '', WYG: 曰崩大尊象崩之為言崩伏强天下撫擊失神明黎庶殞涕海内悲涼諸侯曰薨國失陽薨之言奄也奄然亾也大夫曰卒精熠終卒卒之為言終於國也士曰不禄失其忠節不忠終君之祿祿之言消也身消名彰庶人曰死魂去亾死之為言澌精氣竆也崩薨紀於國何以為有尊卑之禮謚號之制即有矣禮始於黄帝至堯舜而備易言復者據遂也書殂落死者矣各自見義堯皆憯痛之舜見終各一也䘮者何謂也䘮者亾人死謂之䘮言其亾不可復得見也不直言䘮何為孝子心不忍言尚書曰武王既䘮䘮終曰死為適室知據死者稱䘮也生者哀痛之亦稱䘮禮曰䘮服斬衰易曰不封不樹䘮期無數孝經曰孝子之䘮親也是施生者也天子下至庶人俱言䘮何欲言身體髪膚俱受之父母其痛一也天子崩訃告諸侯何緣臣子䘮君哀痛憤懣無能不告語人者也諸侯欲聞之又當持土地所出以供䘮事故禮曰天子崩}
