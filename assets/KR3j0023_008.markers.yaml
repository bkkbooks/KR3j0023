  - {type: variant, offset: 175, length: 3, content: 明什倍, WYG: 所宗也宗其為髙祖後者五世而遷者也髙祖遷於上宗則易於下宗其為曾祖後者為曾祖宗宗其為祖後者為祖宗宗其為父後者為父宗以上至髙祖宗皆為小宗以其轉遷别於大宗也别子者自為其子孫為祖繼别也各自為宗小宗有四大宗有一凡有五宗人之親所以備矣}
