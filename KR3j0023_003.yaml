body:
  text: 諡故禮郊特牲曰古者生無爵死無諡此言生有爵死當有諡也死乃諡之何詩云靡不有初鮮克有終言人行終始不能若一故據其終始後可知也士冠經曰死而諡之今也所以臨葬而諡之何因衆會欲顯揚之也故春秋曰公之喪至自乾侯昭公死於晉乾侯之地數月歸至急當未有諡也春秋曰丁巳葬戊午日下側乃克葬明祖載而有諡也諡者何謂也諡之為言引也引烈行之迹也所以進勸成德使上務節也黃帝先黃後帝者何古者順質死生之同稱各持特行合而言之美者在上黃帝始制法度得道之中萬世不易名黃自然也後世雖聖莫能與同也後世得與天同亦得稱帝不能立制作之時故不得復稱黃也諡或一言或兩言何文者以一言為諡質者以兩言為諡故尚書曰高宗殷宗也湯死後世稱成湯以兩言為諡也號無質文諡有質文何號者始也為本故不可變也周已後用意尤文以為本生時號令善故有善諡故舍合言文王武王也合言之則上其諡明別善惡所以勸人為善戒人為惡也帝者天號也以為堯猶諡顧上世質直死後以其名為號耳所以諡之為堯何為諡有七十二品禮記諡法曰翼善傳聖諡曰堯仁聖盛明諡曰舜慈惠愛民諡曰文剛強理直諡曰武天子崩大臣下至南郊諡之者何以為人臣之義莫不欲褒大稱其君掩惡揚善者也故之南郊明不得欺天也故曾子問孔子曰天子崩臣下之南郊告諡之諸侯薨世子赴告赴告於天子天子遣大夫會其葬而諡之何幼不誄長賤不誄貴諸侯相誄非禮也臣當受諡於君也卿大夫老歸死有諡何諡者別尊卑彰有德也卿大夫歸無過猶有祿位故有諡也夫人無諡者何無爵故無諡或曰夫人有諡夫人一國之母修閨門之內群下亦化之故設諡以彰其善惡春秋傳曰葬宗宋恭姬傳曰其稱諡何賢也傳曰哀薑者何莊公夫人也卿大夫妻命婦也無諡者何以賤也八妾所以無諡何亦以卑賤無所能務豫猶士卑小不得有諡也太子夫人無諡何本婦人隨夫太子無諡其夫人不得有諡也士冠經曰天子太子元士也士無諡知太子亦無諡也附庸所以無諡何卑小無爵也王制曰王者之制爵祿凡五等附庸不在其中明附庸本非爵也後后夫人於何所諡之以為於朝廷朝廷本所以治政之處臣子共審諡白之於君然後加之婦人大天夫故但白君而已何以知不之南郊也婦人本無外事何為於郊也禮曾子問曰唯天子稱天以誅誄之唯者獨也明天子獨於南郊耳顯號諡何法號法天也法日也日未出而明諡法地也法月也月已入有餘光也是以大行受大名細行受小名行生於己名生於人
