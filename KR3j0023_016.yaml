body:
  text: 災變天所以有災變何所以譴告人君覺悟其行欲令悔過修德深思慮也援神契曰行有玷點缺氣逆于干天情感變出以戒人也災異者何謂也春秋潛潭巴曰災之言為言傷也隨事而誅異之言怪為言怪也先發感動之也何以言災有哭也春秋曰新宮火三日哭傳曰必三日哭何禮也災三日哭所以然者宗廟先禮祖所處鬼神無形體曰今忽得天火得無為災所中乎故哭也變者何謂變者非常也樂稽耀嘉曰禹將受位天意火大變迅風靡木雷雨晝冥服乘妖者何謂也衣服乍大乍小言語非常故尚書大傳曰時則有服乘妖也孽者何謂也曰介蟲生為非常尚書大傳曰時則有介蟲之孽時則有龜孽堯遭洪水湯遭大旱示亦有譴告乎堯遭洪水湯遭大旱命運時然所以或災變或異何各隨其行因其事也霜之為言亡也陽以散云亡雹之為言合也陰氣專精積合為雹露者霜之始寒即變為霜日食者必殺救之何陰侵陽也鼓用牲于社社者衆陰之主以朱絲縈之鳴鼓攻之以陽責陰也故春秋春秋傳曰日有食之鼓用牲于社所以必用牲者社地別神也尊之故不敢虛責也日食大水則鼓於用牲於社大旱則雲雩祭未求雨非苟虛也非虛言也助陽責下求陰之道也月食救之者陰失明也故角尾交日月食救之者謂夫人擊鏡傳孺人擊杖庶人之妻楔搔太平之時時雨時霽不以恆暘而以時暘天地之氣宣也
