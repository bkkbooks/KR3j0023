  - {type: variant, offset: 668, length: 1, content: 誅, SBCK: 配中外相應故吉凶不同服歌哭不同聲所以表中誠也布衰裳麻絰蕭笄繩纓苴杖爲略反本絰者亦示也故揔而載之示有䘮也腰絰者以伐紳帶也所以結之何思慕腸􅀂結也必再結之何明思慕無已所以必杖者孝子失親悲哀哭泣三日不食身體嬴病故杖以扶身明不以死傷生也禮童子婦人不杖者以其不能病}
