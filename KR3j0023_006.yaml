body:
  text: 禮樂禮樂者何謂也禮之為言履也可履踐而行樂者樂也君子樂得其道小人樂得其欲王者所以盛禮樂何節文之喜怒樂以象天禮以法地人無不含天地之氣有五常之性者故樂所以蕩滌反其邪惡也禮所以防淫佚節其侈靡也故孝經曰安上治民莫善於禮移風易俗莫善於樂子曰樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之內父子兄弟同聽之則莫不和親故樂者所以崇和順比物飾節節奏合以成文所以合和和合父子君臣附親萬民也是先王立樂之意方也故聽其雅頌之聲志意得廣焉執干戚習俯仰屈信容貌得齊莊焉行其惙綴兆要其節奏行列得正焉進退得齊焉故樂者天地之命中和之紀人情之所不能免焉也夫樂者先王之所以飾喜也軍族鈇鉞所以先王之所以飾怒也故先王之喜怒皆得其齊焉喜則天下和之怒則暴亂者畏之先王之道禮樂可謂盛矣聞角聲莫不惻隱而慈者聞徵聲莫不喜養好施者聞商聲莫不剛斷而立事者聞羽聲莫不深思而遠慮者聞宮聲莫不溫潤而寬和者也禮所揖讓何所以尊人自損也揖讓則不爭論語曰揖讓而升下而飲其爭也君子故君使臣以禮臣事君以忠謙謙君子利涉大川以貴下賤大得民也屈己敬人君子之心故孔子曰為禮不敬吾何以觀之哉夫禮者陰陽之際也百事之會也所以尊天地儐鬼神序上下正人道也樂所以必歌者何夫歌者口言之也中心喜樂口欲歌之手欲舞之足欲蹈之故尚書曰前歌後舞假于上下禮貴忠何禮者盛不足節有餘使豐年不奢凶年不儉富貧貧富不相懸也樂尚雅何雅者古正也所以遠鄭聲也孔子曰鄭聲淫何鄭國土地民人山居谷浴男女錯雜為鄭聲以相悅懌故邪僻聲皆淫色之聲也太平乃制禮作樂何夫禮樂所以防奢淫天下人民飢寒何樂之乎防功成作樂治定制禮樂言作禮言制何樂者陽也陽動作倡始故言作也禮者陰也陰繫制度於陽故言制也樂象陽禮法陰也王者始起何用正民以為且用先王之禮樂天下太平乃更制作焉書曰肇修稱殷殷禮祀新邑此言太平去殷禮春秋傳曰昌曷何為不修乎近而修乎遠同己也可因先以太平也必復更制者示不襲也又天下樂之者樂者所以象德表功而殊名也禮記曰黃帝樂曰咸池顓頊樂曰六莖帝嚳樂曰五英堯樂曰大章舜樂曰簫韶禹樂曰大夏湯樂曰大護濩周樂曰大武象周公之樂曰酌合曰大武黃帝曰咸池者言大施天下之道而行之天之所生地之所載咸蒙德施也顓頊曰六莖者言和律曆以調陰陽莖者著萬物也帝嚳曰五英者言能調和五聲以養萬物調其英華也堯曰大章者大明天地人之道也舜曰簫韶者舜能繼堯之道也禹曰大夏者言禹能順二聖之道而行之故曰大夏也湯曰大護濩者言湯承衰能護民之急也周公曰酌合者言周公輔成王能斟酌文武之道而成之也武王曰象者象太平而作樂示已太平也合曰大武者天下始樂周之征伐行武故詩人歌之歌之曰王赫斯怒爰整其旅當此之時天下樂文王之怒以定天下故樂其武也周室中制象湯樂何殷紂為惡日久其惡最甚斫涉刳胎殘賊天下武王起兵前歌後舞剋殷之後民人大喜故中作所以節喜盛天子八佾諸侯四佾所以別尊卑樂者陽也故以陰數法八風六律四時也八風六律者天氣也助天地成萬物者也亦猶樂所以順氣變化萬民成其性命也故春秋公羊傳曰天子八佾諸公六佾諸侯四佾詩曰詩傳曰大夫士琴瑟御八佾者何謂也佾者列也以八人為行列八八六十四人也諸公六六為行諸侯四四為行諸公謂三公二王後大夫士北面之臣非專事子民者也故但琴瑟而已王者有六樂者貴公功美德也所以作供養謂傾先王之樂明有法示亡其本興己所以自作樂明作己也樂所以作四夷之樂何德廣及之也易曰先王以作樂崇德殷薦之上帝以配祖考詩云奏鼓簡簡衎我烈祖樂元語曰受命而六樂樂先王之樂明有法也與興其所自作明有制興四夷之樂明德廣及之也故南夷之樂曰兜西夷之樂曰禁北夷之樂曰昧東夷之樂曰離合觀歡之樂人舞於堂四夷之樂陳於右先王所以得之順命重始也王者之樂有先後者各尚其德也此言以人文得之先以文謂持羽毛儛也以武得之先以武謂持干戚儛也樂元語曰東夷之樂持矛舞助時生也南夷之樂持羽舞助時養也西夷之樂持戟舞助時煞也北夷之樂持干舞助時藏也誰制夷狄之樂以為先聖王也先王惟推行道德和調調和陰陽覆被夷狄故夷狄安樂來朝中國於是作樂樂之南之為言任也任養萬物味之為言昧也昧者萬物老衰衰老取晦昧之義也禁者萬物言萬物禁藏侏離者萬物微離地而生一説東方持矛南方歌西方戚北方擊金夷狄質不如中國中國文章但隨物名之耳故百王不易戚二王者制夷狄樂不制夷狄禮何以為禮者身當履而行也之夷狄之人不能行禮樂者聖人作為以樂之耳故有夷狄樂也殊誰為舞者以為使中國之人何以言之夷狄之人禮不備恐有過誤也作之門外者何夷在外故就之也夷狄無禮義故不不在內明堂記曰九夷之國在東門之外所以知不在門內也明堂記曰禹納蠻夷夷蠻之樂於太廟言納明有入也曰四夷之樂者何謂也以為四夷外無禮義之國數夷狄者從東故舉本以為之總名也言夷狄者舉終始也言蠻舉遠也言貉舉惡也則別之東方為九夷南方為八蠻西方為六戎北方為五狄故曾子問曰九夷八蠻六戎五狄百姓之難至者也何以知夷在東方禮王制曰東方曰夷被髮文身又曰南方曰蠻雕題交趾西方曰戎被髮衣皮北方曰狄衣羽毛穴居東所以九何有九者何蓋來者過過者九九之為言究也德遍究故應德而來亦九也非故為之道自然也何以名為夷蠻曰聖人本不治外國非為制名也因其國名而言之耳一説曰名其短而為之制名也夷者僔狄夷無禮義東方者少陽易化故取名也北方太陰鄙郤故少蠻蟲難化蠻者執心違邪戎者強惡也狄者易也言辟易無別也歌者在堂上舞在堂下何歌者象德舞者象功君子上德而下功郊特牲曰歌者在上論語曰季氏八佾舞於庭書曰下管鞀鼓笙鏞以間降神之樂在上何為鬼神舉也故書曰戛擊鳴球搏拊琴瑟以詠祖考來格何所以用鳴球搏拊者何鬼神清虛貴淨賤鏗鏘也故尚書大傳曰搏拊鼓振裝以秉粳琴瑟練絲朱絃鳴者貴玉聲也王者食所以有樂何樂食天下之太平富積之饒也明天子至尊非功不食非德不飽故傳曰天子食時日舉樂王者所以日四食者何明有四方之物食四時之功也四方不平四時不順有徹樂之法焉所以明至尊著法戒也焉王者平居中央制御四方平旦食少陽之始也晝食太陽之始也晡餔食少陰之始也暮食太陰之始也論語曰亞飯干適楚三飯繚適蔡四飯缺適秦諸侯三飯卿大夫再飯尊卑之差也弟子職曰暮食士偃復禮士也食力無數庶人職在耕桑戮僇力勞役飢即食飽即作故無數聲音者何謂何謂也聲者鳴也聞其聲即知其所生音者飲也言其剛柔清濁和而相飲也尚書曰豫欲聞六律五聲八音五聲者何謂也宮商角徵羽土謂宮金謂商木謂角火謂徵水謂羽月令曰盛德在木其音角又曰盛德在火其音徵盛德在金其音商盛德在水其音羽所以名之為角者何角者躍也陽氣動躍徵者止也陽氣止商者張也陰氣開張陽氣始降也羽者紆也陰氣在上陽氣在下宮者容也含也含容四時者也八音者何謂也樂記曰土曰塤竹曰管皮曰鼓匏曰笙絲曰絃弦石曰磬金曰鐘木曰柷敔此謂八音也法易八卦也萬物之數也八音萬物之聲也所以天子所以用八音何天子承繼萬物當知其數既得其數當知其聲即思其形如此蜎飛蠕動無不樂其音者至德之道也天子樂之故樂用八音樂記曰塤坎音也管艮音也鼓震音也絃弦離音也鐘兌音也柷敔乾音也塤在十一月塤之為言勳熏也陽氣於黃泉之下勳熏蒸而萌匏之言施也牙也在十二月萬物始施而勞牙笙者太蔟之氣也象萬物之生也故曰笙有七正政之節焉有六合之和焉天下樂之故謂之笙鼓震音煩氣也萬物憤悶震動而生出雷以動之溫以暖之風以散之雨以濡之奮至德之聲感和平之氣也同聲相應同氣相求神明報應天地祐之其本乃在萬物之始耶故謂之鼓也鞀者震之氣也上應卯昴星以通王五道故謂之鞀也簫者中呂之氣也萬物生於無聲見於無形僇也簫肅也故謂之簫簫者以祿為本言承天繼物為民本人力加地道化然後萬物戮也故謂之簫也瑟者嗇也間閉也所以懲忽忿窒欲正人之德也故曰瑟有君父之節臣子之法宮商角則宜君父有節臣子有義然後四時和四時和然後萬物生故謂之瑟也琴者禁也所以禁止淫邪正人心也磬者夷則之氣也象萬物之盛成也其氣磬故曰磬有貴賤焉有親疏有長幼焉朝廷之禮貴不讓賤所以有明尊卑也鄉黨之禮長不讓幼所以明有年也宗廟之禮親不讓式所以有親也所以明有親也此三者行然後王道得王道得然後萬物成天下樂之故樂用磬也鐘之為言動也陰氣用事萬物動成鐘為氣用金聲也鎛者時之氣聲也節度之所生也君臣有節度則萬物昌無節度則萬物亡亡與昌正相迫故謂之鎛柷敔者終始之聲萬物之所生也陰陽順而復故曰柷承順天地序迎萬物天下樂之故樂用柷柷始也敔終也一説笙柷鼓簫瑟琴塤鐘磬也如其次笙在北方柷在東北方鼓在東方簫在東南方琴在南方塤在西南方鐘在西方磬在西北方聲五音八何聲為本出於五行音而末象八風故樂記曰聲成文謂之音知音而樂之謂之樂也問曰異説並行則弟子疑焉孔子有言吾聞擇其善者而從之多見而志之也知之次也文武之道未墜於地天之將喪斯文也樂亦在其中矣聖人之道猶有文質所以據擬其説述所聞者亦各傳其所受而已
