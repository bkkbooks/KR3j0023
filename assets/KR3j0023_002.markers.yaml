  - {type: variant, offset: 418, length: 1, content: 敬, SBCK: 尊天地儐􅀑神序上下正人道也樂所以必歌者何夫歌者口言之也中心喜樂口欲歌之手欲舞之足欲蹈之故尚書曰前歌後舞假于上下禮貴忠何禮者盛不足節有餘使豐年不奢凶年不儉冨貧不相懸也樂尚雅雅者古正也所以逺鄭聲也孔子曰鄭聲淫何鄭國土地民人山居谷浴男女錯􅄂爲鄭聲以相恱懌故邪僻聲皆淫色之聲也太平乃制禮作樂何夫禮樂所以防奢淫天下人民飢寒何樂之乎功成作樂治定制禮樂言作禮言制何樂者陽也陽倡始故言作禮者隂也隂制度於陽故言制樂象陽禮法隂也王者始起何用正民以爲且用先王之禮樂天下太平乃更制作焉書曰肇修殷殷禮祀新邑此言太平去殷禮春秋傳曰昌何爲不修乎近而修乎逺同巳也可因先以太平也必復更制者示不襲也又天下樂之者樂者所以象德表功殊名禮記曰黄帝樂曰咸池顓頊樂曰六莖帝嚳樂曰五英堯樂曰大章舜樂曰簫韶禹樂曰大夏湯樂曰大護周樂曰大武象周公之樂曰酌合曰大武黄帝曰咸池者言大施}
