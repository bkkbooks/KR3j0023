body:
  text: 情性情性者何謂也性者陽之施情者陰之化也人稟陰陽氣而生故內懷五性六情情者靜也性者生也此人所稟六氣以生者也故鉤命決曰情生於陰欲以時念也性生於陽以理也陽氣者仁陰氣者貪故情有利欲性有仁也五常性者何謂仁義禮智信也仁者不忍也施好生愛人也義者宜也斷決得中也禮者履也履道成文也智者知也獨見前聞不惑於事見微知者著也信者誠也專一不移也故人生而應八卦之體得五氣以為常仁義禮智信是也六情者何謂也喜怒哀樂愛惡謂六情所以扶成五性性所以五情所以六者何人本含六律五行之氣而生故內有五藏六府此情性之所由出入也樂動聲儀曰官有六府人有五藏五藏者何也謂肝心肺腎脾也肝之為言干也肺之為言費也情動得序心之為言任也任於恩也腎之為言寫也以竅寫也脾之為言辨也所以積精稟氣也五藏肝仁肺義心禮腎智脾信也肝所以仁者何肝木之精也仁者好生東方者陽也萬物始生故肝象木色青而有枝葉目為之候何目能出淚而不能內物木亦能出枝葉不能有所內也肺所以義者何肺者金之精義者斷決西方亦金殺成萬物也故肺象金色白也鼻為之候何鼻出入氣高而有竅山亦有金石纍積亦有孔穴出雲布雨以潤天下雨則雲消鼻能出納氣也心所以為禮何心火之精也南方尊陽在上卑陰在下禮有尊卑故心象火色赤而鋭也人有道尊天本在上故心下鋭也耳為之候何耳能遍插內外別音語火照有似於禮上下分明腎所以智何腎者水之精智者進而不止無所疑惑水亦進而不惑北方水故腎色黑水陰故腎雙竅為之候何竅能瀉水亦能流濡脾所以信何脾者土之精也土尚任養萬物為之象生物無所私信之至也故脾象土色黃也口為之候何口能啖嘗舌能知味亦能出音聲吐滋液故元命苞曰目者肝之使肝者木之精蒼龍之位也鼻者肺之使肺者金之精制割立斷耳者心之候心者火之精上為張星陰者腎之寫腎者水之精上為虛危口者脾之門戶脾者土之精上為北斗主變化者也或曰口舌者心之候耳者腎之候或曰肝繫於目肺繫於鼻心繫於口脾繫於舌腎繫於耳六府者何謂也謂大腸小腸胃膀胱三焦膽也府者為五藏宮府也故禮運記曰六情所以扶成五性也胃者脾之府也脾主稟氣胃者穀之委也故脾稟氣也膀胱者腎之府也腎者主瀉膀胱常能有熱故先決難也三焦者包絡府也水穀之道路氣之所終始也故上焦若竅中焦若編下焦若瀆膽者肝之府也肝者木之精也主仁仁者不忍故以膽斷也是以肝膽二仁者必有勇也肝膽異趣何以知相為府也肝者木之精也木之為言牧也人怒無不色青目脤張者是其效也小腸大腸心肺之府也主禮義禮義者有分理腸之亦大小相承受也腸為心肺主心為皮支體主故為兩府也目為心視口為心談耳為心聽鼻為心嗅是其支體主也喜在西方怒在東方好在北方惡在南方哀在下樂在上何以西方萬物之成故喜東方萬物之生故怒北方陽氣始施故好南方陰氣始起故惡上多樂下多哀也魂魄者何謂也魂猶傳傳也行不休也少陽之氣故動不息於人為外也主於情也魄者猶迫然著人也此少陰之氣象金石著人不移主於性也魂者藝也情以除穢魄者白也性以治內精神者何謂也精者靜也太陰施化之氣也象火水之化須待任生也神者恍惚太陰陽之氣也出入無間棇總云支體萬化之本也
