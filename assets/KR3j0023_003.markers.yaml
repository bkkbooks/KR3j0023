  front:
  - {type: variant, offset: 0, length: 1, content: 謚, SBCK: 白虎通德論卷第三臣班固纂集封公侯王者所以立三公九卿何曰天雖至神必因日月之光地雖至靈必有山川之化聖人雖有萬人之德必須俊賢三公九卿二十七大夫八十一元士以順天成其道司馬主兵司徒主人司空主地王者受命爲天地人之職}
  - {type: page-break, offset: 0, content: '', id: KR3j0023_SBCK_003-1a}
  - {type: variant, offset: 0, length: 1, content: 謚, WYG: 封公侯王者所以立三公九卿何曰天雖至神必因日月之光地雖至靈必有山川之化聖人雖有萬人之徳必須俊賢三公九卿二十七大夫八十一元士以順天成其道司馬主兵司徒主人司空主地王者受命為天地人之職}
