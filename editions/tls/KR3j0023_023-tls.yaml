body:
  text: 聖人聖人者何聖者通也道也聲也道無所不通明無所不照聞聲知情與天地合德日月合明四時合序鬼神合吉凶禮別名記曰五人曰茂十人曰選百人曰俊千人曰英倍英曰賢萬人曰傑萬傑曰聖聖人未沒時寧知其聖乎曰知之論語曰太宰問子貢曰夫子聖者歟孔子曰太宰知我乎聖人亦自知聖乎曰知之孔子曰文王既沒文不在茲乎何以知帝王聖人也易曰古者伏羲氏之王天下也於是始作八卦又曰聖人之作易也又曰伏羲氏沒神農氏作神農氏沒黃帝堯舜氏作文俱言作明皆聖人也論語曰聖乎堯舜其由病諸何以言禹湯聖人論語曰巍巍乎舜禹之有天下而不預與焉與舜比方巍巍知禹湯聖人春秋傳曰湯以聖盛德故放桀何以言文王武王周公皆聖人詩曰文王受命非聖不能受命易曰湯武革命順乎天湯武與文王比方孝經曰則周公其人也下言夫聖人之德又何以加於孝乎何以言皋陶聖人也以自篇曰若稽古皋陶聖人而能為舜陳道朕言惠可底行又旁施象刑維明又聖人皆有表異異表傳曰伏羲日祿衡連珠唯大目鼻山准龍伏狀作易八卦以應樞黃帝龍顏得天匡陽上法中宿取象文昌顓頊戴午干是謂清明發節移度蓋象招搖帝嚳駢齒上法月參康度成紀取理陰陽堯眉八彩是謂通明曆歷象日月璇璣玉衡舜重瞳子是謂玄景上應攝提以象三光禮曰禹耳三漏是謂大通興利除害決河疏江皋陶鳥馬喙是謂至誠決獄明白察於人情湯臂三肘是謂柳翼攘去不義萬民蕃咸息文王四乳是謂至仁天下所歸百姓所親武王望羊是謂攝揚盱目陳兵天下富昌周公背僂是謂強俊成就周道輔於幼主孔主反宇是謂尼甫立德澤所與興藏元通流聖人所以能獨見前與神通精者蓋皆天所生也
