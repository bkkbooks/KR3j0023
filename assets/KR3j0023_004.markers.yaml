  - {type: variant, offset: 401, length: 0, content: '', SBCK: 不爲臣隠何以爲君之於臣無適無莫義之與比賞一善而衆臣勸罰一惡而衆臣懼􅀂爲卑隠爲不可殆也故尚書曰必力賞罰以定厥功諸侯臣對天子亦爲隠乎然本諸侯之臣今來者爲聘問天子無恙非爲告君之惡來也故孝經曰將順其美匡救其惡故上下治能相親也君不爲臣隠父獨爲子隱何以爲父子一體而分榮耻相及故論語曰父爲子隠子爲父隠直在其中矣兄弟相爲隠乎曰然與父子同義故周公誅四國常以禄甫爲主也朋友相爲隠者人本接朋結友爲欲立身􅀭名也朋友之道四焉通財不在其中近則正之逺則稱之樂則思之患則死之夫妻相爲隠乎傳曰曽去妻􅀺蒸不熟問曰婦有七出不蒸亦預乎曰吾聞之也絶交令可友弃妻令可嫁也􅀺蒸不熟而巳何問其故乎此爲隠之也郷射天所以以親射何助陽氣逹萬物也春氣微弱􅂲物有窒塞不能自逹者夫射自内發外貫堅入剛象物之生故以射逹之也含文嘉曰天子射熊諸侯射麋大夫射虎豹士射鹿豕天子所以射熊何示服猛巧侫也熊爲獸猛巧者非但當服猛也示當服天下巧侫之臣也諸侯射糜者示逹迷惑人也麋之言迷也大夫射虎豹者示服猛也士射鹿豕者示除害也各取德所能服也大夫士兩射者人臣示爲君親視事身勞苦也或曰臣隂故數偶也􅀱者以布爲之何用人事之始也本正則未正矣所以名爲候何明諸侯有不朝者則射之故禮射祝曰嗟爾不寕候爾不朝于王所以故天下失業亢而射爾所以不射正身何君子重同􅀋不忍射之故晝獸而射之射主何爲乎曰射義非一也夫射者執弓堅固}
