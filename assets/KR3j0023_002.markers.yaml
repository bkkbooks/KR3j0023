  - {type: variant, offset: 5, length: 1, content: 號, SBCK: 俱有土之君禮記三正曰王者二社爲天下立禮曰太社自爲立社曰王社諸侯爲百姓立社曰國社自爲立社曰侯社太社爲天下報功王社爲京師報功太社尊於王社土地乆故而報之王者諸侯必有誡社何示有存亡}
