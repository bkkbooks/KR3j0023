body:
  text: 三綱六紀三綱者何謂也謂君臣父子夫婦也六紀者謂諸父兄弟族人諸舅師長朋友也故含文嘉曰君為臣綱父為子綱夫為妻綱又曰敬諸父兄六紀道行諸舅有義族人有序昆弟有親師長有尊朋友有舊何謂綱紀綱者張也紀者理也大者為綱小者為紀所以強張理上下整齊人道也人皆懷五常之性有親愛之心是以紀綱為化若羅網之有紀綱而萬目張也詩云亹亹我王綱紀四方君臣父子夫婦六人也所以稱三綱何一陰一陽謂之道陽得陰而成陰得陽而序剛柔相配故六人為三綱三綱法天地人六紀法六合君臣法天取象日月屈信歸功天也父子法地取象五行轉相生也夫婦法人取象六人合陰陽有施化端也六紀者為三綱之紀者也師長君臣之紀也以其皆成己也諸父兄弟父子之紀也以其有親恩連也諸舅朋友夫婦之紀也以其皆有同志為紀己助也父子者何謂也父者矩也以法度教子也子者孳也孳孳無已也故孝經曰父有爭子則身不陷於不義夫婦者何謂也夫者扶也以道扶接也婦者服也以禮屈服也昏禮曰夫親脫婦之纓傳曰夫婦判合也朋友者何謂也朋者黨也友者有也禮記曰同門曰朋同志曰友朋友之交近則謗其言遠則不相訕一人有善其心好之一人有惡其心痛之貨則通而不計共憂患而相救生不屬死不託故論語曰子路云願車馬衣輕裘與朋友共敝之又曰朋友無所歸生於我乎館死於我乎殯朋友之道親存不得行者二不得許友以其身不得專通財之恩友飢則白之於父兄父兄許之乃稱父兄與之不聽即止故曰友飢為之減餐友寒為之不重裘故論語曰有父兄在如之何其聞斯行之也男稱兄弟女稱姊妹何男女異姓故別其稱也何以言之禮親屬記曰男子先生稱兄後生稱弟女子先生為姊後生為妹父之昆弟不俱謂之世叔父之女昆弟俱謂之姑何也以為諸父曰內親也故別稱之也姑當外適人故總言之也至姊妹亦當外適人所以別諸姊妹何以為事諸姑禮等可以外出又同故稱略也至姊妹雖欲有略之姊尊妹卑其禮異也詩云問我諸姑遂及伯姊謂之舅姑者何舅者舊也姑者故也舊故之者老人之稱也謂之姊妹何姊者恣咨也妹者末也謂之兄弟何兄者況也況父法也弟者悌也心順行篤也稱夫之父母謂之舅姑何尊如父而非父者舅也親如母而非母者姑也故稱夫之父母為舅姑也
