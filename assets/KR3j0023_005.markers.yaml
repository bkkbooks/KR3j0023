  - {type: variant, offset: 129, length: 6, content: 月擇元日命人, SBCK: 中也即如是舜葬蒼梧禹葬㑹稽于時尚質故死則止葬不重煩擾也何以知太平乃廵狩以武王不廵狩至成王乃廵狩岳者何謂也岳之爲言桶桶功徳東方爲岱宗者言萬物更相代於東方也南方霍山者霍之爲言護也言萬物護也太陽用事護養萬物也西方爲華山者華之爲言穫也言萬物成熟可得穫也北方爲􅁪山􅁪者常也萬物伏藏於北方有常也中央爲嵩山言其後大之也故尚書大傳曰五岳謂岱山霍山華山􅁪山嵩山也謂之瀆何瀆者濁也中國垢濁發源東注海其功着大故稱瀆也爾雅云江河淮濟爲四瀆也考黜諸侯所以考黜何王者所以勉賢抑惡重}
  - {type: page-break, offset: 129, content: '', id: KR3j0023_SBCK_005-7a}
