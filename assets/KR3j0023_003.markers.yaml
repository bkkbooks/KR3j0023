  - {type: variant, offset: 720, length: 2, content: 附庸, krp: 公卿大夫皆食菜者示與民同有無也五行五行者何謂也謂金木水火土也言行者欲言爲天行氣之義也地之承天猶妻之事夫臣之事君也謂其位卑卑者親事故自周於一行尊於天也尚書一曰水二曰火三曰木四曰金五曰土水位在北方北方者隂氣在黄泉之下任飬萬物水之爲言淮也隂化沾濡任生木木在東方東方者隂陽氣始動萬物始生木之爲言觸也陽氣動躍火在南方南方者陽在上萬物垂枝火之爲言委随也言萬物布施火之爲言化也陽氣用事萬物變化也金在西方西方者隂始起萬物禁止金之爲言禁也土在中央者主吐含萬物土之爲言吐也何知東方生樂記曰春生夏長秋收冬蔵土}
  - {type: variant, offset: 724, length: 0, content: '', SBCK: 不名時地土别名也比於五行最尊故不自居部職也元命包曰土之爲位而道在故大不預化人主不任部職五行之性或上或下何火者陽也尊故上水者隂也卑故下水者少陽金者少隂有中和之性故可曲可直􅀙革土者最大苞含物將生者出者將歸者不嫌清濁爲萬物尚書曰水曰潤下火曰炎上木曰曲直金曰􅀙革土爰稼穡五行所以二陽三隂何土尊尊者配天金木水火隂陽自偶水味所以醎何是其性也所以北方醎者萬物醎與所以堅之也猶五味得醎乃堅也木味所以酸者何東方萬物之生也酸者以逹生也猶五味得酸乃逹也火味所以苦何南方主長飬苦者所以長飬也猶五味須苦可以飬也金味所以􅉝何西方煞傷成物辛所以煞傷之也猶五味得辛乃委煞也土味所以甘何中央者中和也故甘猶五味以甘爲主也尚書曰潤下作醎炎上作苦曲直作酸􅀙革作辛稼穡作甘北方其臰朽者何北方水萬物所幽蔵也又水者受垢濁故臰腐朽也東方者木也萬物新出地中故其臭羶南方者水也盛陽承動故其臭焦西方者金也萬物成熟始復諾故其臭腥中央土也主飬故其臭香也月令曰東方其臭羶南方其臭焦中央其臭香西方其臭腥北方其臭朽所以名之爲東方者動方也萬物始動生也南方者任飬之方萬物懐任也西方者遷方也萬物遷落也北方者伏方也萬物伏蔵也少陽見寅寅者演也律中大簇律之言率所以率氣令生也卯者茂也律中夾鍾衰於辰辰震也律中姑洗其日甲乙者萬物孚甲也乙者物蕃屈有節欲出時爲春春之爲言偆偆動也位在東方其色青其音角角者氣動耀也其帝太皥皥者大起萬物擾也其神勾芒者物之始生其精青龍芒之爲言萌也隂中陽故太陽見於巳巳者物必起律中仲吕壯盛於午午物滿長律中􅅋賔衰於未未味也律中林鍾其日丙丁者其物炳明丁者強也時爲夏夏之言大也位在南方其色赤其音徴徴止也陽度極也其帝炎帝者太陽也其神祝融祝融者属續其精爲鳥離爲鸞故少隂見於申申者身也律中夷則壯於酉酉者老物収歛律中南吕衰於戌戌者㓕也律中}
