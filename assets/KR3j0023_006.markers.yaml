  - {type: variant, offset: 2449, length: 899, content: 聞六律五聲八音五聲者何謂也宮商角徵羽土謂宮金謂商木謂角火謂徵水謂羽月令曰盛德在木其音角又曰盛德在火其音徵盛德在金其音商盛德在水其音羽所以名之為角者何角者躍也陽氣動躍徵者止也陽氣止商者張也陰氣開張陽氣始降也羽者紆也陰氣在上陽氣在下宮者容也含也含容四時者也八音者何謂也樂記曰土曰塤竹曰管皮曰鼓匏曰笙絲曰絃弦石曰磬金曰鐘木曰柷敔此謂八音也法易八卦也萬物之數也八音萬物之聲也所以天子所以用八音何天子承繼萬物當知其數既得其數當知其聲即思其形如此蜎飛蠕動無不樂其音者至德之道也天子樂之故樂用八音樂記曰壎坎音也管艮音也鼓震音也絃弦離音也鐘兌音也柷敔乾音也壎在十一月壎之為言勳熏也陽氣於黃泉之下勳熏蒸而萌匏之言施也牙也在十二月萬物始施而勞牙笙者太蔟之氣也象萬物之生也故曰笙有七正政之節焉有六合之和焉天下樂之故謂之笙鼓震音煩氣也萬物憤懣震動而生出雷以動之溫以煖之風以散之雨以濡之奮至德之聲感和平之氣也同聲相應同氣相求神明報應天地祐之其本乃在萬物之始耶故謂之鼓也鞀者震之氣也上應卯昴星以通王五道故謂之鞀也簫者中呂之氣也萬物生於無聲見於無形僇也簫肅也故謂之簫簫者以祿為本言承天繼物為民本人力加地道化然後萬物戮也故謂之簫也瑟者嗇也閑閉也所以懲忽忿窒欲正人之德也故曰瑟有君父之節臣子之法宮商角則宜君父有節臣子有義然後四時和四時和然後萬物生故謂之瑟也琴者禁也所以禁止淫邪正人心也磬者夷則之氣也象萬物之盛成也其氣磬故曰磬有貴賤焉有親疏有長幼焉朝廷之禮貴不讓賤所以有明尊卑也鄉黨之禮長不讓幼所以明有年也宗廟之禮親不讓式所以有親也所以明有親也此三者行然後王道得王道得然後萬物成天下樂之故樂用磬也鐘之為言動也陰氣用事萬物動成鐘為氣用金聲也鎛者時之氣聲也節度之所生也君臣有節度則萬物昌無節度則萬物亡亡與昌正相迫故謂之鎛柷敔者終始之聲萬物之所生也陰陽順而復故曰柷承順天地序迎萬物天下樂之故樂用柷柷始也敔終也一說笙柷鼓簫瑟琴塤鐘磬也如其次笙在北方柷在東北方鼓在東方簫在東南方琴在南方塤在西南方鐘在西方磬在西北方聲五音八何聲為本出於五行音而末象八風故樂記曰聲成文謂之音知音而樂之謂之樂也問曰異說並行則弟子疑焉孔子有言吾聞擇其善者而從之多見而志, SBCK: 留供養}
