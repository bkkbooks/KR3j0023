  - {type: variant, offset: 837, length: 1, content: 唯, SBCK: 施也不娶同姓何法法五行異􅀋乃相生也子䘮父母何法法木不見水則憔悴也䘮三年何法法三年一閏天道終也父䘮子夫䘮妻何法法一􅀊物有終始天氣亦爲之變也年六十閉房何法法六月陽氣衰也人有五蔵六府何法法五行六合也人目何法法日月明也日照晝月照夜人目所不更照何法目亦更用事也王}
