  - {type: variant, offset: 2962, length: 0, content: '', SBCK: 者重人倫防􅁋泆恥與禽獸同也論語曰君娶於呉爲同姓謂之呉孟子曲禮曰買妾不知姓則卜之外属小功巳上亦不得娶也以春秋傳曰譏娶母黨也王者嫁女必使同姓諸侯主之}
