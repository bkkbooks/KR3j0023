  - {type: variant, offset: 359, length: 0, content: '', SBCK: 皆爲重民而求巳失也禮保傳曰於是立進善之旍懸誹謗之木建招諫之鼓王法立史記事者以爲臣下之儀様人之所取法則也動則當應禮是以必有記過之史徹膳之宰禮玉藻曰動則左史書之言則右史書之禮保傳曰王失度則史書之士誦之三公進讀之宰夫徹其膳是以天子不得爲非故史之義不書則死宰不徹膳亦死所以謂之史}
