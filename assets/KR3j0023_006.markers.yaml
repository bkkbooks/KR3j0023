  - {type: punctuation, offset: 1333, content: 「, id: KR3j0023_tls_006-bkkpn412}
  - {type: variant, offset: 1336, length: 219, content: 作樂崇德殷薦之上帝以配祖考詩云奏鼓簡簡衎我烈祖樂元語曰受命而六樂樂先王之樂明有法也與興其所自作明有制興四夷之樂明德廣及之也故南夷之樂曰兜西夷之樂曰禁北夷之樂曰昧東夷之樂曰離合觀歡之樂人舞於堂四夷之樂陳於右先王所以得之順命重始也王者之樂有先後者各尚其德也此言以人文得之先以文謂持羽毛儛也以武得之先以武謂持干戚儛也樂元語曰東夷之樂持矛舞助時生也南夷之樂持羽舞助時養也西夷之樂持戟舞助時煞也北夷之樂持干舞助時藏也誰制夷狄之樂以為先聖王也先王惟推, SBCK: 至日閉􅀜啇旅不}
