  - {type: variant, offset: 14, length: 161, content: 可履踐而行樂者樂也君子樂得其道小人樂得其欲王者所以盛禮樂何節文之喜怒樂以象天禮以法地人無不含天地之氣有五常之性者故樂所以蕩滌反其邪惡也禮所以防淫佚節其侈靡也故孝經曰安上治民莫善於禮移風易俗莫善於樂子曰樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之內父子兄弟同聽之則莫不和親故樂者所以崇和順比, SBCK: 養}
