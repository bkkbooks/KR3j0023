  - {type: variant, offset: 230, length: 1, content: 邑, SBCK: 秋冬時者期也隂陽消息之期也四時天異名何天尊各據其盛者爲名也春秋物變盛冬夏氣變盛春曰蒼天夏曰昊天秋曰旻天冬爲上天爾雅曰一􅀃春爲蒼天等是也四時不隨正朔變何以爲四時據物爲名春當生冬當終皆以正爲時也或言歳或言載或言年何言歳者以紀氣物帝王共之據曰爲􅀊春秋曰元年正月十有二月朔有朔有晦知據月斷爲言年載之言成也載成萬物終始言之也二帝爲載三王言年皆}
