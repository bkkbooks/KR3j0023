  body:
  - {type: variant, offset: 1, length: 1, content: 樂, SBCK: 義所能化故不臣也春秋傳曰夷狄相誘君子不疾尚書大傳曰正朔所不加即君子所不臣也王者有蹔不臣者五謂祭尸受授之師將師用兵三老五更不臣祭尸者方與尊者配也不臣受授之師者尊師重道欲使極陳天人之意也故}
