markers:
  front:
  - {type: variant, offset: 0, length: 0, content: '', SBCK: 白虎通德論卷第九臣班固纂集嫁娶人道所以有嫁娶何以爲情性之大莫􅀂男女男女之交人情之始莫􅀂夫婦易曰天地氤氲萬物化淳男女稱精萬物化生人承天地施隂陽故設嫁娶之禮者重人倫庻繼嗣也禮保傳記曰謹爲子嫁娶必擇世有仁義者禮男娶女嫁何隂卑不得自專就陽而成之故傳曰陽倡隂和男行女隨男不自專娶女不自專嫁必由父母湏媒妁何逺恥防􅁋泆也詩云娶妻如之何必告父母又曰娶妻如之何匪媒不得男三十而娶女二十而嫁陽數竒隂數偶男長女㓜者陽舒隂促男三十䈥骨堅強任爲人父女二十肌膚充盛任爲人母合爲}
