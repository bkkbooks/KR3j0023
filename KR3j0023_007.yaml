body:
  text: 封公侯王者所以立三公九卿何曰天雖至神必因日月之光地雖至靈必有山川之化聖人雖有萬人之德必須俊賢三公九卿二十七大夫八十一元士以順天成其道司馬主兵司徒主人司空主地王者受命為天地人之職故八分職以置三公各主其一以效其功一公置三卿故九卿也天道莫不成於三天有三光日月星地有三形高下平人有三尊君父師故一公三卿佐之一卿三大夫佐之一大夫三元士佐之天有三光然後而能遍照各自有三法物成於三有始有中有終明天道而終之也三公九卿二十士七大夫八十一元士凡百二十官下應十二子別名記曰司徒典民司空主地司馬順天天者施生所以主兵何兵者為諸謀除害也所以全其生衛其養也故兵稱天寇賊猛獸皆為除害者所主也論語曰天下有道則禮樂征伐自天子出司馬主兵不言兵而言馬者馬陽物乾之所為行兵用焉不以傷害為度文故言馬也司徒主人不言徒人而言徒者徒衆也重民衆司空主土不言土而言空者空尚主之何況於實乎以微見著王者主立三公九卿二十七大夫足以教道照幽隱必復封諸侯何重民之至也善惡比而易故知知故擇賢而封之使治其民以著其德極其才上以尊天子備蕃輔下以子養百姓施行其道開賢者之路謙不自專故列土封賢因而象之象賢重民也州伯州伯者何謂也伯長也選擇賢良使長一州故謂之伯也王制曰千里之外設方伯五國以為屬屬有長十國以為連連有率三十國以為卒卒有正二百一十國以為州州有伯唐虞謂之牧者何尚質使大夫往來牧視諸侯故謂之牧旁立三人凡十二人尚書曰咨十有二牧何知堯時十有二州也以禹貢言九州也王者所以有二伯者分職而授政欲其亟成也王制曰八伯各以其屬屬於天子之老二人分天下以為左右曰二伯詩云蔽芾甘棠勿剪翦勿伐邵召伯所茇春秋公羊傳曰自陝已東周公主之自陝已西邵召公主之不分南北何東方被聖人化日少西方被聖人化日久故分東西使聖人主其難者賢者主其易者乃俱到致太平也又欲令同有陰陽寒暑之節共法度也所分陝者是國中也若言面八百四十國矣諸侯有三卿者分三事也五大夫者下天子王制曰大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君大夫悉同禮王度記曰子男三卿一卿命於天子諸侯封不過百里象雷震百里所潤雲雨同也雷者陰中之陽也諸侯象也焉諸侯比王者為陰南面賞罰為陽法雷也七十里五十里差德功也故王制曰凡四海之內九州州方千里建百里之國二三十七十里之國六十五十里之國百有二十名山大澤不以封其餘以為附庸間田天子所治方千里此平土三千并數邑居山川至五十里名山大澤不以封者與百姓共之不使一國獨專也山木之饒水泉之利千里相通所以均有無贍其不足制土三等何因土地有高下中三等王者即位先封賢者憂人之急也故列土為疆非為諸侯張官設府非為卿大夫皆為民也易曰利建侯此言因所利故立之樂記曰武王克殷反商下車封夏后氏之後於杞投殷人之後於宋封王子比干之墓釋箕子之囚天下太平乃封親屬者示不私也即不私封之何普天之下莫非王土率土之賓莫非王臣海內之衆已盡得使之不忍使親屬無短足之居一人使封之親親之義也以尚書封康叔據平安也王者始起封諸父昆弟示與己共財之義故可與以共土也一說諸父不得封諸侯二十世國厚有功象賢以為民也賢者子孫類多賢又卿不世位為其不子愛百姓各加一功以虞樂其身也受命不封子者父子手足無分離異財之義至昆弟皮支體有分別故封之也以舜封弟象有比之野也封諸侯以夏何陽氣盛養故封諸侯盛成養賢也封立人君陽德之盛者也月令曰孟夏之月行賞封諸侯慶賜無不欣悅何以言諸侯繼世以立諸侯象賢也大夫不世位何股肱之臣任事者也為其專權擅勢傾覆國家又白曰孫苟中庸不任輔政妨塞賢故不世世故春秋公羊傳曰譏世卿世卿非禮也諸侯世位大夫不世安法所以諸侯南面之君體陽而行陽道不絶大夫人臣北面體陰而行陰道有絶以男生內嚮有留家之義女生外嚮有從夫之義意此陽不絶陰有絶之效也國君在立太子者所以防篡煞壓臣子之亂也春秋之義弒太子罪與弒君同春秋曰弒其君之子奚齊言君者明與弒君同也君薨適夫人無子有育遺腹必待其産立之何尊適重正也曾子問曰立適以長不以賢何以言為賢不肖不可知也尚書曰知人則哲惟帝其難之立子以貴不以長者防愛憎也春秋公羊傳曰立適以長不以賢立子以賢貴不以長也始封諸侯無子死不得與兄弟何古者象賢也弟非賢者子孫春秋傳曰善善及子孫不言及昆弟昆弟尊同無相承養之義以閔公不繼莊公也昆弟不相繼之義至繼體諸侯無子得及親屬者以其俱賢者子孫也重其先祖之功故得及之繼世諸侯無子又無弟但有諸父庶兄當誰與庶與與庶兄推親之序也以僖公得繼閔公也禮服傳曰大宗不可絶同宗則可以為後為人作子何明小宗可以絶大宗不可絶故舍己之父後往為後於大宗所以尊祖重不絶大宗也春秋傳曰為人後者為人之子者王者受命而作興滅國必興滅國繼絶世何為先王無道妄煞殺無辜及嗣子幼弱為強臣所奪子孫皆無罪囚而絶重其先人之功故復立之論語曰興滅國繼絶世誅君之子不立者義無所繼也諸侯世位象賢也今親被誅絶也春秋傳曰誅君之子不立君見弒其子得立何所以尊君防篡弒也春秋繼經曰齊無知殺其君貴妾子公子紏糾當立也大夫功成未封未封而死子得封者善善及子孫也春秋傳曰賢者子孫宜有土地也周公不之魯何為周公繼武王之業也春秋傳曰周公曷為不之魯欲天下一于周也詩云王曰叔父建爾無元子俾侯于魯周公身薨天為之變成王以天子之禮葬之命魯郊以明至孝天所興也
