body:
  text: 誅伐誅不避親戚何所以尊君卑臣強幹弱枝明善惡善善惡惡之義也春秋傳曰季子煞其母兄何善示爾誅不避母兄君臣之義之義也尚書曰肆朕誕以爾東征誅弟也諸侯有三年之喪有罪且不誅何君子恕己哀孝子之思慕不忍加刑罰春秋曰晉士丐帥師侵齊至穀聞齊侯卒乃旋還傳曰大其不伐喪也諸侯之義非天子之命不得動眾起兵誅不義者所以強幹弱枝尊天子卑諸侯也論語曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出世無聖賢方伯諸侯有相滅者力能救者可也論語曰陳恆弒其君孔子沐浴而朝請討之王者諸侯之子篡弒其君而立臣下得誅之者廣討賊之義也春秋傳曰臣弒君臣不討賊非臣也又曰蔡世子班弒其君楚子誅之王者受命而起諸侯有臣弒君而立當誅君身死子不得繼繼之者以其逆無所天承也詩云毋封靡于爾邦惟王其崇之此言追誅大罪也或盜天子土地自立為諸侯絕之而已父煞其子當誅何以為天地之性人為貴人皆天所生也託父母氣而生耳王者以養長而教之故父不得專也春秋傳曰晉侯煞煞其世子申生不出蔡佞人當誅何為其亂善行傾覆國政韓詩內傳曰孔子為魯司寇先誅少正卯謂佞道已行亂國政也佞道未行章明遠之而已論語曰放鄭聲遠佞人子得為父報讎者臣子之於君父其義一也忠臣孝子所以不能已以恩義不可奪也故曰父之讎不與共天下兄弟之讎不與共國朋友之讎不與同朝族人之讎不共鄰故春秋傳曰子不復讎非子檀弓記子夏問曰居兄弟之讎如之何仕不與同共國銜君命遇之不鬥父母以義見煞子不復讎者為往來不止也春秋傳曰父不受誅子復讎可也誅者何謂也誅猶責也誅其人責其罪極其過惡春秋曰楚子虎虔誘蔡侯班煞之于申傳曰誅君之子不立討者何謂也討猶除也欲言臣當掃除君之賊也春秋曰衛人煞州吁于濮傳曰其稱人何討賊之辭也伐者何謂也伐擊也欲言伐擊之也尚書敘曰武王伐紂征者何謂也征猶正也欲言其正也輕重從辭也尚書曰誕以爾東征誅祿甫也又曰甲戍我惟征徐戎戰者何謂也尚書大傳曰戰者憚警之也春秋讖曰戰者延改也弒者何謂也弒者試也欲言臣子殺其君父不敢卒候閒司事可稍稍弒之易曰臣弒其君子弒其父非一朝一夕之故也篡者何謂也篡猶奪也取也欲言庶奪嫡孽奪宗引奪取其位春秋傳曰其言人入何篡辭也稍稍煞之襲者何謂也行不假途掩人不備也春秋傳曰其謂之秦何夷狄之也曷為夷狄之秦伯將襲鄭人國掩人不備行不假途人銜杖枚馬勒晝伏夜行為襲也諸侯家國入人家宜告主人所以相尊敬防并兼也春秋傳曰桓公假途于陳而伐楚禮曰使次斤介先假途道用束帛即如是諸侯賣王者道禮無往不反非謂所賣者也將入人國先使大夫執幣假道主人亦遣大夫迎於郊為賓主設禮而待之是其相尊敬也防并兼奈何諸侯之行必有師旅恐掩人不備士卒歛取恆遲先假途則預備之矣冬至所以休兵不舉事閉關商旅不行何此日陽氣微弱王者承天理物故率天下靜不復行役扶助微氣成萬物也故孝經纖曰夏至陰氣始動冬至陽氣始萌易曰先王以至日閉關商旅不行夏至陰始起反大熱何陰氣始起陽氣推而上故大熱也冬至陽始起陰氣推而上故大寒也
