  - {type: variant, offset: 2957, length: 0, content: '', WYG: 無所不生也娶九女亦足以成君施也九而無子百亦無益也王度記曰天子一娶九女春秋公羊傳曰諸侯娶一國則二國往媵之以姪娣從之姪者何兄之子也娣者何女弟也或曰天子娶十二女法天有十二月萬物必生也必一娶何防淫泆也為其棄徳嗜色故一娶而已人君無再娶之義也備姪娣從者為其必不相嫉妬也一人有子三人共之若已生之不娶兩娣何傳異氣也娶三國女何廣異類也恐一國血脉相似俱無子也姪娣年雖少猶從適人者明人君無再娶之義也還待年於父母之國未任答君子也詩云諸娣從之祁祁如雲韓侯顧之爛其盈門公羊傳曰叔姬歸于紀明待年也二國來媵誰為尊者大國為尊國等以徳徳同以色質家法天尊左文家法地尊右所以不聘妾何人有子孫欲尊之義義不可求人以為賤也春秋傳曰二國來媵可求人為士不可求人為妾何士即尊之漸賢不止於士妾雖賢不得為適娶妻卜之何卜女之徳知相宜否昏禮經曰將加諸卜敢問女為誰氏也人君及宗子父母自定娶者卑不主尊賤不主貴故自定之也昏禮經曰親皆没已聘命之詩云文定厥祥親迎于渭大夫功成封得備八妾者重國廣繼嗣也不更聘大國者不􅁯本適也故禮曰納女於諸侯曰備掃灑天子諸侯之世子皆以諸侯禮娶與君同示無再娶之義也王者之娶必先選于大國之女禮儀備所見多詩云大邦有子俔天之妹文定厥祥親迎于渭明王者必娶大國也春秋曰紀侯來朝紀子以嫁女于天子故増爵稱侯至數十年之間紀侯無他功但以子為天王后故爵稱侯知雖小國者必封以大國明其尊所不臣也王者娶及庶人者何開天下之賢示不違善也故春秋曰紀侯來朝文加為侯明封之也先封之明不與聖人交禮也女行虧缺而去其國如之何以封為諸侯比例矣諸侯所以不得自娶國中何諸侯不得專封義不可臣其父母春秋傳曰宋三代無大夫惡其内娶}
