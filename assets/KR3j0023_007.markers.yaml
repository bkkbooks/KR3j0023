  - {type: variant, offset: 196, length: 170, content: 公九卿二十士七大夫八十一元士凡百二十官下應十二子別名記曰司徒典民司空主地司馬順天天者施生所以主兵何兵者為諸謀除害也所以全其生衛其養也故兵稱天寇賊猛獸皆為除害者所主也論語曰天下有道則禮樂征伐自天子出司馬主兵不言兵而言馬者馬陽物乾之所為行兵用焉不以傷害為度文故言馬也司徒主人不言徒人而言徒者徒眾也重民眾司空主土不言土而言空者空尚主之何況於實乎以, SBCK: ''}
