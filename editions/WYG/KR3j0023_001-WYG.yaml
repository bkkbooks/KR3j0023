body:
  text: 漢班固撰徳論上爵天子者爵稱也爵所以稱天子者何王者父天母地為天之子也故援神契曰天覆地載謂之天子上法斗極鈎命訣曰天子爵稱也帝王之徳有優劣所以俱稱天子者何以其俱命於天而王治五千里内也尚書曰天子作民父母以為天下王何以知帝亦稱天子也以法天下也中候曰天子臣放勛書無逸篇曰厥兆天子爵何以言皇亦稱天子也以其言天覆地載俱王天下也故易曰伏羲氏之王天下也爵有五等以法五行也或三等者法三光也或法三光或法五行何質家者據天故法三光文家者據地故法五行含文嘉曰殷爵三等周爵五等各有宜也王制曰王者之制禄爵凡五等謂公侯伯子男此周制也所以名之為公侯者何公者通也公正無私之意也侯者候也候逆順也春秋𫝊曰王者之後稱公其餘人皆千乘象雷震百里所潤同大國稱侯小國稱伯子男也王制曰公侯田方百里伯七十里子男五十里伯者百也子者孶也孶孶無己也男者任也人皆五十里差次功徳小者不滿為附庸附庸者附大國以名通也百里兩爵公侯共之七十里一爵五十里復兩爵何公者加尊二王之後侯者百里之正爵士上可有次下可有第中央故無二十五里有兩爵者所以加勉進人也小國下爵猶有尊卑亦以勸人也殷爵三等謂公侯伯也所以合子男從伯者何王者受命改文從質無虛退人之義故上就伯也尚書曰侯甸任衞作國伯謂殷也春秋傳曰合伯子男以為一爵或曰合從子貴中也以春秋名鄭忽忽者鄭伯也此未踰年之君當稱子嫌為改赴故名之也地有三等不變至爵獨變何地比爵為質故不變王者有改道之文無改道之實家所以令公居百里侯居七十里何也封賢極於百里其政也不可空退人示優賢之義欲裒尊而上之何以知殷家侯人不過七十里者也曰士上有三等有百里有七十里有五十里其地半者其數倍制地之理體也多少不相配公卿大夫者何謂也内爵稱也曰公卿大夫何爵者盡也各量其職盡其才也公之為言公正無私也卿之為言章善明理也大夫之為言大扶進人者也故𫝊曰進賢達能謂之大夫也士者事也任事之稱也故𫝊曰古今辯然否謂之士禮曰四十強而仕不言爵為士至五十爵為大夫何以知士非爵何以知卿為爵也以大夫知卿亦爵也何以知公為爵也春秋傳曰諸侯四佾諸公六佾合而言之以是知公卿為爵内爵所以三等何亦法三光也所以不變質文何内者為本故不改内也諸侯所以無公爵者下天子也故王制曰上大夫下大夫上士中士下士凡五等此謂諸侯臣也大夫但有上下何明卑者多也爵皆一字也大夫獨兩字何春秋𫝊曰大夫無遂事以為大夫職在之適四方受君之法施之於民故獨兩字言之或曰大夫爵之下者也稱大夫明從大夫以上受下施皆大自著也天子之士獨稱元士何士賤不得體君之尊故加元以别諸侯之士也禮經曰士見大夫諸侯之士王制曰王者八十一元士天子爵連言天子諸侯爵不連言王侯何即言王侯以王者同稱為衰弱僣差生簒弑猶不能為天子也故連言天子也或曰王者天爵王者不能生諸侯故不言王侯諸侯人事自著故不著也王者太子亦稱士何舉從下升以為人無生得貴者莫不由士起是以舜時稱為天子必先試於士禮士冠經天子之元子士也婦人無爵何陰卑無外事是以有三從之義未嫁從父既嫁從夫夫死從子故夫尊於朝妻榮於室隨夫之行故禮郊特牲曰婦人無爵坐以夫之齒禮曰生無爵死無諡春秋錄夫人皆有諡夫人何以知非爵也論語曰邦君之妻君稱之曰夫人國人稱之曰君夫人即令是爵君稱之與國人稱之不當異也庶人稱匹夫者匹偶也與其妻為偶陰陽相成之義也一夫一婦成一室明君人者不當使男女有過時無匹偶也論語曰匹夫匹婦之為諒也爵人於朝者示不私人以官與衆共之義也封諸侯於廟者示不自専也明法度皆祖之制也舉事必告焉王制曰爵人於朝與衆共之也詩云王命卿士南仲太祖禮祭統曰古者明君爵有徳必於太祖君降立於阼階南南向所命北向史由君右執策命之大夫功成未封而死不得追爵賜之者以其未當股肱也春秋榖梁𫝊曰追賜死者非禮也王制曰葬從死者祭從生者所以追孝繼飬也葬從死者何子無爵父之義也禮中庸記曰父為大夫子為士𦵏以大夫祭以士子為大夫父為士祭以大夫葬以士也父在稱世子何繫於君也父沒稱子某者何屈於尸柩也既葬稱小子者即尊之漸也踰年稱公者縁民之心不可一日無君也緣終始之義一年不可有二君也故踰年即位所以繫民臣之心然後爵者縁孝子之心未忍安吉故春秋魯僖公三十三年十二月乙巳薨于小寢文公元年春王正月公即位四月丁巳葬我君僖公韓詩内傳曰諸侯世子三年䘮畢上受爵命於天子所以名之為世子何言欲其世世不絶也何以知天子子亦稱世子也春秋傳曰公㑹世子于首止或曰天子之子稱太子尚書曰太子發升于舟也或曰諸侯之稱代子則傳曰晉有太子申生鄭有太子華齊有太子光由是觀之周制太子代子亦不定也漢制天子稱皇帝其嫡嗣稱皇太子諸侯王之嫡稱代子後代咸因之世子三年䘮畢必上受爵命於天子何明爵土者天子之有也臣無自爵之義童子當受父爵命使大夫就其國命之明王者不與童子為禮也以春秋魯成公幼少與諸侯㑹公不見之經不以魯耻明不與童子為禮也世子上受爵命衣士服何謙不敢自専也故詩曰韎韐有赩世子始行也天子大斂之後稱王者明士不可一日無君也故尚書曰王麻冕黼裳此斂之後也何以知王從死後加王也以尚書言迎子釗不言迎王王者既殯而即繼體之位何縁民臣之心不可一日無君故先君不可得見則後君繼體矣尚書曰再拜興對乃受同瑁也明為繼體君也緣始終之義一年不可有二君也故尚書曰王釋冕䘮服吉冕受同稱王以接諸侯明已繼體為君也釋冕藏同反䘮明未稱王以統事也不曠年無君故逾年乃即位改元名元年年以紀事君名其事矣而未發號令也何以言踰年即位謂改元位春秋傳曰以諸侯逾年即位亦知天子踰年即位也春秋曰元年春王正月公即位改元位也王者改元年即事天地諸侯改元即事社稷王制曰夫䘮三年不祭唯祭天地社稷為越紼而行事春秋傳曰天子三年然後稱王者謂稱王統事發號令也尚書曰髙宗諒陰三年是也論語君薨百官總已聽於冡宰三年縁孝子之心則三年不當也故三年除䘮乃即位統事即位踐祚為主南靣朝臣下稱王以發號令也故天子諸侯凡三年即位終始之義乃備所以諒陰三年卒孝子之道故論語曰古之人皆然君薨百官總已聽於冡宰三年所以聽於冡宰三年者何以為冡宰職在制國之用是以由之也故王制曰大冡宰制國用所以名之為冡宰何冡者大也宰者制也大制事也故王度記曰天子冡宰一人爵禄如天子之大夫或曰冡宰視卿周官所云也號帝王者何號也號者功之表也所以表功明徳號令臣下者也徳合天地者稱帝仁義合者稱王别優劣也禮記諡法曰徳象天地稱帝仁義所生稱王帝者天號王者五行之稱也皇者何謂也亦號也皇君也美也大也天之總美大稱也時質故緫之也號之為皇者煌煌人莫違也煩一夫擾一士以勞天下不為皇也不擾匹夫匹婦故為皇故黄金弃於山珠玉捐於淵巖居穴處衣皮毛飲泉液吮露英虛無寥廓與天地通靈也號言為帝者何帝者諦也象可承也王者往也天下所歸往鈎命訣曰三皇步五帝趨三王馳五霸騖或稱天子或稱帝王何以為接上稱天子明以爵事天也接下稱帝王者得號天下至尊言稱以號令臣下也故尚書曰咨四岳曰格汝衆或有一人王者自謂一人者謙也欲言己材能當一人耳故論語曰百姓有過在予一人臣謂之一人何亦所以尊王者也以天下之大四海之内所共尊者一人耳故尚書曰不施予一人或稱朕何亦王者之謙也朕我也或稱予者予亦我也不以尊稱自也但自我皆謙或稱君子何道徳之稱也君之為言羣也子者丈夫之通稱也故孝經曰君子之教以孝也所以敬天下之為人父者也何以言知其通稱也以天子至於民故詩云凱弟君子民之父母論語云君子哉若人此謂弟子弟子者民也三皇者何謂也謂伏羲神農燧人也或曰伏羲神農祝融也禮曰伏羲神農祝融三皇也謂之伏羲者何古之時未有三綱六紀民人但知其母不知其父能覆前而不能覆後臥之詓詓起之吁吁飢即求食飽即弃餘茹毛飲血而衣皮韋於是伏羲仰觀象於天俯察法於地因夫婦正五行始定人道畫八卦以治下治下伏而化之故謂之伏羲也謂之神農何古之人民皆食禽獸肉至於神農人民衆多禽獸不足於是神農因天之時分地之利制耒耜教民農作神而化之使民宜之故謂之神農也謂之燧人何鑽木燧取火教民熟食養人利性避臭去毒謂之燧人也謂之祝融何祝者属也融者續也言能属續三皇之道而行之故謂祝融也五帝者何謂也禮曰黄帝顓頊帝嚳帝堯帝舜五帝也易曰黄帝堯舜氏作書曰帝堯帝舜黄帝中和之色自然之性萬世不易黄帝始作制度得其中和萬世常存故稱黄帝也謂之顓頊何顓者專也頊者正也能專正天人之道故謂之顓頊也謂之帝嚳者何也嚳者極也言其能施行窮極道徳也謂之堯者何堯猶嶤嶤也至髙之貌清妙髙逺優遊博衍衆聖之主百王之長也謂之舜者何舜猶僢僢也言能推信堯道而行之三王者何謂也夏殷周也故禮士冠經曰周弁殷冔夏收三王共皮弁也所以有夏殷周號何以為王者受命必立天下之美號以表功自克明易姓為子孫制也夏殷周者有天下之大號也百王同天下無以相别改制天下之大禮號以自别於前所以表著己之功業也必改號者所以明天命己著欲顯揚己於天下也己復襲先王之號與繼體守文之君無以異也不顯不明非天意也故受命王者必擇天下美號表著己之功業明當致施是也所以預自表克於前也帝王者居天下之尊號也所以差優號令臣下諡者行之跡也所以别於後代著善惡垂無窮無自推觀施後世皆以勸善著戒惡明不勉也不以姓為號何姓者一字之稱也尊卑所同也諸侯各稱一國之號而有百姓矣天子至尊即備有天下之號而兼萬國矣夏者大也明當守持大道殷者中也明當為中和之道也聞也見也謂當道著見中和之為也周者至也宻也道徳周宻無所不至也何以知即政立號也詩云命此文王于周于京此改號為周易邑為京也春秋傳曰王者受命而王必擇天下之美號以自號也五帝無有天下之號何五帝徳大能禪以民為子成于天下無為立號也或曰唐虞者號也唐蕩蕩也蕩蕩者道徳至大之貌也虞者樂也言天下有道人皆樂也故論語曰唐虞之際帝嚳有天下號髙辛顓頊有天下號曰髙陽黄帝有天下號曰自然者獨宏大道徳也髙陽者陽猶明也道徳髙明也髙辛者道徳大信也五霸者何謂也昆吾氏大彭氏豕韋氏齊桓公晉文公也昔三王之道衰而五霸存其政率諸侯朝天子正天下之化興復中國攘除夷狄故謂之霸也昔昆吾氏霸於夏者也大彭氏豕韋氏霸於殷者也齊桓晉文霸於周者也或曰五霸謂齊桓公晉文公秦穆公楚莊王呉王闔閭也霸者伯也行方伯之職㑹諸侯朝天子不失人臣之義故聖人與之非明王之張法霸猶迫也把也迫脅諸侯把持其政論語曰管仲相桓公霸諸侯春秋曰公朝于王所於是時晉文之霸尚書曰邦之榮懷亦尚一人之慶知秦穆之霸也楚勝鄭而不告從而攻之又令還師而佚晉冦圍宋宋因而與之平引師而去知楚莊之霸也蔡侯無罪而拘於楚呉有憂中國心興師伐楚諸侯莫敢不至知呉之霸也或曰五霸謂齊桓公晉文公秦穆公宋襄公楚莊王也宋襄伐楚不擒二毛不鼓不成列春秋傳曰雖文王之戰不是過知其霸也伯子男臣子於其國中褒其君為公王者臣子獨不得褒其君謂之為帝何以為諸侯有㑹聚之事相朝聘之道或稱公而尊或稱伯子男而卑為交接之時不私其臣子之義心俱欲尊其君父故皆令臣子得稱其君為公也帝王異時無㑹同之義故無為同也何以諸侯稱公齊侯桓公尚書曰公曰嗟秦伯也詩云譚公維私譚子也春秋曰葬許繆公許男也禮大射經曰則釋獲大射者諸侯之禮也伯子男皆在也諡諡者何也諡之為言引也引列行之跡也所以進勸成徳使上務節也故禮特牲曰古者生無爵死無諡此言生有爵死當有諡也死乃諡之何言人行終始不能若一故據其終始從可知也士冠經曰死而諡之今也所以臨葬而諡之何因衆㑹欲顯揚之也故春秋曰公之䘮至自乾侯昭公死於晉乾侯之地數月歸至急當未有諡也春秋曰丁巳葬戊午日下側乃克葬明祖載而有諡也黄帝先黄後帝何古者順死生之稱各持行合而言之美者在上黄帝始制法度得道之中萬世不易名黄自然也後世雖聖莫能與同也後世徳與天同亦得稱帝不能立制作之時故不得復稱黄也諡或一言或兩言何文者以一言為諡質者以兩言為諡故尚書曰髙宗殷宗也湯死後世稱成湯以兩言為諡也號無質文諡有質文何號者始也為本故不可變也周已後用意尤文以為本生時號令善故有善諡故舍文武王也合言之則上其諡明别善惡所以勸人為善戒人為惡也帝者天號也以為堯猶諡顧上世質直死後以其名為號耳所以諡之為堯何為諡有七十二品禮記諡法曰翼善傳聖諡曰堯仁聖盛明諡曰舜慈惠愛民諡曰文强理勁直諡曰武天子崩臣下至南郊諡之者何以為人臣之義莫不欲褒大其君掩惡揚善者也故之南郊明不得欺天也故曾子問孔子曰天子崩臣下之南郊告諡之諸侯薨世子赴告天子天子遣大夫㑹其葬而諡之何幼不誄長賤不誄貴諸侯相誄非禮也臣當受諡於君也卿大夫老歸死有諡何諡者别尊卑彰有徳也卿大夫歸無過猶有祿位故有諡也夫人無諡者何無爵故無諡或曰夫人有諡夫人一國之母修閨門之内羣下亦化之故設諡以彰其善惡春秋傳曰葬宋恭姬傳曰其稱諡何賢也傳曰哀姜者何莊公夫人也卿大夫妻無諡何賤也公妾所以無諡何卑賤無所能務猶士卑小不得有諡也太子夫人無諡何本婦人隨夫太子無諡其夫人不得有諡也天子太子元士也士無諡知太子亦無諡也附庸所以無諡何卑小無爵也王制曰爵祿凡五等附庸本非爵也後夫人於何所諡之以為於朝廷朝廷本所以治政之處臣子共審諡白之於君然後加之婦人大夫故但白君而已何以知不之南郊也婦人本無外事何為於郊也禮曾子問曰唯天子稱天以誄之唯者獨也明天子獨於南郊耳顯號諡何法法日未出而明已入有餘光也五祀五祀者何謂也謂門户井竈中霤也所以祭何人之所處出入所飲食故為神而祭之何以知五祀謂門户井竈中霤也月令曰其祀户又曰其祀竈其祀中霤其祀門其祀井獨大夫已上得祭之何士者位卑禄薄但祭其先祖耳禮曰天子祭天地諸侯祭山川卿大夫祭五祀士祭其祖曲禮曰天地四時山川五祀嵗遍諸侯方祀山川五祀嵗遍卿大夫祭五祀士祭其先非所當祭而祭之名曰滛祀滛祀無福祭五祀所以嵗一遍何順五行也故春即祭户户者人所出入亦春萬物始觸戸而出也夏祭竈者火之主人所以自養也夏亦火王長養萬物秋祭門門以閉藏自固也秋亦萬物成熟内備自守也冬祭井井者水之生藏任地中冬亦水王萬物伏藏六月祭中霤中霤者象土在中央也六月亦土王也故月令春言其祀戸祭先脾夏言其祀竈祭先肺秋言其祀門祭先肝冬言其祀井祭先腎中央言其祀中霤祭先心春祀戸祭所以時先脾者何脾者土也春木主煞土故以所勝祭之也是冬腎六月心非所勝者以祭何以為土位在中央至尊故祭以心心者藏之尊者水最卑不得食其所勝祭五祀天子諸侯以牛卿大夫以羊因四時牲也一說戸以羊竈以雉中霤以豚門以犬井以豕或曰中霤用牛餘不得用豚井以魚社稷王者所以有社稷何為天下求福報功人非土不立非榖不食土地廣博不可徧敬也五榖衆多不可一一而祭也故封土立社示有土尊稷五榖之長故封稷而祭之也尚書曰乃社于新邑孝經曰保其社稷而和其民人蓋諸侯之孝也稷者得陰陽中和之氣而用尤多故為長也歲
