  - {type: variant, offset: 183, length: 6, content: 牛羊一豕一工, SBCK: 等而禮之故進賢賜之納陛以優之也旣能進善當能戒惡故賜虎賁虎賁者所以戒不虞而距惡距惡當斷刑故賜之鈇􅃏鈇􅃏所以斷大刑刑罰旣中則能征不義故賜弓矢弓矢所以征不義伐無道也圭瓉秬鬯宗廟之盛禮故孝道備而賜之秬鬯所以極著孝道孝道純備故内和外榮玉以象徳金以配情芬香條鬯以通神靈玉飾其本君子之性金飾其中君子之道君子有黄中通理之道美素徳金者精和之至也玉者徳美之至也鬯者芬香之至也君子有玉瓉秬鬯乎車者以配道德也其至矣合天下之極美以通其志也其唯玉瓉秬鬯乎車者謂有赤有青之蓋朱輪特能居前左右寢米庶也以其進止有節德綏民路車乗馬以安其身言成章行成規卷龍之衣服表顯其德長於教誨内懷至仁則賜時王樂以化其民尊賢逹德動作有禮賜之納陛以安其體居處修治房内節男女時配貴賤有别則賜朱戸以明其徳列威武有矜嚴仁堅強賜以虎賁以備非常喜怒有節誅伐刑賜以鈇􅃏使得專殺好惡無私執義不傾賜以弓矢使得專征孝道之美百行之本也故賜以玉瓉得專爲賜也故王制曰賜之弓矢然後專殺又曰賜圭瓉然後爲暢未賜者資暢於天子王度記曰天子鬯諸侯薫大夫􅉮蘭士蒹庶人艾車馬衣服樂三等者賜與其物禮天子賜諸侯民服車路先設路下四惡之又曰諸公奉選服}
