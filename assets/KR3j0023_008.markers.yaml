  - {type: variant, offset: 264, length: 0, content: '', WYG: 族也母昆弟者男女皆在外親故合言之妻族二者妻之父為一族妻之母為二族妻之親略故父母各一族禮曰惟是三族之不虞尚書曰以親九族義同也一說合言九族者欲明堯時俱三也禮所以獨父族四何欲言周承二弊之後民人皆厚於末故與禮母族妻之黨廢禮母族父之族是以貶妻族以附父族也或言九者據有交接之恩也若邢侯之姨譚}
  - {type: page-break, offset: 264, content: '', id: KR3j0023_WYG_002-37b, image: WYG0850/WYG0850-0054d.png}
  - {type: variant, offset: 265, length: 0, content: '', WYG: 惟私也言四者據有服耳不相害所異也姓名人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻也故禮别類使生相愛死相哀同姓不得相娶皆為重人倫也姓生也人所稟天氣所以生者也詩云天生烝民尚書曰平章百姓姓所以有百何以為古者聖人吹律定姓以記其族人含五常而生聲有五音宫商角徴羽轉而相雜五五二十五轉生四時故百而異也氣殊音悉備故殊百也所以有氏者何所以貴功徳賤伎力或氏其官或氏其事聞其氏即可知其所以勉人為善也或氏王父字何所以别諸侯}
  - {type: page-break, offset: 265, content: '', id: KR3j0023_WYG_002-38a, image: WYG0850/WYG0850-0055a.png}
