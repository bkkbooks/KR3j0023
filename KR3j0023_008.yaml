body:
  text: 京師王者必即土中者何王者京師必擇土中何所以均教道平往來使為善易以聞為惡易以聞明當懼慎損於善惡尚書曰王來紹上帝自服於土中聖人承天而制作尚書曰公不敢不敬天之休來相宅周家始封於何后稷封於邰公劉去邰之邠詩云即有台邰家室又曰篤公劉于邠斯觀周家五遷其意一也皆欲成其道也時寧先皇白王者不以諸侯移必先請從然後行京師者何謂也千里之邑號也京大也師衆也天子所居故以大衆言之明什倍諸侯法日月之徑經千里春秋傳曰京曰師天子之居也王制曰天子之田方千里或曰夏曰夏邑殷曰商邑周曰京師尚書曰率割夏邑謂桀也在商邑謂殷也祿者録也上以敬録接下下以名録謹以事上王制曰天子三公之田視公侯卿視伯大夫視子男士視附庸上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者以是為差也諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿次國之卿三大夫祿君十卿祿小國之卿倍上大夫祿君十卿祿天子之縣內有百里之國九七十里之國二十一五十里之國六十三凡九十三國名山大澤不以封其餘以祿士以為間田諸侯入為公卿大夫得食兩家菜采不曰有能然後居其位德加於人然後食其祿所以尊賢重有德也今以盛德人入輔佐兩食之何劉師培云何當作可王制曰天子之縣內諸侯祿也外諸侯嗣也天子太子食菜采者儲君嗣主也當有上土以尊之也太子食百里與諸侯封同故禮曰公士大夫天子子也無爵而在大夫上故知百里也公卿大夫皆食菜采者示與民同有無也
