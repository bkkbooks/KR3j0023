  - {type: variant, offset: 204, length: 1, content: 子, SBCK: 圎地方不相􅀋故無緫名也君舒臣疾卑者冝勞天所以反常行何以爲陽不動無以行其教隂不静無以成其化雖終日乾乾亦不離其處也故易曰終日乾乾反覆道也日月天左旋日月五星右行何日月五星比天爲隂故右行右行者猶臣對君也含文嘉曰計日月右行也刑德放日月東行而日行遟月行疾何君舒臣勞也日日行一度月日行十三度十九分度}
