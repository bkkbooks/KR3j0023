  - {type: variant, offset: 719, length: 389, content: 又欲令同有陰陽寒暑之節共法度也所分陝者是國中也若言面八百四十國矣諸侯有三卿者分三事也五大夫者下天子王制曰大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君大夫悉同禮王度記曰子男三卿一卿命於天子諸侯封不過百里象雷震百里所潤雲雨同也雷者陰中之陽也諸侯象也焉諸侯比王者為陰南面賞罰為陽法雷也七十里五十里差德功也故王制曰凡四海之內九州州方千里建百里之國二三十七十里之國六十五十里之國百有二十名山大澤不以封其餘以為附庸間田天子所治方千里此平土三千并數邑居山川至五十里名山大澤不以封者與百姓共之不使一國獨專也山木之饒水泉之利千里相通所以均有無贍其不足制土三等何因土地有高下中三等王者即位先封賢者憂人之急也故列土為疆非為諸侯張官設府非為卿大夫皆為民也易曰利建侯此言因所利故立之樂記曰武王克殷反商下車封夏后氏之後於杞投殷人之後於宋封王子比干之墓釋箕子之囚, SBCK: 明}
