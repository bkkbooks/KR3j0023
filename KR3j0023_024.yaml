body:
  text: 八風風者何謂也風之為言萌也養物成功所以象八卦陽立於五極於九五九四十五日變變以為風陰合陽以生風也距冬至四十五日條風至條者王生也四十五日明庶風至明庶者迎衆也四十五日清明風至清明者清青芒也四十五日景風至景者大風也言陽氣長養也四十五日涼風至涼寒也行陰氣行也四十五日昌盍風至昌盍者戒收藏也四十五日不周風至不周者不交也言陰陽未合化也四十五日廣莫風至廣莫者大莫也同開陽氣也故曰條風至地暖明庶風至萬物産清明風至物形乾景風至棘造實涼風至黍禾乾昌盍風至生薺麥不周風至蟄蟲匿廣莫風至則萬物伏是以王者承順之條風至則出輕刑解稽留明庶風至則修封疆埋理田疇清明風至出幣帛使諸侯景風至則爵有德封有功涼風至報地德則報土功化祀四鄉昌盍風至則申象刑飾囷倉不周風至則築宮室修城郭廣莫風至則斷大辟行獄刑
