body:
  text: 封禪王者易姓而起必升封泰山何教報告之義也始受命之時日改制應天天下太平功成封禪以告太平也所以必於泰山何萬物所之始交代之處也必於其上何因高告高順其類也故升封者增高也下禪梁甫之山基之基之址廣厚也刻石紀號者著己之功跡績業也以自效放效也天以高為尊地以厚為德故增泰山之高以放報天附梁甫之基以報地明天地之所命功成事遂就有益於天地若高者加高厚者加厚矣或曰封者金泥銀繩或曰石泥金繩封之以印璽故孔子曰升泰山觀易姓之王可得而數者七十有餘封者附廣也言禪者明以成功相傳也梁甫者太泰山旁山名正於梁甫何以三皇禪於繹繹之山明己成功而去有德者居之繹繹者無窮之意義也五帝禪于亭亭之山亭亭者制度審諟道德著明也三王禪于梁甫之山者梁信也甫輔也信輔天地之道而行之也太平乃封知告于天必也於岱宗何明知易姓也刻石紀號知自紀于百王也燎祭天報之義也望祭山川祀群神也詩云於皇明周陟其高山言周太平封太山也又曰墮山喬嶽允猶翕河言望祭山川百神來歸也天下太平符瑞所以來至者以為王者承天統理調和陰陽陰陽和萬物序休氣充塞故符瑞並臻皆應德而至德至天則斗極明日月光甘露降德至地則嘉禾生蓂莢起秬鬯出太平感德至文表則景星見五緯順軌德至草木則朱草生木連理德至鳥獸則鳳凰翔鸞鳥舞騏驎麒麟臻白虎到狐九尾白雉降白鹿見白烏下德至山陵則景雲出芝實茂陵出異黑丹阜出蓮甫萐莆山出器車澤出神鼎德至淵泉則黃龍見醴泉通涌河出龍圖洛出龜書江出大貝海出明珠德至八方則祥風至佳氣時喜鐘律調音度施四夷化越裳貢孝道至則以蓮甫萐蒲出庖廚萐莆者樹名也其葉大於門扇不搖自扇於飲食清涼助供養也繼嗣平明則賓連生於房戶賓連闊達者木名也其狀連累相承故在生於房戶象繼嗣也日曆得其分度則蓂以莢生於階間蓂莢者樹名也月一日生一莢生十五日畢至十六日去一莢去故莢夾階而生似以明日月也王者使賢不肖位不相踰則平路露生于庭平路露者樹名也官位得其人則生失其人則死狐九尾何狐死首丘不忘本也明安不忘危也必九尾者也何九妃配得其所子孫繁息也於尾者何明後當盛也景星者大星也月或不見景星常見可以夜作有益於人民也甘露者美露也降則物無不盛者也朱草者赤草也可以染絳別尊卑也醴泉者美泉也狀若醴酒可以養老也嘉禾者大禾也成王時有三苗異畝而生同為一穟大幾盈車長幾充箱民有得而上之者成王訪召周公而問之公曰三苗為一穟天下當和為一乎以是後果有越裳氏重九譯而來矣鳳凰者禽之長也上有明王太平乃來居廣都之野雄鳴曰節雌鳴足足小音中鐘大音鼓遊必擇地飢不妄食黃帝之時鳳凰蔽日而至東方止於東園食常竹實栖常梧桐終身不去
