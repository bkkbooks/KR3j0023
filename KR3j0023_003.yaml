body:
  text: 謚故禮郊特牲曰古者生無爵死無謚此言生有爵死當有謚也死乃謚之何詩云靡不有初鮮克有終言人行終始不能若一故據其終始後可知也士冠經曰死而謚之今也所以臨葬而謚之何因眾會欲顯揚之也故春秋曰公之喪至自乾侯昭公死於晉乾侯之地數月歸至急當未有謚也春秋曰丁巳葬戊午日下側乃克葬明祖載而有謚也謚者何謂也謚之為言引也引烈行之跡也所以進勸成德使上務節也黃帝先黃後帝者何古者順質死生之同稱各持特行合而言之美者在上黃帝始制法度得道之中萬世不易名黃自然也後世雖聖莫能與同也後世得與天同亦得稱帝不能立制作之時故不得復稱黃也謚或一言或兩言何文者以一言為謚質者以兩言為謚故尚書曰高宗殷宗也湯死後世稱成湯以兩言為謚也號無質文謚有質文何號者始也為本故不可變也周已後用意尤文以為本生時號令善故有善謚故舍合言文王武王也合言之則上其謚明別善惡所以勸人為善戒人為惡也帝者天號也以為堯猶謚顧上世質直死後以其名為號耳所以謚之為堯何為謚有七十二品禮記謚法曰翼善傳聖謚曰堯仁聖盛明謚曰舜慈惠愛民謚曰文剛強理直謚曰武天子崩大臣下至南郊謚之者何以為人臣之義莫不欲褒大稱其君掩惡揚善者也故之南郊明不得欺天也故曾子問孔子曰天子崩臣下之南郊告謚之諸侯薨世子赴告赴告於天子天子遣大夫會其葬而謚之何幼不誄長賤不誄貴諸侯相誄非禮也臣當受謚於君也卿大夫老歸死有謚何謚者別尊卑彰有德也卿大夫歸無過猶有祿位故有謚也夫人無謚者何無爵故無謚或曰夫人有謚夫人一國之母修閨門之內群下亦化之故設謚以彰其善惡春秋傳曰葬宗宋恭姬傳曰其稱謚何賢也傳曰哀姜者何莊公夫人也卿大夫妻命婦也無謚者何以賤也八妾所以無謚何亦以卑賤無所能務豫猶士卑小不得有謚也太子夫人無謚何本婦人隨夫太子無謚其夫人不得有謚也士冠經曰天子太子元士也士無謚知太子亦無謚也附庸所以無謚何卑小無爵也王制曰王者之制爵祿凡五等附庸不在其中明附庸本非爵也後后夫人於何所謚之以為於朝廷朝廷本所以治政之處臣子共審謚白之於君然後加之婦人大天夫故但白君而已何以知不之南郊也婦人本無外事何為於郊也禮曾子問曰唯天子稱天以誅誄之唯者獨也明天子獨於南郊耳顯號謚何法號法天也法日也日未出而明諡法地也法月也月已入有餘光也是以大行受大名細行受小名行生於己名生於人
