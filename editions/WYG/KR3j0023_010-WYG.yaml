body:
  text: 紼冕紼者何謂也紼者蔽也行以蔽前紼蔽者小有事因以别尊卑彰有德也天子朱紼諸侯赤紼詩云朱紼斯皇室家君王又赤紼金舄㑹同有繹又云赤紼在股皆謂諸侯也書曰黼黻衣黄朱紼亦謂諸侯也並見衣服之制故逺别之謂黄朱亦赤矣大夫葱衡别於君矣天子大夫赤紱葱衡士􅀈韐朱赤者或盛色也是以聖人塗法之用為紼服為百王不易也紼以韋為之者反古不忘本也上廣一尺下廣二尺天一地二也長三尺法天地人也所以有冠者􅀈也所以􅀈持其髮也人懷五常莫不貴徳示成禮有修飾首别成人也士冠經曰冠而字之敬其名也論語曰冠者五六人童子六七人禮所以十九見正者而冠何漸三十之人耳男子陽也成於隂故二十而冠曲禮曰二十弱冠言見正何以知不謂正月也以禮士冠經曰夏葛屨冬皮屨明非歳之正月也皮弁者何謂也所以法古至質冠名也弁之言樊也所以樊持其髮也上古之時質先加服皮以鹿皮者取其文章也禮曰三王共皮弁素積裳也腰中辟積至質不易之服反古不忘本也戰伐田獵此皆服之麻冕者何周宗廟之冠也禮曰周冕而祭又曰殷􅒐夏收而祭此三代宗廟之冠也十一月之時陽氣冕仰黄泉之下萬物被施前冕而後仰故謂之冕謂之冔者十二月之時施氣受化詡張而後得牙故謂之冔謂之收者十三月之時氣收本舉生萬物而達出之故謂之收冕仰不同故前後乖也詡張故萌大時物亦牙萌大也收而連故前葱大者在後時物亦前葱也絶所以用麻為之者女功之始亦不忘本也即不忘本不用皮皮乃太古未有禮文之服故論語曰麻冕禮也尚書曰王麻冕冕所以前後遂延者何示進賢退不能也垂旒者示不見邪纊塞耳示不聼讒也故水清無魚人察無徒明不尚極知下故禮玉藻曰十有二旒前後遂延禮器曰天子麻冕朱緑藻垂十有二旒者法四時十二月也諸侯九旒大夫七旒士爵弁無旒委兒者何謂也周朝廷理政事行道徳之冠名士冠經曰委兒周道章甫殷道母追夏后氏之道所以謂之委兒何周統十一月為正萬物萌小故為冠飾最小故曰委貎委貎者委曲有貎也殷統十二月為正其飾微大故曰章甫章甫者尚未與極其本相當也夏者統十三月為正其飾最大故曰母追母追者言其追大也爵弁者周人宗廟之冠也禮郊特牲曰周弁士冠經曰周弁殷冔夏收爵何以知指謂其色又乍言爵弁乍但言弁周之冠色所以爵何為周尚赤所以不純赤但如爵頭何以本制冠者法天天色𤣥者不失其質故周加赤殷加白夏之冠色純𤣥何以知殷加白也周加赤知殷加白也夏殷士冠不異何古質也以士冠禮知之䘮服諸侯為天子斬衰三年何普天之下莫非王土率土之濱莫非王臣臣之於君猶子之於父明至尊臣子之義也喪服經曰諸侯為天子斬衰三年天子為諸侯絶朞何示同愛百姓明不獨親也故禮中庸曰朞之喪達乎諸侯三年之喪達乎天子卿大夫降緦重公正也禮庶人國君服齊衰三月王者崩京師之民喪三月何民賤而王貴故三月而已天子七月而葬諸侯五月而葬者則民始哭素服先葬三月成齊衰朞月以成禮葬君也禮不下庶人所以為民制何禮不下庶人者尊卑制度也服者恩從内發故為之制也王者崩臣下服之有先後何恩有深淺逺近故制有日月檀弓記曰天子崩三日祝先服五日官長服七日國中男女服三月天下服三年之喪何二十五月以為古民質痛於死者不封不樹喪期無數亡之則除後代聖人因天地萬物有終始而為之制以朞斷之父至尊母至親故為加隆以盡孝子恩恩愛至深加之則倍故再朞二十五月也禮有取於三故謂之三年縁其漸三年之氣也故春秋𫝊曰三年之喪其實二十五月也三年之䘮不以閠月數何以其言朞也朞者復其時也大功已下月數故以閏月除禮士虞經曰言朞而小祥又朞而大祥喪禮必制衰麻何以副意也服以飾情情貎相配中外相應故吉㓙不同服歌哭不同聲所以表中誠也布衰裳麻絰簫笄繩纓苴杖為畧及本絰者亦示也故㹅而載之示有喪也腰絰者以代紳帶也所以結之何思慕腸若結也必再結之何明思慕無已所以必杖者孝子失親悲哀哭泣三日不食身體羸病故杖以扶身明不以死傷生也禮童子婦人不杖者以其不能病也禮曰斬衰三日不食齊衰二日不食大功一日不食小功緦麻一日不食再不食可也以竹杖何取其名也竹者蹙也桐者痛也父以竹母以桐何竹者陽也桐者陰也竹何以為陽竹斷而用之質故為陽桐削而用之加人功文故為隂也故禮曰苴杖竹也削杖桐也所以必居倚廬何孝子哀不欲聞人之聲又不欲居故處居中門之外倚木為廬質反古也不在門外何戒不虞故也故禮大傳曰父母之喪居倚廬於中門外東墻下户北靣練而居堊室無餘之室又曰婦人不居倚廬又曰天子七日又曰公諸侯五日卿大夫三日而服成居外門内赤壁下為廬寢苫塊哭無晝夜時不脫絰帶既虞寢有席蔬食飲水朝一哭夕一哭而已既練舍外寢居琧室始食菜果及素食哭無時二十五月而大祥飲醴酒食乾肉二十七月而禫通祭宗廟去喪之殺也喪禮不言者何思慕盡情也言不文者指謂士民不言而事成者國君卿大夫杖而謝賓財少恃力靣垢作身不言而事具者故號哭盡情喪有病得飲酒食肉何所以輔人生已重先祖遺支體也故曲禮曰居䘮之禮頭有瘡則沐身有痬則浴有疾則飲酒食肉五十不致毁七十唯衰麻在身飲酒食肉又曰父母有疾食肉不至變味飲酒不至變皃笑不至矧怒不至詈琴瑟不御曾子問曰三年之䘮練不羣立不旅行禮以飾情三年之䘮而弔哭不亦虚乎禮檀弓曰曾子有母之䘮弔子張子張者朋友有服雖重服弔之可也曾子問曰小功可以與祭乎孔子曰斬衰已下與祭禮也此謂君䘮然也子夏問三年之䘮既卒哭金革之事無避者禮與孔子曰吾聞諸老聃曰魯公伯禽則有為之也今以三年之喪從其利者吾不知也婦人不出境弔者婦人無外事防淫佚也禮雜記曰婦人越疆而弔非禮也而有三年䘮君與夫人俱徃禮妻為父母服夫亦當服有不弔三何為人臣子常懐恐懼深思逺慮志在全身今乃畏厭溺死用為不義故不弔也檀弓曰不弔三畏厭溺也畏者兵死也禮曾子記曰大辱加於身皮體毁傷即君不臣士不交祭不得為昭穆之尸食不得昭穆之牲死不得葬昭穆之域也弟子為師服者弟子有君臣父子朋友之道也故生則尊敬而親之死則哀痛之恩㴱義重故為之隆服入則絰出則否檀弓曰昔夫子之䘮顔囘若䘮子而無服䘮子路亦然請䘮夫子若䘮父而無服也曾子問曰君薨既殯而臣有父母之䘮則如之何孔子曰歸居于家有殷事則之君所朝夕否曰君既斂而臣有父母之喪則如之何孔子曰歸殯哭而反于君所有殷事則歸朝夕否大夫室老行事士則子孫行事大夫内子有殷事則亦之君所朝夕否諸侯有親䘮聞天子崩奔䘮者何屈己親親猶尊尊之義也春秋𫝊曰天子記崩不記葬者必其時葬也諸侯記葬不必有時諸侯為有天子䘮尚奔不得必以其時葬也大夫使受命而出聞父母之䘮非君命不反者葢重君也故春秋𫝊曰大夫以君命出聞䘮徐行不反諸侯朝而有私䘮得還何凶服不入公門君不呼之義也凶服不敢入公門者明尊朝廷吉凶不相干故周官曰凶服不入公門曲禮曰居䘮不言樂祭事不言凶公庭不言婦女論語曰子於是日哭則不歌臣下有大喪不呼其門者使得終其孝道成其大禮春秋𫝊曰古者臣有大䘮君三年不呼其門聞哀哭而後行何盡哀舒憤然後行望國境則哭過市朝則否君子自抑小人勉以及禮見星則止日行百里惻怛之心但欲見尸柩汲汲故禮奔䘮以哭答使者盡哀問故遂行曾子曰師三十里者行五十里奔䘮百里既除䘮乃歸哭於墓何眀死復不可見痛傷之至也謂喪不得追服者也哭於墓而已故禮奔䘮記曰之墓西向哭止此謂逺出歸後葬䘮服以禮除曾子與客立於門其徒趨而出曾子曰爾将何之曰吾父死將出哭於巷曾子曰反哭於爾次曾子北面而弔焉檀弓記曰孔子曰吾惡乎哭諸兄弟吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門外所知吾哭諸野養從生葬從死周公以王禮𦵏何以為周公踐祚理政與天同志展興周道顯天度數萬物咸得休氣允塞原天之意子愛周公與文武無異故以王禮葬使得郊祭尚書曰今天動威以彰周公之徳下言禮亦宜之崩薨書曰成王崩天子穪崩何别尊卑異生死也天子曰崩大尊象崩之為言崩伏强天下撫擊失神明黎庶殞涕海内悲涼諸侯曰薨國失陽薨之言奄也奄然亾也大夫曰卒精熠終卒卒之為言終於國也士曰不禄失其忠節不忠終君之祿祿之言消也身消名彰庶人曰死魂去亾死之為言澌精氣竆也崩薨紀於國何以為有尊卑之禮謚號之制即有矣禮始於黄帝至堯舜而備易言復者據遂也書殂落死者矣各自見義堯皆憯痛之舜見終各一也䘮者何謂也䘮者亾人死謂之䘮言其亾不可復得見也不直言䘮何為孝子心不忍言尚書曰武王既䘮䘮終曰死為適室知據死者稱䘮也生者哀痛之亦稱䘮禮曰䘮服斬衰易曰不封不樹䘮期無數孝經曰孝子之䘮親也是施生者也天子下至庶人俱言䘮何欲言身體髪膚俱受之父母其痛一也天子崩訃告諸侯何緣臣子䘮君哀痛憤懣無能不告語人者也諸侯欲聞之又當持土地所出以供䘮事故禮曰天子崩遣使者訃諸侯王者崩諸侯悉奔䘮何臣子悲哀慟怛莫不欲觀君父之棺柩盡悲哀者也又為天子守蕃不可頓空也故分為三部有始死先奔者有得中來盡其哀者有得會䘮奉送君者七月之間諸侯有在京師親供臣子之事者也號泣悲哀奔走道路者有居其國哭痛思慕竭盡所供以助䘮事者是四海之内咸悲臣下若䘮考妣之義也葬有會者親疎逺近盡至親親之義也童子諸侯不朝而来奔䘮者何明臣子於其君父非有老少也亦因䘮質無般旋之禮但盡悲哀而已臣死亦赴告於君何此君哀痛於臣子也欲聞之加賻賵之禮故春秋曰蔡侯考父卒𫝊曰卒赴而葬禮也諸侯薨赴告隣國何緣隣國欲有禮也春秋𫝊曰桓母䘮告於諸侯桓母賤尚告於諸侯諸侯薨告隣國明矣諸侯夫人薨告天子者不敢自廢政事天子亦欲知之當有禮也春秋曰天子使宰咺來歸惠公仲子之賵譏不及事仲子者魯君之貴妾也何况於夫人乎諸侯薨使臣歸瑞珪於天子何諸侯以瑞珪為信今死矣嗣子諒闇三年之後當乃更爵命故歸之推譲之義也禮曰諸侯薨使臣歸瑞珪於天子天子聞諸侯薨哭之何慘怛發中哀痛之至也使大夫弔之追逺重終之義也故禮檀弓曰天子哭諸侯爵弁純衣又曰遣大夫弔詞曰皇天降災子遭離之難嗚呼哀哉天王使臣某弔臣子死君徃弔之何親與之共治民恩㴱義重厚欲躬見之故禮雜記曰君弔臣主人待于門外見馬首不哭君至主人先入君升自阼階西向哭主人居中庭從哭或曰大夫疾君問之無數士疾二問之而大夫卒比葬不食肉比卒哭不舉樂士比殯不舉樂𤣥冠不以弔者不以吉服臨人凶示助哀也論語曰羔裘𤣥冠不以弔崩薨三日乃小斂何奪孝子之恩以漸也一日之時属纊於口上以候絶氣二日之時尚兾其生三日之時魂氣不還終不可奈何故禮士䘮經曰御者四人皆坐持禮属纊以候絶氣禮曰天子諸侯三日小斂大夫士二日小斂属纊於口者孝子欲生其親也人死必沐浴於中霤何示潔淨反本也禮檀弓曰死於牖下沐浴於中霤飯唅於牖下小斂於户内大斂於阼階殯於客位祖於庭葬於墓所以即逺奪孝子之㤙以漸也所以有飯唅何緣生食今死不欲虚其口故唅用珠寳物何也有益死者形體故天子飲以玉諸侯以珠大夫以米士以貝也贈襚何謂也贈之為言稱也玩好曰贈襚之為言遺也衣被曰襚知死者則贈襚所以助生送死追恩重終副至意也贈賵者何謂也贈者助也所以相佐給不足也故弔辭曰知生則賻貨財曰賻車馬曰賵天子七日而殯諸侯五日而殯事有小大所供者不等故王制曰天子七日而殯諸侯五日而殯卿大夫三日而殯夏后氏殯於阼階殷人殯於兩楹之間周人殯於西階之上何夏后氏敎以忠忠者厚也曰生吾親也死亦吾親也主人宜在阼殷人敎以敬曰死者將去又不敢容也故置之两楹之間賓主共夾而敬之周人敎以文曰死者將去不可又得故賔客之也檀弓記曰夏后氏殯於阼階殷人殯於两楹之間周人殯於西階稽命徴曰天子舟車殯何為避水火災也故棺在車上車在舟中臣子更執紼晝夜常百二十二人紼者所以掌持棺也故禮曰天子舟車殯諸侯車殯大夫倚塗士瘞尊卑之差也祖於庭何盡孝子之恩也祖者始也始載於庭也乗軸車辭祖禰故名為祖載也禮曰祖於庭葬於墓又曰適祖昇自西階所以有棺槨何所以掩藏形惡也不欲令孝子見其毁壊也棺之為言兒所以藏尸令兒全也槨之為言廓所以開廓辟土無令廹棺也禮王制曰天子棺槨九重衣衾百二十稱丁領大度曰公侯五重衣衾九十稱士再重禮曰大夫有大棺三重衣衾五十稱士無大棺二重衣衾三十稱單祫備為一稱禮檀弓曰天子棺四重水兕革棺被之其厚三寸杝棺一梓棺二栢椁以端長六尺有虞氏瓦棺今以木何虞尚質故用瓦夏后氏益文故易之以堲周謂堲木相周無膠漆之用也殷人棺槨有膠漆之用周人浸文墻置􅀢如巧飾䘮𦵏之禮緣生以事死生時無死亦不敢造太古之時穴居野䖏衣皮帯革故死衣之以薪内藏不飾中古之時有宫室衣服故衣之幣帛藏以棺槨封樹識表體以象生夏殷彌文齊之以器械至周大文緣夫婦生時同室死同葬之尸柩者何謂也尸之為言失也陳也失氣亾神形體獨陳柩之為言究也久也不復章也曲禮曰在床曰尸在棺曰柩崩薨别號至墓同何也時臣子藏其君父安厝之義貴賤同葬之為言下藏之也所以入地何人時於隂含陽光死始入地歸所與也天子七月而𦵏諸侯五月而𦵏何尊卑有差也天子七月而葬同軌必至諸侯五月而𦵏同㑹必至所以慎終重䘮也禮曰家人奉圗先君之𦵏君居以中昭穆為左右羣臣從葬以貴賤序合葬者所以固夫婦之道也故詩曰榖則異室死則同穴又禮檀弓曰合𦵏非古也自周公已来未之有改也葬於城郭外何死生别處終始異居易曰葬之中野所以絶孝子之思慕也𫝊曰作樂於廟不聞於墓哭泣於墓不聞於廟所以於北方何就隂也檀弓曰孔子卒所以受魯君之璜玉葬魯城壮又曰於邑北北首三代之達禮也封樹者所以為識故檀弓曰古也墓而不墳今丘也東西南北之人也不可以不識也於是封之崇四尺春秋含文嘉曰天子墳髙三仞樹以松諸侯半之樹以栢大夫八尺樹以欒士四尺樹以槐庶人無墳樹以楊栁白虎通義卷下
