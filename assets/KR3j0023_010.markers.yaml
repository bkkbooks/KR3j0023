  - {type: variant, offset: 839, length: 5, content: 將軍必於廟, SBCK: 使者計諸侯王者崩諸侯悉奔䘮}
  - {type: variant, offset: 839, length: 3, content: 將軍必, WYG: 使者訃諸侯王者崩諸侯悉奔䘮何臣子悲哀慟怛莫不欲觀君父之棺柩盡悲哀者也又為天子守蕃不可頓空也故分為三部有始死先奔者有得中來盡其哀者有得會䘮奉送君者七月之間諸侯有在京師親供臣子之事者也號泣悲哀奔走道路者有居其國哭痛思慕竭盡所供以助䘮事者是四海之内咸悲臣下若䘮考妣之義也葬有會者親疎逺近盡至親親之義也童子諸侯不朝而来奔䘮者何明臣子}
  - {type: page-break, offset: 839, content: '', id: KR3j0023_WYG_002-69b, image: WYG0850/WYG0850-0070d.png}
  - {type: variant, offset: 839, length: 5, content: 將軍必於廟, krp: 使者計諸侯王者崩諸侯悉奔䘮}
  - {type: variant, offset: 843, length: 1, content: 廟, WYG: 其君父非有老少也亦因䘮質無般旋之禮但盡悲哀而已臣死亦赴告於君}
  - {type: punctuation, offset: 845, content: ？, id: KR3j0023_tls_010-bkkpn240}
  - {type: 'tls:seg', offset: 845, content: '', id: KR3j0023_tls_010-534a.2}
  - {type: variant, offset: 845, length: 1, content: 示, SBCK: 臣子悲哀慟怛莫}
  - {type: variant, offset: 845, length: 1, content: 示, WYG: 此君哀痛於臣子也欲聞之加賻賵之禮故春秋曰蔡侯考父卒𫝊曰卒赴而葬禮也諸侯薨赴告隣國何緣隣國欲有禮也春秋𫝊曰桓母䘮告於諸侯桓母賤尚告於諸侯諸侯薨告隣國明矣諸侯夫人薨告天子者}
  - {type: page-break, offset: 845, content: '', id: KR3j0023_WYG_002-70a, image: WYG0850/WYG0850-0071a.png}
  - {type: variant, offset: 845, length: 1, content: 示, krp: 臣子悲哀慟怛莫}
  - {type: variant, offset: 847, length: 3, content: 敢自專, SBCK: 欲觀君父之棺柩盡悲哀者}
  - {type: variant, offset: 847, length: 3, content: 敢自專, krp: 欲觀君父之棺柩盡悲哀者}
  - {type: variant, offset: 849, length: 1, content: 專, WYG: 廢政事天子亦欲知之當有禮}
  - {type: punctuation, offset: 851, content: 。, id: KR3j0023_tls_010-bkkpn241}
  - {type: 'tls:seg', offset: 851, content: '', id: KR3j0023_tls_010-534a.3}
  - {type: variant, offset: 851, length: 8, content: 獨於祖廟何制法度, SBCK: 又爲天子守蕃不可頓空也故分爲三部有始死先奔}
  - {type: variant, offset: 851, length: 1, content: 獨, WYG: 春秋曰天子使宰咺來歸惠公仲子之賵譏不及事仲子者魯君之貴妾也何况}
  - {type: variant, offset: 851, length: 8, content: 獨於祖廟何制法度, krp: 又爲天子守蕃不可頓空也故分爲三部有始死先奔}
  - {type: variant, offset: 853, length: 0, content: '', WYG: 夫人乎諸侯薨使臣歸瑞珪於天子何諸侯以瑞珪為信今死矣嗣子諒闇三年之後當乃更爵命故歸之推譲之義也禮曰諸侯薨使臣歸瑞珪於天子天子聞諸侯薨哭之何慘怛發中哀痛之至也使大夫弔之追逺重終之義也故禮檀弓曰天子哭諸侯爵弁純衣又曰遣大夫弔詞曰皇天降災子遭離之難嗚呼哀哉天王使臣某弔臣子死君徃弔之何親與之共治民恩㴱義重厚欲躬見之故禮雜記曰君弔臣主人待于門外見馬首不哭君至主人先入君升自阼階西向哭主人居中庭從哭或曰大夫疾君問之無數士疾二問之而大夫卒比葬不食肉比卒哭不舉樂士比殯不舉樂𤣥冠不以弔者不以吉服臨人凶示助哀也論語曰羔裘𤣥冠不以弔崩薨三日乃小斂何奪孝子之恩以漸也一日之時属纊於口上以候絶氣二日之時尚兾其生三日之時魂氣不還終不可奈何故禮士䘮經曰御者四人皆坐持禮属纊以候絶氣禮曰天子諸侯三日小斂大夫士二日小斂属纊於口者孝子欲生其親也人死必沐浴於中霤何示潔淨反本也禮檀弓曰死於牖下沐浴於中霤飯唅於牖下小斂於户内大斂於阼階殯於客位}
  - {type: page-break, offset: 853, content: '', id: KR3j0023_WYG_002-70b, image: WYG0850/WYG0850-0071b.png}
  - {type: page-break, offset: 853, content: '', id: KR3j0023_WYG_002-71a, image: WYG0850/WYG0850-0071c.png}
  - {type: variant, offset: 854, length: 1, content: 廟, WYG: 於庭葬於墓所以即逺奪孝子之㤙以漸也所以有飯唅}
