  - {type: variant, offset: 7, length: 1, content: 古, SBCK: 千里之外設方伯五國以爲属属有長十國以爲連連有率三十國以爲卒卒有正二百一十國以爲州州有伯唐虞謂之牧何尚質使大夫往來牧諸侯故謂之牧旁立三人凡十二人尚書曰咨十有二牧何知堯時十有二州也以禹貢言九州也王}
  - {type: page-break, offset: 7, content: '', id: KR3j0023_SBCK_003-3a}
  - {type: variant, offset: 7, length: 1, content: 古, WYG: 千里之外設方伯五國以為属属有長十國以為連連有率三十國以為卒卒有正二百一十國以為州州有伯唐虞謂之牧何尚質使大夫往來牧諸侯故謂之牧旁立三人凡十二人尚書曰咨十有二牧何知堯時十有二州也以禹貢言九州也王}
  - {type: variant, offset: 7, length: 1, content: 古, krp: 千里之外設方伯五國以爲属属有長十國以爲連連有率三十國以爲卒卒有正二百一十國以爲州州有伯唐虞謂之牧何尚質使大夫往來牧諸侯故謂之牧旁立三人凡十二人尚書曰咨十有二牧何知堯時十有二州也以禹貢言九州也王}
  - {type: page-break, offset: 8, content: '', id: KR3j0023_WYG_001-32a, image: WYG0850/WYG0850-0018c.png}
  - {type: variant, offset: 9, length: 1, content: 生, SBCK: 所以有二伯者分職而授政欲其亟成也王制曰八伯各以其属属於天子之老曰二伯詩云蔽芾甘棠勿剪勿伐邵伯所茇春秋公羊傳曰自陜巳東周公主之自陜已西邵公主之不分南北何東方􅀍聖人化日少西方􅀍聖人化日乆故分東西使聖人主其難者賢者主其易者乃俱到太平也又欲令同有隂陽寒暑之節共法度也所分陜者是國中也􅀂言面八百四十國矣諸侯有三卿者分三事也五大夫者下天子王制曰大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君大夫悉同禮王度記曰子男三卿一卿命於天子諸侯封不過百里象雷震百里所潤􅀨同也雷者隂中之陽也諸侯象也諸侯比王者爲隂南面賞罰爲陽法雷也七十里五十里差德功也故王制曰凢四海之内九州州方千里建百里之國二十七十里之國六十五十里之國百有二十名山大澤不以封其餘以爲附庸間田天子所治方千里此平土三千并數邑居山川至五十里名山大澤不以封者與百姓共之不使一國獨專也山木之饒水泉之利千里相通所均有}
  - {type: page-break, offset: 9, content: '', id: KR3j0023_SBCK_003-3b}
  - {type: page-break, offset: 9, content: '', id: KR3j0023_SBCK_003-4a}
  - {type: variant, offset: 9, length: 1, content: 生, WYG: 所以有二伯者分職而授政欲其亟成也王制曰八伯各以其屬屬於天子之老曰二伯詩云蔽芾丼棠勿剪勿伐召伯所茇春秋公羊傳曰自陜已東周公主之自陜已西召公主之不分南北何東方被聖人化日少西方被聖人化日久故分東西使聖人主其難者賢者主其易者乃俱致太平也又欲令同有陰陽寒暑之節共法度也所分陜者是國中也若言靣八百四十國矣諸侯有三卿者分三事也五大夫者下天子王制曰大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君小國二卿皆命於其君大夫悉同禮王度記曰子男三卿一卿命於天子諸侯封不過百里象雷震百里所潤雨同也雷者陰中之陽也諸侯象也諸侯比王者為陰南靣賞罰為陽法雷也七十里五十里差徳功也故王制曰凡四海之内九州州方千里建百里之國三十七十里之國六十五十里之國百有二十名山大澤不以封其餘以為附庸閒田天子所治方千里此平土三千并數邑居山川至五十里名山大澤不以封者與百姓共之不使一國獨專也山木之饒水泉之利千里相通所均有}
