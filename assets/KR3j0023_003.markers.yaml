  - {type: variant, offset: 117, length: 2, content: 丁巳, krp: 適以長不以賢立子以賢不以長也始封諸侯無子死不得與兄弟何古者象賢也弟非賢者子孫春秋傳曰善善及子孫不言及昆弟昆弟尊同無相承養之義以閔公不繼莊公也昆弟不相繼之義至繼體諸侯無子得及親属者以其俱賢者子孫也重其先祖之功故得及之禮服傳曰大宗不可絶同宗則可以爲後爲人作子何明小宗可以絶大宗不可絶故舎已之父往爲後於大宗所以尊祖重不絶大宗也春秋傳曰爲人後者爲人子者繼丗諸侯無子又無弟但有諸父庶兄當誰庶與兄推親之序也王者受命而作興㓕國繼絶丗何爲先王無道妄煞無辜及嗣子㓜弱爲强臣所奪子孫皆無罪囚而絶重其先人之功故復立之論語曰興㓕國繼絶丗誅君之子不立者義無所繼也諸侯丗位象賢也今親𬒳誅絶也春秋傳曰誅君之子立君見弑其子得立何所以尊君防篡弑春秋繼經曰齊無知殺其君貴妾子公子紏當立也大夫功成未封子得封者善善及子孫也春秋傳曰賢者子孫宜有土地也周公不之魯何爲周公繼武王之業也春秋傳曰周公曷爲不之魯欲天下一于周也詩云王曰叔父建爾無子俾侯于魯周公身薨天爲之變成王以天子之禮}
