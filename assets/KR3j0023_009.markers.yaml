  - {type: variant, offset: 668, length: 615, content: 東方其臭羶南方其臭焦中央其臭香西方其臭腥北方其臭朽所以名之為東方者動方也萬物始動生也南方者任養之方萬物懷任也西方者遷方也萬物遷落也北方者伏方也萬物伏藏也少陽見於寅寅者演也律中大太簇律之言率所以率氣令生也盛於卯卯者茂也律中夾鍾衰於辰辰者震也律中姑洗其日甲乙甲者萬物孚甲也乙者物蕃屈有節欲出時為春春之為言偆偆動也位在東方其色青其音角角者氣動耀躍也其帝太皞太皞者大起萬物擾也其神勾芒勾芒者物之始生其精青龍芒之為言萌也陰中陽故太陽見於巳巳者物必起律中仲呂壯盛於午午物滿長律中蕤賓衰於未未味也律中林鍾其日丙丁丙者其物炳明丁者強也時為夏夏之言大也位在南方其色赤其音徵徵止也陽度極也其帝炎帝炎帝者太陽也其神祝融祝融者屬續也其精為朱鳥離為鸞故少陰見於申申者身也律中夷則壯於酉酉者老也物收歛律中南呂衰於戍戍者滅也律中無射無射者無聲也其日庚辛庚者物更庚也辛者陰始成時為秋秋之為言愁亡也其位西方其色白其音商商者強也其帝少皞少皞者少歛也其神蓐收蓐收者縮也其精白虎虎之為言搏討也故太陰見於亥亥者仰侅也律中應鍾壯於子於子者孳也律中黃鍾衰於丑丑者紐也律中大呂其日壬癸壬者陰始使任癸者揆揆度可揆度也時為冬冬之為言終也其位在北方其音羽羽之為言舒言萬物始孳其帝顓頊顓頊者寒縮也其神玄冥玄冥者入冥也其精玄武掩起離體泉龜蛟珠蛤土為中宮其日戊己戊者茂也己者抑屈起其音宮宮者中也其帝黃帝其神后土月令云月令十一月律謂之黃鍾何黃中和之色鍾者動也言陽氣潛藏動於黃泉之下動養萬物也十, WYG: ''}
