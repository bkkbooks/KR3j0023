  - {type: variant, offset: 115, length: 5, content: 春求穀秋報, krp: 本廵狩爲祭天告至尚書曰東廵狩至于岱宗柴也王者出必告廟何孝子出辤反面事死如事生尚書歸假于祖禰曽子問曰王者諸侯出稱告祖禰使祝遍告五廟尊親也王者將出告天者示不專也故王制曰類于上帝冝乎社造于禰類祭以祖配不曰接者尊無二禮尊尊}
