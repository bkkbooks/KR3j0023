  - {type: variant, offset: 725, length: 1, content: 謚, SBCK: 射無射者無聲也其曰庚辛庚者物更也辛者隂始成時爲秋秋之爲言愁亡也其位西方其色白其音啇啇者強也其帝少皥少皥者少歛也其神蓐収蓐収者縮也其精白虎虎之爲言􅅮討也故太隂見於亥亥者仰也律中應鍾壯於子於子者孳也律中黄鍾衰於丑丑者紐也律中大吕其日壬癸壬者隂始任癸者揆揆度可揆度也時爲冬冬之爲言終也其位在北方其音羽羽之爲言舒言萬物始孳其帝顓頊顓頊者寒縮也其神玄㝠玄㝠者入㝠也其精玄武掩起離體泉􅀛蛟珠蛤土爲中宫其日戊巳戊者茂也巳抑屈起其音宫宫者中也其帝黄帝其神后土月令云十一月律謂之黄鍾}
