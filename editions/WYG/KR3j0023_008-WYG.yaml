body:
  text: 情性情性者何謂也性者陽之施情者隂之化也人稟陰陽氣而生故内懐五性六情情者静也性者生也此人所稟六氣以生者也故鈎命訣曰情生於陰欲以時念也性生於陽以理也陽氣者仁陰氣者貪故情有利欲性有仁也五常者何謂仁義禮智信也仁者不忍也施生愛人也義者宜也㫁决得中也禮者履也履道成文也智者知也獨見前聞不惑於事見微者也信者誠也専一不移也故人生而應八卦之體得五氣以為常仁義禮智信是也六情者何謂也喜怒哀樂愛惡謂六情所以扶成五性性所以五情所以六者何人本含六律五行氣而生故内有五藏六府此情性之所由出入也樂動聲儀曰官有六府人有五藏五藏者何也謂肝心肺腎脾也肝之為言干也肺之為言費也情動得序心之為言任也任於恩也腎之為言冩也以竅寫也脾之為言辨也所以積精稟氣也五藏肝仁肺義心禮腎智脾信也肝所以仁者何肝木之精也仁者好生東方者陽也萬物始生故肝象木色青而有枝葉目為之候何目能出淚而不能内物木亦能出枝葉不能有所内也肺所以義者何肺者金之精義者㫁决西方亦金成萬物也故肺象金色白也鼻為之候何鼻出入氣髙而有竅山亦有金石累積亦有孔穴出雲布雨以潤天下雨則雲消鼻能出納氣也心所以為禮何心火之精也南方尊陽在上卑陰在下禮有尊卑故心象火色赤而銳也人有道尊天本在上故心下銳也耳為之候何耳能遍内外别音語火照有似於禮上下分明腎所以智何腎者水之精智者進而止無所疑惑水亦進而不惑北方水故腎色黑水陰故腎雙竅為之候何竅能㵼水亦能流濡脾所以信何脾者土之精也土尚任養萬物為之象生物無所私信之至也故脾象土色黄也口為之候何口能啖嘗舌能知味亦能出音聲吐滋液故元命苞曰目者肝之使肝者木之精蒼龍之位也鼻者肺之使肺者金之精制割立㫁耳者心之候心者火之精上為張星陰者腎之寫腎者水之精上為虚危口者脾之門户脾者土之精上為北斗主變化者也或曰口者心之候耳者腎之候或曰肝繫於目肺繫於鼻心繫於口脾繫於舌腎繫於耳六府者何謂也謂大腸小腸胃膀胱三焦膽也府者為藏宫府也故禮運記曰六情所以扶成五性也胃者脾之府也脾主禀氣胃者穀之委也故脾禀氣也膀胱者腎之府也腎者主瀉膀胱常能有熱故先决難也三焦者包絡府也水糓之道路氣之所終始也故上焦若竅中焦若編下焦若瀆膽者肝之府也肝者木之精也主仁仁者不忍故以膽㫁也是以肝膽二者必有勇也肝膽異趣何以知相為府也肝者木之精也木之為言牧也人怒無不色青目脤張者是其效也小腸大腸心肺府也主禮義禮義者有分理腸之大小相承受也腸為心肺主心為皮體主故為兩府也目為心視口為心談耳為心聽鼻為心嗅是其支體主也喜在西方怒在東方好在北方惡在南方哀在下樂在上何以西方萬物之成故喜東方萬物之生故怒北方陽氣始施故好南方陰氣始起故惡上多樂下多哀也魂魄者何謂魂猶伝伝也行不休於外也主於情魄者迫然著人主於性也魂者芸也情以除穢魄者白也性以治内精神者何謂也精者静也太陰施化之氣也象火之化任生也神者恍惚太隂之氣也間捴云支體萬化之本也夀命命者何謂也人之壽也天命已使生者也命有三科以記騐有壽命以保度有遭命以遇暴有隨命以應行習壽命者上命也若言文王受命唯中身享國五十年隨命者隨行為命若言怠弃三正天用勦絶其命矣又欲使民務仁立義闕無滔天滔天則司命舉過言則用以弊之遭命者逢世殘賊若上逢亂君下必災變暴至夭絶人命沙鹿崩于受邑是也冉伯牛危言正行而遭惡疾孔子曰命矣夫斯人也而有斯疾也夫子過鄭與弟子相失獨立郭門外或謂子貢曰東門有一人其頭似堯其頸似臯繇其肩似子産然自腰以下不及禹三寸儡儡如䘮家之狗子貢以告孔子孔子喟然而笑曰形狀未也如䘮家之狗然哉乎然哉乎宗族宗者何謂也宗尊也為先祖主也宗人之所尊也禮曰宗人將有事族人皆待聖者所以必有宗何也所以長和睦也大宗能率小宗小宗能率羣弟通於有無所以紀理族人者也宗其為始祖後者為大宗此百世之所宗也宗其為髙祖後者五世而遷者也髙祖遷於上宗則易於下宗其為曾祖後者為曾祖宗宗其為祖後者為祖宗宗其為父後者為父宗以上至髙祖宗皆為小宗以其轉遷别於大宗也别子者自為其子孫為祖繼别也各自為宗小宗有四大宗有一凡有五宗人之親所以備矣諸侯奪宗明尊者宜之大夫不得奪宗何曰諸侯世世傳子孫故奪宗大夫不傳子孫故不宗也䘮服經曰大夫為宗子不言諸侯為宗子也族者何也族者湊也聚也謂恩愛相流湊也生相親愛死相哀痛有㑹聚之道故謂之族尚書曰以親九族族所以九何九之為言究也親踈恩愛究竟也謂父族四母族三妻族二父族四者謂父之姓一族也父女昆弟適人有子為二族也身女昆弟適人有子為三族也身女子適人有子為四族也母族三者母之父母一族也母之昆弟二族也母昆弟子三族也母昆弟者男女皆在外親故合言之妻族二者妻之父為一族妻之母為二族妻之親略故父母各一族禮曰惟是三族之不虞尚書曰以親九族義同也一說合言九族者欲明堯時俱三也禮所以獨父族四何欲言周承二弊之後民人皆厚於末故與禮母族妻之黨廢禮母族父之族是以貶妻族以附父族也或言九者據有交接之恩也若邢侯之姨譚公惟私也言四者據有服耳不相害所異也姓名人所以有姓者何所以崇恩愛厚親親逺禽獸别婚姻也故禮别類使生相愛死相哀同姓不得相娶皆為重人倫也姓生也人所稟天氣所以生者也詩云天生烝民尚書曰平章百姓姓所以有百何以為古者聖人吹律定姓以記其族人含五常而生聲有五音宫商角徴羽轉而相雜五五二十五轉生四時故百而異也氣殊音悉備故殊百也所以有氏者何所以貴功徳賤伎力或氏其官或氏其事聞其氏即可知其所以勉人為善也或氏王父字何所以别諸侯之後為興滅國繼絶世也諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏故魯有仲叔季楚有昭屈景齊有髙國崔立氏三以知其為子孫也王者之後二稱王子兄弟立而皆封也或曰王孫上稱王孫也堯知命表稷契賜生子姓臯陶典刑不表姓言天任徳逺刑禹姓姒氏祖以億生殷姓子氏祖以𤣥鳥子也周姓姬氏祖以履大人跡生也人必有名何所以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有變人生三月目煦亦能笑與人相更答故因其始有知而名之故禮服傳曰子生三月則父名之於祖廟於祖廟者謂子之親廟也明當為宗祖主也一說名之於燕寢名者幼少卑賤之稱也寡略故於燕寢禮内則曰子生君沐浴朝服夫人亦如之立于阼階西南世婦抱子升自西階君命之士適子執其右手庶子撫其􅈡君曰欽有帥夫人曰記有成告於四境四境者所以遏絶萌牙禁備未然故曾子問曰世子生三月以名告于祖禰内則記曰以名告于山川社稷四境天子太子使士負子於南郊以桑弧蓬矢六射者何也此男子之事也故先表其事然後食其祿必桑弧何桑者相逢接之道也保傅曰大子生舉之以禮使士負之者何齋肅端緌之郊見于天韓詩内傳曰太子生以桑弧蓬矢六射上下四方明當有事天地四方也殷以生日名子何殷家質故直以生日名子也以尚書道殷家太甲帝武丁也於臣民亦得以生日名子何亦不止也以尚書道殷臣有巫咸有祖已也何以知諸侯不象王者以生日名子也以太王名亶甫王季名歴殷之諸侯也易曰帝乙謂成湯帝乙謂六代孫也湯生於夏世何以用甲乙為名曰湯王後乃更變名子孫法耳本名履故論語曰予小子履履湯名也不以子丑何曰甲乙者幹也子丑者枝也幹為本本質故以甲乙為名也名或兼或單何示非一也或聽其聲以律定其名或依事旁其形故名或兼或單也依其事者若后稷是也弃之因名之為弃也旁其形者孔子首類魯國尼丘山故名為丘或旁其名為之字者聞名即知其字聞字即知其名若名賜字子貢名鯉字伯魚春秋譏二名何所以譏者乃謂其無常者也若乍為名祿甫元言武庚名不以日月山川為名者少賤卑已之稱也臣子當諱為物示通故避之也曲禮曰二名不偏諱逮事父母則諱王父母不逮父母則不諱王父母也君前不諱詩書不諱臨文不諱郊廟中不諱又曰君前臣名父前子名謂大夫名卿弟名兄也明不敢諱於尊者前也太古之時所不諱者何尚質也故臣子不諱其君父之名故禮記曰朝日上値不諱正天名也人所以十月而生者何人天子之也經天地之數五故十月而備乃成人也人生所以泣何本一幹而分得氣異息故泣重離母之義也尚書曰啓呱呱泣也人拜所以自名者何所以泣號自紀禮拜自後不自名何備隂陽也人所以相拜者何所以表情見意屈節卑體尊事之者也拜之言服也所以必再拜何法隂陽也尚書曰再拜稽首也必稽首何敬之至也頭至地何以言首謂頭也禮曰首有瘍則沐所以先拜首後稽首何名順其父質也尚書曰周公拜首稽首人所以有字何冠徳明功敬成人也故禮士冠經曰賓北靣字之曰伯某甫又曰冠而字之敬其名也所以五十乃稱伯仲者五十知天命思慮定也能順四時長幼之序故以伯仲號之禮檀弓曰幼名冠字五十乃稱伯仲論語曰五十而知天命稱號所以有四何法四時用事先後長幼兄弟之象也故以時長幼號曰伯仲叔季也伯者長也伯者子最長迫近父也仲者中也叔者少也季者幼也適長稱伯伯禽是也庶長稱孟以魯大夫孟氏男女異長各自有伯仲法陰陽各自有終始也春秋傳曰伯姬者何内女稱也婦人十五稱伯仲何婦人值少變陰陽道促蚤成十五通乎織絍之事思慮定故許嫁笄而字故禮經曰女子十五許嫁笄禮之稱字之婦姓以配字何明不娶同姓也故春秋曰伯姬歸于宋姬者姓也値字所以於仲春何値者親故近於仲文子尊尊故於伯仲之時物尚値叔之時物失之章即如是周有八士論語曰伯達伯适仲突仲忽叔夜叔夏季隨季騧積於叔何盖以兩兩俱生故也不積於伯季明其無二也文王十子詩傳曰伯邑考武王發周公旦管叔鮮蔡叔鐸成叔處霍叔武康叔封南季載載所以或上其叔何也管蔡霍成康南皆采也故上置叔上伯邑叔震也以獨無乎盖以為大夫者不是采地也天地天者何也天之為言鎮也居髙理下為人鎮也地者易也言養萬物懐任交易變化也始起之天始起先有太初後有太始形兆既成名曰太素混沌相連視之不見聽之不聞然後剖判清濁既分精出曜布度物施生精者為三光號者為五行行生情情生汁中汁中生神明神明生道徳道徳生文章故乾鑿度曰太初者氣之始也太始者形兆之始也太素者質之始也陽唱陰和男行女隨也天道所以左旋地道右周何以為天地動而不别行而不離所以在旋右周者猶君臣陰陽相對之義男女㹅名為人天地所以無㹅名何曰天圓地方不相類故無總名也君舒臣疾卑者宜勞天所以反常行何以為陽不動無以行其敎陰不静無以成其化雖終日乾乾亦不離其處也故易曰終日乾乾反覆道也日月天左旋日月五星右行何日月五星比天為陰故右行右行者猶臣對君也含文嘉曰計日月右行也刑徳放日月東行而日行遲月行疾何君舒臣勞也日日行一度月日行十三度十九分度之七感精符曰三綱之義日為君月為臣也日月所以懸晝夜者何助天行化照明下地故易曰懸象著明莫大乎日月日之為言實也常滿有節月之為言闕也有滿有闕也所以有缺何歸功於日也八日成光二八十六日轉而歸功晦至朔旦受符復行故援神契曰月三日成魄也所以名之為星何星者精也據日節言也一日一夜適行一度一日夜為一日剩復分天為三十六度周天三百六十五度四分度之一日月徑千里也所以必有晝夜何備陰陽也日照晝月照夜日所以有長短何陰陽更相用事也故夏節晝長冬節夜長夏日宿在東井出寅入戌冬日宿在牽牛出辰入申月大小何天道左旋日月東行日日行一度月日行十三度月及日為一月至二十九日未及七度即三十日者過行七度日不可分故月乍大小明有陰陽故春秋曰九月庚戌朔日有食之十月庚辰朔日有食之此三十日也又曰七月甲子朔日有食之八月癸巳朔日有食之此二十九日也月有閏餘何周天三百六十五日度四分度之一嵗十二月日過十二度故三年一閏五年再閏明陰不足陽有餘也故䜟曰閏者陽之餘四時所以名為歳何歳者遂也三百六十六日一周天萬物畢死故為一歳也尚書曰朞三百有六旬有六日以閏月定四時成歲春夏秋冬時者朞也陰陽消息之朞也四時天異名何天尊各據其盛者為名也春秋物變盛冬夏氣變盛春曰蒼天夏曰昊天秋曰旻天冬為上天爾雅曰一説春為蒼天等是也四時不隨正朔變何以為四時據物為名春當生冬當終皆以正為時也或言嵗或言載或言年何言嵗者以紀氣物帝王共之據曰為嵗春秋曰元年正月十有二月朔有朔者晦知據月斷為言年載之言成也載成萬物終始言之也二帝為載三王言年皆謂闚􅎿故尚書曰三載四海遏宻八音謂二帝也又曰諒陰三年謂三王也春秋傳曰三年之䘮其實二十五月知闚􅎿日言夜月言晦月言朔日言朝何朔之言蘓也明消更生故言朔日晝見夜藏有朝夕故言朝也衣裳聖人所以制衣服何以為絺􅗽蔽形表徳勸善别尊卑也所以名為裳何衣者隠也裳者鄣也所以隠形自鄣閉也易曰黄帝堯舜垂衣裳而天下治何以知上為衣下為裳以其先言衣也詩曰褰裳渉溱所以合為衣也弟子職言摳衣而降也名為衣何上兼下也獨以羔裘何取輕煖因狐死首丘明君子不忘本也羔者取跪乳遜順也故天子狐白諸侯狐黄大夫蒼士羔裘亦因别尊卑也所以必有紳帶示謹敬自約整繢繒為結於前垂三分身半紳居二焉以有鞶帯者示有事也其所以必有佩者論語曰去䘮無所不佩天子佩白玉諸侯佩𤣥玉大夫佩水蒼玉士佩瓀珉石佩即象其事若農夫佩其耒耜工匠佩其斧斤婦人佩其鍼鏤何以知婦人亦佩玉詩云將翺將翔佩玉將將彼美孟姜徳音不忘五刑聖人治天下必有刑罰何所以佐徳助治順天之度也故懸罰賞者示有勸也設刑罰者明有所懼也刑所以五何法五行也科條三千者應天地人情也五刑之屬三千大辟之屬二百宫辟之屬三百腓辟之屬五百劓墨辟之屬各千張布羅衆非五刑不見劓墨何其下刑者也腓者其臏宫者女子滛執置宫中不得出也丈夫滛割去其勢也大辟者謂死也刑不上大夫何尊大夫禮不下庶人欲勉民使至於士故禮為有知制刑為無知設也庶人雖有千金之幣不得服刑不上大夫者據禮無大夫刑或曰撻笞之刑也禮不及庶人者謂酬酢之禮也五經孔子所以定五經者何以為孔子居周之末世王道凌遲禮義廢壊强陵弱衆暴寡天子不敢誅方伯不敢伐閔道徳之不行故周流應聘冀行其聖徳自衞反魯自知不用故追定五經以行其道故孔子曰書曰孝乎惟孝友于兄弟施於有政是亦為政也孔子未定五經如何周衰道失綱散紀亂五敎廢壊故五常之經咸失其所象易失理則陰陽萬物失其性而乖設法謗之言並作書三千篇作詩三百篇而歌謡怨誹也已作春秋後作孝經何欲専制正於孝經何夫孝者自天子下至庶人上下通孝經者夫制作禮樂仁之本聖人道徳已備弟子所以復記論語何見夫子遭事異變出之號令失法文王所以演易何文王受王不率仁義之道失為人法矣已之調和陰陽尚微故演易使我得卒至于太平日月之光明則如易矣伏羲作八卦何伏羲始王天下未有前聖法度故仰則觀象於天俯則察法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以象萬物之情也經所以有五何經常也有五常之道故曰五經樂仁書義禮禮易智詩信也人情有五性懐五常不能自成是以聖人象天五常之道而明之以敎人成其徳也五經何謂易尚書詩禮春秋也禮解曰温柔寛厚詩敎也疏通知逺書敎也廣博易良樂敎也潔净精微易敎也恭儉莊敬禮教也屬辝比事春秋敎也春秋何常也則黄帝已來何以言之易曰上古結繩以治後世聖人易之以書契百官以理萬民以察後世聖人者謂五帝也傳曰三王百世計神元書五帝之受錄圖世史記從政録帝魁已來除禮樂之書三千二百四十篇也
