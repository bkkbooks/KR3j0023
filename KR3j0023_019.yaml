body:
  text: 巡狩王者所以巡狩者何巡者循也狩者牧也王者為天下循守行守牧民也道德太平恐遠近不同化政化幽隱有不得其所者故必親自行之謹敬重民之至也考禮義正法度同律曆計時月皆為民也尚書曰遂覲東后時月正日同律度量衡修五禮尚書大傳曰見諸侯問百年太師陳詩以觀民命風俗命市納賈以觀民好惡山川神祇有不舉者為不敬不敬者削以地宗廟有不順者為不孝不孝者黜以爵變禮易樂者為不從不從者君流改制度衣服衣服制度為畔畔者君討有功者賞之尚書曰明試以功車服以庸巡狩所以四時出何當承宗廟故不踰時也以夏之仲月者同律度當得其中也二月八月晝夜分五月十一月陰陽終尚書曰二月東巡狩至于岱宗柴五月南巡狩至于南嶽八月西巡狩至于西嶽十有一月朔巡狩至于北嶽所以五不歲巡狩何為太煩也過五年為太疏也因天道時有所生歲有所成三歲一閏天道小備五歲再閏天道大備故五歲年一巡狩三年小備二伯出述職黜陟一年物有終始歲有所成方伯行國時有所生諸侯行邑傳曰周公入為三公出為二伯中分天下出黜陟詩曰周公東征四國是皇言東征述職周公黜陟而天下皆正也又曰蔽芾甘棠勿剪勿伐召伯所茇言邵公述職親説舍於野樹之下也春秋穀梁傳曰古之君民以時視民之勤巡狩必祭天何本巡狩為天祭天所以告至也尚書曰東巡狩至于岱宗柴也王者出必告廟何孝子出辭反面事死如事生尚書曰歸假于祖禰曾子問曰王者諸侯出稱親告祖禰使祝遍插告五廟尊親也王者將出告天者示不專也故王制曰類于上帝宜乎社造于禰類祭以祖配不曰接者尊無二禮尊尊之義造于禰獨見禰何辭從卑不復敢留尊者之命至禰不謙嫌不至祖也即祭告天為告事也祖為出辭也義異告于尊者然後乃辭出王者諸侯出必將主何示有所尊故曾子問曰王者將出必以遷廟主行載于齋車示有尊也無遷主以幣帛皮主圭告于祖禰廟遂奉以出每舍奠焉蓋貴命也必以遷主者明廟不可空也王者巡狩諸侯待于境者何諸侯以守蕃為職也禮祭義曰天子巡狩諸侯待于境也王者巡狩必舍諸侯祖廟何明尊無二上也故禮坊記曰君適其臣升自阼階示民不敢有其室也禮運曰天子適諸侯必舍其祖廟王者出一公以其屬守二公以其屬從也王者巡狩崩于道歸葬何夫太子當為喪主天下皆來奔喪京師四方之中也即如是舜葬蒼梧禹葬會稽何于時尚質故死則止葬不重煩擾也王者所以太平乃巡狩何王者始起日月尚促德化未宣獄訟未息近不治遠不安故太平巡狩也何以知太平乃巡狩以武王不巡狩至成王乃巡狩也嶽者何謂也嶽之為言桶桷也桶捔功德也東方為岱宗者何言萬物更相代於東方也南方霍山者何霍之為言護也言萬物護也太陽用事護養萬物也小山繞大山為霍南衡山者上承景宿銓德均物故曰衡也西方為華山者何華之為言穫也言萬物成熟可得穫也北方為恆山者何恆者常也萬物伏藏於北方有常也中央為嵩高山者何嵩言其後高大之也故尚書大傳曰五嶽謂岱山霍山華山恆山嵩山也謂之瀆何瀆者濁也中國垢濁發源東注海其功著大故稱瀆也爾雅云江河淮濟為四瀆也
