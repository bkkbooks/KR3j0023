  - {type: variant, offset: 2436, length: 0, content: '', WYG: 號帝王者何號也號者功之表也所以表功明徳號令臣下者也徳合天地者稱帝仁義合者稱王别優劣也禮記諡法曰徳象天地稱帝仁義所生稱王帝者天號王者五行之稱也皇者何謂也亦號也皇君也美也大也天之總美大稱也時質故緫之也號之為皇者煌煌人莫違也煩一夫擾一士以勞天下不為皇也不擾匹夫匹婦故為皇故黄金弃於山珠玉捐於淵巖居穴處衣皮毛飲泉液吮露英虛無寥廓與天地通靈也號言為帝者何帝者諦也象可承也王者往也天下所歸往鈎命訣曰三皇步五帝趨三王馳五霸騖或稱天子或稱帝王何以為接上稱天子明以爵事天也接下稱帝王者得號天下至尊言稱以號令臣下也故尚書曰咨四岳曰格汝衆或有一人王者自謂一人者謙也欲言己材能當一人耳故論語曰百姓有過在予一人臣謂之一人何亦所以尊王者也以天下之大四海之内所共尊者一人耳故尚書曰不施予一人或稱朕何亦王者之謙也朕我也或稱予者予亦我也不以尊稱自也但自我皆謙或稱君子何道徳之稱也君之為言羣也子者丈夫之通稱也故孝經曰君子之教以孝也所以敬天下之為人父者也何以言知其通稱也以天子至於民故詩云凱弟君子民之父母論語云君子哉若人此謂弟子弟子者民也三皇者何謂也謂伏羲神農燧人也或曰伏羲神農祝融也禮曰伏羲神農祝融三皇也謂之伏羲者何古之時未有三綱六紀民人但知其母不知其父能覆前而不能覆後臥之詓詓起之吁吁飢即求食飽即弃餘茹毛飲血而衣皮韋於是伏羲仰觀象於天俯察法於地因夫婦正五行始定人道畫八卦以治下治下伏而化之故謂之伏羲也謂之神農何古之人民皆食禽獸肉至於神農人民衆多禽獸不足於是神農因天之時分地之利制耒耜教民農作神而化之使民宜之故謂之神農也謂之燧人何鑽木燧取火教民熟食養人利性避臭去毒謂之燧人也謂之祝融何祝者属也融者續也言能属續三皇之道而行之故謂祝融也五帝者何謂也禮曰黄帝顓頊帝嚳帝堯帝舜五帝也易曰黄帝堯舜氏作書曰帝堯帝舜黄帝中和之色自然之性萬世不易黄帝始作制度得其中和萬世常存故稱黄帝也謂之顓頊何顓者專也頊者正也能專正天人之道故謂之顓頊也謂之帝嚳者何也嚳者極也言其能施行窮極道徳也謂之堯者何堯猶嶤嶤也至髙之貌清妙髙逺優遊博衍衆聖之主百王之長也謂之舜者何舜猶僢僢也言能推信堯道而行之三王者何謂也夏殷周也故禮士冠經曰周弁殷冔夏收三王共皮弁也所以有夏殷周號何以為王者受命必立天下之美號以表功自克明易姓為子孫制也夏殷周者有天下之大號也百王同天下無以相别改制天下之大禮號以自别於前所以表著己之功業也必改號者所以明天命己著欲顯揚己於天下也己復襲先王之號與繼體守文之君無以異也不顯不明非天意也故受命王者必擇天下美號表著己之功業明當致施是也所以預自表克於前也帝王者居天下之尊號也所以差優號令臣下諡者行之跡也所以别於後代著善惡垂無窮無自推觀施後世皆以勸善著戒惡明不勉也不以姓為號何姓者一字之稱也尊卑所同也諸侯各稱一國之號而有百姓矣天子至尊即備有天下之號而兼萬國矣夏者大也明當守持大道殷者中也明當為中和之道也聞也見也謂當道著見中和之為也周者至也宻也道徳周宻無所不至也何以知即政立號也詩云命此文王于周于京此改號為周易邑為京也春秋傳曰王者受命而王必擇天下之美號以自號也五帝無有天下之號何五帝徳大能禪以民為子成于天下無為立號也或曰唐虞者號也唐蕩蕩也蕩蕩者道徳至大之貌也虞者樂也言天下有道人皆樂也故論語曰唐虞之際帝嚳有天下號髙辛顓頊有天下號曰髙陽黄帝有天下號曰自然者獨宏大道徳也髙陽者陽猶明也道徳髙明也髙辛者道徳大信也五霸者何謂也昆吾氏大彭氏豕韋氏齊桓公晉文公也昔三王之道衰而五霸存其政率諸侯朝天子正天下之化興復中國攘除夷狄故謂之霸也昔昆吾氏霸於夏者也大彭氏豕韋氏霸於殷者也齊桓晉文霸於周者也或曰五霸謂齊桓公晉文公秦穆公楚莊王呉王闔閭也霸者伯也行方伯之職㑹諸侯朝天子不失人臣之義故聖人與之非明王之張法霸猶迫也把也迫脅諸侯把持其政論語曰管仲相桓公霸諸侯春秋曰公朝于王所於是時晉文之霸尚書曰邦之榮懷亦尚一人之慶知秦穆之霸也楚勝鄭而不告從而攻之又令還師而佚晉冦圍宋宋因而與之平引師而去知楚莊之霸也蔡侯無罪而拘於楚呉有憂中國心興師伐楚諸侯莫敢不至知呉之霸也或曰五霸謂齊桓公晉文公秦穆公宋襄公楚莊王也宋襄伐楚不擒二毛不鼓不成列春秋傳曰雖文王之戰不是過知其霸也伯子男臣子於其國中褒其君為公王者臣子獨不得褒其君謂之為帝何以為諸侯有㑹聚之事相朝聘之道或稱公而尊或稱伯子男而卑為交接之時不私其臣子之義心俱欲尊其君父故皆令臣子得稱其君為公也帝王異時無㑹同之義故無為同也何以諸侯稱公齊侯桓公尚書曰公曰嗟秦伯也詩云譚公維私譚子也春秋曰葬許繆公許男也禮大射經曰則釋獲大射者諸侯之禮也伯子男皆在也諡諡者何也諡之為言引也引列行之跡也所以進勸成徳使上務節也故禮特牲曰古者生無爵死無諡此言生有爵死當有諡也死乃諡之何言人行終始不能若一故據其終始從可知也士冠經曰死而諡之今也所以臨葬而諡之何因衆㑹欲顯揚之也故春秋曰公之䘮至自乾侯昭公死於晉乾侯之地數月歸至急當未有諡也春秋曰丁巳葬戊午日下側乃克葬明祖載而有諡也黄帝先黄後帝何古者順死生之稱各持行合而言之美者在上黄帝始制法度得道之中萬世不易名黄自然也後世雖聖莫能與同也後世徳與天同亦得稱帝不能立制作之時故不得復稱黄也諡或一言或兩言何文者以一言為諡質者以兩言為諡故尚書曰髙宗殷宗也湯死後世稱成湯以兩言為諡也號無質文諡有質文何號者始也為本故不可變也周已後用意尤文以為本生時號令善故有善諡故舍文武王也合言之則上其諡明别善惡所以勸人為善戒人為惡也帝者天號也以為堯猶諡顧上世質直死後以其名為號耳所以諡之為堯何為諡有七十二品禮記諡法曰翼善傳聖諡曰堯仁聖盛明諡曰舜慈惠愛民諡曰文强理勁直諡曰武天子崩臣下至南郊諡之者何以為人臣之義莫不欲褒大其君掩惡揚善者也故之南郊明不得欺天也故曾子問孔子曰天子崩臣下之南郊告諡之諸侯薨世子赴告天子天子遣大夫㑹其葬而諡之何幼不誄長賤不誄貴諸侯相誄非禮也臣當受諡於君也卿大夫老歸死有諡何諡者别尊卑彰有徳也卿大夫歸無過猶有祿位故有諡也夫人無諡者何無爵故無諡或曰夫人有諡夫人一國之母修閨門之内羣下亦化之故設諡以彰其善惡春秋傳曰葬宋恭姬傳曰其稱諡何賢也傳曰哀姜者何莊公夫人也卿大夫妻無諡何賤也公妾所以無諡何卑賤無所能務猶士卑小不得有諡也太子夫人無諡何本婦人隨夫太子無諡其夫人不得有諡也天子太子元士也士無諡知太子亦無諡也附庸所以無諡何卑小無爵也王制曰爵祿凡五等附庸本非爵也後夫人於何所諡之以為於朝廷朝廷本所以治政之處臣子共審諡白之於君然後加之婦人大夫故但白君而已何以知不之南郊也婦人本無外事何為於郊也禮曾子問曰唯天子稱天以誄之唯者獨也明天子獨於南郊耳顯號諡何法法日未出而明已入有餘光也五祀五祀者何謂也謂門户井竈中霤也所以祭何人之所處出入所飲食故為神而祭之何以知五祀謂門户井竈中霤也月令曰其祀户又曰其祀竈其祀中霤其祀門其祀井獨大夫已上得祭之何士者位卑禄薄但祭其先祖耳禮曰天子祭天地諸侯祭山川卿大夫祭五祀士祭其祖曲禮曰天地四時山川五祀嵗遍諸侯方祀山川五祀嵗遍卿大夫祭五祀士祭其先非所當祭而祭之名曰滛祀滛祀無福祭五祀所以嵗一遍何順五行也故春即祭户户者人所出入亦春萬物始觸戸而出也夏祭竈者火之主人所以自養也夏亦火王長養萬物秋祭門門以閉藏自固也秋亦萬物成熟内備自守也冬祭井井者水之生藏任地中冬亦水王萬物伏藏六月祭中霤中霤者象土在中央也六月亦土王也故月令春言其祀戸祭先脾夏言其祀竈祭先肺秋言其祀門祭先肝冬言其祀井祭先腎中央言其祀中霤祭先心春祀戸祭所以時先脾者何脾者土也春木主煞土故以所勝祭之也是冬腎六月心非所勝者以祭何以為土位在中央至尊故祭以心心者藏之尊者水最卑不得食其所勝祭五祀天子諸侯以牛卿大夫以羊因四時牲也一說戸以羊竈以雉中霤以豚門以犬井以豕或曰中霤用牛餘不得用豚井以魚社稷王者所以有社稷何為天下求福報功人非土不立非榖不食土地廣博不可徧敬也五榖衆多不可一一而祭也故封土立社示有土尊稷五榖之長故封稷而祭之也尚書曰乃社于新邑孝經曰保其社稷而和其民人蓋諸侯之孝也稷者得陰陽中和之氣而用尤多故為長也歲}
