  - {type: variant, offset: 233, length: 0, content: '', SBCK: 黜不肖尚書曰三載考績三考黜陟何以知始考輙黜之尚書曰三年一考少黜以地書所言三考黜者謂爵土異也小國考之有功増土進爵後考無功削黜後考有功上而賜之矣五十里不過五賜而進爵土七十里不過七賜而進爵土能有小大行有進退也一􅀃盛德始封百里者賜三等得征伐專殺斷獄七十里伯始封賜二等至虎賁百人後有功賜弓矢復有功賜秬鬯増爵爲侯益士百里復有功入爲三公五十里子男始封賜一等至樂復有功稍賜至虎賁増爵爲伯復有功稍賜至秬鬯増爵爲侯未賜鈇􅃏者從大國連率方伯而斷獄受命之五致太平之主美群臣上下之功故盡封之及中興征伐大功皆封所以著大功盛德之士亦封之所以尊有德也以德封者必試之必附庸三年有功因而封五十里元士有功者亦爲附庸丗其位大夫有功成封五十里卿功成封七十里公功成封百里士有功德遷爲大夫大夫有功德遷爲卿卿有功德遷爲公故爵主有德封主有功也}
