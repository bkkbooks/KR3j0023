  front:
  - {type: variant, offset: 0, length: 1, content: 封, SBCK: 白虎通德論卷第七臣班固纂集文質王者始立諸侯皆見何當受法禀正教也尚書輯五瑞覲四嶽謂舜始即位見四方諸侯合符信詩云玄王桓撥受小國是逹受大國是逹言湯王天下大小國諸侯皆來見湯能通逹以禮義也周頌曰烈文辟公錫茲祉福言武王伐紂定天下諸侯來㑹聚於京師受法度也逺近莫不至受命之君天之所興四方莫敢違夷狄咸率服故也何謂五瑞謂珪璧琮璜璋也禮曰天子珪尺二寸又曰􅀶三寸剡上寸半厚半寸爲珪爲璋方中圎外曰璧半璧曰璜圎中牙身玄外曰琮禮記王度曰王者有象君之德燥不輕濕不重薄不澆廉不傷疵不掩是以人君寳之天子之純玉尺有二寸}
