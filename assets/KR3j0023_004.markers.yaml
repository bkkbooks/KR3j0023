  - {type: variant, offset: 0, length: 0, content: '', SBCK: 白虎通德論卷第四臣班固纂集三軍國有三軍何所以戒非常伐無道尊宗廟重社稷安不忘危也何以言有三軍也論語曰子行三軍則誰與詩云周王于邁六師及之三軍者何法法天地人也以爲}
