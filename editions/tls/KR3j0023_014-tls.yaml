body:
  text: 致仕臣年七十懸車致仕者何臣以執事趨走為職七十陽道極耳目不聰明跂踦之屬是以退老去避賢者避賢者路所以長廉遠恥也懸車示不用也致仕者致其事於君君不使退而自去者尊賢者也故曲禮曰大夫七十而致仕今本禮記作事王制曰七十致政鄉卿大夫老有盛德者留賜之几杖不備之以筋力之禮在家者三分其祿以一與之所以厚賢也人年生七十臥非人不溫適四方乘安車與婦人俱自稱曰老夫曲禮曰大夫致仕若不得謝則必賜之几杖王度記曰臣致仕於君者養之以其祿之半几杖所以扶助衰也故王制曰五十杖於家六十杖於鄉七十杖於國八十杖於朝臣老歸年九十君欲有問則就其室以珍從明尊賢也故禮祭義曰八十不仕俟朝於君問則就之大夫老歸死以大夫禮葬車馬衣服如之何曰盡如故也
