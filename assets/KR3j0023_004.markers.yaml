  - {type: variant, offset: 309, length: 6, content: 祀戶祭先脾夏, SBCK: 行也人懐五常故有五諫謂諷諫順諫窺諫􅃌諫伯諫諷者智也患禍之萌深睹其事未彰而諷告此智性也順諫者仁也出辭遜順不逆君心仁之性也窺諫者禮也視君顔色不恱且却恱則復前以禮進退此禮之性也􅃌諫者信也􅃌質相其事也此信之性也伯諫者義也惻􅀮發於中直}
