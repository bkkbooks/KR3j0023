  - {type: variant, offset: 0, length: 132, content: 京師王者必即土中者何王者京師必擇土中何所以均教道平往來使為善易以聞為惡易以聞明當懼慎損於善惡尚書曰王來紹上帝自服於土中聖人承天而制作尚書曰公不敢不敬天之休來相宅周家始封於何后稷封於邰公劉去邰之邠詩云即有台邰家室又曰篤公劉于邠斯觀周家五遷其意一也皆欲成其道也時寧先皇, SBCK: ''}
