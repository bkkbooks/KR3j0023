  - {type: variant, offset: 832, length: 0, content: '', WYG: 君過稱已何法法陰陽共敘共生陽名生陰名煞臣有功歸於君何法法歸明於日也臣法君何法法金正木也子諫父何法法火揉直木也臣諫君不從則去何法法水潤下逹於上也君子逺子近孫何法法木逺火近土也親属臣諌不相去何法法水木枝葉不相離也父為子隠何法法木之藏火也子為父隠何法法水逃金也君有衆民何法法}
