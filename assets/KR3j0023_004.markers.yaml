  - {type: variant, offset: 391, length: 0, content: '', WYG: 得君臣之義必待於郊者忠厚之至也冀君覺悟能用之所以必三年古者臣下有大䘮君三年不呼其門所以復君恩今已所言不合於禮義君欲罪之可得也援神契曰三諫待放復三年盡惓惓也所以言放者臣為君諱若言有罪放之也所諌事已行者遂去不留凡待放冀君用其言耳事已行簒各去無為留也易曰介如石不終日貞吉論語曰三日不朝孔子行臣待於郊者君絶其祿者示不欲去也道不合耳禄參二與之一留與其妻長子使終祭宗廟賜之環則反賜之玦則去明君子重耻也王度記曰反之以玦其不待放者亦與之物明有介主無介民也詩曰逝將去汝適彼樂}
  - {type: page-break, offset: 391, content: '', id: KR3j0023_WYG_001-54b, image: WYG0850/WYG0850-0029d.png}
  - {type: variant, offset: 392, length: 2, content: 位在, WYG: 或曰天子之臣不得言放天子以天下為家也親屬諫不得放者骨肉無相去離之義也春秋傳曰司馬子反曰君請處乎此臣請歸子反者楚公子也時不待放士不得諌者士賤不得預政事故不得諌也謀及之得固盡其忠耳禮保傅大夫進諫士傳民語妻得諫夫者夫婦榮耻共之詩云相䑕有體人而無禮人而無禮胡不遄死此妻諌夫之詩也諫不從不得去之者本娶妻非為諫正也故一與齊終身不改此地無去天之義也子諫父不去者父子一體而分無相離之法猶火去木而滅也論語事父母幾諫下言又敬不違臣之諫君何取法法金正木也子之諫父法火以揉木也臣諫君以義故折正之也子諫父以恩故但揉之也木無毁傷也待放木取法於水火無金則相離也諫者何諫間也因也更也是非相間革更其行也人懷五常故有五諫謂諷諫順諫窺諫指諫伯諫諷諌者智也患禍之萌深睹其事未彰而諷告此智之性也順諫者仁也出辭遜順不逆君心仁之性也窺諫者禮也視君顔色不悅且郤悅則復前以禮進退此禮之性也指諫者信也指質相其事也此信之性也伯諫者義也惻隱發於}
