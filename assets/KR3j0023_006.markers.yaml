  - {type: variant, offset: 3, length: 1, content: 樂, WYG: 學記曰當其為師則不臣也當其為尸則不臣也不臣將師用兵者重士衆為敵國國不可從外治兵不可從内御欲成其威一其令春秋之義兵不稱使明不可臣也不臣三老五更者欲率天下為人子弟禮曰父事三老兄事五更王者不純臣諸侯何尊重之以其列土傳子孫世世稱君南面而治凡不臣異朝則迎之於著覲則待之於阼階升降自西階為庭燎設九賓享禮而後歸是異於衆臣也始封之君不臣諸父兄弟何不忍以己一日之功徳加於諸父兄弟也故禮服傳曰封君之子不臣諸父封君之孫盡臣之禮服傳曰子得為父臣者不遺善之義也詩云文武受命召公維翰召公文王子也傳曰子不得為父臣者閨門尚和朝廷尚敬人不能無過失為恩傷義也王者臣不得為諸侯臣以其尊當與諸侯同春秋傳曰許公不世待以初或曰王者臣得復為諸侯臣者為衰世主上不明賢者非其罪而去道不施行百姓不得其所復令得為諸侯臣施行其道易曰不事王侯此據言王之致仕臣也言不事王可知復言侯者明年少復得仕於諸侯也王者臣有不名者五先王老臣不名親與先王戮力共治國同功於天下故尊而不名也尚書曰咨爾伯不言名也不名者貴賢者而已共成先祖功徳徳加于百姓者也春秋曰單父不言名傳曰大夫之命于天子者大也盛徳之士名尊賢也春秋曰公弟叔盻諸父諸兄不名諸父諸兄者親與己父兄有敵體之義也詩云王曰叔父春秋傳曰王禮者何為長之稱也不名盛徳之士者不可屈爵祿也故韓詩内傳曰師臣者帝交友受臣者王臣臣者霸爵臣者亡不行蓍龜天子下至士皆有蓍龜者重事决疑示不自專尚書曰女則有大疑謀及卿士謀及庶人謀及卜筮定天下之吉凶成天下之亹亹者莫善於蓍龜禮三正記曰天子龜長一尺二寸諸侯一尺大夫八寸士六寸龜隂故數偶也天子蓍長九尺諸侯七尺大夫五尺士三尺蓍陽故數竒也所以先謀及卿士何先盡人事念而不能得思而不能知然後問於蓍龜聖人獨見先睹必問蓍龜何示不自專也或曰清微無端緒非聖人所及聖人亦疑之尚書曰女則有疑謂武王也乾草枯骨衆多非一獨以灼龜何此天地之間夀考之物故問之也龜之為言久也蓍之為言耆也久長意也龜曰卜蓍曰筮何卜赴也爆見兆筮也者信也見其卦也尚書卜三龜禮士冠經曰筮于廟門外筮晝卦所以必於廟何託義歸智於先祖至尊故因先祖而問之也卜春秋何方以為於西方東面蓋蓍之處也卜時西嚮已卜退東向問蓍於東方面以少問老之義皮弁素積求之於質也禮曰皮弁素積筮于廟門之外或曰天子占卜九人諸侯七人大夫五人士三人又尚書曰三人占則從二人之言不見吉凶于蓍復以卜何蓍者陽道多變變乃成龜以制火灼之何禮雜記曰龜陰之老也蓍陽之老也龍非水不處龜非火不兆以陽動陰也必以荆者取其究音也禮三正記曰灼龜以荆以火動龜不以水動蓍何以為嘔則是也蓍龜敗則埋之何重之不欲人襲尊者也周官曰凡國之大事先筮而後卜凡卜人君視體大夫視色士視墨凡人卜事視髙揚火以作龜凡取龜用秋時攻龜用冬時聖人聖人者何聖者通也道也聲也道無所不通明無所不照聞聲知情與天地合徳日月合明四時合序鬼神合吉凶禮别名記曰五人曰茂十人曰選百人曰俊千人曰英倍英曰賢萬人曰傑萬傑曰聖聖人未没時寧知其聖乎曰知之論語曰太宰問子貢曰夫子聖者歟孔子曰太宰知我乎聖人亦自知聖乎曰知之孔子曰文王既没文不在兹乎何以知帝王聖人也易曰古者伏羲氏之王天下也於是始作八卦又曰聖人之作易也又曰伏羲氏没神農氏作神農沒黄帝堯舜氏作文俱言作明皆聖人也論語曰聖乎堯舜其猶病諸何以言禹湯聖人論語曰巍巍乎舜禹之有天下而不預焉與舜比方巍巍知禹湯聖人春秋傳曰湯以聖徳故放桀何以言文王武王周公皆聖人詩曰文王受命非聖不能受命易曰湯武革命順乎天湯武與文王比方孝經曰則周公其人也下言夫聖人之徳又何以加於孝乎何以言臯陶聖人也以自篇曰若稽古臯陶聖人而能為舜陳道朕言惠可底行又旁施象刑維明又聖人皆有表異傳曰伏羲祿衡連珠唯大目鼻龍伏作易八卦以應樞黄帝顔得天匡陽上法中宿取象文昌顓頊戴午是謂清明發節移度盖象招揺帝嚳䮁齒上法月叅康度成紀取理陰陽堯眉八彩是謂通明歴象日月璇璣玉衡舜重瞳子是謂𤣥景上應攝提以象三光禮曰禹耳三漏是謂大通興利除害决河疏江臯陶鳥喙是謂至誠决獄明白察於人情湯臂三肘是謂栁翼攘去不義萬民蕃息文王四乳是謂至仁天下所歸百姓所親武王望羊是謂攝揚盰目陳兵天下富昌周公背僂是謂强俊成就周道輔於幼主孔子反宇是謂尼甫立徳澤所與藏元通流聖人所以能獨見前覩與神通精者盖皆天所生也八風風}
