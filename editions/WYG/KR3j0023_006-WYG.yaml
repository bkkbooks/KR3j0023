body:
  text: 蓍龜天子下至士皆有蓍龜者重事决疑示不自專尚書曰女則有大疑謀及卿士謀及庶人謀及卜筮定天下之吉凶成天下之亹亹者莫善於蓍龜禮三正記曰天子龜長一尺二寸諸侯一尺大夫八寸士六寸龜隂故數偶也天子蓍長九尺諸侯七尺大夫五尺士三尺蓍陽故數竒也所以先謀及卿士何先盡人事念而不能得思而不能知然後問於蓍龜聖人獨見先睹必問蓍龜何示不自專也或曰清微無端緒非聖人所及聖人亦疑之尚書曰女則有疑謂武王也乾草枯骨衆多非一獨以灼龜何此天地之間夀考之物故問之也龜之為言久也蓍之為言耆也久長意也龜曰卜蓍曰筮何卜赴也爆見兆筮也者信也見其卦也尚書卜三龜禮士冠經曰筮于廟門外筮晝卦所以必於廟何託義歸智於先祖至尊故因先祖而問之也卜春秋何方以為於西方東面蓋蓍之處也卜時西嚮已卜退東向問蓍於東方面以少問老之義皮弁素積求之於質也禮曰皮弁素積筮于廟門之外或曰天子占卜九人諸侯七人大夫五人士三人又尚書曰三人占則從二人之言不見吉凶于蓍復以卜何蓍者陽道多變變乃成龜以制火灼之何禮雜記曰龜陰之老也蓍陽之老也龍非水不處龜非火不兆以陽動陰也必以荆者取其究音也禮三正記曰灼龜以荆以火動龜不以水動蓍何以為嘔則是也蓍龜敗則埋之何重之不欲人襲尊者也周官曰凡國之大事先筮而後卜凡卜人君視體大夫視色士視墨凡人卜事視髙揚火以作龜凡取龜用秋時攻龜用冬時聖人聖人者何聖者通也道也聲也道無所不通明無所不照聞聲知情與天地合徳日月合明四時合序鬼神合吉凶禮别名記曰五人曰茂十人曰選百人曰俊千人曰英倍英曰賢萬人曰傑萬傑曰聖聖人未没時寧知其聖乎曰知之論語曰太宰問子貢曰夫子聖者歟孔子曰太宰知我乎聖人亦自知聖乎曰知之孔子曰文王既没文不在兹乎何以知帝王聖人也易曰古者伏羲氏之王天下也於是始作八卦又曰聖人之作易也又曰伏羲氏没神農氏作神農沒黄帝堯舜氏作文俱言作明皆聖人也論語曰聖乎堯舜其猶病諸何以言禹湯聖人論語曰巍巍乎舜禹之有天下而不預焉與舜比方巍巍知禹湯聖人春秋傳曰湯以聖徳故放桀何以言文王武王周公皆聖人詩曰文王受命非聖不能受命易曰湯武革命順乎天湯武與文王比方孝經曰則周公其人也下言夫聖人之徳又何以加於孝乎何以言臯陶聖人也以自篇曰若稽古臯陶聖人而能為舜陳道朕言惠可底行又旁施象刑維明又聖人皆有表異傳曰伏羲祿衡連珠唯大目鼻龍伏作易八卦以應樞黄帝顔得天匡陽上法中宿取象文昌顓頊戴午是謂清明發節移度盖象招揺帝嚳䮁齒上法月叅康度成紀取理陰陽堯眉八彩是謂通明歴象日月璇璣玉衡舜重瞳子是謂𤣥景上應攝提以象三光禮曰禹耳三漏是謂大通興利除害决河疏江臯陶鳥喙是謂至誠决獄明白察於人情湯臂三肘是謂栁翼攘去不義萬民蕃息文王四乳是謂至仁天下所歸百姓所親武王望羊是謂攝揚盰目陳兵天下富昌周公背僂是謂强俊成就周道輔於幼主孔子反宇是謂尼甫立徳澤所與藏元通流聖人所以能獨見前覩與神通精者盖皆天所生也八風風者何謂也風之為言萌也養物成功所以象八卦陽生於五極於九五九四十五日變變以為風陰合陽以生風距冬至四十五日條風至條者正也四十五日明庶風至明庶者迎衆也四十五日清明風至清明者清芒也四十五日景風至景大也陽氣長養四十五日涼風至涼寒也行陰氣也四十五日昌盍風至戒收藏也四十五日不周風至不周者不交也陰陽未合化也四十五日廣莫風至廣莫者大也同陽氣也故曰條風至地暖明庶風至萬物産清明風至物形乾景風至棘造實涼風至黍禾乾昌盍風至生薺麥不周風至蟄蟲匿廣莫風至則萬物伏是以王者承順之條風至則出輕刑觧稽留明庶風至則修封疆理田疇清明風至出幣帛使諸侯景風至則爵有徳封有功涼風至報地徳化四鄉昌盍風至則申象刑飾囷舍不周風至則築官室修城郭廣莫風至則㫁大辟行獄刑商賈商賈何謂也商之為言商其逺近度其有亡通四方之物故謂之商也賈之為言固固有其用物以待民來以求其利者也行曰商止曰賈易曰先王以至日閉闗商旅不行后不省方論語曰沽之哉我待價者也即如是尚書曰肇牽車牛逺服賈用方言逺行可知也方言欽厥父母欲留供養之也
