  - {type: variant, offset: 9, length: 0, content: '', SBCK: 得之惡者失之故春秋公羊傳曰亡國之社奄其上柴其下郊特牲曰䘮國之社屋之自言與天地絶也在門東明自下之無事處也或曰皆當着明誡當近君置宗廟之墻南禮曰亡國之社稷必以爲宗廟之屏示賤之也社稷在中門之外外門之内何尊而親之與先祖同也不置中門内何敬之示不褻瀆也論語曰譬諸宮墻不得其門而入不見宗廟之美百官之富祭義曰右社稷左宗廟大夫有民其有社稷者亦爲報}
