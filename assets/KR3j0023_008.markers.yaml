  - {type: variant, offset: 510, length: 0, content: '', WYG: 故懸罰賞者示有勸也設刑罰者明有所懼也刑所以五何法五行也科條三千者應天地人情也五刑之屬三千大辟之屬二百宫辟之屬三百腓辟之屬五百劓墨辟之屬各千張布羅衆非五刑不見劓墨何其下刑者也腓者其臏宫者女子滛執置宫中不得出也丈夫滛割去其勢也大辟者謂死也刑不上大夫何尊大夫禮不下庶人欲勉民使至於士故禮為有知制刑為無知設也庶人雖有千金之幣不得服刑不上大夫者據禮無大夫刑或曰撻笞之刑也禮不及庶人者謂酬酢之禮也五經孔子所以定五經者何以為孔子居周之末世王道凌遲禮義廢壊强陵弱衆暴寡}
  - {type: page-break, offset: 510, content: '', id: KR3j0023_WYG_002-47b, image: WYG0850/WYG0850-0059d.png}
  - {type: variant, offset: 512, length: 1, content: 太, WYG: 不敢誅方伯不敢伐閔道徳之不行故周流應聘冀行其聖徳自衞反魯自知不用故追定五經以行其道故孔}
  - {type: page-break, offset: 512, content: '', id: KR3j0023_WYG_002-48a, image: WYG0850/WYG0850-0060a.png}
  - {type: variant, offset: 514, length: 3, content: 食菜采, WYG: 曰書曰孝乎惟孝友于兄弟施於有政是亦為政也孔子未定五經如何周衰道失綱散紀亂五敎廢壊故五常之經咸失其所象易失理則陰陽萬物失其性而乖設法謗之言並作書三千篇作詩三百篇而歌謡怨誹也已作春秋後作孝經何欲専制正於孝經何夫孝}
