  - {type: variant, offset: 167, length: 0, content: '', SBCK: 曰命矣夫斯人也而有斯疾也夫子過鄭與弟子相失獨立郭門外或謂子貢曰東門有一人其頭似堯其頸似臯繇其肩似子産然自腰以下不及禹三寸儡儡如䘮家之狗子貢以告孔子孔子喟然而􅀏曰形狀未也如䘮家之狗然哉乎然哉乎宗族宗者何謂也宗尊也爲先祖主也宗人之}
