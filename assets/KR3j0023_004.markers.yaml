  - {type: variant, offset: 395, length: 1, content: 央, WYG: 直言國之害厲志忘生為君不避䘮身義之性也孔子曰諫有五吾從諷之諫事君進思盡忠退思補過去而不訕諫而不露故曲禮曰為人臣不顯諌纎微未見於外如詩所刺也若過惡已著民蒙毒螫天見災變事白異露作詩以刺之幸其覺悟也明王所以立諫諍者皆為重民而求己失也禮保傅曰於是立進善之旌懸誹謗之木建招諫之鼓王法立史記事者以為臣下之儀様人之所取法則也動則當應禮是以必有記過之史徹膳之宰禮玉藻曰動則左史書之言則右史書之禮保傅曰王失度則史書之士誦之三公進讀之宰夫徹其膳是以天子不得為非故史之義不書則死宰不徹膳亦死所以謂之史何明王者使為之也謂之宰何宰制也使制法度也宰所以徹膳何陰陽不調五糓不熟故王者為不盡味而食之禮曰一榖不升不備鷄鷃二榖不升不備三牲人臣之義當掩惡揚美所以記君過何各有所縁也掩惡者謂廣徳宣禮之臣所以為君隱惡何君}
