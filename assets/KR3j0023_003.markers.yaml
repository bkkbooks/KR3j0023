  - {type: variant, offset: 831, length: 0, content: '', SBCK: 居九重之内臣下衛之也蔵於木者依於仁也木自主金須人􅂑之乃成隂卑不能自成也木所以浮金所以沉何子生於母之義肝所以沉肺所以浮何有知者尊其母也一說木畏金金之妻庚受庚之化木者法其本柔可曲直故浮也肝法其化直故沉五行皆同義天子所以内明而外昧人所以外明而内昧何明天人欲相嚮而治也行有五時有四何四時爲時五行爲節故木王即謂之春金王即謂之秋土尊不任職君不居部故時有四也子不肯禪何法法四時火不興土而興金也父死子繼何法法木終火王也兄死弟及何法法夏之承春也善善及子孫何法法春生待夏復長也惡惡止其身何法法秋煞不待冬也主㓜臣攝政何法法土用事於季孟之間也子之復讎何法法土勝水水勝火也子順父臣順君妻順夫何法法地順天也男不離父母何法法火不離木也女離父母何法法水流去金也娶妻親迎何法法日入陽下隂也君譲臣何法法月三十日名其功也善}
  - {type: page-break, offset: 831, content: '', id: KR3j0023_SBCK_003-17a}
  - {type: page-break, offset: 831, content: '', id: KR3j0023_SBCK_003-17b}
