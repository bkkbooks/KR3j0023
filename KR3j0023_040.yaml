body:
  text: 嫁娶人道所以有嫁娶何以為情性之大者莫若男女男女之交人情倫之始莫若夫婦易曰天地氤氳萬物化淳男女稱搆精萬物化生人承天地施陰陽故設嫁娶之禮者重人倫庶廣繼嗣也禮保傅記曰謹為子嫁娶必擇世有仁義者禮男娶女嫁何陰卑不得自專就陽而成之故傳曰陽倡陰和男行女隨男不自專娶女不自專嫁必由父母須媒妁何遠恥防淫泆也詩云娶妻如之何必告父母又曰娶妻如之何匪媒不得男三十而娶女二十而嫁何陽數奇陰數偶男長女幼者何陽道舒陰道促男三十筋骨堅強任為人父女二十肌膚充盛任為人母合為五十應大衍之數生萬物也故禮內則曰男五三十壯有室女二十壯而嫁七歲之陽也八歲之陰也七八十五陰陽之數備有相偶之志故禮記曰女子十五許嫁笄而字禮之稱字陰繫於陽所以專一之節也陽尊無所繫二十五繫者就陰節也陽舒而陰促三十數三三數終奇陽節也二十數再終偶陰節也陽小成於陰大成於陽故二十而冠三十而娶陰小成於陽大成於陰故十五而笄二十而嫁也一說二十五繫者就陰節也春秋穀梁傳曰男二十五繫心女十五許嫁感陰陽也陽數七陰數八男八歲毀齒女七歲毀齒陽數奇故三三八二十四加一為二十五而繫心也陰數偶故再成十四四加一為十五故十五許嫁也各加一者明其專一繫心所以繫心者何防其淫佚也禮曰女子十五許嫁納采問名納吉請期親迎以鴈為贄納徵曰用玄纁故不用鴈贄用鴈者取其隨時而南北不失其節明不奪女子之時也又是隨陽之鳥妻從夫之義也又取飛成行止成列也明嫁娶之禮長幼有序不相踰越也又婚昏禮贄不用死雉故用鴈也納徵玄纁束帛離皮玄三法天纁二法地也陽奇陰偶明陽道之大也離皮者兩皮也以為庭實庭實偶也禮昏經曰納采問名納吉請期親迎皆用鴈納徵用玄纁束帛離皮納徵辭曰吾子有加嘉命貺室某也某有先人之禮離皮束帛使某也請納徵上某者聲也下某者鬫也下次某者使人名也女之父曰吾子順先典貺某重禮某不敢辭敢不承命納采辭曰吾子有惠貺貺室某也某有先人之禮使某也請納采對曰某之子惷愚又不能教吾子命之某不敢辭天子下至士必親迎授綏者何以陽下陰也欲得其歡心示親之心也夫必親迎御輪三周下車曲顧者防淫泆也詩云文定厥祥親迎于渭造舟為梁不顯其光禮昏經曰賓升北面奠鴈再拜拜手稽首降出婦從房中也從降自西階揖婦車授綏遣女於禰廟者重先人之遺支體也不敢自專故告禰也父母親男戒女何親親之至也父曰誡之敬之夙夜無違命女必有端黹繡衣若笄之母施襟結帨曰勉之敬之夙夜無違宮事父誡於阼階母誡於西階庶母及門內施鞶祭紬申之以父母之命命之曰敬恭聽爾父母之言夙夜無愆視諸衿鞶祭去不辭誡不誥諾者蓋恥之重去也禮曰嫁女之家不絕火三日相思思相離也娶婦之家三日不舉樂思嗣親也感親年衰老代至也禮曰婚禮不賀人之序也授綏姆辭曰未教未乞不足與為禮也始親迎於辭擯者請辭曰吾子命某以茲初昏使某將請承命主人曰某故敬具以酒須父命醮子遣之迎命曰往迎爾相承我宗事勗率以敬先妣之嗣若則有常子曰諾唯恐不堪不敢忘命娶妻不先告廟到者示不必安也婚昏禮請期不敢必也婦人入三月然後祭行舅姑既沒亦婦入三月奠采于廟三月一時物有成者人之善惡可得知也然後可得事宗廟之禮曾子曰女未廟見而死歸葬于女氏之黨示未成婦也嫁娶必以春者何春天地交通萬物始生陰陽交接之時也詩云士如歸妻迨冰未泮夫有惡行妻不得去者地無去天之義也夫雖有惡不得去也故禮郊特牲曰一與之齊終身不改悖逆人倫殺妻父母廢絕綱紀亂之大者也義絕乃得去也天子諸侯一娶九女者何重國廣繼嗣也適也九者何法地有九州承天之施無所不生也一娶九女亦足以成君之施也九而無子百亦無益也王度記曰天子天子諸侯一娶九女春秋公羊傳曰諸侯娶一國則二國往媵之以姪娣從謂之姪者何兄之子也娣者何女弟也或曰天子娶十二女法天有十二月萬物必生也必一娶何防淫泆也為其棄德嗜色故一娶而已人君無再娶之義也備姪娣從者為其必不相嫉也一人有子三人共之若己生之生之也不娶兩娣何傳博異氣也娶三國女何廣異類也恐一國血脈相似俱無子也姪娣年雖少猶從適人者明人者明人君無再娶之義也還待年於父母之國未任荅君子也詩云姪娣從之祁祁如雲韓侯顧之爛其盈門公羊傳曰叔姬歸于紀明待年也二國來媵誰為尊者大國為尊國等同以德德同以色質家法為天尊左文家法地尊右所以不聘妾何人有子孫欲尊之義義不可永求人以為賤也春秋傳曰二國來媵可求人為士不可求人為妾何士即尊之漸賢不止於士妾雖賢不得為適嫡娶妻卜之何卜女之德知相宜否昏禮經曰將加諸卜敢問女為誰氏也人君及宗子無父母自定娶者卑不主尊賤不主貴故自定之也昏禮經曰親皆沒己聘躬命之詩云文定厥祥親迎于渭大夫功成受封得備八妾者重國廣繼嗣也不更聘大國者不忘本適嫡也故禮曰納女於諸侯大夫曰備掃灑天子之太子諸侯之世子皆以諸侯禮娶與君同示無再娶之義也王者之娶必先選于大國之女禮儀備所見多詩云大邦有子俔天之妹文定厥祥親迎于渭明王者必娶大國也春秋曰紀侯來朝紀子以嫁女於天子故增爵稱侯至數十年之間紀侯無他功但以子為天王后故爵稱侯知雖小國者必封以大國明其尊所不臣也王者娶及庶人邦者何開天下之賢示士不遺善也故春秋曰紀侯來朝交文加為侯明封之也先封之明不與聖人庶邦交禮也女行虧缺而去其國如之何以封為諸侯比例矣諸侯所以不得自趣娶國中何諸侯不得專封義不可臣其父母春秋傳曰宋三代無大夫惡其內娶也不娶同姓者重人倫防淫泆恥與禽獸同也論語曰君娶於吳為同姓謂之吳孟子曲禮曰買妾不知其姓則卜之外屬小功已上亦不得娶也以春秋傳曰譏娶母黨也王者嫁女必使同姓諸侯主之何婚禮貴和不可相荅為傷君臣之義亦欲使女不以天子之尊乘諸侯也春秋傳曰天子嫁女于諸侯必使諸侯同姓者主之諸侯嫁女于大夫使大夫同姓者主之必使同姓者以其同宗共祖可以主親也故使攝父事不使同姓卿主之何尊加諸侯為威厭不得舒也不使同姓諸侯就京師主之何諸侯親迎入京師當朝天子為禮不兼春秋傳曰築土王姬觀于外明不往京師也所以必更築觀者何尊之也不於路寢路寢本所以行政處非婦人之居也小寢則嫌群公子之舍則已卑矣故必改築於城郭之內傳曰築之禮也于外非禮也卿大夫一妻二妾者何尊賢重繼嗣也不備姪娣何北面之臣賤不足盡執人骨肉之親禮服經曰貴臣貴妾明有卑賤妾也士一妻一妾何下卿大夫禮喪服小記曰士妾有子則為之緦娉聘嫡夫未往而死媵當往否乎人君不再娶之義也天命不可保故一娶九女以春秋伯姬卒時娣季姬更嫁鄫春秋譏之適夫人死後更立夫人者不敢以卑賤承宗廟自立其娣者尊大國也春秋傳曰叔姬歸于紀叔姬者伯姬之娣也伯姬卒叔姬升于嫡經不譏也或曰嫡死不復更立明嫡無二防篡煞也祭宗廟攝而已以禮不聘為妾明不升曾子問曰昏禮既納幣有吉日女之父母死何如孔子曰婿使人吊弔之如婿之父母死女亦使人吊弔之父喪稱父母喪稱母父母不在則稱伯父世尊母葬壯父叔父使人致命女氏曰某子有父母之喪不得嗣為兄弟使母某致命女氏許諾不敢嫁禮也免喪女父使人請不娶而後嫁之禮也女之父母死亦如之婦人所以有師何學事人之道也詩云言告師氏言告言歸禮昏昏禮經曰告教于公宮三月婦人學一時足以成矣與君有緦麻之親者教於公宮三月與君無親者各教於宗廟宗婦之室國君取大夫之妾士之妻老無子者而明於婦道又者祿之使教宗室五屬之女大夫士皆有宗族自於宗子之室學事人也女必有傅姆何尊之也春秋傳曰傅至矣姆未至婦人學事舅姑不學事必父母夫者示婦與夫一體也禮內則曰妾事夫人如事舅姑尊嫡絕嫉之原禮服傳曰妾事女君與事舅姑同也婦事夫有四禮焉雞初鳴咸盥漱櫛縱縰笄總而朝君臣之道也惻隱之恩父子之道也會計有無兄弟之道也閨閫之內衽席之上朋友之道也聞見異辭故設此也有五不娶亂家之子不娶逆家之子不娶世有刑人惡疾喪婦長子此不娶也出婦之義必送之接以賓客之禮君子絕愈于小人之交詩云薄送我畿天子之妃謂之后何后者君也天子妃至尊天下尊之故謂之后也明海內小人之君子也妻妾者何謂也妻者齊也與夫齊體自天子下至庶人其義一也妾者接也以時接見也嫁娶者何謂也嫁者家也婦人外成以出適人為嫁家娶者取也男女者何謂也男者任也任功業也女者如也從如人也在家從父母既嫁從夫夫沒從子也傳曰婦人有三從之義也夫婦者何謂也夫者扶也扶以人道者也婦者服也服於家事事人者也妃者匹也配妃疋者何謂相與偶也焉婚姻者何謂也婚者昏時行禮故謂之曰婚也姻者婦人因夫而成故曰姻詩云不惟舊因謂夫也又曰燕爾新婚謂婦也所以昏時行禮何示陽下陰也婚昏亦陰陽交時也男子六十閉房何所以輔衰也故重性命也又曰父子不同椸為亂長幼之序也禮內則曰妾雖老未滿五十必預與五日之御滿五十不御俱為助衰也至七十大衰食非肉不飽寢非人不暖故七十復開房也
