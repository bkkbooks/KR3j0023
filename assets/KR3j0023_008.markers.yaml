  - {type: variant, offset: 184, length: 1, content: 徑, krp: 稱也臣子當諱爲物示通故避之也曲禮曰二名不偏諱逮事父母則諱王父母不逮父母則不諱王父母也君前不諱詩書不諱臨文不諱郊廟中不諱又曰君前臣名父前子名謂大夫名卿弟名兄也明不敢諱於尊者前也太古之時所不諱者何尚質也故臣子㸦言其君父之名故禮記曰朝日上值不諱正天名也人所以十月而生者何人天子之也}
