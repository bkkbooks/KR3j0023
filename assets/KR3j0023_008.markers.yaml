  - {type: variant, offset: 499, length: 2, content: 縣內, WYG: 也經天地之數五故十月而備乃成人也人生所以泣何本一幹而分得氣異息故泣重離母之義也尚書曰啓呱呱泣也人拜所以自名者何所以泣號自紀禮拜自後不自名何備隂陽也人所以相拜者何所以表情見意屈節卑體尊事之者也拜之言服也所以必再拜何法隂陽也尚書曰再拜稽首也必稽首何敬之至也頭至地何以言首謂頭也禮曰首有瘍則沐所以先拜首後稽首何名順其父質也尚書曰周公拜首稽首人所以有字何冠徳明功敬成人也故禮士冠經曰賓北靣字之曰伯某甫又曰冠而字之敬其名也所以五十乃稱伯仲者五十知天命思慮定也能順四時長幼之序故以伯仲號之禮檀弓曰幼名冠字五十乃稱伯仲論語曰五十而知天命稱號所以有四何法四時用事先後長幼兄弟之象也故以時長幼號曰伯仲叔季也伯者長也伯者子最長迫近父也仲者中也叔者少也季者幼也適長稱伯伯禽是也庶長稱孟以魯大夫孟氏男女異長各自有伯仲法陰陽各自有終始也春秋傳曰伯姬者何内女稱也婦人十五稱伯仲何婦人值少變陰陽道促蚤成十五通乎織絍之事思慮定故許嫁笄而字故禮經曰女子十五許嫁笄禮之稱字之婦姓以配字何明不娶同姓也故春秋曰伯姬歸于宋姬者姓也値字所以於仲春何値者親故近於仲文子尊尊故於伯仲之時物尚値叔之時物失之章即如是周有八士論語曰伯達伯适仲突仲忽叔夜叔夏季隨季騧積於叔何盖以兩兩俱生故也不積於伯季明其無二也文王十子詩傳曰伯邑考武王發周公旦管叔鮮蔡叔鐸成叔處霍叔武康叔封南季載載所以或上其叔何也管蔡霍成康南皆采也故上置叔上伯邑叔震也以獨無乎盖以為大夫者不是采地也天地天者何也天之為言鎮也居髙理下為人鎮也地者易也言養萬物懐任交易變化也始起之天始起先有太初後有太始形兆既成名曰太素混沌相連視之不見聽之不聞然後剖判清濁既分精出曜布度物施生精者為三光號者為五行行生情情生汁中汁中生神明神明生道徳道徳生文章故乾鑿度曰太初者氣之始也太始者形兆之始也太素者質之始也陽唱陰和男行女隨也天道所以左旋地道右周何以為天地動而不别行而不離所以在旋右周者猶君臣陰陽相對之義男女㹅名為人天地所以無㹅名何曰天圓地方不相類故無總名也君舒臣疾卑者宜勞天所以反常行何以為陽不動無以行其敎陰不静無以成其化雖終日乾乾亦不離其處也故易曰終日乾乾反覆道也日月天左旋日月五星右行何日月五星比天為陰故右行右行者猶臣對君也含文嘉曰計日月右行也刑徳放日月東行而日行遲月行疾何君舒臣勞也日日行一度月日行十三度十九分度之七感精符曰三綱之義日為君月為臣也日月所以懸晝夜者何助天行化照明下地故易曰懸象著明莫大乎日月日之為言實也常滿有節月之為言闕也有滿有闕也所以有缺何歸功於日也八日成光二八十六日轉而歸功晦至朔旦受符復行故援神契曰月三日成魄也所以名之為星何星者精也據日節言也一日一夜適行一度一日夜為一日剩復分天為三十六度周天三百六十五度四分度之一日月徑千里也所以必有晝夜何備陰陽也日照晝月照夜日所以有長短何陰陽更相用事也故夏節晝長冬節夜長夏日宿在東井出寅入戌冬日宿在牽牛出辰入申月大小何天道左旋日月東行日日行一度月日行十三度月及日為一月至二十九日未及七度即三十日者過行七度日不可分故月乍大小明有陰陽故春秋曰九月庚戌朔日有食之十月庚辰朔日有食之此三十日也又曰七月甲子朔日有食之八月癸巳朔日有食之此二十九日也月有閏餘何周天三百六十五日度四分度之一嵗十二月日過十二度故三年一閏五年再閏明陰不足陽有餘也故䜟曰閏者陽之餘四時所以名為歳何歳者遂也三百六十六日一周天萬物畢死故為一歳也尚書曰朞三百有六旬有六日以閏月定四時成歲春夏秋冬時者朞也陰陽消息之朞也四時天異名何天尊各據其盛者為名也春秋物變盛冬夏氣變盛春曰蒼天夏曰昊天秋曰旻天冬為上天爾雅曰一説春為蒼天等是也四時不隨正朔變何以為四時據物為名春當生冬當終皆以正為時也或言嵗或言載或言年何言嵗者以紀氣物帝王共之據曰為嵗春秋曰元年正月十有二月朔有朔者晦知據月斷為言年載之言成也載成萬物終始言之也二帝為載三王言年皆謂闚􅎿故尚書曰三載四海遏宻八音謂二帝也又曰諒陰三年謂三王也春秋傳曰三年之䘮其實二十五月知闚􅎿日言夜月言晦月言朔日言朝何朔之言蘓也明消更生故言朔日晝見夜藏有朝夕故言朝也衣裳聖人所以制衣服何以為絺􅗽蔽形表徳勸善别尊卑也所以名為裳何衣者隠也裳者鄣也所以隠形自鄣閉也易曰黄帝堯舜垂衣裳而天下治何以知上為衣下為裳以其先言衣也詩曰褰裳渉溱所以合為衣也弟子職言摳衣而降也名為衣何上兼下也獨以羔裘何取輕煖因狐死首丘明君子不忘本也羔者取跪乳遜順也故天子狐白}
