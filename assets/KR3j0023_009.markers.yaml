  - {type: variant, offset: 15, length: 0, content: '', SBCK: 又取飛成行止成列也明嫁娶之禮長㓜有序不相踰越也又婚禮贄不用死雉故用鴈也納徴玄纁束帛離皮玄三法天纁二法地也陽竒隂偶明陽道之大也離皮者兩皮也以爲庭實庭實偶也禮昏經曰納采問名納吉請期親迎皆用鴈納徴束帛離皮納徴辭曰吾子有加命貺室某也有先人之禮離皮束帛使某請納徴上某者聲名也下次某者使人名也女之父曰吾子順先典貺某重禮某不敢辭敢不承命納采辭曰吾子有惠貺貺室某某有先人之禮使某也請納采對曰某之子惷愚又不能教吾子命之某不敢辭天子下至士必親迎授綏者何以陽下隂也欲得其歡心示親之心也夫親迎輪三周下車曲顧者防滛泆也詩云文定厥祥親迎于渭造舟爲梁不顯其光禮昏經曰賔升北靣奠鴈再拜拜手稽首降出婦從房中也從降自西階揖御婦車授綏遣女於禰廟者重先人之遺支體也不敢自專故告禰也父母親男女何親親之至也父曰誡之敬之夙夜無違命女必有端繡衣􅀂笄之母施􅁭結帨曰勉之敬之夙夜無違宫事父誡於阼階母誡於西階庻母及門内施鞶祭紬以母之命命曰敬㳟聽爾父母}
  - {type: page-break, offset: 15, content: '', id: KR3j0023_SBCK_009-3a}
