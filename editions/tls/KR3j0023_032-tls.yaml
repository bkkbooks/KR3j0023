body:
  text: 宗族宗者何謂也宗者尊也為先祖主也宗人之所尊也禮曰宗人將有事族人皆待侍聖古者所以必有宗何也所以長和睦也大宗能率小宗小宗能率群弟通於其有無所以紀理族人者也宗其為始祖後者為大宗此百世之所宗也宗其為高祖後者五世而遷者也高祖遷於上故曰祖遷於上宗則易於下宗其為曾祖後者為曾祖宗宗其為祖後者為祖宗宗其為父後者為父宗父宗以上至高祖宗皆為小宗以其轉遷別於大宗也別子者自為其子孫為祖繼別也者各自為宗所謂小宗有四大宗有一凡有五宗人之親所以備矣諸侯奪宗明尊者宜之大夫不得奪宗何曰諸侯世世傳子孫故奪宗大夫不傳子孫故不奪宗也喪服經曰大夫為宗子不言諸侯為宗子也族者何也族者湊也聚也謂恩愛相流湊也上湊高祖下至玄孫一家有吉百家聚之合而為親生相親愛死相哀痛有會聚之道故謂之族尚書曰以親九族族所以有九何九之為言究也親疏恩愛究竟謂之九族也謂父族四母族三妻族二父族四者謂父之姓一族也父女昆弟適人有子為二族也身女昆弟適人有子為三族也身女子適人有子為四族也母族三者母之父母一族也母之昆弟二族也母昆弟子三族也母昆弟者男女皆在外親故合言之妻族二者妻之父為一族妻之母為二族妻之親略故父母各一族禮曰惟氏三族之不虞尚書曰以親九族義同也一說合言九族者欲明堯時俱三也禮所以獨父族四何欲言周承二弊之後民人皆厚於末故興與禮母族妻之黨廢禮母族父之族足是以貶妻族以附父族也或言九者據有交接之恩也若刑侯之姊姨覃公惟私也言四者據有服耳不相害所異也
