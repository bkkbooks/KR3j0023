  - {type: variant, offset: 262, length: 3, content: 祭井井, SBCK: 至陽始起隂氣推而上故大寒也諫諍臣所以有諫君之義何盡忠納誠也愛之能無勞乎忠焉能無誨乎孝經曰天子有諍臣七人雖無道不失其天下諸侯有諍臣五人雖無道不失其國大夫有諍臣三人雖無道不失其家士有諍友則身不離於令名父有諍子則身不䧟於不義天子置左輔右弼前凝後承以順左輔主修政㓨不法右弼主糺周言失傾前凝主糺度定德經後承主匡正常考變天四弼興道率主行仁夫陽變於七以三成故建三公序四諍列七人雖無道不失天下杖辟賢也諸侯諍不􅀙得去何以屈尊申卑􅀌惡君也去日某質性頑鈍言愚不任用請退避賢如是之是待以禮臣待放如不以禮待遂去君待之以禮柰何曰予熟思夫子言未得其道今子不且留聖王之制無塞賢之路夫子欲何之則遣大夫送至于郊必三諫}
  - {type: page-break, offset: 262, content: '', id: KR3j0023_SBCK_004-8b}
  - {type: page-break, offset: 262, content: '', id: KR3j0023_SBCK_004-9a}
  - {type: variant, offset: 262, length: 34, content: 祭井井者水之生主藏任在地中冬亦水王萬物伏藏六月祭中霤中霤者象土在中央, WYG: 至陽始起隂氣推而上故大寒}
  - {type: variant, offset: 262, length: 0, content: '', krp: 至陽始起隂氣推而上故大寒也諫諍臣所以有諫君之義何盡忠納誠也愛之能無勞乎忠焉能無誨乎孝經曰天子有諍臣七人雖無道不失其天下諸侯有諍臣五人雖無道不失其國大夫有諍臣三人雖無道不失其家士有諍友則身不離於令名父有諍子則身不䧟於不義天子置左輔右弼前凝後承以順左輔主修政㓨不法右弼主糺周言失傾前凝主糺度定德經後承主匡正常考變天四弼興道率主行仁夫陽變於七以三成故建三公序四諍列七人雖無道不失天下杖辟賢也諸侯諍不從得去何以屈尊申卑孤惡君也去日某質性頑鈍言愚不任用請退避賢如是之是待以禮臣待放如不以禮待遂去君待之以禮柰何曰予熟思夫子言未得其道今子不且留聖王之制無塞賢之路夫子欲何之則遣大夫送至于郊必三諫者何以爲得君臣之義必得於郊者忠厚之至也兾君覺悟能用之所以必三年古者臣下有大䘮君子年不呼其門所以復君恩今已所言不合於禮義君欲罪之可得也援神契曰三諫待放復二千盡惓惓也所以言放者臣爲君諱若言有罪放之也所諫事巳行者遂去不留凡待放兾君用其言耳事巳行篡各去無爲留也易曰介如石不終日貞吉論語曰三日不朝孔子行臣待於郊者君絶其禄者示不欲去也道不合耳禄參三與之一留與其妻長子使終}
