body:
  text: 喪服諸侯為天子斬衰三年何普天之下莫非王土率土之賓莫非王臣臣之於君猶子之於父明至尊臣子之義也喪服經曰諸侯為天子斬衰三年天子為諸侯天子為諸侯絶其何示同愛百姓明不獨親其親也故禮中庸曰之喪達乎諸侯大夫三年之喪達乎天子卿大夫降緦重公正也禮庶人為國君服齊衰三月王者崩京師之民喪三月何民賤而王貴故思恩淺故三月而已天子七月而葬諸侯五月而葬者則民始哭素服先葬三月成齊衰期月以成禮葬君也禮不下庶人所以為民制服何禮不下庶人者尊卑制度也服者恩從內發故為之制也王者崩臣下服之有先後何恩有深淺遠近故制有日月檀弓記曰天子崩三日祝先服五日官長服七日國中男女服三月天下服三年之喪何二十五月以為古民質痛於死者不封不樹喪期無數亡之則除後代聖人因天地萬物有終始而為之制以斷之父至尊母至親故為於加隆以盡孝子之恩恩愛至深加之則倍故再二十五月也禮有取於三故謂之三年緣其漸三年之氣也故春秋傳曰三年之喪其實二十五月也三年之喪不以閏月數何以其言期也者復其時也大功已下月數故以閏月除禮士虞經曰言而小祥又而大祥喪禮必制衰麻何以副意也服以飾情情貌相配中外相應故吉凶不同服歌哭不同聲所以表中誠也布衰裳麻絰蕭箭笄繩纓苴杖為略反本絰者亦示也故炕總而載之示有喪也腰絰者以伐代紳帶也所以結之何思慕腸若結也必再結之何明思慕無已所以必杖者孝子失親悲哀哭泣三日不食身體嬴羸病故杖以扶身明不以死傷生也禮童子婦人不杖者以其不能病也禮曰斬衰三日不食齎齊衰二日不食大功一日不食小功緦麻一日再不食不再食可也所以杖竹桐何取其名也竹者蹙也桐者痛也父以竹母以桐何竹者陽也桐者陰也竹何以為陽竹斷而用之質故為陽桐削而用之加人功文故為陰也故禮曰苴杖竹也削杖桐也所以孝子必居倚廬何孝子哀不欲聞人之聲又不欲居故處居中門之外倚木為廬質反古也不在門外何戒不虞故也故禮大閒傳曰父母之葬居倚廬於中門外東暀戶北面向練而居聖堊室無餘飾之室又曰婦人不居倚廬又曰天子七日又曰又曰二字公諸侯五日卿大夫三日而服成居外門內赤東壁下為廬寢苫塊哭晝無夜時不脫絰帶既虞寢有席蔬疏食飲水水飲朝一哭夕一哭而已既練舍外寢居堊室始食菜果及反素食哭無時二十五月而大祥飲醴酒食乾肉二十七月而禫通祭宗廟去喪之殺也喪禮不言者何思慕盡情也言不文者指謂士民不言而事成者國君卿大夫杖而謝賓財少恃力面垢作身不言而事具者故號哭盡情喪有病得飲酒食肉何所以輔人生已重先祖遺支體也故曲禮曰居喪之禮頭有瘡則沐身有瘍則浴有疾則飲酒食肉五十不致毀六十不毀七十唯衰麻在身飲酒食肉又曰父母有疾食肉不至變味飲酒不至變貌笑不至矧怒不至詈琴瑟不御曾子問曰三年之喪練不群立不旅行禮以飾情三年之喪而吊弔哭不亦虛乎禮檀弓曰曾子有母之喪弔子張子張者朋友有服雖重服吊弔之可也曾子問曰小功可以與祭乎孔子曰斬衰已下與祭禮也此謂君喪然也子夏問三年之喪既卒哭金革之事無避者禮與孔子曰吾聞諸老聃曰魯周公伯禽則有為之為為之也今以三年之喪從其利者吾不知也婦人不出境吊弔者婦人無外事防淫佚也禮雜記曰婦人越彊疆而吊弔非禮也而有三年喪君與夫人俱往禮妻為父母服夫亦當服有不吊弔三何為人臣子常懷恐懼深思遠慮志在乃全身今乃畏厭溺死用為不義故不吊弔也檀弓曰不吊弔三畏厭溺也畏者兵死也禮魯曾子記曰大辱加於身皮支體毀傷即君不臣士不交祭不得為昭穆之尸食不得昭穆之牲死不得葬昭穆之城域也弟子為師服者弟子有臣君君臣父子朋友之道也故生則尊敬而親之死則哀痛之恩深義重故為之隆服入則絰出則否檀弓曰昔夫子之喪顏回若喪子而無服喪子路亦然請喪天夫子若喪父而無服也曾子問曰君薨既殯而臣有父母之喪則如之何孔子曰歸居于家有殷事則之君所朝夕否曰君既斂啓而臣有父母之喪則如之何孔子曰歸殯哭而反于送君曰君未殯而臣有父母之喪則如之何孔子曰歸殯反于君所有殷事則歸朝夕否大夫家室老行事士則子孫行事大夫內子有殷事則亦如之君所朝夕否諸侯有親喪聞天子崩奔喪者何屈己親親猶尊尊之義也春秋傳曰天子記崩不記葬者必其時葬也諸侯記葬不必有時諸侯為有天子喪奔喪尚奔不得必以其時葬也大夫使受命而出聞父母之喪非君命不反者蓋重君也故春秋傳曰大夫以君命出聞喪徐行不反諸侯朝而有私喪得還何凶服不入公門君不呼之義也凶服不敢入公門者明尊朝廷吉凶不相干故周官曰凶服不入公門曲禮曰居喪不言樂祭事不言凶公庭不言婦女論語曰子於是日哭則不歌臣下有大喪不呼其門者使得終其孝道成其大禮春秋傳曰古者臣有大喪君三年不呼其門聞哀喪哭而後行何盡哀舒憤然後行望國境則哭過市朝則否君子自抑小人勉以及禮見星則止日行百里惻怛之心但欲見尸柩汲汲故禮奔喪記曰以哭答使者盡哀問故遂行曾子曰師行三十里者吉行五十里奔喪百里既除喪乃歸哭於墓何明死者不可見痛傷之至也謂喪不得追服者也哭於墓而已故禮奔喪記曰之墓西向哭止此謂遠出歸後葬喪服以禮除曾子與客立於門其徒趨而出曾子曰爾將何之曰吾父死將出哭於巷曾子曰反哭於爾次曾子北面而吊弔焉檀弓記曰孔子曰吾惡乎哭諸兄弟吾哭諸廟門之外師吾哭諸寢朋友吾哭諸寢門外所知吾哭諸野養從生葬從死周公以王禮葬何以為周公踐祚阼理政與天同志展與興周道顯天度數萬物咸得休氣允寒充塞原天之意豫子愛周公與文武無異故以王禮葬使得郊祭尚書曰今天動威以彰周公之德下言禮亦宜之
