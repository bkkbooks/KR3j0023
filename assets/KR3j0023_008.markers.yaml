  - {type: variant, offset: 162, length: 2, content: 師眾, SBCK: 府者爲藏宫府也故禮運記曰六情所以扶成五性也胃者脾之府也脾主禀氣胃者榖之委也故脾禀氣也膀胱者腎之府也腎者主瀉膀胱常能有􅀬故先决難也三焦者包絡府也水榖之道路氣之所終始也故上焦􅀂竅中焦􅀂編下焦􅀂瀆膽者肝之府也肝者木之精也主仁仁者不忍故以膽斷也是以肝膽二者必有勇也肝膽異􅃐何以知相爲府也肝者木之精也木之爲言牧也人怒無不色青目脤張者是其効也小腸大腸心肺府也主禮義禮義者有分理腸之大小相承受也腸爲心肺主心爲皮體主故爲兩府也目爲心視口爲心談耳爲心聽鼻爲心嗅是其支體主也喜在西方怒在東方好在北方惡在南方哀在下樂在上何以西方萬物之成故喜東方萬物之生故怒北方陽氣始施故好南方隂氣始起故惡上多樂下多哀也魂魄者何謂魂猶伝伝也行不休於外也主於情魄者迫然著人主於性也魂者芸也情以除􅁾魄者白也性以治内精神者何謂也精者静也太隂施化之氣也象火之化任生也神者恍惚太隂之氣也間棇云支體萬化之本也壽命命者何謂也人之壽}
