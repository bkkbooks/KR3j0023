  - {type: variant, offset: 4, length: 0, content: '', SBCK: 者縁臣子心以爲之制差其尊卑以副其意公侯以玉爲贄者玉取其燥不輕濕不重公之德全輕以羔者取其群不黨卿職在盡忠率下不阿黨也大夫以鴈爲贄者取其飛成行列大夫職在以奉命之適四方動作當能自正以事君也士以雉爲贄者取其不可誘之以食懾之以威必死不可生畜士行威守節死義不當移轉也曲禮曰卿羔大夫以鴈士以雉爲贄庻人之贄疋童子委贄而退野外軍中無贄以纓拾矢可也言必有贄也疋謂鶩也卿大夫贄古以麑鹿今以羔鴈何以爲古者質取其内謂得羙草鳴相呼今文取其外謂羔跪乳鴈有行列也禮相見經曰上大夫相見以羔左顧右贄執麑明古以麑鹿今以羔也卿大夫贄變君與士贄不變何人君至尊極美之物以爲贄士賤伏節死義一介之道也故不變􅀻相見亦有贄何所以相尊敬長和睦也朋友之際五常之道有通財之義賑窮教急之意中心好之欲飲食之故財幣}
