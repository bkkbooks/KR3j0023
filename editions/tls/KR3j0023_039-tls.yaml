body:
  text: 五經孔子所以定五經者何以為孔子居周之末世王道凌遲禮義廢壞強陵弱眾暴寡天子不敢誅方伯不敢伐閔道德之不行故周流應聘冀行其聖道德自衛反魯自知不用故追定五經以行其道故孔子曰書曰孝乎惟孝友于兄弟施於有政是以為政也孔子未定五經如何周衰道失綱散紀亂五教廢壞故五常之經咸失其所象易失理則陰陽萬物失其性而乖設法謗之言並作書三千篇作詩三百篇而歌謠怨誹也已作春秋後復作孝經何欲專制正於孝經何夫孝者自天子下至庶人上下通孝經者夫制作禮樂仁之本聖人道德已備弟子所以復記論語何見夫子遭事異變出之號令失足法文王所以演易何文商王受王不率仁義之道失為人法矣己之調和陰陽尚微故演易使我得卒至于太平日月之光明則如易矣伏羲作八卦何伏羲始王天下未有前聖法度故仰則觀象於天俯則察法於地觀鳥獸之文與地之宜近取諸身遠取諸物於是始作八卦以通神明之德以象萬物之情也經所以有五何經常也有五常之道故曰五經樂仁書義禮禮易智詩信也人情有五性懷五常不能自成是以聖人象矣天五常之道而明之以教人成其德也五經何謂謂易尚書詩禮春秋也禮經解曰溫柔寬厚詩教也疏通知遠書教也廣博易良樂教也春秋何常也則黃帝已來何以言之易曰上古結繩以而治後世聖人易之以書契百官以理萬民以察後世聖人者謂五常帝也傳曰三王皇百世計神元玄書五帝之世受錄圖世史記從政錄帝魁已來除禮樂之書三千二百四十篇也
