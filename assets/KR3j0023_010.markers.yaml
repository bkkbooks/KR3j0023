  - {type: variant, offset: 736, length: 3, content: 言開自, SBCK: 輔人生巳重先祖遺支體也故曲禮曰居䘮之禮頭有瘡則沐身有瘍則浴有疾則飲酒食􅁏五十不致毀七十唯衰麻在身飲酒食􅁏又曰父母有疾食􅁏不至變味飲酒不至變皃􅀏不至矧怒不至詈琴瑟不御曽子問曰三年之䘮練不羣立不旅行禮以飾情三年之䘮而吊哭不亦虚乎禮檀弓曰曽子有母之䘮弔子張子張者朋友有服雖重服吊之可也曽子問曰小功可以與祭乎孔子曰斬衰巳下與􅀕禮也此謂君䘮然也子夏問三年之䘮旣卒哭金革之事無避者禮與孔子曰吾聞諸老聃曰魯公伯禽則有爲之也今以三年之䘮從其利者吾不知也婦人不}
